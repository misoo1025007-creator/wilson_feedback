<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>윌슨 주간 현장 피드백</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{--navy:#1B3A6B;--navy-dark:#122a52;--yellow:#F5C400;--red:#c0392b;--red-bg:#fff5f5;--red-bd:#fcc;--green:#1a7a4a;--green-bg:#f0faf5;--gray:#f4f5f8;--border:#e2e6ed;--text:#1c1c2e;--muted:#6b7280;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--gray);color:var(--text);font-size:14px;line-height:1.7;}
header{background:var(--navy);height:60px;display:flex;align-items:center;padding:0 28px;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.logo{font-size:22px;font-weight:700;color:#fff;letter-spacing:.03em;}.logo em{color:var(--yellow);font-style:normal;}
.hbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;}
.hbtn:hover{background:rgba(255,255,255,.22);}
.wtabs{background:var(--navy-dark);display:flex;padding:0 24px;overflow-x:auto;scrollbar-width:none;gap:2px;}
.wtabs::-webkit-scrollbar{display:none;}
.wtab{background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;padding:10px 16px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .2s;}
.wtab:hover{color:rgba(255,255,255,.85);}.wtab.on{color:var(--yellow);border-bottom-color:var(--yellow);font-weight:700;}.wtab.add{color:rgba(255,255,255,.35);font-size:12px;}
.layout{display:flex;max-width:1360px;margin:0 auto;}
.sidebar{width:190px;flex-shrink:0;padding:18px 0 18px 18px;position:sticky;top:100px;max-height:calc(100vh - 100px);overflow-y:auto;scrollbar-width:thin;}
.sb-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--muted);text-transform:uppercase;padding:0 8px;margin-bottom:8px;}
.sb-item{display:block;width:100%;text-align:left;background:none;border:none;padding:7px 8px;border-radius:6px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s;margin-bottom:1px;line-height:1.35;}
.sb-item:hover{background:var(--border);color:var(--text);}.sb-item.on{background:var(--navy);color:#fff;font-weight:600;}
.sb-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.main{flex:1;padding:22px 18px 80px;min-width:0;}
.whd{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.wpill{background:var(--navy);color:var(--yellow);font-size:13px;font-weight:700;padding:4px 16px;border-radius:20px;}
.wdt{font-size:13px;color:var(--muted);}
.warn-bar{background:var(--red-bg);border:1.5px solid var(--red-bd);border-radius:10px;padding:13px 16px;margin-bottom:18px;}
.warn-bar-t{font-size:12px;font-weight:700;color:var(--red);margin-bottom:8px;}
.wchips{display:flex;flex-wrap:wrap;gap:6px;}
.wchip{background:#fff;border:1px solid var(--red-bd);border-radius:6px;padding:3px 10px;font-size:12px;color:var(--red);font-weight:500;cursor:pointer;}
.wchip:hover{background:#ffe5e5;}
.wchip-group{margin-top:8px;}
.wchip-group:first-of-type{margin-top:0;}
.wchip-cat{display:inline-block;font-size:10.5px;font-weight:700;color:var(--navy);background:#fff;border:1px solid var(--navy);border-radius:4px;padding:1px 7px;margin-bottom:5px;}
.overall-box{background:#eef2ff;border:1.5px solid #c7d2fe;border-radius:10px;padding:13px 16px;margin-bottom:14px;}
.overall-t{font-size:12px;font-weight:700;color:#3730a3;margin-bottom:6px;}
.overall-txt{font-size:13px;line-height:1.75;color:#1e1b4b;}
.overall-inline{margin-top:12px;padding-top:12px;border-top:1px dashed var(--red-bd);}
.overall-inline-t{font-size:11.5px;font-weight:700;color:#3730a3;margin-bottom:6px;}
.overall-inline-txt{font-size:12.5px;line-height:1.75;color:#1e1b4b;}
.overall-top{background:#e0f2fe;border:2px solid #7dd3fc;border-radius:12px;padding:18px 22px;margin-bottom:18px;}
.overall-top-t{font-size:15px;font-weight:800;color:#075985;margin-bottom:8px;}
.overall-top-txt{font-size:15.5px;line-height:1.85;color:#0c4a6e;font-weight:500;}
.bd-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.bd-toggle{display:flex;gap:6px;margin-bottom:10px;}
.bd-toggle-btn{background:var(--gray);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted);}
.bd-toggle-btn:hover{border-color:var(--navy);}
.bd-toggle-btn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.bd-cat-tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px dashed var(--border);}
.bd-cat-tab{background:#fff;border:1px solid var(--border);border-radius:16px;padding:5px 13px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);}
.bd-cat-tab:hover{border-color:var(--navy);color:var(--navy);}
.bd-cat-tab.on{background:#eff6ff;border-color:#1d4ed8;color:#1d4ed8;font-weight:700;}
.bd-tab{background:var(--gray);border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--muted);}
.bd-tab:hover{border-color:var(--navy);color:var(--navy);}
.bd-tab.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.bd-week-hd2{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.bd-week-pill{background:var(--navy);color:var(--yellow);font-size:12px;font-weight:700;padding:3px 12px;border-radius:16px;}
.bd-week-dt{font-size:12px;color:var(--muted);}
.bd-content{max-height:60vh;overflow-y:auto;}
.bd-store-block{margin-bottom:16px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.bd-store-name{background:var(--navy);color:#fff;font-size:13px;font-weight:700;padding:8px 14px;}
.bd-fb-item{padding:10px 14px;border-bottom:1px solid #f0f2f5;}
.bd-fb-item:last-child{border-bottom:none;}
.bd-fb-cat{font-size:10.5px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.bd-fb-text{font-size:12.5px;line-height:1.7;color:var(--text);}
.csec{background:#fff;border-radius:12px;border:1px solid var(--border);margin-bottom:13px;overflow:hidden;scroll-margin-top:106px;}
.chd{display:flex;align-items:center;gap:10px;padding:13px 17px;cursor:pointer;user-select:none;}
.chd:hover{background:#fafbfd;}
.cicon{width:29px;height:29px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.ctitle{font-size:14px;font-weight:700;flex:1;}
.cchev{font-size:11px;color:var(--muted);margin-left:auto;transition:transform .2s;}
.csec.open .cchev{transform:rotate(180deg);}
.cbody{display:none;border-top:1px solid var(--border);}.csec.open .cbody{display:block;}
.sitem{padding:13px 18px;border-bottom:1px solid #f0f2f5;}.sitem:last-child{border-bottom:none;}
.stag{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;margin-bottom:5px;}
.stag.best{background:#fff9e0;color:#92400e;}.stag.change{background:#eff6ff;color:#1d4ed8;}
.stag.warn{background:var(--red-bg);color:var(--red);}.stag.proposal{background:#f5f3ff;color:#6d28d9;}
.stag.insight{background:#f0fdf4;color:#166534;}.stag.normal{background:#f0f0f0;color:#444;}
.stxt{font-size:13.5px;line-height:1.8;color:var(--text);}.stxt strong{color:var(--navy);}.stxt .wt{color:var(--red);font-weight:600;}
.clt{width:100%;border-collapse:collapse;font-size:13px;}
.clt th{background:var(--navy);color:#fff;padding:8px 11px;text-align:left;font-size:11px;font-weight:600;}
.clt td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:top;}
.clt tr:last-child td{border-bottom:none;}.clt tr:nth-child(even) td{background:#fafbfc;}
.st{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.st.red{background:#fdecea;color:var(--red);}.st.green{background:var(--green-bg);color:var(--green);}
.st.blue{background:#eff6ff;color:#1d4ed8;}.st.gray{background:#f0f0f0;color:#555;}
.upsec{display:flex;align-items:center;gap:10px;background:#fff;border:2px dashed var(--border);border-radius:10px;padding:14px 18px;margin-bottom:18px;cursor:pointer;}
.upsec:hover{border-color:var(--navy);}.upsec-t{font-size:13px;color:var(--muted);}.upsec-t strong{color:var(--navy);}
.loverlay{position:fixed;inset:0;background:rgba(27,58,107,.93);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.loverlay.hidden{display:none;}
.spinner{width:42px;height:42px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ltxt{color:#fff;font-size:15px;font-weight:500;}.lsub{color:rgba(255,255,255,.6);font-size:12px;}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding-top:56px;}
.mbg.hidden{display:none;}
.modal{background:#fff;border-radius:14px;width:92%;max-width:700px;max-height:82vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.mhd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.msrch{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit;outline:none;}
.msrch:focus{border-color:var(--navy);}
.mclose{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:4px;}
.mbody{overflow-y:auto;padding:14px 18px;flex:1;}
.slist{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.sbtn{border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;background:#fff;font-family:inherit;color:var(--text);}
.sbtn:hover{border-color:var(--navy);color:var(--navy);}.sbtn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.sres{display:none;}.sres.on{display:block;}
.sres-name{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sres-ch{font-size:12px;color:var(--muted);font-weight:400;}
.swblock{margin-bottom:16px;}
.swlabel{font-size:11px;font-weight:700;color:var(--muted);background:var(--gray);padding:3px 9px;border-radius:4px;display:inline-block;margin-bottom:7px;}
.sfitem{margin-bottom:7px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;line-height:1.65;}
.sfcat{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:3px;}
.no-s{color:var(--muted);font-size:13px;text-align:center;padding:24px 0;}
@media(max-width:768px){.sidebar{display:none;}.main{padding:14px 12px 60px;}.clt th,.clt td{padding:6px 8px;font-size:11px;}}
</style>
</head>
<body>
<div class="loverlay hidden" id="loverlay">
  <div class="spinner"></div>
  <div class="ltxt">AI가 피드백을 분석 중입니다</div>
  <div class="lsub">카테고리별로 요약하고 있어요...</div>
</div>
<div class="mbg hidden" id="mbg" onclick="closeMod(event)">
  <div class="modal">
    <div class="mhd">
      <input class="msrch" type="text" placeholder="매장명 검색..." id="msrch" oninput="filterS(this.value)">
      <button class="mclose" onclick="closeMod()">&#x2715;</button>
    </div>
    <div class="mbody">
      <div class="slist" id="slist"></div>
      <div class="sres" id="sres"></div>
    </div>
  </div>
</div>
<div class="mbg hidden" id="bdMbg" onclick="closeBD(event)">
  <div class="modal" style="max-width:760px;max-height:88vh;">
    <div class="mhd">
      <div style="font-size:16px;font-weight:700;color:var(--navy);flex:1;">&#x1F4CB; 주차별 BD (원본 피드백 백데이터)</div>
      <button class="mclose" onclick="closeBD()">&#x2715;</button>
    </div>
    <div class="mbody" id="bdBody" style="padding:18px 22px;"></div>
  </div>
</div>
<header>
  <div class="logo">WILSON <em>현장 피드백</em></div>
  <div style="display:flex;gap:8px;">
    <button class="hbtn" onclick="openBD()">&#x1F4CB; 주차별BD</button>
    <button class="hbtn" onclick="openMod()">&#x1F3EA; 매장별 보기</button>
  </div>
</header>
<div class="wtabs" id="wtabs"></div>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

 볼타워 정책 재검토 목소리. 가정의 달 소비 반동으로 입점 20~40% 감소했으나 테니스 목적 고객은 증가세 유지.","판매베스트":{"title":"금주 판매 베스트","items":[{"tag":"베스트","text":"**퓨어드라이 에이스 W 재입고 효과** 즉각 반영 — 품절로 로스 발생하던 매장들이 여성 고객 호응으로 주력 판매 연결. 시어아이스 수요 지속 강세. 롯데잠실은 이번 주 여성 60:남성 40으로 남성 비중 소폭 증가."},{"tag":"특이","text":"신세계강남 '의류 풀착 → 신발·가방 연계 구매 고객 늘어나는 패턴' 주목할 변화. 퓨어드라이·시어아이스 양강 구도 확고."}]},"전주대비":{"title":"전주 대비 변화","items":[{"tag":"변화","text":"📈 **퓨어드라이 에이스 W 재입고** 효과 전매장 즉각 반영. 📉 가정의 달 연휴 소비 반동으로 전반 입점 20~40% 감소 (현대스페이스원 -40%, 아이파크 -20%). 📈 테니스 시즌 본격화로 테니스 목적 고객은 롯데의왕·신세계광주 +20%."}]},"의류":{"title":"의류 특이사항","items":[{"tag":"트렌드","text":"시어아이스 수요 전주에 이어 지속. 기온 상승으로 관심도 더 올라가는 흐름. 퓨어드라이 에이스 W 재입고로 여성 고객 즉각 반응."},{"tag":"⚠️즉시체크","text":"⚠️ **시어아이스 ORG 컬러 색 물빠짐(이염) 불량** (스타필드고양) — 전주에 이어 2주 연속 접수, 즉시 확인·매장 공식 답변 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **퓨어드라이 공용 S·M 사이즈 지속 품절** — 롯데인천·롯데의왕·스타필드안성 등 다수 — **FW 신상 S·M 확대 예정 — 매장 안내 필요**"},{"tag":"제안","text":"피키스튜디오 반팔 버전 요청 지속. 여성 V넥·헨리넥 탑 요청 (현대중동). 남성 슬리브리스 컬러 다양화 요청 다수. 얇은 바람막이 블랙 컬러 다양화 (신세계사우스시티)."}]},"용품":{"title":"용품 특이사항 (여름 아이템 반응)","items":[{"tag":"트렌드","text":"**바이저** 전매장 수요 급증, 화이트 컬러 압도적 선호. **암슬리브** 본격 수요 시작. **드로우 V2 재입고** 반응 폭발적 — 스타필드고양 '테니스 필수 가방으로 자리잡았다'."},{"tag":"⚠️즉시체크","text":"⚠️ **드로우 V2 수량 여전히 부족** (스타필드고양·현대스페이스원) — 그레이 컬러 문의 많음, 지속 모니터링 및 리오더 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **베일 드레이프 캡 리오더 필요** (현대무역) — 입고 일정 확인"},{"tag":"이슈","text":"암슬리브 원사이즈 이슈 (신세계대전) '남녀 사이즈 구분 출시 필요'. 상설 마스크 두께 이슈 — 여름에 두껍다는 의견 다수."}]},"신발":{"title":"신발 특이사항 (에어벨 W 2주차)","items":[{"tag":"에어벨W","text":"디자인 호감도 유지되나 구매 전환 여전히 저조. 스타필드안성 볼트프로 입고 즉시 소진. 리스폰스프로 1.5·볼트프로 1.5 양강 안정적 유지."},{"tag":"⚠️즉시체크","text":"⚠️ **블레이드 100 PRO 품절 2주 연속** — 다수 매장, 남성 구매 이탈 반복 → 긴급 재입고 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **리스폰스프로 1.5 여성 사이즈 부족** (현대대전) — 판매 로스 발생"},{"tag":"⚠️즉시체크","text":"⚠️ **러쉬투어 불량 클레임 지속** — 빠른 공식 대응 안내 필요"}]},"라켓":{"title":"라켓 특이사항 (롤랑가로스 에디션)","items":[{"tag":"롤랑가로스","text":"디자인 요소: 흘림체·문양 전반 긍정. 내/외국인: 내국인 90%+. 여/남: 여성 70~90%. 연계 아이템: 드로우 V2 IVY·롤랑 더플백·시어아이스 셋업 순."},{"tag":"⚠️즉시체크","text":"⚠️ **홀세일 가격 역전 이슈 지속** — 스타필드고양 강한 우려. 단 나인원한남은 홀세일 품절 후 정상 채널 유입 늘기 시작 (긍정 신호)"},{"tag":"⚠️즉시체크","text":"⚠️ **블레이드 100 PRO 품절 2주** — 긴급 재입고 필요"}]},"팀스포츠":{"title":"팀스포츠 특이사항","items":[{"tag":"트렌드","text":"에볼루션·퓨어샷·에보넥스트 꾸준한 판매. 10~20대 학생층 주력 고객. 가족 단위 구매 지속."},{"tag":"⚠️즉시체크","text":"⚠️ **에볼루션·퓨어샷·포지 DP 재고만 남은 매장 다수** (롯데아울렛기흥·스타필드고양·더현대서울) — '볼타워 공 구매 꺼리는 고객으로 판매 로스' → 재고 현황 확인"},{"tag":"⚠️즉시체크","text":"⚠️ **스타필드고양 볼타워 철거 또는 보강 시급** — 볼타워 정책 검토 필요"}]},"고객동향":{"title":"고객 입점 동향","items":[{"tag":"동향","text":"📉 전반 감소. 신세계광주 -20%, 사이먼부산 -20%. 기온 상승으로 주말 백화점 입점 자체 감소 추세. 테니스 신규 유입은 지속 (롯데의왕 '입문자 점점 늘어나는 중'). 신세계센텀 크루즈 입항으로 외국인 유입."}]},"경쟁사":{"title":"경쟁사 동향","items":[{"tag":"경쟁사","text":"언더아머 외국인 여권 20% / 나이키 외국인 10% / 리복 10~20% / 아디다스 두산베어스 유니폼 팝업 진행 중"}]},"즉시체크":{"title":"⚠️ 즉시 체크 리스트","items":[{"구분":"의류","내용":"시어아이스 ORG 이염 불량 2주 연속","매장":"스타필드고양","상태":"❌ 미해결","조치":"즉시 확인·매장 답변"},{"구분":"의류","내용":"퓨어드라이 공용 S·M 문의","매장":"다수 매장","상태":"📌 안내필요","조치":"FW 신상 S·M 확대 예정 안내"},{"구분":"용품","내용":"드로우 V2 수량 부족 지속","매장":"스타필드고양·현대스페이스원 등","상태":"🔄 모니터링","조치":"추가 리오더 검토"},{"구분":"용품","내용":"베일 드레이프 캡 리오더","매장":"현대무역","상태":"❌ 미진행","조치":"리오더 검토"},{"구분":"신발","내용":"블레이드 100 PRO 품절 2주","매장":"다수 매장","상태":"❌ 미해결","조치":"긴급 재입고 필요"},{"구분":"신발","내용":"리스폰스프로 여성 사이즈 부족","매장":"현대대전","상태":"❌ 미해결","조치":"재고 보충"},{"구분":"신발","내용":"러쉬투어 불량 클레임 지속","매장":"다수 매장","상태":"❌ 미해결","조치":"공식 대응 안내"},{"구분":"팀스포츠","내용":"에볼루션·퓨어샷 DP 재고만 남음","매장":"롯데아울렛기흥·스타필드고양·더현대서울","상태":"❌ 미해결","조치":"재고 현황 확인"},{"구분":"팀스포츠","내용":"볼타워 정책 검토 필요","매장":"스타필드고양","상태":"❌ 미해결","조치":"철거·보강 논의"}]}},"5월3W":{"date":"05/18~05/24","전체요약":"선셋매치 런칭(5/22)으로 라이프스타일 구매 무드 확산, 기능성 중심에서 분위기 전환. 리본 니삭스 재입고 즉각 반응, 드로우 V2 재고 부족은 계속 발목. 블레이드 100 PRO 품절 3주째, 여성 테린이 1그립 재고도 동반 부족 심화. 발볼 넓은 수입화 부재 등 신발 사이즈·핏 이슈 다수 매장 공통 제기. 대체 연휴 효과로 입점 혼재, 전반 소비 위축은 지속.","판매베스트":{"title":"금주 판매 베스트","items":[{"tag":"베스트","text":"**선셋매치 런칭(5/22)** 효과로 라이프스타일 구매 고객 급증. 남성 입점 비중 전주 대비 상승 (신세계강남 강한 언급). 베스트: **선셋매치 썸머 티셔츠** > **퓨어드라이 에이스 W** > **시어아이스 셋업** 순."},{"tag":"특이","text":"신세계광주 사회적 이슈로 평일 입점 40% 감소, 주말 테니스 고객으로 선방. 신세계강남 '의류 제작 시 신발 컬러를 1차 기준으로 협업' 제안 (신발→의류 코디 순서 구매 고객 증가)."}]},"전주대비":{"title":"전주 대비 변화","items":[{"tag":"변화","text":"📈 **선셋매치 런칭** — 라이프스타일 구매 무드로 전환, 기능성 구매 중심이던 전주 대비 분위기 확연히 달라짐. 📈 **리본 니삭스 W 재입고** — 기다리던 고객 즉각 반응, 재고 빠르게 소진 (신세계센텀). 📉 대체 연휴 후 전반 혼재 — 일부 증가, 전반 소비 위축 지속."}]},"의류":{"title":"의류 특이사항 (선셋매치·엘리트퍼포먼스 런칭)","items":[{"tag":"선셋매치","text":"이번 주 가장 인기. '테니스 그래픽이 아닌 여름·휴가 감성' 잘 전달됨. 20~40대 남녀 공통, 커플 구매. 외국인 남녀에게도 인기 (롯데아울렛동부산)."},{"tag":"엘리트퍼포먼스","text":"진성 테니스 고객 중심. '타이트한 핏·더워 보이는 소재' 인식이 일부 구매 장벽. 남성 내장 반바지 기능 긍정 평가 (현대판교)."},{"tag":"⚠️즉시체크","text":"⚠️ **선셋매치 NTS51 XS 사이즈 미출시** (신세계대전) — 공용 S가 마른 여성에게 커서 구매 미연결 → 사이즈 기획 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **시어아이스 와이드팬츠 네이비 품절·블랙 미출시** (신세계대전) — 수요 높은데 두 컬러 모두 없어 아쉬움 → 입고 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **롯데인천 타 매장 입고 상품 미입고** — 홈페이지 보고 방문한 고객 응대 불가, 판매 로스 → 입고 배분 확인"},{"tag":"⚠️즉시체크","text":"⚠️ **선셋매치 입고 당일 사이즈 소진** (아이파크) — 초기 물량 확보 필요"}]},"용품":{"title":"용품 특이사항 (선셋매치 볼캡·크루삭스·리본니삭스 반응)","items":[{"tag":"리본니삭스","text":"재입고 즉각 반응, 신세계센텀 '재고 빠르게 소진'. 꾸준한 수요 확인."},{"tag":"선셋매치 용품","text":"볼캡: 터치 있으나 구매 전환 낮음 '여름에 더울 것'. 크루삭스: 대부분 매장 반응 미미, 조금 더 지켜볼 필요."},{"tag":"⚠️즉시체크","text":"⚠️ **드로우 V2 WHT·IVY 재고 부족 지속** (스타필드하남·사이먼파주 등) — V2 WHT·IVY 다수 문의, 재고 없어 타 상품 유도 중"},{"tag":"⚠️즉시체크","text":"⚠️ **드로우스트링 제조국 표기 이슈** (현대무역) — 제조국 때문에 구매 못하는 고객 발생 → 확인 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **리본 니삭스 네이비 컬러 리오더 요청** (현대판교·롯데인천) — 리오더 검토"},{"tag":"이슈","text":"자외선 차단 스타킹 수요 (AK원주) '니삭스보다 스타킹 찾는 고객 더 많음'. 오솔라이트 인솔 단품 판매 문의 (신세계대전)."}]},"신발":{"title":"신발 특이사항","items":[{"tag":"트렌드","text":"볼트프로 1.5·리스폰스프로 1.5 양강 유지. 기온 상승으로 경량 테니스화 수요 본격 상승. 클레이 코트용 신발 판매 증가 (롯데잠실)."},{"tag":"⚠️즉시체크","text":"⚠️ **발볼 넓은 수입화 부재** (신세계센텀·스타필드하남·현대스페이스원) — '러쉬 계열 발볼 넓은 수입화 필요, 리스폰스로 대체하나 불만족'"},{"tag":"⚠️즉시체크","text":"⚠️ **에어리 W 사이즈 부족 판매 로스** (롯데부산) — ✅ 6/29 입고 예정, 매장 안내 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **오솔라이트 인솔 단품 판매 문의 급증** (신세계대전) '굉장히 많은 문의' → 단품 판매 가능 여부 확인"},{"tag":"⚠️즉시체크","text":"⚠️ **러쉬투어 내구성 이슈로 적극 추천 어려운 상황** (커넥트청주) '사전에 내구성 이슈 고지 중' → 공식 안내 지속 필요"}]},"라켓":{"title":"라켓 특이사항","items":[{"tag":"트렌드","text":"롤랑가로스 에디션 전주 대비 상승세 (롯데의왕 '전주 대비 확실히 터치·판매 올라옴'). 블레이드 V10 꾸준하나 초반 대비 안정화 단계. 테린이 입문 고객 라켓 구매 증가."},{"tag":"⚠️즉시체크","text":"⚠️ **블레이드 100 PRO 품절 3주 연속** (스타필드수원·커넥트청주·스타필드하남 등) — 남성 구매 이탈 발생 → 긴급 재입고 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **여성 테린이 1그립 재고 부족** (사이먼여주) '커플 테린이 고객 많이 놓치는 중' → 입고 검토"},{"tag":"트렌드","text":"📌 **피클볼 라켓 문의 증가** (스타필드수원) '이번 주 유독 많았음' → 수요 트렌드 모니터링"}]},"팀스포츠":{"title":"팀스포츠 특이사항","items":[{"tag":"트렌드","text":"에볼루션·퓨어샷·에보넥스트 꾸준한 판매. 신세계강남 '윌슨 농구공이 패셔너블 브랜드로 인식되며 인테리어·인증샷 목적 구매도 증가' 주목."},{"tag":"⚠️즉시체크","text":"⚠️ **에볼루션·퓨어샷·에보넥스트 재고 부족 다수** (스타필드하남·더현대서울·스타필드안성) '주력 상품 DP만 남거나 재고 거의 없음' → 재고 현황 확인"},{"tag":"이슈","text":"사이먼파주 무신사 입점 후 중고등학생 유입 증가. '종류 많지 않다는 아쉬움 반복, SKU 다양화 필요'. 온라인 가격 비교 고객 증가 (사이먼파주·사이먼부산)."}]},"고객동향":{"title":"고객 입점 동향","items":[{"tag":"동향","text":"대체 연휴(월요일) 효과로 일부 매장 증가, 전반적으로 소비 위축 지속. 더현대서울 피크민·케데헌 행사로 가족 단위 유입 증가. 신세계센텀 크루즈 입항 지속."}]},"경쟁사":{"title":"경쟁사 동향","items":[{"tag":"경쟁사","text":"나이키 시즌오프 20% / 뉴발란스 이월 최대 70% / 아디다스·나이키 추가 30% / 르꼬끄 60% / 휠라 신발 균일가 / 언더아머 외국인 여권 20%"}]},"즉시체크":{"title":"⚠️ 즉시 체크 리스트","items":[{"구분":"의류","내용":"선셋매치 NTS51 XS 미출시","매장":"신세계대전","상태":"❌ 미해결","조치":"사이즈 기획 검토"},{"구분":"의류","내용":"시어아이스 와이드팬츠 네이비 품절·블랙 미출시","매장":"신세계대전","상태":"❌ 미해결","조치":"입고 검토"},{"구분":"의류","내용":"롯데인천 타 매장 상품 미입고","매장":"롯데인천","상태":"❌ 미해결","조치":"입고 배분 확인"},{"구분":"의류","내용":"퓨어드라이 공용 S·M 문의","매장":"다수 매장","상태":"📌 안내필요","조치":"FW 신상 S·M 확대 예정 안내"},{"구분":"용품","내용":"드로우 V2 WHT·IVY 재고 부족","매장":"스타필드하남·사이먼파주 등","상태":"❌ 미해결","조치":"리오더 검토"},{"구분":"용품","내용":"드로우스트링 제조국 표기 이슈","매장":"현대무역","상태":"❌ 미해결","조치":"확인 필요"},{"구분":"용품","내용":"리본 니삭스 네이비 리오더","매장":"현대판교·롯데인천","상태":"❌ 미진행","조치":"리오더 검토"},{"구분":"신발","내용":"발볼 넓은 수입화 부재","매장":"신세계센텀·스타필드하남·현대스페이스원","상태":"❌ 미해결","조치":"상품 기획 검토"},{"구분":"신발","내용":"에어리 W 사이즈 부족","매장":"롯데부산","상태":"✅ 입고예정 (6/29)","조치":"매장 안내"},{"구분":"신발","내용":"오솔라이트 인솔 단품 판매 문의","매장":"신세계대전","상태":"❌ 미해결","조치":"단품 판매 여부 확인"},{"구분":"신발","내용":"러쉬투어 내구성 공식 안내 부재","매장":"커넥트청주","상태":"❌ 미해결","조치":"공식 대응 지속"},{"구분":"라켓","내용":"블레이드 100 PRO 품절 3주","매장":"스타필드수원·커넥트청주·스타필드하남","상태":"❌ 미해결","조치":"긴급 재입고"},{"구분":"라켓","내용":"여성 1그립 재고 부족","매장":"사이먼여주","상태":"❌ 미해결","조치":"입고 검토"},{"구분":"팀스포츠","내용":"에볼루션·퓨어샷 DP 재고만 남음","매장":"스타필드하남·더현대서울·스타필드안성","상태":"❌ 미해결","조치":"재고 현황 확인"}]}},"5월4W":{"date":"05/25~05/31","전체요약":"선셋매치 구매 본격화로 전주 터치 위주에서 실구매 전환 뚜렷, 홀세일 재고 소진 후 정상 채널 유입 증가 신호. 신세계강남 '오픈 이래 가장 라켓 판매 좋은 달' — 블레이드 V9→V10 교체 + 롤랑가로스 시너지 절정. 에어벨 런칭 1개월 종합: 일상화 목적 구매 압도적이나 사이즈 10단위 출시로 이탈 지속. 러쉬투어 내구성 클레임(메쉬망·A/S 3건) 본격 제기 시작. 블레이드 100 PRO 품절 4주, 여성 1그립 부족 3주로 장기화.","판매베스트":{"title":"금주 판매 베스트","items":[{"tag":"베스트","text":"**선셋매치 런칭 2주차 구매 본격화** — 전주 터치 위주에서 실구매 연결 증가. 신세계강남 '오픈 이래 가장 라켓 판매 좋은 달' — 블레이드 V9→V10 교체 수요 + 롤랑가로스 런칭 시너지 절정."},{"tag":"특이","text":"홀세일 재고 소진 시작 → 스타필드고양·나인원한남 '홀세일 품절 이후 정상 채널 유입 증가' 전주 예고 현실화. 선셋매치 링거 슬림 티셔츠 (여성) 판매 강세 — '크롭하지 않은 적당한 기장감·슬림핏·일상 겸용'."}]},"전주대비":{"title":"전주 대비 변화","items":[{"tag":"변화","text":"📈 **선셋매치 구매 본격화** — 전주 대비 실구매 연결 눈에 띄게 증가. 📈 **홀세일 재고 소진 → 정상 채널 유입 증가** — 나인원한남·스타필드고양 긍정 신호. 📉 월말 소비 집중 후 둔화, 더워진 날씨로 주말 아이쇼핑 고객 증가 / 구매 고객 감소."}]},"의류":{"title":"의류 특이사항 (선셋매치 심층 피드백)","items":[{"tag":"선셋매치 구매층","text":"테니스:일반 = 50~70%:30~50%. 신세계강남·나인원한남처럼 유동 고객 많은 매장은 일반 60%까지. 링거 슬림 티셔츠 공홈 룩 그대로 구매하는 고객 多 (나인원한남)."},{"tag":"타이다잉","text":"전 매장 공통 반응 거의 없음 — '면 소재 두껍게 느껴짐, 취향 타는 디자인'."},{"tag":"⚠️즉시체크","text":"⚠️ **선셋매치 NTS52 밑단 워싱 부정 반응** (신세계광주) — '워싱 처리 고객 호응 낮음, 백그래픽 유지 권장' → 디자인 피드백 전달"},{"tag":"⚠️즉시체크","text":"⚠️ **남성 쇼츠 기장 짧음·벨크로→지퍼 선호** (스타필드하남) — '버뮤다 핏 요청, 포켓 방식 변경 필요' → 차기 시즌 기획"},{"tag":"⚠️즉시체크","text":"⚠️ **선셋매치 쇼츠 S 사이즈 미출시** (신세계대전) — '주니어·마른 여성·마른 남성 수요 많으나 대응 불가' → 사이즈 기획 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **여성 베이스라인 쇼츠 이너 레깅스 없어 입기 부담** (나인원한남·스타필드하남) — 이너 포함 또는 안감 보완 요청"},{"tag":"제안","text":"신세계강남: '퍼포먼스 상품의 라이프스타일 무드화 가속 필요, 카테고리 간 연계 판매 강화'. 심플 그래픽 20~50대 통용 디자인 추가 요청."}]},"용품":{"title":"용품 특이사항 (선셋매치 볼캡·크루삭스)","items":[{"tag":"선셋매치 용품","text":"볼캡: 핑크 컬러 반응 그나마 나은 편. '깊이감 없다' (사이먼부산). 크루삭스: 전반 반응 미미, 핑크 단독 소폭 구매. 의류 연계 판매: 온라인 보고 풀셋 구매 고객에게만 성사."},{"tag":"⚠️즉시체크","text":"⚠️ **드로우 V2 재입고 대기 고객 다수** (현대대전·스타필드안성) — '리오더 기다리겠다는 고객' → 입고 일정 매장 공유 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **양말 재고 소진 빠름** (현대대전) — 재고 보충 필요"},{"tag":"이슈","text":"투어백·여성 소형 투어백 문의 증가 (나인원한남) '올라운드 짐백 판매 많고 심플한 여성용 투어백 문의 늘어' → 기획 참고. 가천대 타이브레이크 동아리 소단체 구매 (스타필드안성)."}]},"신발":{"title":"신발 특이사항 (에어벨 W 런칭 1개월 종합)","items":[{"tag":"에어벨W 1개월","text":"내/외국인: 내국인 50~60%:외국인 40~50% (신세계센텀·롯데의왕은 외국인 60~70%). 주 구매 연령: 20~40대 여성. 구매 목적: 일상화·여름 가볍게 신기 압도적."},{"tag":"긍정","text":"메리제인 디자인·착화감·쿠션감 긍정. '발레코어 스타일링 원하는 20~30대 여성 구매'. 사이즈 10단위 출시로 애매한 사이즈 이탈은 계속 발생."},{"tag":"⚠️즉시체크","text":"⚠️ **에어벨 연결 메쉬망 내구성 약하다는 클레임** (아이파크) '너무 약해서 내구성 문제 제기 고객' → 품질 확인 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **러쉬투어 앞발 볼 벌어지는 현상 A/S 3건 동시 접수** (스타필드안성) '착용 횟수 많지 않은데 동일 현상 반복, 가격 대비 내구성 문제 강하게 제기' → 즉시 확인·대응 필요"}]},"라켓":{"title":"라켓 특이사항","items":[{"tag":"트렌드","text":"신세계강남 '오픈 이래 가장 라켓 판매 좋은 달'. 롤랑가로스 클래시 UL 1그립 여성 1위 유지. 테린이 입문층: 울트라·클래시 선호 지속."},{"tag":"⚠️즉시체크","text":"⚠️ **블레이드 100 PRO 품절 4주 연속** (커넥트청주·스타필드하남 등) — 남성 고객 이탈 반복 → 긴급 재입고 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **즉시 스트링 불가 매장 구매 이탈** (롯데부산·스타필드코엑스) '소요 1~2일이면 인근 홀세일로 이탈' → 스트링 서비스 방안 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **여성 테린이 1그립 재고 부족 3주 연속** (사이먼여주) → 입고 시급"},{"tag":"이슈","text":"V9 할인 문의 증가 (사이먼파주·커넥트청주) — 재고 정리 방향 검토."}]},"팀스포츠":{"title":"팀스포츠 특이사항","items":[{"tag":"트렌드","text":"에볼루션·퓨어샷 수요 안정적이나 재고 한계 근접. 신세계강남 '재고만 있으면 무조건 구매하는 충성 고객 多, 컬러볼·에보 NXT 프리미엄 모델 판매 강세'."},{"tag":"⚠️즉시체크","text":"⚠️ **에볼루션·퓨어샷·에보넥스트 재고 한계** (스타필드수원·롯데아울렛기흥·스타필드안성·더현대서울) 'DP만 남거나 매장 수량 거의 없음' → 재고 현황 확인"},{"tag":"이슈","text":"유소년 글러브 A360 초등 저학년용 문의 (롯데아울렛기흥). 축구공·미식축구공 문의 지속 (아이파크)."}]},"고객동향":{"title":"고객 입점 동향","items":[{"tag":"동향","text":"📉 전반 감소 — 월말 소비 둔화, 기온 급상승으로 주말 아이쇼핑 비중 증가. 스타필드안성 '러닝 고객 증가' — 기존 테니스 중심에서 러닝 고객 유입 새 트렌드. 신세계광주 스벅 관련 이슈 영향 지속."}]},"경쟁사":{"title":"경쟁사 동향","items":[{"tag":"경쟁사","text":"언더아머 2개↑ 추가 40% / 나이키·아디다스 역대 롤랑가로스 라켓 최고 매출 갱신 (목~일 4일 60개 판매). 📉 날씨 더워지며 주말 아이쇼핑 전반 감소, 목적 구매 고객 비중 높아지는 추세."}]},"의류":{"title":"의류 특이사항","items":[{"tag":"트렌드","text":"시어아이스·선셋매치·퓨어드라이 3강 구도 안착. 폴로 티셔츠 수요 강세 (신세계센텀 '2NPS41·시어아이스 폴로 반응 굉장히 좋음')."},{"tag":"⚠️즉시체크","text":"⚠️ **시어아이스 와이드팬츠 블랙 미출시 4주 연속** (신세계대전·신세계의정부) — '일상복으로 블랙 컬러 필요' → 기획 반영 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **선셋매치 링거 슬림 W 재고 부족** (롯데인천·스타필드안성) — 8월까지 판매 가능 아이템 → 재입고 검토 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **에브리데이 코트 드레스 W 볼 수납 주머니 없다는 피드백** (현대스페이스원) — 차기 기획 반영 검토"},{"tag":"이슈","text":"퓨어드라이 전년 대비 디자인 유사 피로감 (롯데아울렛기흥). 얇은 긴바지 SKU 부족 (현대무역·신세계의정부) — 여름 자외선 차단용 긴바지 문의 많으나 구성 부족."}]},"용품":{"title":"용품 특이사항 (드로우 V2 아이보리·화이트 재입고)","items":[{"tag":"드로우V2 재입고","text":"전 매장 즉각적·긍정적 반응 — 대기 고객 즉시 구매, 라켓·신발 연계 판매 증가. 아이보리 > 화이트 > 그린 인기 순서 (커넥트청주)."},{"tag":"⚠️즉시체크","text":"⚠️ **드로우 V2 기타 컬러 재고 부족** (스타필드고양) '아이보리 외 컬러 재고 거의 없어' → 전체 컬러 재고 현황 확인"},{"tag":"⚠️즉시체크","text":"⚠️ **남성 투어백·더플백 문의 증가** (현대무역·나인원한남) '백팩만으로 응대 한계' → 기획 검토"},{"tag":"이슈","text":"암슬리브·바이저 수요 급증 전 매장 공통. 양말 소진 빠름 지속 — 재고 보충 필요."}]},"신발":{"title":"신발 특이사항","items":[{"tag":"트렌드","text":"볼트프로 1.5·리스폰스프로 1.5 양강 유지. 상설 추가 10% 할인 효과로 러쉬프로 다량 구매 발생."},{"tag":"⚠️즉시체크","text":"⚠️ **리스폰스프로·볼트프로 사이즈 재고 부족 전 매장** — '남성 290·295mm 입고 없어 이탈 심각' (현대무역·신세계대전) → 사이즈 보충 시급"},{"tag":"⚠️즉시체크","text":"⚠️ **리스폰스프로 화이트 전체 품절** (신세계대전) '여성 올화이트 집착적 수요' → 입고 일정 확인"},{"tag":"⚠️즉시체크","text":"⚠️ **에어벨 W 소형 사이즈(220·225mm) 문의 급증** (신세계강남·롯데의왕) '작은 사이즈 없어 이탈' → 사이즈 검토"}]},"라켓":{"title":"라켓 특이사항","items":[{"tag":"역대최고","text":"신세계강남 역대 롤랑가로스 라켓 최고 매출 갱신 — 목~일 4일간 60개 판매. TV 중계 시청 후 방문 고객 증가 확인. 에고니(뷰티&에고니) 신규 입고 반응 긍정적."},{"tag":"⚠️즉시체크","text":"⚠️ **블레이드 100 PRO 품절 5주 연속** (스타필드수원·롯데아울렛기흥·스타필드하남 등) — 남성 고객 이탈 지속 → 긴급 재입고 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **즉시 스트링 불가 매장 이탈 심각** (아이파크·롯데창원·나인원한남) '2팀 모두 즉시 스트링 원해 테니스메트로로 이탈' → 긴급 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **테니스메트로 프로모션 경쟁** (아이파크) '10만↑ 팔토시, 40만↑ 전부 증정' → 당사 대응 방안 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **여성 테린이 1그립 재고 부족 4주 연속** (사이먼여주) → 입고 시급"}]},"팀스포츠":{  다수 접수.","판매베스트":{"title":"금주 판매 베스트","items":[{"tag":"베스트","text":"**퓨어드라이 반팔+셋업** 전 연령·성별 공통 베스트. 신세계강남 '라켓+의류+용품 전체적으로 균등하게 잘 팔린 한 주, 남성 고객 의류 구매 2주 연속 증가'. 2030 여성: 스트로베리앤크림(피키 퍼플), 3040 여성: 수입라인(TSK42), 2030 남성: 선셋매치·코트라인 쇼츠."},{"tag":"특이","text":"**스트로베리앤크림 컬렉션 런칭** — 터치는 있으나 구매 전환은 매장별 온도차 큼. 볼트프로 신규 컬러 입고 — 화이트·블루 반응 좋으나 전환은 지켜봐야."}]},"전주대비":{"title":"전주 대비 변화","items":[{"tag":"변화","text":"📉 **전반 큰 폭 감소** — 다수 매장 '전주 대비 20~60% 감소'. 원인: 휴무일·선거·월드컵 경기·좋은 날씨 외부활동 증가. 📈 시어아이스 강세 지속되나 일부 매장 다시 퓨어드라이로 회귀 (스타필드코엑스). 롯데부산 BTS 공연+크루즈 외국인 급증."}]},"의류":{"title":"의류 특이사항 (스트로베리앤크림 반응)","items":[{"tag":"스트로베리앤크림","text":"구매 목적: 매장별 편차 큼 — 신세계대전 '테니스 60:라이프 40', 현대중동·롯데인천 '라이프 비중 더 높음'. 연령: 20~30대 집중. 50대 이상 터치조차 없음 (스타필드코엑스)."},{"tag":"이슈","text":"'그래픽이 너무 크고 중앙에 있어 부담스럽다' (스타필드하남). TTS76 오버핏 사이즈 작은 사이즈로 쏠림 (현대무역)."},{"tag":"⚠️즉시체크","text":"⚠️ **여름 얇은 긴바지·자외선 차단 긴팔 이너 미출시** (신세계대전) — 수주 반복 → 차기 시즌 기획 강력 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **남성 폴로티 라인업 부족·NPS43 원단 두꺼움** (신세계대전·신세계광주) — 더 얇은 폴로티 다양화 필요"}]},"용품":{"title":"용품 특이사항 (피키 크루삭스 반응)","items":[{"tag":"크루삭스","text":"전반 반응 미미 — '소재 얇음, 테니스 양말로 부적절' (스타필드고양·LF광양·신세계의정부). 단독 구매 비중 압도적. 신세계대전만 '심플해서 무난하게 매치 좋다' 긍정."},{"tag":"⚠️즉시체크","text":"⚠️ **피키 크루삭스 소재 두께 이슈** — '바닥 두께감 있는 양말 찾는 고객 多' → 소재 보강 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **드로우 V2 라이트그레이 문의 지속** (신세계대전) '가장 무난해서 인기 많은데 재고 없음'"},{"tag":"이슈","text":"컴팩트 사이즈 더플백·라켓 커버 문의 증가 (신세계대전·현대판교) '테린이 유입 증가로 컴팩트 가방 수요' → 기획 검토."}]},"신발":{"title":"신발 특이사항 (볼트프로 신규 컬러)","items":[{"tag":"볼트프로 신규컬러","text":"화이트·블루·퍼플·골드 입고 → SKU 다양화 효과 긍정. 화이트·블루 터치율 가장 높음. 기존 WGN 컬러 판매도 동반 상승 (신세계대전 '교차 진열 효과')."},{"tag":"⚠️즉시체크","text":"⚠️ **볼트프로 인기 컬러 사이즈 부재** (신세계의정부·현대중동) '220·225·280·285 깨짐으로 판매 로스' → 사이즈 보충 시급"},{"tag":"⚠️즉시체크","text":"⚠️ **수입 신발 외국인向 사이즈 부족 심각** (신세계의정부) '사이즈 없으면 외국인은 주문 안 하고 즉시 이탈' → 우선 확보 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **에어리 W 재입고 대기 증가** — ✅ 6/29 입고 예정, 매장 안내 필요"},{"tag":"이슈","text":"클레이 코트화 수요 지속 (롯데인천 '볼트프로 기반 클레이화 강력 요청')."}]},"라켓":{"title":"라켓 특이사항","items":[{"tag":"트렌드","text":"외국인: 롤랑가로스 에디션 1위, 내국인: 블레이드 V10 판매 가장 좋음 (신세계강남). 블레이드·롤랑가로스·뷰티에고니 3강 체제."},{"tag":"⚠️즉시체크","text":"⚠️ **여성 선호 중량·그립 재고 부족 2주 연속** (현대스페이스원) '여성 고객 관심 높으나 재고로 판매 연결 안 됨' → 입고 시급"},{"tag":"⚠️즉시체크","text":"⚠️ **즉시 스트링 요구 신규 고객 증가** (아이파크) '유선 문의 시 즉시 스트링 가능 여부 먼저 질문' → 서비스 방안 지속 검토"}]},"팀스포츠":{"title":"팀스포츠 특이사항","items":[{"tag":"⚠️즉시체크","text":"⚠️ **농구공 재고 고갈 심화** — 거의 전 매장 '완불 주문으로만 대응' 6주 연속 → 긴급 입고 필요, 매출 손실 누적"},{"tag":"트렌드","text":"농구 트렌드 확산 지속 — 신세계강남 '여성 고객 구매 증가, 충동구매 트렌드 강화'. 6호 농구공(여성·소형) 문의 증가 (신세계사우스시티)."}]},"고객동향":{"title":"고객 입점 동향","items":[{"tag":"동향","text":"📉 전주 대비 큰 폭 감소 — '20~60% 감소' 다수. 롯데부산 BTS 공연+크루즈 외국인 급증. 더현대서울 흑백요리사·성시경 막걸리 팝업 일반 고객 유입 지속."}]},"경쟁사":{"title":"경쟁사 동향","items":[{"tag":"경쟁사","text":"라코스테 목요일부터 대행사 30%+ 할인 — 응대 어려움 호소 (신세계의정부). 언더아머·나이키 외국인 할인 지속."}]},"즉시체크":{"title":"⚠️ 즉시 체크 리스트","items":[{"구분":"의류","내용":"여름 얇은 긴바지·자외선 차단 이너 미출시","매장":"신세계대전 (수주 반복)","상태":"❌ 미해결","조치":"차기 시즌 기획 검토"},{"구분":"의류","내용":"TTS76 작은 사이즈 부족","매장":"현대무역","상태":"❌ 미해결","조치":"사이즈 보충"},{"구분":"의류","내용":"퓨어드라이 공용 S·M 문의","매장":"다수 매장","상태":"📌 안내필요","조치":"FW 신상 S·M 확대 예정 안내"},{"구분":"용품","내용":"피키 크루삭스 소재 얇음","매장":"스타필드고양·LF광양·신세계의정부","상태":"❌ 미해결","조치":"소재 보강 검토"},{"구분":"용품","내용":"드로우 V2 라이트그레이 재고 부족","매장":"신세계대전","상태":"❌ 미해결","조치":"재고 확인"},{"구분":"신발","내용":"볼트프로 인기 컬러 사이즈 부재","매장":"신세계의정부·현대중동","상태":"❌ 미해결","조치":"사이즈 보충 시급"},{"구분":"신발","내용":"수입 신발 외국인향 사이즈 부족","매장":"신세계의정부","상태":"❌ 미해결","조치":"우선 확보 검토"},{"구분":"신발","내용":"에어리 W 재입고 대기","매장":"다수 매장","상태":"✅ 입고예정 (6/29)","조치":"매장 안내"},{"구분":"라켓","내용":"여성 선호 중량·그립 재고 부족 2주","매장":"현대스페이스원","상태":"❌ 미해결","조치":"입고 시급"},{"구분":"팀스포츠","내용":"농구공 재고 고갈 지속","매장":"전 매장","상태":"❌ 미해결","조치":"긴급 입고"},{"구분":"사은품","내용":"그립커버 입구 좁음 (2그립 불가)","매장":"다수 매장","상태":"❌ 미해결","조치":"차기 제작 반영"},{"구분":"사은품","내용":"차기 사은품 양말 요청","매장":"다수 매장","상태":"📌 안내필요","조치":"검토 필요"}]}},"6월3W":{"date":"06/15~06/21","전체요약":"FW 신상 퓨어드라이 입고로 단골 고객 '실물 확인' 방문 급증, 멜로우 시리즈 재입고 즉각 반응. 여성 여름용 긴바지 수요가 전 매장 공통으로 확인돼 차기 시즌 기획 필요성 명확화. 에어리 W 리오더는 '입고 시기 늦음'으로 대기 고객 상당수 이탈. 여성 260~280g 1그립 라켓 재고 부족이 수주째 누적, 핵심 미해결 이슈로 고착. 야구글러브 문의 급증(야구 시즌), 에볼루션·퓨어샷 재입고됐으나 소량이라 빠른 재소진 우려.","판매베스트":{"title":"금주 판매 베스트","items":[{"tag":"베스트","text":"**선셋매치 런칭 이후 라이프스타일 고객 증가** 뚜렷. 이번 주 가장 큰 변화는 **FW 신상 퓨어드라이 입고 효과** — '실물 보고 싶어 내방' 고객 급증. 멜로우 크롭 재입고 후 즉각 반응, 나인원한남 '외국인 대량 구매'. 단체·소규모 클럽 문의 증가 (신세계센텀·사이먼여주)."},{"tag":"특이","text":"선셋매치 구매 의도: **전 매장 공통 운동 목적 구매 압도적** — '휴가 목적 거의 없음'. 극히 일부만 데일리·여행용 구매."}]},"전주대비":{"title":"전주 대비 변화","items":[{"tag":"변화","text":"📈 **FW 퓨어드라이 신상 입고** — 재구매율 높은 단골 고객 신상 구매 연결. 📈 **멜로우 시리즈 재입고** 즉각 반응, 화이트 컬러 터치 압도적. 📉 한여름 진입으로 전반 입점 비슷하거나 소폭 감소. 스타필드코엑스 '평일 유동인구 크게 감소 체감'."}]},"의류":{"title":"의류 특이사항 (FW 신상·여성 여름 긴바지 수요 조사)","items":[{"tag":"FW 퓨어드라이 반응","text":"전반 매우 긍정적. '기존 대비 차분하고 고급스러운 컬러감' (신세계대전). 핑크 컬러 가장 인기 (신세계의정부 '판매 1등'). 단, 일부 '기존과 디자인 유사해 단골 피로감' (롯데아울렛동부산)."},{"tag":"여성 여름 긴바지 수요","text":"**전 매장 공통 수요 확인** — '조거보다 시어아이스처럼 냉감·얇은 소재의 와이드/세미와이드 선호', 'UV 차단 목적 구매 분명히 존재', '알로 브랜드 스타일 원함'. → **차기 시즌 기획 반영 시급**"},{"tag":"⚠️즉시체크","text":"⚠️ **FW 퓨어드라이 여성 재고 부족** (사이먼여주) '여성 사이즈 전혀 없어 판매 기회 빈번히 로스' → 재고 확보 시급"},{"tag":"⚠️즉시체크","text":"⚠️ **신상 스커트 미입고로 셋업 판매 어려움** (스타필드수원) '신상 퓨어드라이 상의 입고됐는데 매치할 스커트 없어 셋업 판매 제한' → 입고 시급"},{"tag":"⚠️즉시체크","text":"⚠️ **에어모션캠프캡 세탁 불가 이슈** (스타필드수원) '여름 모자인데 손세탁도 안 돼 판매 어려움' → 케어 안내 또는 소재 검토"}]},"용품":{"title":"용품 특이사항","items":[{"tag":"트렌드","text":"드로우 V2 꾸준한 판매 유지. 외국인 고객 드로우 V2 인기 지속 (신세계센텀·롯데아울렛동부산). 모자·암슬리브·마스크 여름 용품 수요 급증."},{"tag":"⚠️즉시체크","text":"⚠️ **드로우스트링 에어 YEL·GBL 재고 부족** (신세계대전·현대판교) '해당 컬러 문의 많은데 재고 없음'"},{"tag":"⚠️즉시체크","text":"⚠️ **모자·양말 기본 재고 부족** (스타필드안성) → 재고 보충 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **베일 드레이프 캡 리오더 문의** (갤러리아센터시티) — 입고 일정 확인"}]},"신발":{"title":"신발 특이사항 (에어리 W 리오더 입고 반응)","items":[{"tag":"에어리W 리오더","text":"**종합: '입고 시기가 다소 늦음'** — 기다리다 타 제품 구매한 고객 다수 발생. 기다리던 고객 즉시 구매 (신세계센텀·롯데의왕·스타필드고양). 스타필드수원·사이먼부산 '이미 타 제품 구매한 고객 多'."},{"tag":"⚠️즉시체크","text":"⚠️ **볼트프로 그린 사이즈 부재 지속** (신세계의정부) '전사이즈 있는 컬러로만 판매 중' → 재고 보충"},{"tag":"⚠️즉시체크","text":"⚠️ **수입 신발 외국인향 사이즈 부재 지속** (신세계의정부) '280·285·290·295 부재 심각' → 우선 확보"},{"tag":"⚠️즉시체크","text":"⚠️ **코트글라이드 슈트리스티커·자석 미입고** (롯데의왕) — 확인 필요"}]},"라켓":{"title":"라켓 특이사항","items":[{"tag":"트렌드","text":"블레이드 V10 + 롤랑가로스 에디션 투탑 유지. 뷰티에고니 매장 내 빠르게 소진 (스타필드하남). 블레이드 V10 바이럴 효과 — 'SNS 보고 왔다' 고객 다수."},{"tag":"⚠️즉시체크","text":"⚠️ **여성 260~280g 1그립 재고 부족 수주 연속** (사이먼여주·현대스페이스원·아이파크) '매주 판매 기회 놓치는 중, 여성 고객 응대 불가' → 입고 시급"},{"tag":"⚠️즉시체크","text":"⚠️ **BNA 265g 미출시 이탈** (나인원한남) '디자인은 여성용인데 265g 없어 이탈 고객 발생' → 기획 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **블레이드 100 PRO 입고 대기 지속** (갤러리아센터시티·스타필드안성) → 입고 일정 매장 공유"}]},"팀스포츠":{"title":"팀스포츠 특이사항","items":[{"tag":"재입고 효과","text":"에볼루션·퓨어샷 재입고 후 즉각 판매 반응. '감사하다'는 매장 피드백 다수 — 재고 공백 기간이 길었음을 반증."},{"tag":"⚠️즉시체크","text":"⚠️ **에볼루션·퓨어샷 재입고 수량 소량** — 다수 매장 '소량 입고로 다시 빠르게 소진 우려' → 재고 현황 지속 모니터링"},{"tag":"트렌드","text":"야구글러브 문의 급증 (롯데잠실·신세계강남) '야구 시즌 맞아 클럽 문의 증가, 온라인 보고 실물 확인 방문'. 미식축구공 문의 소폭 증가 (스타필드안성·현대판교)."}]},"고객동향":{"title":"고객 입점 동향","items":[{"tag":"동향","text":"📊 전반 비슷하거나 소폭 감소. 비 오는 날 오히려 백화점 유입 증가 매장 다수. 더현대서울 스파오·토이스토리 팝업으로 외국인·내국인 동시 급증. 스타필드안성 '초롱프로 방문 후 VM 개선, 고객 터치 증가'. 신세계강남 '외국인 테니스 신규 유입 급증·피클볼 문의 증가'."}]},"경쟁사":{"title":"경쟁사 동향","items":[{"tag":"경쟁사","text":"타사 시즌오프 할인 시작으로 가격 저항 발생 (신세계대전). 추이 모니터링 필요."}]},"즉시체크":{"title":"⚠️ 즉시 체크 리스트","items":[{"구분":"의류","내용":"FW 퓨어드라이 여성 재고 부족","매장":"사이먼여주","상태":"❌ 미해결","조치":"재고 확보 시급"},{"구분":"의류","내용":"신상 스커트 미입고 — 셋업 판매 제한","매장":"스타필드수원","상태":"❌ 미해결","조치":"입고 시급"},{"구분":"의류","내용":"여성 여름용 긴바지 수요 전 매장 확인","매장":"전 매장","상태":"📌 안내필요","조치":"냉감·세미와이드 1~2종 기획 검토"},{"구분":"의류","내용":"에어모션캠프캡 세탁 불가","매장":"스타필드수원","상태":"❌ 미해결","조치":"케어 안내 또는 소재 검토"},{"구분":"용품","내용":"드로우 에어 YEL·GBL 재고 부족","매장":"신세계대전·현대판교","상태":"❌ 미해결","조치":"재고 확인"},{"구분":"용품","내용":"모자·양말 기본 재고 부족","매장":"스타필드안성","상태":"❌ 미해결","조치":"재고 보충"},{"구분":"신발","내용":"볼트프로 그린 사이즈 부재","매장":"신세계의정부","상태":"❌ 미해결","조치":"재고 보충"},{"구분":"신발","내용":"수입 신발 외국인향 사이즈 부재","매장":"신세계의정부","상태":"❌ 미해결","조치":"우선 확보"},{"구분":"신발","내용":"코트글라이드 액세서리 미입고","매장":"롯데의왕","상태":"❌ 미해결","조치":"입고 확인"},{"구분":"라켓","내용":"여성 260~280g 1그립 부족 수주 연속","매장":"사이먼여주·현대스페이스원·아이파크","상태":"❌ 미해결","조치":"입고 시급"},{"구분":"라켓","내용":"BNA 265g 미출시 이탈","매장":"나인원한남","상태":"❌ 미해결","조치":"기획 검토"},{"구분":"라켓","내용":"블레이드 100 PRO 입고 일정","매장":"갤러리아센터시티·스타필드안성","상태":"❌ 미해결","조치":"매장 공유 필요"},{"구분":"팀스포츠","내용":"에볼루션·퓨어샷 재입고 수량 소량","매장":"다수 매장","상태":"🔄 모니터링","조치":"재고 현황 모니터링"},{"구분":"팀스포츠","내용":"야구글러브 문의 급증","매장":"롯데잠실·신세계강남","상태":"❌ 미해결","조치":"재고 현황 확인"},{"구분":"사은품","내용":"UV 파우치 피부 트러블 대응 매뉴얼","매장":"신세계대전·현대중동 등","상태":"📌 안내필요","조치":"사전 준비 검토"}]}},"6월4W":{"date":"06/22~06/28","전체요약":"윔블던 효과로 스트로베리앤크림·라켓 에디션 판매 급등, FW 신상 퓨어드라이 반팔이 전매장 압도적 1위. 드로우 V2 신규 컬러(LGR·PNK·RED), 에어리 W 신규 컬러 모두 즉각 긍정 반응. 파이썬 라켓 사전 문의가 SNS·블로그 통해 급증, 출시 일정 공유 필요성 대두. 비수기가 작년보다 한 달 빠르게 시작돼 다수 매장 입점 큰 폭 감소. 사이먼여주는 여성 의류·라켓 재고가 모두 전무한 상태로 긴급 배분이 시급한 매장으로 부각.","판매베스트":{"title":"금주 판매 베스트","items":[{"tag":"베스트","text":"**FW 신상 퓨어드라이 반팔** 전 매장 압도적 1위. 신세계강남 '윔블던 영향으로 스트로베리앤크림 판매 급등, 그랜드슬램 월마다 매출 증가 체감'. 멜로우 크롭·시어아이스 셋업 동반 강세."},{"tag":"특이","text":"드로우 V2 신규 컬러(LGR·PNK·RED) 입고 즉각 반응 — 신세계강남 'LGR+PNK가 WHT 판매 비중 처음으로 근소하게 제침'. 파이썬 라켓 사전 문의 급증 — SNS·블로그 통해 내국인 중심 확산."}]},"전주대비":{"title":"전주 대비 변화","items":[{"tag":"변화","text":"📈 **윔블던 효과** — 스트로베리앤크림·선셋매치 판매 전주 대비 확연히 상승. 📈 **드로우 V2 신규 컬러·에어리 W 신규 컬러 입고** — 즉각 반응. 📉 **비수기 조기 진입 심화** — '작년보다 한 달 빠름' (LF광양), 스타필드코엑스 '매장 유입 고객 거의 절반 수준 감소'."}]},"의류":{"title":"의류 특이사항","items":[{"tag":"트렌드","text":"퓨어드라이·시어아이스·멜로우 3강 구도 안착. **FW 신상 퓨어드라이 반팔** 전 매장 압도적 1위. 윔블던 영향으로 **스트로베리앤크림 라인 판매 급등** (신세계강남 '확확 올라왔다'). 남녀공용 커플 코디 구매 증가 (롯데부산·스타필드안성). 신세계강남 '남성 반바지 2~3개 다량 구매 급증'."},{"tag":"⚠️즉시체크","text":"⚠️ **사이먼여주 여성 의류 재고 전무** — '입고 상품 절실하게 필요, 재고 없어 고객 응대 불가' → 긴급 배분 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **스타필드하남 퓨어드라이 L 사이즈 재고 부족** — '기회 로스 많아 아쉬움' → 재고 확인"},{"tag":"⚠️즉시체크","text":"⚠️ **초경량 긴팔 자켓·냉감 루즈핏 긴팔 이너 미출시** (신세계대전, 수주 연속 반복) — 차기 시즌 기획 검토"},{"tag":"이슈","text":"**여성 긴기장 반바지·긴바지 수요 지속** (AK원주·신세계의정부) — AK원주 '40~50대 주 고객층, 기장 짧아 스커트·쇼츠 판매 어려움'. 신세계의정부 '긴 기장 반바지 및 여성용 공용 그래픽 라인 요청' → 차기 기획 반영 필요"},{"tag":"이슈","text":"**스타필드수원 화이트 스커트 밴드 없는 버전 수요** — '밴드 있는 화이트 치마 비선호 고객 多' → 기획 참고"},{"tag":"이슈","text":"**스타필드하남 원피스 구매 전환 저조** — '사이즈 애매·노출 많아 구매 망설임, 시어서커 볼레로 같은 겉옷 연계 아이템 제안'. **시어아이스 소재 연령 불일치** — '소재 터치는 젊은층인데 디자인 연령대가 높아 불일치'"},{"tag":"이슈","text":"**커넥트청주 핑크 라인 부담감** — '핑크 스펙트럼 넓어졌으나 실제 구매까지 부담 느끼는 고객 多'. **사이먼부산 가을 FW 상품 입고 문의 증가** — '기다리는 분들 많음' → 입고 일정 안내 필요"},{"tag":"이슈","text":"**스타필드고양 빠른 FW 신상 리오더 요청** — '빠른 리오더로 기다림 없이 판매 가능하도록'. **롯데아울렛기흥 소비심리 위축** — '상설·정상 구매 고객 모두 객단가 낮아지는 중'"},{"tag":"제안","text":"신세계강남: '엘리트 라인 4계절 신상 지속 출시 요청', 'FW에도 그랜드슬램 카테고리 디자인 구성 제안 (윔블던 효과 근거)'. 롯데아울렛동부산: '여성 긴 기장 의류 종류 늘어나며 반응 좋았음'. **퓨어드라이 공용 S·M 문의** → FW 신상 S·M 확대 예정 안내 필요"},{"tag":"안내필요","text":"📌 **퓨어드라이 공용 S·M 문의 매장** — FW 신상에 S·M 사이즈 확대 반영 예정. 매장 문의 시 안내 필요 (리오더 불가)"}]},"용품":{"title":"용품 특이사항 (드로우 V2 신규 컬러 반응)","items":[{"tag":"신규컬러 반응","text":"드로우 V2 신규 컬러(LGR·PNK·RED) 입고 즉각 반응. **LGR(라이트그레이)**: 전 매장 1위 — '무난하고 캐주얼 코디 용이', 남성·내국인 선호. 신세계강남 'LGR+PNK가 WHT 판매 비중 처음으로 근소하게 제침'. 외국인에게 '신상품'으로 소개 시 즉시 구매 결정 사례 多."},{"tag":"신규컬러 반응","text":"**PNK(핑크)**: 2030 여성·외국인(중국·동남아) 선호, 화사한 컬러감 긍정. 사이먼파주·스타필드수원 '터치는 좋으나 밝은 컬러 관리 걱정으로 구매 망설임'. **RED(레드)**: 전반 반응 미미, 호불호 강함. 스타필드코엑스 '가장 불호 심함'. 단, 롯데잠실만 예외적으로 '레드 터치·반응 가장 많았음'."},{"tag":"⚠️즉시체크","text":"⚠️ **드로우 V2 LGR·PNK 재고 빠른 소진 우려** (신세계강남) — '이번 주 매출의 큰 역할, 지속 재고 관리 필요' → 재고 현황 모니터링"},{"tag":"이슈","text":"**AK원주 드로우 V2 신규 컬러 관심도 미미** — 외국인 없는 매장 특성, 기존 컬러 위주 구매. **스타필드하남 신규 컬러 반응 아직 미약** — '가방 판매는 많으나 신규 컬러는 조금 더 지켜봐야'"},{"tag":"⚠️즉시체크","text":"⚠️ **드로우 에어 YEL·GBL 재고 부족 지속** (스타필드하남·현대판교) — 재고 보충 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **모자·양말 기본 재고 빠른 소진** (스타필드안성) — '인기 품목 기본 스타일 재고 부족으로 판매 아쉬움' → 재고 보충"},{"tag":"⚠️즉시체크","text":"⚠️ **베일 드레이프 캡(베일캡) 리오더 입고 일정 문의** (갤러리아센터시티 반복 언급) — 입고 일정 확인 필요"},{"tag":"이슈","text":"투어백·여성 소형 투어백 문의 증가 (나인원한남) '올라운드 짐백 판매 많고 심플한 여성용 투어백 문의 늘어' → 기획 참고"}]},"신발":{"title":"신발 특이사항 (에어리 W 신규 컬러 반응)","items":[{"tag":"에어리W 신규컬러","text":"에어리 W 화이트 리오더 + 신규 컬러(옐로우·버건디 등) 입고 반응. 20~30대 여성 중심 긍정 반응. 옐로우 > 버건디 순. 롯데인천 '레몬색 유행'. 외국인(중국·동남아) 반응 특히 좋음. 화이트 리오더 꾸준한 인기 유지."},{"tag":"매장별 반응","text":"신세계사우스시티: '화이트 리오더 고객이 신규 컬러로 변경 多, 30~40대 주 구매층'. 현대판교: '이번 주 신발 판매 중 에어리 1위, 30대 구매 주도'. 롯데잠실: '신규 컬러 입고로 반응 좋음, 볼트프로·리스폰스프로 보다가 에어리로 전환 구매 多'. 신세계강남: '화이트 꾸준 판매, 신규 컬러는 매칭 의류 부재로 즉각 판매 전환 낮음'."},{"tag":"⚠️즉시체크","text":"⚠️ **스타필드하남 에어리 퍼플 재입고 기대 고객 多** — '화이트·신규 컬러보다 퍼플 재입고 더 기대' → 입고 여부 확인"},{"tag":"⚠️즉시체크","text":"⚠️ **신세계강남 에어리 신규 컬러 매칭 의류 부재** — '의류 신상 빠른 입고가 에어리 판매 전환율 높이는 핵심' → 의류 입고 연계 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **사이먼파주 볼트프로 230mm 사이즈 부재** — '그라데이션 컬러 작은 사이즈 찾는 고객 많은데 없어 아쉬움' → 재고 보충"},{"tag":"이슈","text":"아이파크: '가격 저항으로 인트리그 전환 발생'. 신세계의정부: '에어벨 구매율 감소 추세 — 몇 주 전보다 확연히 낮아짐' → 추이 모니터링. 갤러리아센터시티: '신규 볼트프로 여성 225 사이즈 반응 좋음'."},{"tag":"이슈","text":"**수입 신발 사이즈 부족 외국인 이탈** (신세계의정부 반복) — '외국인은 사이즈 없으면 주문 안 하고 즉시 이탈, 280·285·290·295 부재 심각' → 우선 확보 필요"}]},"라켓":{"title":"라켓 특이사항","items":[{"tag":"트렌드","text":"블레이드 V10 + 롤랑가로스 클래시 투탑 유지. 신세계강남 '윔블던으로 오픈 이래 에디션 라켓 최고 판매 주간'. V9→V10 교체 수요 중상급자 중심 지속. 스타필드고양 'BNA 같은 한정판 예쁜 라켓이 여성 마음에 불 지핌, 출시 시 여성 그램수까지 대량 수입 필요'."},{"tag":"파이썬 문의","text":"📌 **파이썬 라켓 사전 문의 급증** — SNS·블로그 통해 내국인 중심 확산. 스타필드하남 '문의 급증', 커넥트청주 '설명 드리며 잠재 고객 확보 중', 더현대서울 'SNS·블로그 통해 내국인 중심 확산' → **출시 일정 매장 공유 필요**"},{"tag":"⚠️즉시체크","text":"⚠️ **사이먼여주 여성 라켓 재고 전무** — '블레이드 V9이라도 있으면 판매에 큰 도움' → 입고 시급"},{"tag":"⚠️즉시체크","text":"⚠️ **롤랑가로스 클래시 재고 소진 임박** (롯데창원·나인원한남) — 롯데창원 '찾는 여성 고객 많은데 재고 없음', 나인원한남 '추가 물량 확보 필요' → 재고 현황 확인"},{"tag":"⚠️즉시체크","text":"⚠️ **BNA 265g 미출시 이탈** (스타필드고양) — '여성용 디자인인데 265g 없어 이탈 고객 발생' → 기획 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **롯데의왕 상설 라켓 추가 입고 문의 증가** — '상설 라켓 언제 추가 입고되냐 문의' → 입고 일정 확인"},{"tag":"이슈","text":"**가격 저항 강화** (신세계대전·AK원주) — '홀세일·인터넷 비교 후 이탈 고객, 할인 기대 고객 증가'. 아이파크 '롤랑가로스 100L 리오더 문의 2~3건'. **여성 외국인 라켓 구매 문의** — 신세계강남·신세계의정부 '외국인 테니스 신규 유입 증가 중'."}]},"팀스포츠":{"title":"팀스포츠 특이사항","items":[{"tag":"트렌드","text":"에볼루션·에보넥스트 재입고 효과로 판매 소폭 상승. 신세계강남 '재고만 있으면 무조건 구매하는 충성 고객 多, 컬러볼·에보 NXT 프리미엄 모델 판매 강세'. 레트로볼 수요 확인 (롯데의왕)."},{"tag":"⚠️즉시체크","text":"⚠️ **스타필드하남 좌투 글러브 문의 多** — 재고 현황 확인 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **스타필드코엑스 올팀 재고 부족** — '올팀 좀 부족합니다' → 재고 확인"},{"tag":"⚠️즉시체크","text":"⚠️ **에볼루션·퓨어샷 재고 소진 속도 빠름** (다수 매장) — 재입고됐으나 빠르게 소진 중 → 재고 현황 지속 모니터링"},{"tag":"이슈","text":"**스타필드수원 6호 농구공 수요** — '예쁜 6호공 찾는 고객 多' → 기획 참고. **롯데인천 포지 브라운 컬러 수요** — '운영 당시 반응 좋았음, 물량 있으면 운영 희망' → 재고 확인. **롯데의왕 볼타워 관심도 높으나 판매 전환 저조** — '볼타워 터치만 있고 실 구매 안 이루어짐'."},{"tag":"이슈","text":"사이먼파주 '무신사 입점 후 중고등학생 유입 증가, 종류 많지 않다는 아쉬움 반복, SKU 다양화 필요'. 온라인 가격 비교 고객 증가 추세 (사이먼파주·사이먼부산)."}]},"고객동향":{"title":"고객 입점 동향","items":[{"tag":"동향","text":"📉 **비수기 조기 진입 심화** — LF광양 '작년보다 한 달 빠름', 스타필드코엑스 '매장 유입 고객 거의 절반 수준 감소'. 현대대전 30% 이상 감소. 신세계대전 '매장 앞 젝시믹스 70% 대행사장으로 입점 감소·가격 저항 심화'. 롯데인천 '15% 이상 감소, 2층 MUJI·올리브영 오픈 영향'."},{"tag":"동향","text":"📌 **상승 매장**: 롯데부산 '지하 팝업 행사로 일반 고객 유입 급증, 라이프스타일 의류 일반 고객 반응 좋아 매출 도움'. 더현대서울 '토이스토리·몬치치 팝업으로 외국인 급증'. 신세계강남 '기존 고객 재방문 높아 매출 안정적'. 현대무역 내국인 20%:외국인 80% 역전."},{"tag":"동향","text":"외국인: 신세계강남 '중국·일본·홍콩·대만 증가, 동남아는 작년 수준 유지'. 사이먼부산 '내국인 20%:외국인 80%'. 나인원한남 '입점은 전주와 유사하나 구매 전환율 감소'. AK원주 '늘 가던 브랜드만 가는 고착화된 움직임으로 매장 유입 떨어짐'."}]},"경쟁사":{"title":"경쟁사 동향","items":[{"tag":"경쟁사","text":"**HDEX 보이드 행사 60%** (2만원대 반팔 주력) / **르꼬끄·휠라 50~60% 할인** / **무신사스탠다드 최대 80% 할인**. 현대대전 '언더아머·휠라·르꼬끄 3브랜드 2주째 균일가 행사 (1.9만~3만원대 의류)'. 비수기 타사 할인 공세로 가격 저항 증가 추세 — 추이 모니터링 필요."}]},"상설":{"title":"상설 — 동업계 FW 입고 현황","items":[{"tag":"트렌드","text":"**전 매장 공통: FW 본격 입고 브랜드 없음** — 반팔·반바지가 여전히 주력. 현대스페이스원만 '서서히 윈드실드·롱슬리브 유닛 눈에 띄기 시작'. 사이먼파주는 '반팔 라인 신상품 2~3종 입고 수준'."},{"tag":"경쟁사 행사","text":"커넥트청주 '**HDEX 보이드 행사 60%, 2만원대 반팔 주력** / 르꼬끄·휠라 50~60% 할인'. 현대대전 '**언더아머·휠라·르꼬끄 3브랜드 2주째 균일가 행사** (1.9만~3만원대)'. 롯데아울렛동부산 '언더아머 12~3시 3개 이상 구매 시 20~40% 추가 할인, 아디다스도 추가 할인 시간대 운영'."},{"tag":"소비심리","text":"롯데아울렛기흥 '**소비심리 위축으로 상설·정상 구매 고객 모두 객단가 하락** 중'. 사이먼여주 '스커트·반바지스커트·나시 종류 꾸준히 판매 완료'. 롯데의왕 'FW 선구매 목적 고객 없음 — 아직 여름 시즌 아이템 위주 판매'."}]},"상품교육북":{"title":"26FW 상품교육북 매장 의견","items":[{"tag":"긍정","text":"전 매장 **매우 긍정적** 반응. 공통 호평 포인트: ① 품번·상품명 검색 즉시 세일즈 포인트 확인 가능 ② 신입 직원 자기 학습 가능 ③ 연계 판매·셋업 코디 안내 수월 ④ 언제든 꺼내볼 수 있는 접근성. 스타필드하남 '아주 보기 좋고 기다리던 시스템', 커넥트청주 '현장에서 정말 많은 도움'."},{"tag":"개선 제안","text":"신세계강남: **'착장 이미지·유사 상품 차이점·국가별 외국인 응대 포인트 추가 시 활용도 극대화'** 구체적 제안. 롯데잠실: '**섹션 구성을 공식 홈페이지처럼** 나누면 좋겠음'. 신세계의정부: '**세일즈 포인트가 제품명만 다르고 내용 유사** — 차별화 필요'. 현대무역: '보기 어렵고 따분한 교육자료를 쉽게 이해할 수 있게 설명해줘서 감사'."}]},"즉시체크":{"title":"⚠️ 즉시 체크 리스트","items":[{"구분":"의류","내용":"사이먼여주 여성 의류 재고 전무","매장":"사이먼여주","상태":"❌ 미해결","조치":"긴급 배분 검토"},{"구분":"의류","내용":"퓨어드라이 L 사이즈 부족","매장":"스타필드하남","상태":"❌ 미해결","조치":"재고 확인"},{"구분":"의류","내용":"초경량 긴팔 자켓·냉감 이너 미출시 (수주)","매장":"신세계대전","상태":"❌ 미해결","조치":"차기 기획 검토"},{"구분":"용품","내용":"드로우 V2 LGR·PNK 재고 소진 우려","매장":"신세계강남","상태":"🔄 모니터링","조치":"재고 모니터링"},{"구분":"용품","내용":"베일캡 리오더 입고 일정","매장":"갤러리아센터시티","상태":"❌ 미해결","조치":"확인 필요"},{"구분":"신발","내용":"에어리 퍼플 재입고 기대 고객","매장":"스타필드하남","상태":"❌ 미해결","조치":"입고 여부 확인"},{"구분":"신발","내용":"볼트프로 230mm 사이즈 부재","매장":"사이먼파주","상태":"❌ 미해결","조치":"재고 보충"},{"구분":"신발","내용":"에어리 신규 컬러 매칭 의류 부재","매장":"신세계강남","상태":"❌ 미해결","조치":"의류 입고 연계 검토"},{"구분":"라켓","내용":"사이먼여주 여성 라켓 재고 전무","매장":"사이먼여주","상태":"❌ 미해결","조치":"입고 시급"},{"구분":"라켓","내용":"파이썬 출시 일정 문의 급증","매장":"스타필드하남·커넥트청주·더현대서울","상태":"📌 안내필요","조치":"출시 일정 매장 공유"},{"구분":"라켓","내용":"롤랑가로스 클래시 재고 소진 임박","매장":"롯데창원·나인원한남","상태":"❌ 미해결","조치":"재고·추가 물량 확보"},{"구분":"라켓","내용":"BNA 265g 미출시 이탈","매장":"스타필드고양","상태":"❌ 미해결","조치":"기획 검토"},{"구분":"팀스포츠","내용":"좌투 글러브 문의 多","매장":"스타필드하남","상태":"❌ 미해결","조치":"재고 현황 확인"},{"구분":"팀스포츠","내용":"올팀 재고 부족","매장":"스타필드코엑스","상태":"❌ 미해결","조치":"재고 확인"}]}},"7월1W":{"date":"06/29~07/05","전체요약":"퓨어드라이 반팔 전 매장 압도적 1위로 본격 여름 시즌 진입. 디파이어 신규 라켓 스펙·출시일 문의 급증, 스타필드고양·더현대서울 등 반응 뜨거움. 여성 긴기장 하의(긴바지·롱스커트) 수요가 전 매장 공통으로 확인돼 차기 기획 반영 필요. 드로우 V1 신규 컬러·윌베어 키링 입고로 용품 분위기 전환, 초반 반응 대체로 긍정적. 휴가철 시작 + 날씨 영향으로 입점객 전반 감소, 일부 매장 20~40% 하락.","판매베스트":{"title":"금주 판매 베스트 및 신상 의류 반응","items":[{"tag":"베스트","text":"**퓨어드라이 반팔** 전 매장 압도적 1위. 기능성·속건 소재 수요 본격화. 신세계강남 '색상 밝고 가볍고 시원한 소재 판매 확 올라옴'. 재구매율도 높아 단골 고객이 같은 원단 다른 컬러·디자인으로 재구매 이어짐."},{"tag":"베스트","text":"여성: **멜로우 크롭 티셔츠** 반응 좋음 (신세계사우스시티·롯데창원·스타필드고양). 남성: **퓨어드라이 코어 7인치 쇼츠** (롯데아울렛동부산 '딱 필요한 색상만 나와서 잘 팔림'). 공통: 시어아이스 + 피키스튜디오 셋업 꾸준한 수요."},{"tag":"FW신상 반응","text":"26FW 신상 퓨어드라이 추가 입고 반응 긍정적 — 신세계대전 '에이스 라인이 가장 반응 좋음, FW라인 색감 예쁘다는 의견 多'. 사이먼파주 '에이스 티셔츠 시착율 좋으나 핑크 그라데이션보다 크림 컬러 구매율 높음'. 스타필드하남 '신상 퓨어드라이 판매 가장 좋음'."}]},"전주대비":{"title":"전주 대비 변화","items":[{"tag":"변화","text":"📈 **퓨어드라이 수요 지속 상승** — 7월 본격 더위 진입으로 기능성 소재 수요 최고조. 신세계강남 '의류 상승세 계속'. 📉 **전반 입점 감소** — 여름 휴가철 시작 + 비/흐린 날씨 복합 영향. 현대판교 -40%, 아이파크 -20%, 현대스페이스원 -20~30%, 신세계광주·롯데인천 -20%. 📈 **농구공 판매 상승** — 여름방학 특수 시작, 롯데아울렛동부산 재입고 후 판매 호조."}]},"의류":{"title":"의류 특이사항 (현시점 추가 구성 필요 아이템·경쟁사 대비 부족 아이템)","items":[{"tag":"공통 수요","text":"**여성 긴기장 하의 수요 전 매장 공통** — '반바지 기장 너무 짧아 연령대 있는 고객 구매 이탈'. 요청 스타일: 무릎까지 오는 5부바지·세미와이드·슬림 조거. 신세계센텀 '배드민턴·탁구 생활체육 고객 증가로 5~60대 비중 높아져 짧은 기장 부담'. 현대판교 '매장에 긴바지 한 종류도 없어 아쉬움'."},{"tag":"공통 수요","text":"**얇은 겉옷 부족** — 신세계사우스시티 '실내 이동 시 바람막이 얇은 겉옷 니즈 있는데 상품 부족, 남성 후드 기본 컬러 多 찾음'. 스타필드코엑스 '여성용 UV 경량 자켓 + 스트레치 소재 셋업 필요, 두께 있는 현 자켓 터치 없음'. 아이파크 '여름용 풀집업 자켓(볼레로 대용)'."},{"tag":"⚠️즉시체크","text":"⚠️ **셋업 컬러 매칭 구성 부족** (신세계강남) — '상의·하의 믹스매치 가능한 구성 없음, 셋업 매칭 가능하도록 기획 필요'. 신세계강남 '핵심 사이즈 S·M 3품번 부재' → FW 신상 S·M 확대 예정 안내"},{"tag":"⚠️즉시체크","text":"⚠️ **스타필드안성 PK티셔츠 물량 부족** — '터치 많은데 물량 부족으로 구매 연결 어려움' → 재고 확인 필요"},{"tag":"이슈","text":"남성 라인 부족 (커넥트청주) '여성은 SKU 다양하나 남성은 얇은 긴팔도 없고 원단 한정적'. 롯데아울렛동부산 '데일리 셋업 라인 부족, 여성 기본 반바지 2~3 SKU 더 필요'. 스타필드고양 '무릎까지 오는 5부 바지 스타일 꽤 많이 찾음'."},{"tag":"제안","text":"신세계강남: '실내 테니스 비중 높아지면서 셋업류 구매 급증, 의류·신발·용품 연계성 기획 필수'. 더현대서울: 'UV 쿨 기능 긴팔·긴바지·쿨감 이너(골프에서 많이 쓰임) 또는 슬리밍 레깅스 필요'."},{"tag":"안내필요","text":"📌 퓨어드라이 공용 S·M 문의 → FW 신상 S·M 사이즈 확대 예정 안내"}]},"용품":{"title":"용품 특이사항 (드로우스트링 신규 컬러·윌베어 키링·바이저 반응)","items":[{"tag":"드로우V1 신규컬러","text":"**드로우 V1 신규 컬러** 입고 초반 반응 긍정적. 사이먼파주 '신규 컬러 관심도·구매도 높아 용품 판매율 상승'. 나인원한남 'V1 신규 컬러 모두 인기, V2까지 동반 수요'. 단, 스타필드고양 'V1·V2 상품 피로감 심함, V3 같은 신규 디자인 필요' 강한 의견."},{"tag":"윌베어 키링","text":"**윌베어 키링** 입고 초반 반응. 아이파크 '반응 너무 좋음, 카운터 비치 후 결제 전 추가 구매 연결, 기존 고객 왜 이제서야 나왔냐 반응'. 신세계강남 '20~30대 여성·외국인 반응 좋음, 가방 구매 고객 연계판매 용이'. 현대무역 '입고분 전량 소진, 물량 필요' → 재고 보충 필요."},{"tag":"⚠️즉시체크","text":"⚠️ **현대무역 드로우스트링·윌베어 입고분 전량 소진** — '물량 필요' → 재고 보충 시급"},{"tag":"바이저","text":"**심리스 퍼포먼스 바이저**: 대부분 매장 반응 미미. 스타필드코엑스만 '글로우 베일 바이저 W 반응 좋음 — 밴드 조절 기능·넓은 밴드 실용성 긍정'. 신세계대전 '착용 시 안정감 없이 올라오거나 벗겨질 것 같다는 의견, 반복 착용 시 소재 약해질 우려'."},{"tag":"이슈","text":"롯데아울렛동부산 'V1 아이보리 컬러만 물통 수납이 찍찍이 방식, 고객 의문 다수'. 스타필드고양 '드로우 V1·V2 상품 피로감 매우 심함, 신규 디자인(V3) 필요 강력 요청'. 신세계의정부 '기본 볼캡(여름용 얇은 소재) 부족, 여성이 쓸 만한 캡 모자 없다는 피드백 多'."}]},"신발":{"title":"신발 특이사항 (리스폰스프로 1.5 신규 컬러 반응)","items":[{"tag":"리스폰스프로1.5 신규","text":"신규 컬러 입고 초반 반응 대체로 긍정적이나 구매 전환은 지켜봐야. 신세계대전 '새 컬러 모두 반응 좋음, 기존 WGN도 꾸준 판매'. 롯데창원 '단골은 이미 보유, 새 컬러로 추가 구매 고민'. 에이리 신규 컬러도 동반 반응 좋음 (롯데인천 '에어리 225 사이즈 전개 만족도 높음')."},{"tag":"이슈","text":"스타필드코엑스 '리스폰스 신상 발이 커보인다는 피드백 너무 많음, 볼트프로 대비 비교될 수 있음'. 롯데잠실 '뒷축 높아서 불편하다는 의견, 기존 리스폰스 대비 피팅감 달라진 것 같음'. 신세계강남 '볼이 넓은 장점으로 경기·레슨용으로 좋다는 의견, 러쉬프로 구매자 이탈 흡수'."},{"tag":"⚠️즉시체크","text":"⚠️ **스타필드안성 볼트프로 신규 컬러 남성 사이즈 부족** — '인기 많은데 남성 사이즈 없어 아쉬움' → 재고 보충 필요"},{"tag":"이슈","text":"사이먼파주 '볼트프로1.5 관심도 높으나 온라인 가격 비교 후 시착만 하고 온라인 구매 이탈 증가'. 더현대서울 '여성 인잔 코트 신발 출시 후 남성 인잔 코트 신발 문의 증가'. 미입고 매장: 롯데아울렛동부산·현대스페이스원·커넥트청주 등."}]},"라켓":{"title":"라켓 특이사항 (디파이어 라켓 초기 반응)","items":[{"tag":"디파이어 초기반응","text":"**디파이어 라켓 인지도·문의 수준**: 스타필드수원·롯데아울렛기흥 '하루 2~3건 문의'. 신세계강남 '반응 뜨거움 — 바볼랏 퓨어에어로 대비 스핀 성능·시타 가능 여부 집중 문의'. 스타필드고양·더현대서울 '출시일·예약 문의 多, 시타회 요청'. 단, 롯데잠실·현대중동 등 지방·비테니스 매장은 '모르시는 분 대부분'."},{"tag":"디파이어 주요 문의","text":"문의 유형 1위: **출시일·입고 일정** (더현대서울·스타필드하남 등). 2위: **스펙·그램수** (스타필드고양 '여성 그램수까지 물량 갖춰 출시 필요'). 3위: **컬러** (사이먼부산 '블랙인지 레드인지 문의'). 4위: **시타 가능 여부**. 스타필드고양 '디테일한 스펙·성능 교육 필요 (울트라 V5 출시 때처럼)'."},{"tag":"⚠️즉시체크","text":"⚠️ **디파이어 출시 일정 매장 공유 필요** — 다수 매장 출시일·예약 문의 急증, 정확한 일정 공유 요청"},{"tag":"⚠️즉시체크","text":"⚠️ **사이먼여주 여성 라켓 그립 재고 부족** — '4/3, 4/4 그립만 보유, 여성 선호 그립 없어 판매 불가, 커플 동시 구매 유도 어려움' → 입고 시급"},{"tag":"⚠️즉시체크","text":"⚠️ **사이먼파주 블레이드 V9 상설 입고 대기** — '입고 대기 고객 생기는 중, 입고 시기 문의' → 일정 공유 필요"},{"tag":"트렌드","text":"블레이드 V10 + 클래시 V3 투탑 유지. 파이썬 이름으로 혼동하는 고객 다수 (롯데인천 '디파이어 명칭 모르고 파이썬으로 물어봄'). 스타필드안성 '신규 유입 고객 증가, 클래시 터치율 상승'."}]},"팀스포츠":{"title":"팀스포츠 특이사항","items":[{"tag":"트렌드","text":"**여름방학 특수 시작** — 신세계강남 '남학생 여름방학 시즌 특수, 에볼루션·에보NXT 판매 안정적'. 스타필드수원 '이번 주 농구공 판매 굉장히 좋음'. 커넥트청주 '레트로·에보넥스트·퓨어샷 등 다양하게 판매, 야구글러브 문의도 증가'."},{"tag":"이슈","text":"현대판교 '에볼루션 재고 없어 보여드리지 못함, 여유롭게 입고 필요'. 신세계광주 '농구공 니즈 있으나 단순화된 컬러에 구매 이탈'. 사이먼파주 '새로운 농구공 필요'. 아이파크 '볼타워 피로도 높음, 10대 학생 신상 문의 있음'."},{"tag":"이슈","text":"더현대서울 '글러브 터치·판매 소폭 증가, 캐치볼 목적 가족 단위 구매 + 소프트 야구공 연계 구매'. 사이먼부산 '성인용 글러브 문의 고객 많음'. 스타필드하남 '이번 주 글러브 터치 늘어 관심 높아지는 모습'."}]},"상설":{"title":"상설 — 25FW 신상품 입고 후 현장 반응","items":[{"tag":"긍정","text":"25FW 상설 신상품 입고 후 전반 긍정적 반응. 커넥트청주 '단골 고객들이 기다린 만큼 판매율 매우 높음, Airveil 전 라인 반응 좋음, 가격 저항 없이 판매'. 롯데의왕 '사이즈 깨짐 상황에서 FW 상품 입고로 분위기 전환'. LF광양 'SKU 다양해지며 고객 체류시간 증가'."},{"tag":"⚠️즉시체크","text":"⚠️ **입고 수량 부족** (롯데의왕·사이먼여주) — '신상품 입고가 많지 않아 아쉬움, 퓨어드라이 소재 상설 입고 있으면 매출 도움' → 추가 배분 검토"},{"tag":"이슈","text":"현대대전 '퓨어드라이 상설 할인율이 정상 대비 크게 차이없다고 느껴 정상 쪽에서 구매 많음'. 사이먼부산 '24FW는 디자인 대비 가격 보고 구매 망설이는 분 多'. 사이먼파주 '반팔 작은 사이즈 찾는 고객多, 신상 입고로 반응 좋음'."}]},"사은품":{"title":"하반기 정기사은품 케이프담요 수량 취합","items":[{"tag":"수량취합","text":"**케이프담요 신청 현황** (1박스=30개, 18만원/박스): 신세계강남 **20박스**, 현대스페이스원 **10박스**, 더현대서울·롯데잠실 **5박스**, 사이먼파주 **4박스**, 신세계광주·현대판교 **3박스**, 신세계사우스시티·신세계센텀·롯데아울렛기흥·롯데인천·사이먼부산·롯데창원·스타필드코엑스·커넥트청주·스타필드하남·현대대전·갤러리아센터시티 **2박스**, 그 외 매장 **1박스**."}]},"디파이어시타회":{"title":"디파이어 시타회 참석 현황 (7/24 15~18시)","items":[{"tag":"참석","text":"**참석 예정 (매니저 1명)**: 롯데아울렛동부산, 현대스페이스원, 현대판교, 롯데인천, 롯데의왕, 사이먼파주, 롯데창원, 더현대서울, 롯데잠실, 스타필드고양. **조율 중**: 스타필드코엑스. **미참석**: 신세계사우스시티·신세계대전·신세계센텀·롯데아울렛기흥 등 다수 (휴가·행사 등 이유)."}]},"고객동향":{"title":"고객 입점 동향","items":[{"tag":"동향","text":"📉 **전반 감소** — 여름 휴가철 시작 + 비/흐린 날씨 복합 영향. 현대판교 -40%, 아이파크 -20%, 현대스페이스원 -20~30%, 신세계광주·롯데인천 -20% 명시. 스타필드고양 '스타필드 자체 입점 확 줄어 다음 주 지켜봐야'."},{"tag":"동향","text":"외국인: 신세계센텀 '평일 외국인 비중 큼', 롯데아울렛동부산 '외국인 팀당 50~80만원 고액 구매'. 스타필드코엑스 '전시회 이슈로 유럽 고객 + 내국인 유입 소폭 증가'. 현대무역 '테니스 입점 고객 현저히 감소, 외국인만 유입 중'."},{"tag":"동향","text":"LF광양·스타필드안성은 비 영향으로 가족 단위 실내 입점 증가. 커넥트청주 '서울 고객 매출 기여, 30대 주 연령'. AK원주 '평일 비슷, 주말 고객 증가'."}]},"경쟁사":{"title":"경쟁사 동향","items":[{"tag":"경쟁사","text":"신세계의정부 '라코스테 30% 할인 + 목요일부터 행사장 매대 크게 설치, 가격 비교 고객 증가'. 갤러리아센터시티 '타 브랜드 할인 행사로 가격 비교 후 비구매 多'. 롯데잠실 '백화점 세일 기간에도 전년 대비 입점·매출 하락'."}]},"즉시체크":{"title":"⚠️ 즉시 체크 리스트","items":[{"구분":"의류","내용":"셋업 컬러 매칭 구성 부족·S·M 핵심 사이즈 부재","매장":"신세계강남","상태":"❌ 미해결","조치":"FW 신상 S·M 확대 예정 안내 + 기획 검토"},{"구분":"의류","내용":"PK티셔츠 물량 부족 판매 로스","매장":"스타필드안성","상태":"❌ 미해결","조치":"재고 확인 필요"},{"구분":"의류","내용":"여성 긴기장 하의(긴바지·롱스커트) 전 매장 수요","매장":"전 매장 공통","상태":"📌 안내필요","조치":"차기 시즌 기획 반영 시급"},{"구분":"용품","내용":"드로우스트링·윌베어 키링 입고분 전량 소진","매장":"현대무역","상태":"❌ 미해결","조치":"재고 보충 시급"},{"구분":"용품","내용":"드로우 V1·V2 상품 피로감 — 신규 디자인(V3) 요청","매장":"스타필드고양","상태":"📌 안내필요","조치":"기획 검토"},{"구분":"신발","내용":"볼트프로 신규 컬러 남성 사이즈 부족","매장":"스타필드안성","상태":"❌ 미해결","조치":"재고 보충 필요"},{"구분":"신발","내용":"온라인 가격 비교 후 시착만 하고 이탈 증가","매장":"사이먼파주","상태":"🔄 모니터링","조치":"채널 가격 정책 참고"},{"구분":"라켓","내용":"디파이어 출시 일정 매장 공유 필요","매장":"다수 매장","상태":"📌 안내필요","조치":"출시 일정 즉시 공유"},{"구분":"라켓","내용":"사이먼여주 여성 라켓 그립 재고 부족","매장":"사이먼여주","상태":"❌ 미해결","조치":"입고 시급"},{"구분":"라켓","내용":"블레이드 V9 상설 입고 대기 고객 발생","매장":"사이먼파주","상태":"❌ 미해결","조치":"입고 일정 공유"},{"구분":"팀스포츠","내용":"에볼루션 재고 부족 — 여유롭게 입고 필요","매장":"현대판교","상태":"❌ 미해결","조치":"재고 확인"},{"구분":"상설","내용":"25FW 상설 신상품 입고 수량 부족","매장":"롯데의왕·사이먼여주","상태":"❌ 미해결","조치":"추가 배분 검토"}]}},"7월2W":{"date":"07/06~07/12","전체요약":"**디파이어 라켓 런칭 주** — 사전예약 + 런칭 당일 방문 구매 동시 발생, 신세계강남·현대스페이스원·현대판교 등 초반 반응 뜨거움. 퓨어드라이 반팔 여전히 전 매장 판매 1위, 여름 기능성 수요 정점. 에어리 W 신규 컬러 반응 긍정적, 볼트프로 판매 강세 지속. 듀오플랩 백팩 신규 입고로 용품 라인업 다양화, 드로우 V2 화이트 여전히 강세. 여름 휴가철 + 날씨 영향으로 입점 전반 감소, 일부 매장 30~40% 하락.","판매베스트":{"title":"금주 판매 베스트","items":[{"tag":"베스트","text":"**퓨어드라이 반팔** 전 매장 공통 1위 유지. 신세계강남 '여성 의류 압도적 판매가 매장 매출 핵심 역할, 퓨어드라이 전 라인 상승세'. 롯데잠실 '레이커스 선수 방문 후 리본 니삭스 커플 구매'. 롯데창원 '클럽 단체 NTS51 선셋 반팔티 구매 발생'."},{"tag":"디파이어런칭","text":"📌 **디파이어 라켓 런칭** 이번 주 최대 이슈. 사전 예약 + 런칭 당일 방문 구매 동시 발생. 현대중동 '재고 당일 소진'. 신세계강남 '사전예약·당일 방문 구매 비중 상당'. 드로우스트링 V2·신규 컬러 동반 판매 호조."}]},"전주대비":{"title":"전주 대비 변화","items":[{"tag":"변화","text":"📈 **디파이어 런칭 효과** — 라켓 문의·판매 급증, 일부 매장 당일 재고 소진. 📈 **에어리 W 신규 컬러 입고** — 여성 선택폭 확대, 판매 소폭 증가. 📉 **입점 전반 감소** — 여름 휴가철 + 비/더위 복합. 신세계광주 -30~40%, LF광양 -40~50%, 사이먼여주·현대대전 30% 이상 감소. 📉 신세계대전 '경쟁 브랜드 시즌오프 + 매장 앞 크록스 대형 행사로 입점 감소'."}]},"의류":{"title":"의류 특이사항 (신상 전반 고객 터치·피드백)","items":[{"tag":"트렌드","text":"신상 전반 반응 좋음. 신세계강남 '이번 주 윌슨코리아 제품보다 수입 상품 위주 신상 출시 — 수입 상품 판매 강세'. 커넥트청주 '26FW 아이템 대부분 반응 좋고 피팅 후 판매율 높음'. 하퍼 크롭 라인 초반 반응 긍정적 (커넥트청주·롯데기흥)."},{"tag":"이슈","text":"**S·M 사이즈 품절 지속** (현대스페이스원·나인원한남 등) '여성 S·M 사이즈 깨져 아쉬움'. 스타필드수원 '의류보다 테니스화 보러 오는 고객 많음 — 의류 셋업 재고 깨짐으로 주문 대응 필요'. 신세계대전 '지방권 특성상 여성 브라탑·스커트 입고 후 판매 소폭 상승'."},{"tag":"⚠️즉시체크","text":"⚠️ **여성 S·M 사이즈 품절 다수 매장** (현대스페이스원 등) → FW 신상 S·M 확대 예정 안내"},{"tag":"이슈","text":"신세계의정부 '피키쇼츠·스커트·여성 퓨어드라이 외 판매율 낮음, 의류 터치감 전반 저하'. 현대중동 'TTS71 화이트 여전히 터치 多'. 롯데의왕 '신상 입고로 사이즈 깨짐 덜해 고객 반응 좋음'."},{"tag":"안내필요","text":"📌 퓨어드라이 공용 S·M 문의 → FW 신상 S·M 사이즈 확대 예정 안내"}]},"용품":{"title":"용품 특이사항","items":[{"tag":"드로우신규","text":"**드로우 V2 화이트** 여전히 판매 강세. 신세계강남 'GBL 컬러 계속 판매'. 신세계광주 'V2 핑크 컬러 반응 좋음'. 나인원한남 'V1·V2·에어소프트·듀오플랩백팩 모두 반응 좋음'."},{"tag":"듀오플랩백팩","text":"**듀오플랩 백팩** 신규 입고 반응 긍정적. 스타필드수원 '옐로우 컬러 인기, 신발 주머니 추가 후 반응 더 좋음'. 롯데잠실 '새 백팩 라인업 반응 좋음'. 롯데기흥 '컬러 추가로 수요 발생 기대'."},{"tag":"이슈","text":"스타필드고양 'V1·V2 상품 피로감 심함, V3 같은 신규 디자인 필요' 반복 언급. 롯데아울렛동부산 'V1 아이보리 물통 수납 찍찍이 방식 고객 의문'. 신세계의정부 '기본 볼캡 여름 소재 부족, 여성 캡 모자 없다는 피드백 多'."},{"tag":"⚠️즉시체크","text":"⚠️ **현대대전 사이즈 깨짐 + 오염 상품 입고** — '오염 있는 상품 많아 구매 못하는 경우 多' → 품질 관리 확인"}]},"신발":{"title":"신발 특이사항","items":[{"tag":"에어리W 신규컬러","text":"**에어리 W 신규 컬러** 여성 선호도 높음. 신세계대전 '옐로우 20~30대, 버건디 40대 선호'. 롯데잠실 '신규 컬러 반응 좋음, 밋밋한 화이트보다 포인트 컬러 구매'. 현대판교 '귀여운 테니스화 원하는 여성 고객 어필 좋아짐'. 단, 신세계의정부 '에어리 겉면 딱딱한 착화감, 발 커보이는 느낌 피드백'."},{"tag":"볼트프로 강세","text":"**볼트프로 1.5** 지속 강세. 커넥트청주 '에어리·리스폰스프로 대비 볼트프로 반응 압도적'. 신세계강남 '볼트프로 판매 상당히 좋음, 리스폰스프로 판매 줄어드는 추세'. 롯데기흥 '착용감 위주 구매, 볼트프로 선택 많음'."},{"tag":"⚠️즉시체크","text":"⚠️ **리스폰스프로 1.5 신규 컬러 미입고 매장** (롯데의왕 등) — 입고 일정 확인 필요"},{"tag":"이슈","text":"스타필드코엑스 '코트글라이드 가격 메리트로 선택하는 고객 다수 발견'. 롯데창원 '리스폰스프로1.5 단골이 이미 보유, 새 컬러 추가 구매 고민'. 롯데동부산 '에어리 크게 인기 없음, 리스폰스프로 1.5 반응 지켜봐야'."}]},"라켓":{"title":"라켓 특이사항 (디파이어 런칭 판매 반응)","items":[{"tag":"디파이어런칭반응","text":"**디파이어 런칭 상세 반응**: 신세계강남 '타사 라켓 사용자 70% + 기존 블레이드 사용자 30% 구매'. 현대스페이스원 '사전예약:방문 = 5:5, 기존 윌슨 충성 고객 + 신규 유입'. 롯데잠실 '윌슨리그 선수 4명 런칭 당일 방문, PRO 98 구매'. 현대중동 '런칭 후 전화 예약→방문 구매, 재고 당일 소진'."},{"tag":"디파이어런칭반응","text":"롯데의왕 '98PRO 모델 사전예약 주도, 재고 빠른 소진 → 구매 원하는 고객 대기 발생'. 롯데동부산 '런칭 날짜 구매 문의 전화 → 당일 방문 구매 연결'. LF광양 '남성 고객 관심도 높고 터치율 높음'. 스타필드아이파크 '자점 인스타 보고 주문하는 내수 고객 비중 높음."},{"tag":"⚠️즉시체크","text":"⚠️ **디파이어 재고 소진 매장 발생** (현대중동·롯데의왕 등) — 추가 배분 검토 필요"},{"tag":"이슈","text":"AK원주 '가격 문의 후 구매 전환 안 됨, 원주 지역 동호인 많아 고사양 라켓 욕심 낮음'. 신세계대전 '디파이어 문의 많지 않음, 출시일·스펙 소량 문의'. 롯데부산 '구력자 위주 구매, 외국인 반응 좋음'. 사이먼파주 '충동 구매로 판매된 고객도 있었음'."}]},"팀스포츠":{"title":"팀스포츠 특이사항","items":[{"tag":"트렌드","text":"에볼루션·퓨어샷·에보넥스트 꾸준한 판매 유지. 신세계강남 'EVO 시리즈 판매 가장 안정적'. 스타필드코엑스 '에볼루션·올팀 판매 좋음'. 현대스페이스원 '이번 주 포지 시리즈 터치·판매 높았음'."},{"tag":"이슈","text":"롯데기흥 '좌투용 글러브 문의 꾸준, 입고 시 수요 분명'. 커넥트청주 '에볼루션·퓨어샷 위주, 새로운 라인 없냐는 고객 문의'. 스타필드수원 '농구공 주말 판매 저조, 외국인 구매 있었음'."}]},"상설":{"title":"상설 — 판매 어려운 점·제안","items":[{"tag":"이슈","text":"커넥트청주 '25FW 소량 입고 상품이 기존 상설라인보다 판매 높음, 재방문 단골 중심'. 롯데의왕 '여름 시즌에 FW 상품 입고돼 고객 니즈 불일치'. 롯데기흥 '컬러·사이즈 깨짐 + 오염 상품 多 → 구매 못하는 경우 발생'."},{"tag":"⚠️즉시체크","text":"⚠️ **현대대전 연도별 할인율 이슈** — '24년도 상품이 25년도 상품보다 할인 안 되는 경우 고객 혼란' → 할인율 정책 확인 필요"},{"tag":"이슈","text":"LF광양 '정상·상설 상품 비교 구매 고객 줄어 상설 구매 감소 체감'. 현대스페이스원 '사이즈 채워진 SKU 적어 원활한 판매 어려움'."}]},"고객동향":{"title":"고객 입점 동향","items":[{"tag":"동향","text":"📉 **전반 감소** — 여름 휴가철 + 날씨 영향. LF광양 -40~50%, 현대대전·사이먼여주 -30% 이상, 신세계광주 -30~40% 명시. 롯데창원 '공동사은·사은 행사 없어 입점 감소, 매출은 전주와 비슷'."},{"tag":"동향","text":"나인원한남 '전주 대비 날씨 영향으로 입점·판매 모두 증가 (상대적)'. 스타필드코엑스 '전시회 이슈로 유럽·내국인 유입 소폭'. 커넥트청주 '트래픽 큰 변화 없음, 강릉길감자 팝업으로 1~20대 유입'. 신세계강남 '7월 2주 기능성 의류·신상품 판매 매우 좋음, 디파이어 에너지 필요'."},{"tag":"동향","text":"신세계의정부 '주말 아이쇼핑·연령대 높은 고객 비중 높음, 라코스테 30% 할인 행사 매대로 가격 비교 고객 증가'. 롯데동부산 '휴가철·경제 규제 영향으로 근래 가장 적은 유동인구'."}]},"경쟁사":{"title":"경쟁사 동향","items":[{"tag":"경쟁사","text":"신세계대전 '경쟁 브랜드 시즌오프 + 크록스 대형 행사로 입점 감소'. 신세계의정부 '라코스테 30% 할인 행사 매대 설치 지속'. 갤러리아센터시티 '타 브랜드 할인 행사로 가격 비교 후 비구매 증가'."}]},"즉시체크":{"title":"⚠️ 즉시 체크 리스트","items":[{"구분":"의류","내용":"여성 S·M 사이즈 품절 다수 매장","매장":"현대스페이스원·나인원한남 등","상태":"❌ 미해결","조치":"FW 신상 S·M 확대 예정 안내"},{"구분":"용품","내용":"오염 상품 입고 — 구매 못하는 경우 多","매장":"롯데기흥","상태":"❌ 미해결","조치":"품질 관리 확인"},{"구분":"신발","내용":"리스폰스프로 1.5 신규 컬러 미입고 매장","매장":"롯데의왕","상태":"❌ 미해결","조치":"입고 일정 확인"},{"구분":"라켓","내용":"디파이어 재고 소진 매장 발생","매장":"현대중동·롯데의왕","상태":"❌ 미해결","조치":"추가 배분 검토"},{"구분":"라켓","내용":"디파이어 재고 대기 고객 발생","매장":"롯데의왕","상태":"🔄 모니터링","조치":"재입고 일정 안내"},{"구분":"상설","내용":"24년도 상품 할인율 이슈 (고객 혼란)","매장":"현대대전","상태":"❌ 미해결","조치":"할인율 정책 확인"}]}},"7월3W":{"date":"07/13~07/19","전체요약":"퓨어드라이 반팔 전 매장 1위 유지, 더위·장마로 기능성 소재 수요 최고조. 디파이어 재고 소진 후에도 문의·재입고 대기 고객 지속 급증 — 10월 재출시까지 열기 유지 우려. 올어라운드 짐백 신규 컬러(민트·라벤더) 여성 반응 좋으나 구매 전환은 지켜봐야. 바이저 SKU 다양화 긍정 반응, 드로우 V2 WHT 여전히 강세. 제헌절 연휴·휴가철로 입점 혼재, 상설 인기 사이즈 공백으로 판매 로스 지속.","판매베스트":{"title":"금주 판매 베스트","items":[{"tag":"베스트","text":"**퓨어드라이 반팔** 전 매장 공통 압도적 1위 유지. 더위·장마로 기능성·속건 소재 수요 최고조. 롯데부산 '남녀 불문 퓨어드라이 가장 기본으로 판매'. 신세계광주 '퓨어드라이 에이스 글로우 티셔츠 가장 반응 좋았음'. 스타필드하남 '퓨어드라이 재구매 고객 급증'."},{"tag":"베스트","text":"여성: **하퍼크롭+레이어드스포츠쇼츠 셋업** 반응 좋음 (롯데부산·신세계사우스시티). **미드타운스커트** 터치 多 — '짧은 기장 피하는 경향' (AK원주·롯데부산). 용품: **드로우스트링 V2 WHT/IVY/PNK**, **글로우 바이저** 판매 강세 (롯데잠실·나인원한남)."},{"tag":"특이","text":"스타필드고양 '테크 크루 티셔츠·반바지 세트 외국인 중심 판매 급증'. 신세계강남 '올어라운드 짐백 라벤더 고객에게 TBO73 라벤더 연계 판매 성공, 듀오플립백팩까지 두 개씩 구매'. 롯데잠실 '신상 용품 판매 좋았음, 컬러풀 손목밴드 반응 좋음'."}]},"전주대비":{"title":"전주 대비 변화","items":[{"tag":"변화","text":"📈 **올어라운드 짐백 신규 컬러(민트·라벤더) 입고** — 여성 반응 긍정적, 구매 전환은 지켜봐야. 📈 **바이저 SKU 다양화** — 착용 후 구매율 높음, 터치율 상승. 📉 **제헌절 연휴+휴가철+장마 복합**으로 입점 혼재 — 일부 매장 증가, 전반 목적구매 감소. 📉 **디파이어 재고 대부분 소진** — 재입고 대기 문의가 판매를 대체하는 상황."}]},"의류":{"title":"의류 특이사항","items":[{"tag":"트렌드","text":"퓨어드라이 소재 재구매율 높음 — 롯데인천 '에슬레저 겸용으로 운동 후 그대로 귀가하는 고객 증가'. 신세계대전 '착장 시 비침·몸매 부각 적고 원단 만족도 높음, 운동+일상 겸용이 가장 큰 장점'. 핑크 그라데이션·에이스 라인 반응 좋음."},{"tag":"이슈","text":"**블랙 컬러 부재 아쉬움** (현대중동·나인원한남·신세계사우스시티) — '여성 의류 블랙 별로 없어 아쉬움', '무채색 셋업 매치 상품 부족'. **커플 매칭 아이템 부족** (현대판교·롯데잠실) — '함께 입을 비슷한 결의 제품 없어 아쉬움'."},{"tag":"⚠️즉시체크","text":"⚠️ **더현대서울 사이즈 전반 깨짐 — DP 판매 多, 판매 로스 큼** — '신상 입고를 좀 더 당겨야 할 것 같음' → 입고 일정 검토"},{"tag":"⚠️즉시체크","text":"⚠️ **스타필드고양 시어아이스 스커트/바지 허리·골반 핏 이슈** — '착용 시 옆으로 튀어나오는 현상, 판매 저조' → 소재·패턴 검토 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **스타필드하남 여성 스커트 속바지 원단 너무 두꺼워** — '착장 시 덥고 답답하다는 피드백 多' → 원단 개선 검토"},{"tag":"이슈","text":"커넥트청주 '핑크 컬러·브라탑 위주 전개로 권해드릴 수 있는 라인이 퓨어드라이뿐, 추천 폭 너무 좁음'. 신세계대전 '남성 라운드 티셔츠 종류 중복 多, 여성 반집업 아노락 같은 커플 겸용 아이템 부족'. 롯데동부산 '시어아이스 카라티 다양한 컬러 요청, 내년 재출시 검토 필요'."},{"tag":"제안","text":"신세계강남: '리조트룩·휴가룩에 테니스 무드 접목한 상품 기획 필요, 여성 긴바지 내년 2종 추가 필요'. 스타필드코엑스: '브라탑 선호 고객 증가 — 수입 제품 위주 터치'. 신세계의정부: '퓨어드라이 연계 반바지 기장 너무 짧거나 컬러 화려해 구매 연결 어려움, 블랙·화이트 스커트 추가 필요'."},{"tag":"안내필요","text":"📌 퓨어드라이 공용 S·M 문의 → FW 신상 S·M 사이즈 확대 예정 안내"}]},"용품":{"title":"용품 특이사항 (올어라운드 짐백 신규컬러·바이저 반응)","items":[{"tag":"올어라운드짐백","text":"**신규 컬러(민트·라벤더) 여성 반응 긍정적** — 나인원한남 '민트·라벤더 둘 다 여성 반응 특히 좋음'. 신세계강남 '라벤더 V2 품절 고객에게 TBO73 연계 판매 성공'. 단, 전반적으로 터치는 있으나 구매 전환은 아직 지켜봐야 — 스타필드수원·스타필드코엑스·스타필드고양 '큰 반응 없음, 더 지켜봐야'."},{"tag":"바이저","text":"**바이저 SKU 다양화 긍정 반응** — 스타필드고양 '전년보다 SKU 늘고 예쁜 색감 많아 고객 만족'. 나인원한남 '챙 넓고 차분한 컬러 인기'. 롯데부산 '글로우베일처럼 큰 밴딩 바이저 선호'. 단, 스타필드하남 '챙 기장 너무 짧다는 피드백', 나인원한남 '스윙바이저 뒷밴딩 아쉬움'."},{"tag":"⚠️즉시체크","text":"⚠️ **드로우 V2 WHT 재고 빠르게 소진** (신세계강남·롯데인천) — '흰색만 자꾸 찾아 IVY 대체 어려움' → 재고 현황 확인"},{"tag":"이슈","text":"신세계대전 '스윙라이트캡 소재 가볍고 좋으나 스윙모션캡 쉐입이 더 예쁘다는 의견, 착용 시 딱 잡히는 느낌 없어 운동 시 불편'. 롯데의왕 'FW 글로우 바이저보다 SS 글로우 바이저 선호'. 스타필드코엑스 '바이저보다 캡 선호 증가, 선물용 캡 터치 많음'."},{"tag":"이슈","text":"신세계의정부 '짐백 타 브랜드 대비 가격 비싸다는 피드백 多'. 롯데동부산 'V1 아이보리 물통 수납 찍찍이 방식 고객 의문 지속'. 스타필드고양 'V1·V2 상품 피로감 심함, V3 같은 신규 디자인 필요 반복 언급'."}]},"신발":{"title":"신발 특이사항","items":[{"tag":"볼트프로 강세","text":"**볼트프로 1.5** 전 매장 판매 1위 유지. 커넥트청주 '볼트프로 판매율 압도적, 그린·블루 인기'. 스타필드고양 '신규 컬러 모두 고객 만족'. 신세계강남 '볼트프로 1.5 블루 컬러 인기 굉장히 좋음'. 롯데잠실 '테린이에게 접근하기 좋은 테니스화로 추천'."},{"tag":"에어리W","text":"**에어리 W 신규 컬러(레드·옐로우)** 반응. 스타필드고양 '신규 컬러 착용 후 대부분 구매로 연결, 기존 컬러를 잊게 만드는 예쁜 컬러'. 사이먼파주 '에어리 레드 컬러 판매율 좋음'. 단, 신세계의정부·나인원한남 '착화감 아쉬움, 가죽 소재 답답·밑창 딱딱하다는 피드백'. 현대중동 '기존 컬러가 더 인기'."},{"tag":"⚠️즉시체크","text":"⚠️ **롯데창원 리스폰스프로 265mm 이상 사이즈 부재** — '남성 시착 못하는 경우 多' → 재고 보충 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **롯데동부산 리스폰스프로 재고 부족** — '입고 요청' → 재고 현황 확인"},{"tag":"⚠️즉시체크","text":"⚠️ **스타필드하남 러쉬프로 내구성 클레임** — '착화 얼마 안 됐는데 발볼 쪽 갈라짐 현상' → 즉시 확인·대응"},{"tag":"이슈","text":"신세계강남 '볼트프로 그린 컬러 없어 헛걸음 고객 발생, 신상 인트리그(WHT/LIM)로 대체 판매'. 스타필드수원 '볼트프로 그린 여전히 가장 인기, 에어리 화이트 터치 가장 많음'. 신세계광주 '에어리 뉴컬러 여성 터치·구매 좋음, 볼트프로·리스폰스 그린·화이트 대비 신규 컬러 반응 아직 미흡'."}]},"라켓":{"title":"라켓 특이사항 (디파이어 재고 소진 후 반응)","items":[{"tag":"디파이어소진후","text":"재고 소진 후에도 **문의·재입고 대기 고객 지속** — 롯데부산·스타필드고양·현대중동·나인원한남 '재고 없는데도 전화·방문 문의 계속'. 신세계사우스시티 '방문객 70%가 디파이어 실물 목적'. 스타필드코엑스 '디파이어 때문에 다른 라켓 수요 없음'."},{"tag":"⚠️즉시체크","text":"⚠️ **디파이어 재입고 10월 일정 안내 중이나 열기 유지 우려** (스타필드고양) — '10월까지 열기 이어갈지 의문' → 8월·10월 스펙별 출시 일정 매장 공유 필요"},{"tag":"⚠️즉시체크","text":"⚠️ **여성 스펙(100UL·100L) 출시 일정 문의 증가** (더현대서울·커넥트청주·스타필드수원) — 출시 일정 공유 필요"},{"tag":"이슈","text":"아이파크 '아래층 테니스메트로에 디파이어 98PRO 재고 多, 이탈 심각. 즉시 스트링 불가로 한정판 라켓 위주 판매 중'. 신세계강남 '이번 주 골고루 판매 — 초보 여성 울트라, 초보 남성 클래시, 부동 1등 블레이드'. 롯데인천 '디파이어 신상으로 인해 쉬프트 재고 소화 더 어려워짐'."},{"tag":"이슈","text":"스타필드수원 '여성 선호 낮은 무게 한정판 라켓 전부 품절, 발길 돌리는 고객 多'. 롯데기흥 '블레이드 V10 에디션 출시 여부 문의 종종 발생'. 현대스페이스원 '유도판매로 블레이드 50% 확률 전환 판매 성공'."}]},"팀스포츠":{"title":"팀스포츠 특이사항","items":[{"tag":"트렌드","text":"에볼루션·퓨어샷·에보넥스트 안정적 판매 유지. 신세계강남 '볼타워 앞 고객 적극 유인 — 시끄럽게 만들어야 주변 고객 모임, 에볼루션·에보NXT 넉넉한 재고로 매출 도움 됨'. 스타필드수원 '주말 볼타워 앞 인산인해'. 롯데의왕 '에볼루션 재입고로 주문 없이 바로 판매 가능해 좋았음'."},{"tag":"이슈","text":"커넥트청주 '레트로볼(고무) 신상 입고됐으나 10대 선호 안 함, 아쉬움'. 롯데기흥 '글러브 A1000 입고 문의 있음'. 롯데동부산 '시티레트로 재고 소진, 추가 입고 필요'. 신세계광주 '이번 주 농구공 찾는 고객 거의 없음'."},{"tag":"⚠️즉시체크","text":"⚠️ **롯데동부산 시티레트로 재고 소진** — 추가 입고 필요"}]},"상설":{"title":"상설 판매 현황","items":[{"tag":"이슈","text":"**인기 사이즈 공백으로 판매 로스 지속** — LF광양 '인기 사이즈 공백 많아  금주 고객입점 현황은?","fb":"주말 입점객이 많이 줄었습니다."},{"cat":"","topic":"1) 에어벨 W의 판매호조 사유 - 주 구매 고객층 (테니스/일반) (테니스신발이 아닌데 어떤고객이 구매하는","fb":"1. 귀여워서 테니스 치러 가시는 길에 신으신다는 분들도 계셨고, 테니스 고객인 아닌 분들께서도 이쁘다며 구매하셨습니다. 2. 선셋매치는 셋업구성에 가격까지 알맞어서 인기가 많습니다."},{"cat":"기타","topic":"신규 라켓 출시 프로모션 진행을 위한 그립커버 사전 주문  박스당 수량 30개, 개당 단가: 3,000원(V","fb":"1박스"}],"6월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"상의와 하의 셋업을 주로 많이 찾으셨고, 반바지를 많이 찾으셨습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품 - 드로우스트링 백팩V2 (아이보리, 화이트) 재입고 후 반응,","fb":"여성분들은 좀 기장감이 있는 하의를 많이 찾으셨고, 남성분들은 시어아이스 폴로티셔츠 그린컬러를 많이 찾으셨는데, 재고가 없어서 아쉬워 하시는분들이 많으셨습니다."},{"cat":"용품","topic":"","fb":"드로우스트링 백팩 아이보리와 화이트 재입고 후 확실히 선택지가 넓어져서 판매에 도움이 되었습니다."},{"cat":"신발","topic":"","fb":"리스폰스프로1.5의 판매가 가장 좋으나, 큰사이즈 재고가 많이 빠져서 남성분들께서 아쉬워하셨습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"롤랑가로스 클래시와 블레이드V10의 인기는 여전히 좋았고, 블레이드 100프로를 문의주시는 분들이 많았습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공과 글러브는 꾸준한 판매가 있습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"주말내 스타필드 입점객 수가 많이 줄었습니다. 외국인의 방문이 줄었던 한 주 였습니다."}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"금주는 퓨어드라이 반팔티셔츠와 스커트/쇼츠와 함께 세트로 구매하시는 분들이 많았습니다. 신상 의류 터치와 반응도 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"스트로베리앤크림 컬렉션은 터치와 반응모두 나쁘지않았으나, 면 소재로 인해 테니스 고객보다는 일반고객분들께 인기가 더 많았습니다. 쇼츠와 함께 세트 구매하시는 분들도 많았습니다."},{"cat":"용품","topic":"","fb":"피키 크루 삭스의 반응은 크게 없었습니다."},{"cat":"신발","topic":"","fb":"볼트프로 신규 컬러보다 여전히 그린컬러의 반응이 좋습니다. 또한 볼트프로보다는 여전히 리스폰스 프로 1.5를 많이 찾으십니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드와 롤랑가로스 라켓 반응이 가장 좋습니다."},{"cat":"팀스포츠","topic":"","fb":"실내용 농구공이 아에 없다보니까 아쉬워하시는 고객분들이 많았습니다. 저희는 볼타워가 굉장히 큰데, 재고부족으로 아쉬움이 남습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"지난주부터 입점객이 계속 줄고있습니다. 외국인 관광객도 많이 줄었습니다."},{"cat":"기타","topic":"수시사은품 전반 매장 피드백 (스크런치 / 그립커버) 좋은점, 아쉬운점 + 차후 사은품 제안 아이템","fb":"그립커버의 반응이 굉장히 좋습니다. 차후 사은품 제안 아이템은, 그립밴드와 신발탈취제입니다."}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"금주는 남녀 모두 퓨어드라이 소재의 반팔의 터치가 가장 많았고, 휴가철 의류 구매 목적보다는 여전히 테니스 고객이 많으셨습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"퓨어드라이 신상 입고로, 특히 여성 반팔 선택지가 많아져서 판매에 용이했습니다. 다만 함께 매치할 스커트가 부족하다보니 (신상 스커트 시급) 세트판매가 조금 어렵습니다. 또한 길이감이 조금 있는 스커트를 찾으시는 분들도 많았습니다.  긴바지 수요는 많지는 않으나 종종있습니다. 긴바지보다는 짧은 반바지나 스커트보다 조금 길이감이 있는 하의가 있으면 좋을것 같습니다."},{"cat":"용품","topic":"","fb":"여전히 드로우스트링 백팩 v2의 판매가 꾸준했습니다. 모자는 에어모션캠프캡이 가장 터치가많은반면에, 세탁불가제품으로 판매가 저조했습니다. 여름 모자인데 손세탁도 안되는 모자라서 판매하기에 어렵습니다."},{"cat":"신발","topic":"","fb":"에어리w 는 리오더가 늦은감이 있다고 봅니다. 기다리시던 분들도 다른 신발을 구매하심에 따라 많은 관심이 있지는 않았습니다. 여전히 리스폰스프로1.5가 꾸준하게 인기가 많습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드 v10은 남녀모두에게 반응이 꾸준히 좋고, 클래시는 여성 테린이 분들께서 많이 구매하십니다. 특히 클래시는 에디션버전이 다양하게 많아서 판매가 많았습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공과 야구글러브의 판매는 꾸준합니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주대비 비슷합니다."},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"상당히 만족하셨습니다. 날씨와 아주 잘맞는 사은행사인것 같습니다."}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"퓨어드라이 티셔츠 라인이 꾸준한 터치와 판매가 있습니다. 여성 신상 퓨어드라이 소재의 티셔츠들이 많아져 선택의 폭이 넓어져서 고객들 반응이 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품) 드로우스트링 백팩 V2 신규 컬러 반응  (내/외국인 비중,","fb":"여성 티셔츠 라인이 많아져서 터치가 많습니다. 기본 화이트 치마를 찾으시는 분들이 많은데, 지금 있는 화이트 치마들은 모두 밴드가 있어서 선호하지 않는분들이 꽤 많았던 한 주였습니다."},{"cat":"용품","topic":"","fb":"드로우스트링 백팩 신규컬러중에 그레이 컬러가 내국인분들이 굉장히 좋아하셨고, 외국인분들은 핑크 터치는 있었으나 여전히 아이보리컬러가 인기가 더 많았습니다. 생각보다 레드컬러는 아직 반응이 없으나 조금더 지켜 볼 필요가 있겠습니다."},{"cat":"신발","topic":"","fb":"에어리W의 신규컬러 입고로, 많은 터치가 있었으며 특히 외국인분들께 인기가 많았습니다. 구매 고객 나이대는 20~30대 입니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"여전히 블레이드와 롤랑가로스 판매가 좋았고, 이번주는 새로운 라켓에대한 문의도 많았습니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션, 퓨어샷은 꾸준히 인기가 좋습니다. 예쁜 6호공을 찾으시는분들이 많습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"저번주와 비슷했습니다."},{"cat":"기타","topic":"* 26FW 상품교육북 매장의견   - 상품교육자료를 직관적으로 볼 수 있게 품번/상품명 검색 시, 세일즈포","fb":"검색히 편하고, 상품에 대해 자세히 알수있어서 직원들과 함께 보기에 아주 좋았습니다. 어떻게 응대해야할지도 같이 나와있어서, 교육에 아주 좋습니다."}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"금주는 민소매를 찾으시는 여성분들이 많으셨습니다.  신상 퓨어드라이 반팔티셔츠의 반응도 매우 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"민소매를 찾으시는분들이 많으신데, 대부분 캡이 붙어있어서 답답하고 덥다는 의견이 많았습니다. 길이감이 좀 있는 얇은소재의 민소매가 있으면 좋을것 같습니다. 또한, 살짝 길이감이 있는 치마와 바지를 많이 찾으십니다."},{"cat":"용품","topic":"","fb":"전반적으로 윌베어 키링에 대한 관심은 20-30대 분들에게 압도적이었으며, 바이저 종류는 늘어나서 좋으나, 많은분들이 여전히 로고가 작은것을 찾으십니다. 드로우스트링 백팩은 색상이 늘어나서 선택지가 많아져서 아주 좋았습니다."},{"cat":"신발","topic":"","fb":"리스폰스 프로 1.5 는 여전히 그린컬러가 가장 판매율이 좋습니다. 그래도 색상이 다양해져서 선택지가 많아져 좋습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"디파이어 라켓 문의가 많습니다. 가격과 스펙에 대한 문의가 가장 많으며, 색상에 대한 궁금증도 많았습니다."},{"cat":"팀스포츠","topic":"","fb":"이번주는 특히나 농구공의 판매가 굉장히 좋았습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"지난주에 비해 입점객수가 조금 늘었습니다. 하지만 외국인 관광객은 계속 줄고있는 추세입니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"1박스"}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"올코트 3인치 쇼츠와 피키쇼츠/피키폴로 셋업이 터치와 판매가 좋았습니다. 올코트 3인치 쇼츠는 기본적인 느낌인데 핏이 좋아서 어디든 매치하기 편할것 같다는 의견이 많았습니다. 또한 피키폴로는 셋업으로 코디하기 편해서 구매하시는 분들이 많으셨습니다."},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"의류는 이번주 또한 퓨어드라이 소재의 반팔티의 판매가 좋았습니다. 이번주는 반바지를 찾으시는 여성분들이 많았으며, 피키쇼츠와 올코트 3인치 쇼츠를 소개해드리니 반응이 좋았습니다."},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"올어라운드 짐백은 많은 반응은 없었으나, 색감이 예쁘다는 분들은 많으셨습니다. 테니스 라켓가방이 아니다 보니, 라켓가방들에 비해 터치가 적습니다. 바이저는 특정 분들만 찾으시는 경향이 있어서 많은 반응을 보기는 어려웠으나, 찾으시는 분들은 종류가 많고 색감이 다양하여 좋아하십니다. 장마가 이어짐에 따라, 야외 테니스를 나가시는 분들이 적어서인지 모자를 찾으시는 분들이 조금 줄었던 한 주였습니다."},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"볼트프로 블루색상은 반응이 조금 있으나, 여전히 그린컬러가 가장 인기가 많습니다. 에어리 역시 화이트 컬러의 터치가 가장 많습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"여전히 디파이어를 찾으시는 분들이 많으십니다. 또한 디파이어 100UL, 100L을 기다리시는 분들도 많아서, 출시 날짜를 안내해드리고 있습니다. 여성분들은 예쁜라켓을 많이 찾으시는데, 한정판 예쁜 라켓들이 낮은 무게들이 모두 품절이어서 (기본라켓도 예쁘다고 많이 어필은 하지만) 발길을 돌리시는 분들이 아주 많으셨습니다. 이번주는 특히 롤랑가로스 클래시 100ul을 많이 찾으셨습니다."},{"cat":"팀스포츠","topic":"2-2. 팀스포츠 판매 특이사항","fb":"농구공은 꾸준히 잘 나갑니다. 주말이면 볼타워 앞이 인산인해입니다."},{"cat":"기타","topic":"고객 입점 동향","fb":"전주대비 스타필드내 입점고객수가 확연히 줄었습니다. 가족단위 방문이 많아서 테니스 고객분들 보다는 농구공 고객이 많았으나, 구매율을 저조했습니다. 외국인 고객수도 작년대비 굉장히 많이 줄었습니다."}]},"신세계사우스시티":{"5월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"기능성 위주의 상의와 모자, 가방 , 신발 등등 다양하게 판매가 이루어졌습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  **신발 : 에어벨 W 고객 반응 (착화, 디자인","fb":"일반고객님들의 기본 티셔츠를 많이 찾아서 와주셨고, 레거시 볼 티셔츠 그래픽 티셔츠의 반응이 좋았습니다. 운동고객님들은 날씨가 덥다보니 기능성 위주로 의류를 보셨습니다."},{"cat":"용품","topic":"","fb":"블레이드 신형을 구입하시면서 드로우스트링백팩v2 그린컬러를 많이들 선호하시는 편이였는데, 재고부족 이슈로 조금 아쉬웠습니다. 그리고 여성분들의 베일 드레이프 캡W 의 반응이 너무 좋았습니다. 이런 착용핏의 기능성 상품들이 더 다양해진다면 너무 좋을 것 같습니다."},{"cat":"신발","topic":"","fb":"볼트프로 1.5와 리스폰스 프로 1.5의 구매율이 확실히 높은 편 이고, 그 중에서 파스텔톤 감의 테니스화를 보시는 분들의 인트리그 투어 민트라인의 판매가 좋았습니다. 에어벨W 상품의 경우, 이번 한 주에는 일반고객님들의 착화가 여러번 있었고, 가벼운 착화감과 귀여운 디자인에 반응이 좋았습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"롤랑 라켓을 전부터 기다리셨던 여성고객님들의 구매가 있었고, 그렇기에 265g 무게를 많이 찾아와 주셨습니다. 그리고 기존에 블레이드를 쓰셨던 남성고객님의 부드러우면서도 무게를 조금 낮춰보시려고 클래시 100 을 구매하셨습니다.또한 라켓과 컬러감을 맞추시려고 드로우스트링백팩v2 아이보리컬러나, 오버그립 옐로우 컬러를 같이 많이 보시는 편입니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션, 퓨어샷을 구매목적으로 오는 학생들의 방문이 많았고, 글러브의 판메율도 좋았습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"아이들과 부모님의 가족단위 입점객이 전 주  대비 확실히 많았던 한 주 였습니다."},{"cat":"","topic":"전체 고객 중 외국인 유입비중 (증가한 사유? 별도 점포에서 외국인 대상 진행하고 있는 프로모션/사은혜택은?","fb":"평소와 크게 다를것 없이 외국인 비중이 많지 않습니다."}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"퓨어드라이 에이스W 재입고 컬러가 여성분들에게 반응이 가장 좋았고, 기능성소재위주의 반팔과 반바지 등 판매가 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"얇은 바람막이를 찾는 남성고객님들이 많았는데, 기본 블랙컬러로 보여드릴 상품 월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"2-30대여성-스트로베리앤크림,피키쇼츠(퍼플),피키스튜디오: 아이캐칭 및 터치율도 높음, 또한 루즈핏이 출시되어 다양한 체격의 고객님들을 만족시키기 좋았으며 다른 상품대비 낮은 가격저항으로 셋업으로 객단가를 높히기도 편하였음 / 3-40대 여성: TSK42 등 수입라인에 대한 터치율과 판매율이 상승하고 있음 윌슨에 대해 전반적으로 고급스럽고 예쁘다 라는 인식이 강하게 적용하였음/ 2-30대 남성: 퓨어드라이 선셋매치, 코트라인숏츠 등: 낮은 AGE 남성의 경우 특정 스타일보단 전반적으로 전체 디자인이 모두 고르게 판매되었음 색감이 다양하게 출시되어 단품보다 셋업으로 객단가를 높혔음/ 4-50대 남성: 시어아이스 폴로, 퓨어드라이 폴로등 전체적으로 폴로티에 대한 수요가 높았음 NPS43의 경우 원단이 다른 상품대비 다소 두꺼워 아쉬움 좀 더 얇은 폴로티 라인이 다양하게 출시되면 좋을것같음"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"1. 구매목적: 테니스 60%/ 라이프 또는 다른 운동 40% 2. 기존고객 40%/신규고객 60%/ 3. 쇼츠와 세트로 구매하는 경우가 많음 피키쇼츠, 피키스튜디오, 또는 다른 라인이나 남성쇼츠와도 매치하여 판매되고 있음 속바지가 없어 고민하는 고객에겐 TLS51 를 연계하거나 기존 바이커쇼츠를 연계하여 판매하였음 / 2.전반적으로 여름 긴바지에 대한 수요나 문의가 많은데 출시되지 않아 매우 아쉬움 테니스 고객, 일반 라이프웨어 고객 또한 요즘 자외선 차단용으로도 여름에 긴바지만 찾으시는 고객들이 많아 출시되었으면 일반 라이프웨어 고객 유치에도 도움이 되며, 테니스 고객들의 만족도를 높히기에도 좋았을듯함 (조거팬츠 또는 TPT41 처럼 와이드팬츠 스타일)/ 3. 이너로 입을 자외선 차단용 긴팔티에 대한 문의가 굉장히 많은데 출시되지 않아서 아쉬움 팔토시의 경우 흘러내림 현상이 있어서 쿨링소재의 긴팔이너를 착용하는 경우가 많음 출시되었으면 판매에 더욱 도움이 되었을듯함 /4.남성 제품군의 경우 일반 티셔츠보다 폴로티의 수요가 더 높은데 출시된 라인이 많지 않아 아쉬움 좀 더 다양한 컬러감과 얇은 원단으로 출시되었으면 좋을것같음/5.NJK40 등 바람막이, 피스테의 경우 기존 출시일보다 1-2달은 먼저 출시되었으면 지금보다 판매율이 훨씬 좋았을듯 함 여름부터 간절기까지 입을수 있다 보단 반대의 경우가 판매하기에도, 고객이 납득하기에도 더욱 메리트가 있다고 생각함 또한 여름에 출시하는 라인이라면 지금보다 더욱 가벼운 원사를 사용하여 출시했어야 한다고 생각함/ 5. 시어아이스 소재의 아주 얇은 여성 자켓 스타일, 와이드팬츠 추가 출시되었으면 판매율이 매우 높았을듯함. 문의가 있기도 하고 여름에 반팔뿐만 아니라 실내활동을 하시는 고객들도 많기에 긴팔에 대한 수요는 꾸준히 있음"},{"cat":"용품","topic":"","fb":"피키크루삭스의 경우 반반비율로 구매가 이어졌음 디자인이 심플하여 무난하게 매치하기 좋다는 의견임 / 2. 드로우스트링백팩의 경우 작년에 많은 구매를 하셔서 다른 디자인을 찾으시는 고객들이 많았음 더플백(기존 출시되는 라인보다 좀 더 컴팩트한 사이즈) 또는 작은 크기의 투어백에 대한 문의가 많았어서 아쉬움 또한 기존 미구매 고객들도 기존 구매 고객들과 겹쳐서 고민하는 경우도 다소 있었음/ 꾸준히 드로우스트링 V2 라이트그레이 컬러에 대한 문의가 많이 들어옴 해당 컬러가 심플하여 가장 무난하게 매기 좋아 아쉽다는 의견이 있었음"},{"cat":"신발","topic":"","fb":"볼트프로 터치시 신규컬러로 출시되었다며 먼저 안내해드리고 있음, 또한 진열시 기존 상품과 교차로 진열하여 더욱 다양한 선택지로 안내해드리기 좋았음 그덕에 기존 WGN 컬러의 판매율도 기존보다 높았으며 신규컬러에 대한 아이캐칭 및 터치율도 좋고 특히나 화이트 블루컬러에 대한
