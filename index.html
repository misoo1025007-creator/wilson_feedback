"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"퓨어드라이 신상 반응이 좋았습니다. 특히 컬러에 만족도와 제질의 만족도가 높습니다. 퓨어드라이 제질을 좋아하시는 고객들이 맣아 신상으로 제품이 나오면 재구매율이 좋습니다.긴바지 수요가 크게 있지는 않습니다. 시어아이스 팬츠의 반응이 좋으나, 사이즈 품절로 인한 아쉬움이 많습니다. 조거팬츠를 찾는 고객은 없었습니다. 조거 팬츠 보다는 시어아이스 바지 같은 제품이 더 좋을 것 같다고 생각합니다."},{"cat":"용품","topic":"","fb":"드로우스트링 / 드로우스트링 에어 제품이 많이 판매가 됩니다. 재입고 되고나서 부터 좋은 반응으로 판매가 유지되고 있습니다."},{"cat":"신발","topic":"","fb":"재입고 되면 전화 부탁하던 고객들이 많았는데 고객님들꼐 연락 드렸더니 다음주에 오시기로 한 고객님들이 많습니다. 다음주 판매가 좋을 것 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"여러 라켓이 골고루 판매가 되었습니다. 저번주에 비해 라켓 판매가 조금 떨어지지만, 금주는 입문자 위주로 판매가 많았습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공 판매는 꾸준히 이어 나가고 있습니다. 금주는 야구 글러브 문의 전화가 많았습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주에 비해 입객 수가 줄어들었습니다. 입점 고객의 객단가가 높았습니다. 객단가가 다행이 높아 전주와 비슷한 매출입니다. 금주 일요일 고객이 입점이 많아 매출이 좋았습니다."},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"파우치 사은품에 대해 반응이 괜찮습니다. 좋아하시며 받아가시지만 그립커버와 비교하면 그립커버 반응이 훨씬 더 좋았다고 생각듭니다."}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"퓨어드라이 소재의 상품이 터치와 구매율이 가장 좋았습니다. 이번 신상 의류 반응이 너무 좋습니다. 기존 고객님들도 신상 입고에 반가워 하시며 내점해주셔서 제품 디자인 퀄리티가 좋다, 또 한번 들려보길 잘했다라는 반응이 있었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품) 드로우스트링 백팩 V2 신규 컬러 반응  (내/외국인 비중,","fb":"멜로우 제품과 퓨어드라이 제품 판매가 너무 좋았고, 이번주는 여러 제품이 골고루 판매가 되었습니다."},{"cat":"용품","topic":"","fb":"입고 기간이 얼마 되지않아 더 지켜봐야합니다. 기존 컬러 화이트와, 아이보리는 꾸준하게 판매가 되고 있습니다. 화이트와 아이보리 컬러 터치율이 월등히 높습니다."},{"cat":"신발","topic":"","fb":"에어리 리오더 입고 후 판매가 좋았습니다. 이번주 신발 판매중에 제일 많이 판매가 되었습니다. 신규 컬러 반응도 나쁘지 않습니다. 30대 고객님들에게 판매가 많이 이루어 집니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"저번주에 비해 라켓 판매량이 줄었습니다. 입문하시는 초보자 고객님 방문이 많았고 클래시 모델이 주로 판매 되었습니다."},{"cat":"팀스포츠","topic":"","fb":"이번주는 농구공을 찾으러 오신 고객님이 줄었지만, 에볼루션과 에보넥스트 제품 터치율이 좋습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"입점 고객이 줄었지만, 신상 입고와 리오더 제품으로 한팀 판매량이 높았던 한주 입니다."},{"cat":"기타","topic":"* 26FW 상품교육북 매장의견   - 상품교육자료를 직관적으로 볼 수 있게 품번/상품명 검색 시, 세일즈포","fb":"상품을 보기에 너무 편하게 잘 되어 있어 너무 유용할 것 같아 너무 좋습니다"}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"퓨어드라이 라인이 금주 판매베스트입니다.신상 의류 디자인에 대체로 거부감 없이 고객들이 만족하며, 구매해 가십니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"시어아이스 와이드 팬츠와 비슷한 제품의 긴바지가 필요합니다. 긴바지 종류가 매장에 한 종류도 없어서 아쉬운 말씀을 하시는 고객이 여럿 있었습니다."},{"cat":"용품","topic":"","fb":"드로우스트링 v1 반응이 좋습니다. 컬러감의 만족하시고 터치율이 높습니다. 소프트 에어 상품은 기존 에어 제품과 금액 차이로 아쉬워 합니다. 키링 보시고 귀엽다고 하시는 고객들이 많았습니다. 아직 판매가 1개 뿐이지만, 앞으로 구매하시는 여성 고객에게 좋은 반응이 올거라 생각합니다. 퍼포먼스 바이저는 조금 더 지켜봐야 할 것 같습니다."},{"cat":"신발","topic":"","fb":"리스폰스 반응이 아직은 없습니다. 오히려 볼트 프로 제품의 반응이 훨씬 좋습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"디파이어 문의 전화가 종종 있었습니다. 컬러 문의와 스펙 물어보는 고객이 많았습니다. 매장에서도 출시 예정이라고 홍보 및 안내 중 입니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션 제품이 많이 판매가 되었습니다. 주말에 찾는 고객이 많았는데 매장 내의 재고가 없어 보여드리지 못했습니다. 조금 더 여유롭게 입고 되었으면 좋겠습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"입점 고객이 40% 정도 감소했습니다. 기존 고객님들이 많은 구매를 해주신 한 주 였습니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"3박스"},{"cat":"기타","topic":"신규라켓 디파이어\n7/24일(금) 15시~18시 시타회 참석여부\n작성예시) 매니저 1, 직원 1","fb":"매니저 1"}],"7월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"시어아이스 제품들과 퓨어드라이 제품들의 판매가 많았습니다."},{"cat":"의류","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신상 전반적인 고객 터치 및 피드백","fb":"퓨어드라이 에이스 글로우 티셔츠 반응이 좋고, 멜로우 제품들에 터치가 많이 있는 편입니다. 얇은 여자 긴바지를 찾는 분들이 좀 있었습니다."},{"cat":"용품","topic":"2-1. 의류/용품/신발 판매 특이사항 - 드로우스트링 신규 반응","fb":"드로우스트링 백팩은 V1, V2 둘 다 터치 및 판매율이 좋고, 에어소프트 제품들도 조금씩 터치가 올라오고 있습니다. 듀오 플랩 백팩은 옐로우 컬러가 반응이 있는 편 입니다."},{"cat":"신발","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신발 신규컬러 반응","fb":"에어리 신규 컬러 추가로 귀여운 테니스화를 찾는 여성 고객분들에게 어필하기가 좋아져 판매가 수월해졌습니다. 화이트 컬러와 옐로우 컬러가 반응이 좋고, 리스폰스 보다는 볼트프로 반응이 좀 더 있는편 입니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 - 디파이어 판매반응","fb":"디파이어 문의가 많았고 판매가 많았던 한 주 였습니다. 구매 의사가 있으신 분들이 많은데 재고가 없어 판매 로스된 부분이 아쉬웠습니다. 대부분 구력자였고, 바볼랏 / 헤드 쓰시던 분들과 윌슨 라켓을 쓰면서 파워 스핀 라켓을 찾던 분들의 수요가 많았습니다."},{"cat":"팀스포츠","topic":"2-2. 라켓/팀스포츠 - 팀스포츠","fb":"농구공에 대한 수요는 꾸준히 있습니다. 지속적인 판매가 있습니다."},{"cat":"기타","topic":"전주대비 고객 입점 현황","fb":"지난주 대비 고객입점 객수는 조금 줄었습니다."}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"지난주 대비 고객입점 객수는 조금 줄었습니다. 여름 휴가 대비를 위해 퓨어드라이 티셔츠 제품들이 판매가 좋았습니다. 여성분들은 운동 목적 겸 여행 목적으로 피키 쇼츠 제품 터치와 구매가 좋았습니다"},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"커플 고객님들께서 함께 입을 비슷한 제품이 별로 없다고 아쉬움을 느끼셨습니다. 최대한 비슷하게 안내드려 판매로 이루어졌지만, 함께 입을 같은 결의 제품이 있었으면 하는 피드백이 있었습니다."},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"신상제품 글로우 바이저와 프로모션캡 터치가 많습니다. 올어라운드 짐백 여성분들이 색상이 이쁘다는 평이 많았습니다. 여행갈때 간단하게 들어도 좋을것같다는 반응도 있었습니다. 입고 된지 얼마 안되어 더 지켜봐야할 것 같습니다."},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"에어리 제품 반응이 좋습니다. 신규 컬러가 이쁘게 잘 나왔다고 말씀이 많으십니다. 리스폰스 제품이 터치율이 제일 적습니다. 이번주는 볼트프로 제품이 제일 많이 판매가 이루어졌습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"디파이어 제품을 보러 찾아주신 고객님들이 많았습니다. 재입고 날짜 안내와 라이트,울트라라이트 제품 안내도 드려 입고 시 방문 고객이 많을 것 같습니다. 재고가 적었던게 아쉬웠습니다. 매장 문의 전화도 꾸준히 오고 있는 편입니다."},{"cat":"팀스포츠","topic":"2-2. 팀스포츠 판매 특이사항","fb":"이번주는 농구공 고객님이 적었습니다. 에보넥스트 제품이 많이 판매 되었습니다."},{"cat":"기타","topic":"고객 입점 동향","fb":"전주대비 입점객이 줄었습니다. 날씨의 영향이 있던것 같습니다. 금요일과 토요일에는 풀린 날씨와 공휴일로 평소보다 많았습니다."}]},"롯데인천":{"5월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"20-50대고객님들 위주였고 전주대비 20대 고객님들의 방문이 조금 더늘었습니다.의류는 기존처럼 퓨어드라이 상품들의 반응이 좋았고, 라켓 판매가 조금 올라왔습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  **신발 : 에어벨 W 고객 반응 (착화, 디자인","fb":"피키스튜디오 셋업류들이 여성고객님들에게 꾸준하게 반응이 좋고 2TPT41 시어아이스 긴바지 터치가 많았습니다. 남자 반바지 셋업같은경우 DGN 컬러의 셋업류들이 반응이 좋았습니다."},{"cat":"용품","topic":"","fb":"드로우스트링 다시 재입고 되어 문의가 많아졌지만 입고된 재고자체가 너무 적어 아쉬움이 있었고, 화이트 컬러도 예약 주문 문의 고객님들도 많으셨습니다."},{"cat":"신발","topic":"","fb":"에어리 사이즈 빠진 이후로 대표적으로 많이나가는 상품 없이 골고루 판매되어지고있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"클래시 리버스 에디션은 남은재고까지 꾸준히 판매되어지고 있고, 블레이드 같은경우 여성고객님들보다는 남성고객님들의 반응이 더좋고, 전체적으로 블레이드 위주의 라켓 판매로 이어지고있습니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션 판매위주였습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"하루하루 입객자체가 꾸준한 느낌보다는 하루는 너무 없었더라고 한다면 다른날은 확몰리고 양극화처럼 입객이 흘러가고있습니다."},{"cat":"","topic":"전체 고객 중 외국인 유입비중 (증가한 사유? 별도 점포에서 외국인 대상 진행하고 있는 프로모션/사은혜택은?","fb":"전주 대비 외국인고객은 크게 변동사항없습니다."},{"cat":"기타","topic":"타브랜드 프로모션","fb":"다이나핏 20/40 5%상품권지급(점포 사은행사와 중복참여 가능)"}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"20~40대 고객님들 방문이 많았고, 퓨어드라이 리오더 2NTS24상품의 반응이 좋았습니다'"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"남녀공용 S/M 사이즈 퓨어드라이 디자인의 재고가 너무 부족하여 아쉽습니다. 디자인에있어서는 크게 호불호없이 좋아하셔서 재고만 늘어난다면 판매에 도움이 많이될것같습니다."},{"cat":"용품","topic":"","fb":"드로우스트링백팩 재입고로 판매가 더 늘어나고있고, 드로우에어백팩도 터치가 조금 늘어났습니다."},{"cat":"신발","topic":"","fb":"에어벨은 조금씩반응이 올라오고는 있지만 확실히 테니스화의 비중이 90% 이상입니다"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"작년 롤랑가로스 에디션 보다는 아직 터치가 적기는 하지만 점점  터치와 판매가 올라오고 있습니다. 흘림체보다는 윌슨 프랜차이즈 라켓의 폰트가 더 반응이 좋은것같습니다. 외국고객님들보다는 점점 내수고객님들에게 반응이 좋다고 느껴지고 있으며, 여성고객님들에게 반응이 좋습니다. 블레이드는 내국/외국인 고객님들 전부 100프로가 반응이 좋고 그외에의 블레이드는 내국인 고객님들에게 반응이 좋습니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션, 퓨어샷 위주의 판매였습니다.(볼타워없음)"},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주와 비슷했던한주였습니다."}],"5월3W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"30~40 고객님들의 방문이 많았고, 대부분 금주 들어온 신상품들의 터치와 반응이 올라오고 있습니다.그중에서도 2TBR51 와 2TSK51 의 반응이 좋고, 리오더 들어온 퓨어드라이 또한 반응이 좋습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통) -의류 : 엘리트 퍼포먼스, 어드밴스드 등 (5/1","fb":"신상품위주의 터치가 많았고, 선셋같은경우 남자고객님들은 대부분 바캉스 무드 데일리로 입으려고 하시는분들이 많았고 여성고객님들은 운동&데일리 모두 입어도 될것같다고 하는 피드백이 많았습니다. 퓨어드라이 NTS22 화이트 리오더 반응도 좋았습니다. 다만 타매장에 입고되는 상품인데 롯데인천점 미입고 되는 상품들을 보고 문의주셔서 판매로스되는부분이 상당히 많아 아쉬웠습니다."},{"cat":"용품","topic":"","fb":"리본니삭스 화이트 리오더 반응 좋고, 네이비도 리오더 됬으면 하는 바램있습니다. 선셋매치 볼캡과 양말은 조금더 지켜봐야할것같습니다. 크게반응이 있거나하지는 않았습니다."},{"cat":"신발","topic":"","fb":"아직도 에어리의 터치가 많지만 사이즈재고 부족으로 판매로스되는점이 아쉽습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"전주대비 확실히 롤랑가로스 에디션 터치감이 올라가 판매율 올라가는것같습니다.아직 울트라와 프로스태프라인은 조금더 지켜봐야할것같습니다."},{"cat":"팀스포츠","topic":"","fb":"볼타워 없음 퓨어샷의 반응이 가장좋습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주대비 입객자체가 확실히 늘었고, 테니스 고객님들 외에 일반고객님들도 퓨어드라이 상품데일리로 구매하시는 분들이 정말 많았습니다."}],"5월4W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"30~50대 고객님들 위주였고, 카라티와 기능성 브라탑 스커트 라인의 판매율이 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 [의류] 선셋매치 라인업  1. 구매목적 : 테니스 카테고리가 아니라","fb":"선셋매치 같은경우 테니스 고객님들이 데일리로도 입으려고 하시는 분들 70% 이고 테니스 외에 일상용으로 입으려는 분들 30% 정도인것같습니다. 남성고객님들 같은경우 피크닉 무드가 유치하지 않게 나와서 반응이 어느정도 좋은것같습니다. 조금이라도 유치하게 나왔으면 남자고객님들에게 크게 반응 없을뻔했지만 이번에는 반응이 좋습니다."},{"cat":"용품","topic":"","fb":"아직 선셋볼캡으로 연계판매 되어지지는 않고 그외에 다른 TSO37 리본 양말 리오더 와 연계판매가 더욱많았습니다."},{"cat":"신발","topic":"","fb":"내국인 40% 외국인 60% 이고, 연령대는 30~50대에게 반응이 좋았습니다. 다만 사이즈가 조금 크게나와 아쉽다는 평이 많았습니다. 대부분 235 신으시는 분들이 230을 구매하시고 정작 240 신으시는분들은 사이즈가 애매하다고 하여 판매로스 된적도 있었습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"클래시 롤랑가로스 에디션(여성)/블레이드 위주의 판매가 가장 좋았습니다."},{"cat":"팀스포츠","topic":"","fb":"퓨어샷과 올팀레트로 농구공 판매가 어느정도 있었습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주보다 10~15% 이상 입객이 늘었던것같습니다."},{"cat":"","topic":"1) 에어벨 W의 판매호조 사유 - 주 구매 고객층 (테니스/일반) (테니스신발이 아닌데 어떤고객이 구매하는","fb":"에어벨은 대부분 일반 고객님들에게 반응이 좋고 테니스 고객님들이 다른상품들 구매하시면서 특이하여 구매하시는 경우도 있습니다.  선셋은 확실히 여성고객님들에게 반응이 좋고 특히나 이번선셋은 윌슨 대표컬러 레드위주의 플레이때문에 반응이 좋았던것같습니다."},{"cat":"기타","topic":"신규 라켓 출시 프로모션 진행을 위한 그립커버 사전 주문  박스당 수량 30개, 개당 단가: 3,000원(V","fb":"3박스"}],"6월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"20~50대까지 다양한 연령층으로 방문있었고, 20~40은 퓨어드라이 원단 상품에 반응이 좋았고, 30~50은 슈퍼드라이,시어아이스 원단에 반응이 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품 - 드로우스트링 백팩V2 (아이보리, 화이트) 재입고 후 반응,","fb":"꾸준히 2NTS24 같은경우 리오더 이후에도 재고 부족할정도로 판매 좋고, 여성라인들 썬셋 라인들이 6월첫재주에 가장 반응이 좋았습니다 그리고, 피키쇼츠 2NFH31. PURPLE 색상 문의도 많았습니다.(온라인전용이라고 안내함)"},{"cat":"용품","topic":"","fb":"드로우V2 찾으셨던 고객님들 리오더 일정연락받고 예약주문하셨던분들 찾아주신분들이 많았습니다. 해당상품 리오더도 너무 매출에 도움되지만 새로운색상의 신상 백팩도 들어왔으면 하는 바램있습니다."},{"cat":"신발","topic":"","fb":"에어리 리오더 기다리시는 분들이 아직 있고, 220사이즈 상품들이 공용에도 같이 나왔으면 하는 고객님들이 금주들어 많이있었습니다. 에어벨같은경우 사이즈 크기아쉽다는 피드백이 아직도 이어지고있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"롤랑가로스 에디션과 , 클래시B&A 에디션의 터치가 조금씩늘어가고있으며 B&A 에디션은 265G 도있었으면하는 아쉬움있고, 저번주부터 블레이드 100L 1그립 문의가 많습니다. 일본에서는 판매한다고 한국에도 윌슨정상매장에서 판매했으면 하는 고객님들 많았습니다."},{"cat":"팀스포츠","topic":"","fb":"볼타워 철수하여 농구공 종류가 많이 없는데 퓨어샷과 에볼루션 재고 마저도 없어서 농구공운영하는데 이제는 조금 차질이 생기고있습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"금주 3일 공휴일부터 고객님들의 방문이 15%이상 늘어난것같습니다. 특이점은 테니스 고객들외에 일반고객님들도 5~10%정도 늘어난것으로 느껴집니다."}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"리오더 입고된 핑크 리플스커트와 더블매쉬 스커트의 판매가 좋았고, 새로 출시된피키쇼츠 보라색 반응이 좋습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"스트로베리 오버핏 같은경우는 운동보다는 데일리로 입으시려고 하시는 분들이 대부분 구매를 하셨고, 기존에 가지고 계신 청바지나 면바지같은거에 코디 하셔서 단품으로 많이 구매하시는 분들이 많았고, 피키스튜디오 또는 피키쇼츠랑 연계판매로 크게 이어지지는 않았습니다."},{"cat":"용품","topic":"","fb":"아직까지는 연계판매가 크게 없습니다. 양말 원단이 좀 얇아서 아쉽다는 피드백이 대부분이었습니다."},{"cat":"신발","topic":"","fb":"색상 같은경우는 조금 더지켜봐야할것같습니다. 테린이들한테는 볼트프로 괜찮게 어필 되지만 구력자분들에게는 내구성과 안정감때문에 다른 상품으로 구매를 하십니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드 위주의 구매가 대부분이었고, 프로스태프 클래식 라인도 이번에는 터치와 구매가 있었습니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션,퓨어샷 ,포지 마저 빠진이후로 농구공 판매가 현저히 줄어들었습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주와 비슷하였고, 확실히 테니스고객님들의 방문이 늘었습니다5%가량증가"},{"cat":"기타","topic":"수시사은품 전반 매장 피드백 (스크런치 / 그립커버) 좋은점, 아쉬운점 + 차후 사은품 제안 아이템","fb":"스크런치같은경우 반응은좋지만 머리짧으신 여성분들 또는 남성고객님들에게 드릴수 없어 성별에 제한적인 부분이 아쉽습니다. 추후에 냉/온 찜질 주머니 같은것도 괜찮을것같습니다. 또는 우산도 좋습니다."}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"목적 구매 위주였고 대부분 80% 이상이 운동 할때 필요한 상품들 구매하러 오셨습니다. 휴가목적은 없었습니다.금주 같은경우 스트로베리 라인과, 피키쇼츠, 등등 신상품 또는 리오더 상품들의 반응이 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"퓨어드라이 신상컬러 그라데이션 무드의 느낌들의 반응이 너무 좋고, 썬셋 라인들의 셋업류들과 신상품, 리오더 상품위주의 반응이 좋습니다. 여성 여름긴바지 같은경우 시어아이스 바지 같은경우는 데일리로 입으려고 하시는 분들 구매가 많았고, 조거 찾으시는 분들은 운동용인데 운동용 긴바지 찾으시는 분들은 이번 여름에는 확실히 적었고, 부츠컷 기능성 라인들 찾으시는 고객님들이 종종 계셨습니다."},{"cat":"용품","topic":"","fb":"드로우스트링 백팩 여전히 인기가 많고, 드로우 에어 YEL/GBL 컬러 재고 부족이 아쉽기는 하지만 추후에 나올 드로우스트링 신상컬러가 나오면 확실히 커버 충분히 될것으로 보여집니다. 그리고 서브로는 롤랑가로스,블레이드 스몰더플백의 반응이 좋습니다."},{"cat":"신발","topic":"","fb":"에어리 예약 주문하셨던분들도 계셨었고, 새로운 입객 고객님들(테린이) 여성분들에게도 반응이 좋습니다. 코트글라이드같은경우는 아직 조금더 지켜봐야할것같습니다(코트글라이드 슈트리스티커,자석 미입고)"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"금주 라켓 판매율이 올라갔고, 블레이드 , 롤랑가로스 100UL 라인 위주의 판매가 좋았습니다. B&M 라켓 같은경우 초반에는 인기가 없다가 본사요청으로 매장재고 다빠진이후에 문의가 와서 아쉬움이 조금 있었습니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션,퓨어샷,에보 입고 해주신덕분에 농구공 터치와 판매 소폭이지만 올라갔습니다. 감사합니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주와 비슷했고, 다만 전주에 비하여 라켓과 의류 구매고객님들이 좀 늘어난것같습니다."},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"남자분들은 민감한부분 전혀없었고, 여성고객님들도 받아보시고 자세히 보시기는 하셨지만 크게 싫다고 하시거나 그런 내색은 없고 대부분 좋아하셨습니다."}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"남성고객님들 3TTS72등등 퓨어드라이류 / TPH21 반응이 좋고, 여성고객님들은  2TTS72 퓨어드라이 신상 라인과 핑크무드 의상들이 반응이 좋습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품) 드로우스트링 백팩 V2 신규 컬러 반응  (내/외국인 비중,","fb":"확실히 수입라인들보다는 국내 신상 라인업들이 남성고객님들에게는 반응이 좋았고, 여성 고객님들은 국내 신상류들도 반응이 좋지만 수입상품들도(브라탑,원피스,스커트) 반응이 좋았습니다."},{"cat":"용품","topic":"","fb":"내국인 외국인 모두 드로우스트링 신상 같은경우 핑크와 그레이가 반응이 좋았고 레드는 조금 더 반응을 지켜봐야할것같습니다. 확실히 기존 핑크보다는 화사한 핑크여서 반응이 더욱더 좋습니다. 연핑크톤에 회색 레터링보다는 조금더 (EX 블랙 화이트 등등 레터링포인트 더 줬으면 반응이 더좋을거같은느낌도 있었습니다)"},{"cat":"신발","topic":"","fb":"에어리 리오더 기다리셨던분들 많았고, 아직까지는 리오더된화이트의 판매위주이고, 이번새로운 에어리 컬러 이쁘게 잘나왔다는 피드백이많았습니다. 30대부터 40대까지의 구매가 가장높았습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드,클래시(RG에디션) 위주의 판매였고, 금주는 라켓 판매율이 떨어진한주였던것같습니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션 ,퓨어샷위주의 판매였으며, 포지 브라운 컬러 운영당시에도 반응 좋았었터라 포지도 물량 있으면 운영하면 좋을것같습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"15%이상 줄어들었습니다. 테니스고객님들 뿐만 아니라 금주들어 해당층에 고객님들 유입이 많이 줄어들었습니다. <2층 MUJI / 올리브영 오픈함>"},{"cat":"기타","topic":"* 26FW 상품교육북 매장의견   - 상품교육자료를 직관적으로 볼 수 있게 품번/상품명 검색 시, 세일즈포","fb":"메뉴얼화 되어 체계적으로 너무 좋았습니다. 그리고 윌슨 브랜드 특성상 매장에서 전문성이 있으면 있을수록 고객님들과의 소통에 있어서 시너지가 되는점 있어 너무 유용합니다. 감사합니다."}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"남녀 통틀어 퓨어드라이 반팔티종류의 반응이 가장좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"기능성 긴바지 (남녀공용인경우 슬림핏의 조거 팬츠)(여성인경우 슬림핏 조거팬츠 또는 부츠컷) 가 조금 필요할거같고 여성 쇼츠 (돌핀팬츠 스타일 아닌 남녀공용 스타일의 여성 사이즈 기능성 반바지류들이 필요할것같습니다.)"},{"cat":"용품","topic":"","fb":"드로우 신상 같은경우 폭발적인 판매는 크게 없지만 충분히 추후에 판매 잘되어질 것으로 보여지고, 키링 같은경우 NGR 컬러가 조금더 반응이 좋은것같습니다. 심리스 바이저는 아직까지 크게 터치감은 없습니다."},{"cat":"신발","topic":"","fb":"리스폰스프로와 에어리 컬러 모두 신상 반응 좋습니다. 특히나 에어리같은경우 225부터 사이즈 전개 하는부분 만족도가 좋은것같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"금주 라켓판매율은 전주대비 조금 줄어들었습니다. 디파이어 같은경우 아직까지는 파이썬으로 인식하시고 더파이어라는 명칭은 잘모르시는것같습니다. 아시는분들만 아시고 일반 테니스고객님들도 크게 관심은 아직 없는것같습니다. 주로 스팩 관련해서 어떤식으로 나오는지와 컬러감 궁금해하시는것같습니다."},{"cat":"팀스포츠","topic":"","fb":"포지플러스 배분 넣어주셔서 농구공 연출자체가 조금 풍성해져서  좋았습니다. 다만 이번주 농구공 찾으시는 분들이 없어서 판매율이 크지는 않았지만 시너지 될것같습니다"},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"평일/주말 20%이상 줄어든것같고, 쇼핑고객님들 트래픽이 조금 줄어든것같았습니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"2박스"},{"cat":"기타","topic":"신규라켓 디파이어\n7/24일(금) 15시~18시 시타회 참석여부\n작성예시) 매니저 1, 직원 1","fb":"매니저 1"}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"일상과 운동 겸용으로 입을수있는 에슬레져 퓨어드라이 느낌이 아직도 반응이 좋습니다. 슈퍼드라이 같은 더 시원한 원단으로 운동후 다시 옷갈아입으시는 분들보다는 운동하고 그대로 바로 귀가 하시는 분들이 많아 그경계에서 장점으로 부각되는 퓨어드라이가 반응이 좋은것같습니다."},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"자켓류들보다는 반팔 또는 브라탑 셋업류들(퓨어드라이,2TPS51 등등) 의 반응이 좋고, 남자/여자 TPH21/NPH21 원단의 반바지 종류들 신상 또는 리오더 입고 되면 셋업류에 확실히 시너지 될 타이밍인것같습니다."},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"드로우스트링 V2 (WHT/IVY/PNK) 반응이 좋았고, 신상입고된  듀오백팩은 (YEL) 컬러의 반응이 좋습니다. 올라운드짐백은 현재까지는 퍼플보다는 민트가 터치가 많고 , 온라인에서 보고 오신(매장에 아직입고안된) 컬러 핑크 주문고객님들이 조금 계셨습니다. 에어모션 스트링캡은 확실히 스트링 전세대 버전이 편하다고 하시는분들이 이번주에도 많았고, 신상 썬바이저같은경우 조금 더 반응 지켜봐야할것같습니다."},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"에어리 레드컬러 반응이 좋고, 리스폰스프로골드와 블랙은 아직까지 GRN/WHT/LPP 에비하여 터치감은 체감상 큰편은아닌것같습니다. BLK 리스폰스프로는 FW때 확실히 반응이 좋을것으로 보여지고, 볼트프로는 아직까지 GRA 컬러의터이가 좀더 많은것같습니다(여성 나이 있으신분들이 둘다 신어봤을때 너무찐해서 등산동호회 가는느낌처럼 나이들어 보인다고 하시는 피드백 2분정도있었음)"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"디파이어 문의가 가장많고, 98 프로 > 100 순서 9월정도면 예약 주문 하고싶다고 하는데 10월이면 너무 기간 길어 예약주문 조금 망설이시는 분들이 계셨습니다. 블레이드 100L 가벼운스팩찾으시는분들이 조금 있었고, 항상 많이 나가는 라켓과 종종 나가는 라켓들 있었던 반면 쉬프트는 판매된지 확실히 오래된것같습니다(99L 재고없음)(디파이어신상으로인하여 추후에 쉬프트 단종되는 부분떄문에 굳이 매장에서도 단종될 라켓으로 추천안드림)"},{"cat":"팀스포츠","topic":"2-2. 팀스포츠 판매 특이사항","fb":"퓨어샷/에볼루션위주의 판매 였습니다."},{"cat":"기타","topic":"고객 입점 동향","fb":"휴가기간으로 입객은 많이 줄었지만 에비뉴엘(VIP) 고객님들 히든 사은행사 있어 객단가 높으신 고객님들 방문이 조금 있었습니다."}]},"롯데의왕":{"5월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"30~40대 고객님들이 많이 방문해주셨고  이번주는 반팔보다는 얇은자켓 상품들을 많이 찾으셨고 판매까지 이어졌습니다 여성분들의 경우 햇빛에 노출되지않으려고 구매하시는분들이 많았습니다"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  **신발 : 에어벨 W 고객 반응 (착화, 디자인","fb":"기온이 더워지면서 얇고 시원한 소재의 기능성 소재를 찾으시는 고객들이 많이 늘었고 퓨어드라이 소재의 터치 및 구매가 많았습니다. 또 햇볕이 강해지면서 겉에 입을 얇은 바람막이를 찾으시는 고객이 늘었고 상설상품의 NJK41, NJK42 등 얇고 통기성이 좋은 상품의 판매가 많았습니다."},{"cat":"용품","topic":"","fb":"날씨 더워지면서 의류를 구매하시면서 같이 맞춰 착장 할 수 있는 아대나 모자의 구매가 늘었고 이번 출시된 롤랑가로스 라켓과 함께 드로우스트링 아이보리 컬러 구매와 상설가방을 찾으시는 고객이 늘었습니다."},{"cat":"신발","topic":"","fb":"기존 테니스화의 판매가 많지는 않았지만 인트리그, 러쉬프로 등 풀사이즈의 상설 테니스화의 입고로 테니스화의 판매율이 늘었습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"런칭 첫 주말 전화 문의가 블레이드보다 많았으며 목적구매로 입점하시는 고객들이 계셨습니다.  특히 여성분들이 밝은 컬러의 라켓을 선호하시는데 편안하고 밝은 컬러는 클레시밖에 없어 구매가 많습니다. 자점의 경우 판매 대부분 여성고객이 많았습니다. 롤랑가로스 시리즈의 가방보다는 드로우스트링백팩 아이보리 컬러와 연계가 좋았습니다."},{"cat":"팀스포츠","topic":"","fb":"자녀선물구매로 쥬니어볼의 판매가 금주는 많았습니다."},{"cat":"상설","topic":" 도 많은 터치율이 있습니다.  그중에서 클래시가 인기가 많습니다. 주로 여성고객층이 구매를 많이 하는데, 무게도 265G 280G 쓰기에 적정한 무게도 있고 밝은 베이지 톤으로 많은 구매가 있어서 계속 이어지는것 같습니다. 연계 구매되는 템은 롤랑 보스턴백 혹은 드로우 스트링 가방아이보리를 많이 찾습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공은 어린이날을 기점으로 판매가 많이 되었고, 주로 에볼루션 에보 등으로 구매가 있었습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주 부터 국내도 근로자의날 어린이날과 그리고 해외 고객분들도 노동절이 끼면서 백화점내에 입점객이 확 늘었고 저희 매장에도 많은 고객분들이 입점하여 의류 구매와 라켓 농구공들을 많이 구매하셨습니다.  그리고 연휴 지나면서 국내 고객은 다시 일부 줄었으며, 외국인 고객분들도 조금씩은 줄었지만, 목적구매나 재방문 외국인도 있어서  입점하여 많이 구매했습니다."},{"cat":"","topic":"전체 고객 중 외국인 유입비중 (증가한 사유? 별도 점포에서 외국인 대상 진행하고 있는 프로모션/사은혜택은?","fb":"일단 외국인도 연휴 기간이였고, 국내도 연휴였던 상황이라 프로모션으로 UNIONPAY 상품권 행사(기존에도 있었지만 증정 상품권 금액율을 높임5% -> 10%) 그리고 국내 고객 대상으로는 현대백화점 5% 혹은 7%적립이 있었습니다."}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"금주 여성 고객분들이 많았고 NTS와 아노락 그리고 TBR 탑과 TSK등 본격적인 여름에 앞서 의류를 구매하는 고객분들이 많았습니다.  시어아이스와 슬리브리스 카라등도 터치나 판매율이 높았습니다. 또한 자외선 차단을 위해 긴팔이더라도 얇은 소재의 자켓이나 아노락을 찾았고,  마찬가지로 바지 또한 긴바지의 수요도 있었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"의류 같은경우 땀흡수 잘 되거나 빠르게 마르는 소재를 찾는 고객분들이 늘었습니다. 그리고 대부분 의류가 땀을 잘 배출해주는것을 알고있는  고객분들이 많아져서 신규 고객이나 자주 오시는 고객분들이 많이 늘고 있는 상황입니다."},{"cat":"용품","topic":"","fb":"용품은 현재 바이저를 위주로 많이 찾고 있고, 아대와 헤어밴드 위주로 찾고 있습니다. 요즘엔 실내 테니스장도 많이 생겨나게 되면서  용품은 주로 땀과 관련된 아이템을 주로 보는것 같습니다. 그리고 드로우 스트링 같은 경우는 아직 물량이 많이 들어오지 않아 들어오면  특정 컬러는 빠르게 소진이 되는것 같습니다."},{"cat":"신발","topic":"","fb":"테니스화는 주로 목적구매로 오시는 분들이 많았고, 에어벨w는 터치율은 높지만 구매까지 아직 많이 이어지진 않은것 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"올해 레터링 문양으로 많은 호응이 있었고, 내국인 외국인 모두 5:5비율로 관심도 많이 받고 구매도 많이 하는편입니다. 주로 여성 고객층에서 관심을 많이 받는 편이며 커플로도 와서 구매하고 가시는 고객분들도 있었습니다.  블레이드는 초반과 비교하여 조금 줄어들긴 했지만 아직도 많은 분들이 찾고 있습니다. 그리고 100pro 를 찾거나 기다리는 고객분들도 꽤 많이 있습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공 판매가 지속적으로 있지만 특히 에볼루션이나 에보라인은 주로 디피 물류밖에 없어서 물건이 부족한 경우도 있는 상황입니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주 대비 연휴가 지난 시점이라 백화점 내에 입점 고객이 줄어들었습 퓨어드라이 소재로된 디자인을 더욱 좋아했던것 같습니다.  링거 슬림 티셔츠 같은경우, 기장감이나, 소재 디자인 모두 맘에 들어 했고, 주로 일상용으로 구매가 있었습니다.  베이스라인 쇼츠나 피키등 쇼츠는 대부분 테니스 용도로 주로 구매를 하는 편이며, 특히 피키 같은경우, 셋업으로 많이 찾았습니다.  그리고 고객분들이 오시면 주로 셋업 위주로 많이 찾으십니다."},{"cat":"용품","topic":"","fb":"양말과 아대등 작은 용품들을 최근에 많이 구입을 하고 있는데, 그중 양말 소진이 제일빨라서 양말이 부족한 현상이 종종 있습니다.  가방도 현재 드로우스트링은 꾸준히 찾고 있어서, 리오더까지 기다리겠다는 고객분들도 있고, 잦은 문의가 있는 편입니다."},{"cat":"신발","topic":"","fb":"여성 남성 모두 러쉬프로 인트리그 볼트등 꾸준히 찾고 있고 있고, 에어리도 꾸준히 찾고 있어서 리오더를 기다리는 고객분들이 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"금주 클래시 블레이드등 찾고 구매하시는 분들이 많았고, 클래시의 경우, 기존 모델 보다는 롤랑가로스 모델을 찾는 고객분들이 많았습니다.  주로 테린이 분들이 많았고, 시작하면서 구매하시는 고객분들도 많이 있었습니다."},{"cat":"팀스포츠","topic":"","fb":"현재 볼타워에 공 DP가 부족할정도로 매장내 수량이 적을때도 종종 생기고 있습니다. 그럼에도 불구 하고, DP도 확인하고 구매하시는 고객분들이 있어 농구공도 꾸준한 분배가 이뤄져야 할것 같습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"금주에도 케데헌 팝업이 지속 되고 있어서 외국인 방문객이 좀 더 높았고, 백화점내에 방문객도 높았습니다.  저희매장도 방문이 많았고, 본격적인 여름을 맞이하여 용품 의류등 시원한 소재를 위주로 판매가 되었고,  더워지는 여름날씨에 새롭게 테니스를 시작하는 고객분들도 꽤 있어 라켓 판매도 많이 되었습니다.  이제 6월이 되면 더욱 더워지는 날씨가 지속될 예정이라 그에 앞서 쇼핑하는 고객분들이 많았습니다."},{"cat":"","topic":"1) 에어벨 W의 판매호조 사유 - 주 구매 고객층 (테니스/일반) (테니스신발이 아닌데 어떤고객이 구매하는","fb":"에어벨 같은경우, 테니스고객 및 일반 고객분들도 구입하시는데 우선 제품 설명을 할때도 테니스화는 아니라는것을 같이 설명을 드리는데  주로 디자인도 만족스러워하고 특히 착용감이 편하다는 피드백이 있습니다. 주로 일상 용도로 구입하시고, 테니스 코트장 가거나 여름 여행을 가실때  사용하려는 용도로 구입을 하는것 같습니다. 연계 판매보다는 단독 구매 비율이 높았습니다.   선셋 매치 같은 경우도 마찬가지로 주로 테니스 고객분들이 많고, 일상용으로 구매하시는 분들도 있었지만, 주로 운동용으로 구매를 하셨습니다.  그래서 주로 면소재 보다는 퓨어드라이의 소재나 가벼운 소재를 위주로 터치율이 높았습니다."},{"cat":"기타","topic":"타 브랜드 프로모션/ 행사현황 (POP내용 등 참조)","fb":"나이키: 20% HDEX: 최대 50% 할인"},{"cat":"기타","topic":"신규 라켓 출시 프로모션 진행을 위한 그립커버 사전 주문  박스당 수량 30개, 개당 단가: 3,000원(V","fb":"8박스"}],"6월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"금주 NTS TTS 와 NJA NPH 등 더위를 피한 반팔이나, 자외선을 차단할 긴팔을 찾는 고객분들이 많았습니다.  자외선을 차단할 긴팔을 찾되 점점 얇은 의류를 찾는 고객분들도 있고, 주로 통기성도 잘 되는지 문의주시는 고객분들도 많았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품 - 드로우스트링 백팩V2 (아이보리, 화이트) 재입고 후 반응,","fb":"의류같은경우, 판매가 높아 상품이 부족한 경우와 그리고 주로 세트 상품을 구매하시는 분들이 많은데  구성이 부족한 경우나, 상품이 이미 품절되어 없는 상황이 있어서 아쉬어 하는 고객분들이 있었습니다.  그럼에도 불구하고, 세트가 아니더라도 단독으로 구매하는 고객분들도 금주에는 특히 많았던것 같습니다."},{"cat":"용품","topic":"","fb":"드로우스트링백팩은 매일 매일 찾는 수요가 있어서 반응은 항상 좋습니다. 특히 화이트 아이보리 컬러가 제일 인기가 있던 제품인지라  리오더 전부터도 찾는 고객분들이 있었고, 들어오고 나서도 꾸준히 판매가 있습니다."},{"cat":"신발","topic":"","fb":"최근 리스폰스 프로 화이트 컬러 혹은 퍼플 컬러를 찾는 고객분들이 늘고 있습니다. 남 3: 여 7 의 비율로 찾고 있으며,  에어리도 리오더를 기다리는 고객분들이 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"클래시 에고니가 들어오면서, 디자인으로 인해 롤랑가로스 혹은 에고니를 찾는 고객분들이 늘었습니다. 다만, 에고니 같은경우 하나의 스팩 280g으로 한정되어있어 무게가 가볍거나 무거운것 찾는 고객분들도 있어 아쉬워 하는 부분도 있었습니다. 그래도 디자인으로 무게를 좀 올려서 구매하시는 고객들도 있어 제품에 대한 반응은 좋은것 같습니다"},{"cat":"팀스포츠","topic":"","fb":"특정 농구공 판매가 높아 공이 부족한 경우가 꽤 있습니다. 주로 nxt 에볼루션 퓨어샷 올팀 그리고 선수 사인 볼 (제임스, 커리) 등 많이 찾으시며, 재고가 부족하더라도 디스플레이 상품까지도 구매하시는 고객분들이 많습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"6월이 시작 되면서 잠시 백화점내 입점객이 줄어들었으나, 수요일부터 다시 증가 되면서 저희 매장에도 방문객이 많이 늘었습니다.  옆 IFC몰에서는 에스파 팝업이 진행되고 있으며, 또 주말에 항상 열리는 마라톤, 그리고 지하 팝업존부터 3,4층 한국 축구 국가대표 팝업까지 이어지면서  국외 뿐 아니라 국내 고객 분들까지 입점 고객이 많아져 백화점 내에 활력이 높아졌습니다."},{"cat":"기타","topic":"타 브랜드 프로모션/ 행사현황 (POP내용 등 참조)","fb":"나이키 20% 할인"}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"금주 NTS, TOP, TBR등 여름에 맞는 반팔이나 쇼츠 위주로 판매가 되었습니다.  신상중에서는 이번 퍼플 쇼츠와 퓨어드라이 스윗 랠리가 터치감이나 판매가 있었습니다.  현재는 주로 퓨어드라이를 찾는 고객분들이 많은것 같습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"스트로베리앤크림 컬렉션 전체적으로 반응은 좋은것 같습니다. 지속적으로 터치감이 있습니다. 다만, 현재는 면소재보다는 퓨어드라이 소재를 더 많이 찾고 있는 시기라 퓨어드라이 판매가 더 있는 편입니다."},{"cat":"용품","topic":"","fb":"양말이나 아대 가방등을 많이 판매가 되는중입니다. 가방같은경우 현재 드로우스트링 에어도 옐로우 컬러나 블루그레이 찾는 고객분들이 있고,  또는 라켓 전체 감싸면서 하나 쏙 들어가는 가방을 찾는 고객분들도 있습니다(라켓 커버) 아무래도 테린이 분들이 유입이 많아지면서, 컴팩트한 가방을 찾는 고객분들이 많이  늘었습니다."},{"cat":"신발","topic":"","fb":"에어리W를 기다리는 고객분들이 조금씩 늘고 있고, 인트리그 프로나, 인트리그 투어중 사이즈가 부족한 품목들이 조금씩 있어서  판매 로스가 조금 있는것 같습니다.  이외에 러쉬프로나 볼트프로 신규 컬러 추가로 인해서 새로이 찾는 고객분들중에 판매가 잘 되어가고 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"뷰티 에고니 라켓 판매가 높습니다. 라켓은 기본라인은 꾸준하게 터치가 있고 한정 모델 같은경우는 빠르게 구매로 인해 소진이 빨리 되는것 같습니다  한정 모델 그리고 라켓에 대한 설명을 했을때 2명이상 팀으로 온 고객분들은 연달아서 구매하시는 고객분들도 꽤 많이 있었습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공 같은경우 에보EXT, 에볼루션, 퓨어샷 등 판매가 많으며, 농구공이 현재 재고가 많이 깨져서 판매 로스도 조금씩 발생하고 있습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"저번주보다 지속되었던 휴무일 및 선거나 시위 이슈 그리고 금주 월드컵 경기로 인해서 백화점내 고객은 좀 줄었지만, 주말에 외국인 방문 비율이 높아지면서,  저희 매장에 방문객들도 늘었습니다. 금주는 특히 테니스 고객분의 방문이 많았던 주였습니다."},{"cat":"기타","topic":"수시사은품 전반 매장 피드백 (스크런치 / 그립커버) 좋은점, 아쉬운점 + 차후 사은품 제안 아이템","fb":"그립커버는 반응이 진짜 좋구요  스크런치는 원단 재질 퀄리티가 진짜 굿이에요 아쉬운점은 곱창이 너무 두꺼워서 머리숱이 없으면 흘러내릴것같아요"}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"금주 TPS52 TSK62를 세트로 구매하시는 고객분들이 많았습니다. 착장도 제일 많이 입어보는 상품이기도 하고, 구매도 많이 일어난 상품이기도합니다.  신상의류나 최근 리오더된 상품도 터치율도 높고 판매도 빠르게 되어 매장내 재고가 많이 없는 상품도 많습니다.  주로 운동목적으로 구매가 높고, 휴가 목적으로는 스윗랠리나, 선셋 매치와 기본으로는 퓨어드라이를 선택하는 고객분들이 많습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"퓨어드라이 찾는 고객분들은 꾸준히 있으며, 최근 나온 신상도 반응이 있습니다. 운동용으로 많이 쓰기도 하고, 일상용으로도 구입을 하는 고객분들이 있어서  기본 템으로 많이 구매를 하시는편입니다 여성 고객분들중에는 그리고 꽤 많이 긴팔이나 긴바지를 찾는(얇은소재로) 주로 햇빛 자외선을 옷으로 차단하고 싶어서 찾는 고객분들이 있고,  운동용이면 조거 형태로 일상용이면 시어아이스 형태를 찾는것 같습니다. 용도에 따라 많이 다른편입니다."},{"cat":"용품","topic":"","fb":"최근 모자, 양말의 수요가 높고 빠르게 판매로 소진 되고 있습니다. 또한 가방도 드로우스트링 가방 뿐만 아니라 다양하게 판매가 되고 있어 고객의 선택의 폭도 다양하게 넓어진거 같습니다."},{"cat":"신발","topic":"","fb":"컬러추가된 볼트 프로와 리오더된 에어리w 그리고 글라이드 테니스화까지 입고가 되면서 테니스화에 대한 선택폭도 넓어졌고, 볼트 프로는 새로운 컬러가 들어오면서  볼트 프로를 찾는 고객층이 조금 더 늘었습니다. 여성 고객층은 주로 볼트프로와 인트리그 투어에서 고민을 많이 하는 편이고, 남성 고객층도 러쉬프로와 볼트프로에서 고민을 많이 합니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"금 주에 데저트와 뷰티엔 에고니가 판매로 빠르게 소진 되었고, 그외에도 블레이드 클래시가 지속적으로 판매 되면서 최근 꾸준히 라켓 판매가 되고 있습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공 최근에 재입고가 되면서 잘 판매가 진행 되고 있습니다. 그리고 최근 미식축구공 관련된 문의가 조금씩 들어오고 있습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"금주에 백화점내에 스파오 팝업 및 토이스토리 팝업 등 다양한 행사가 있었고, 특히 스파오 팝업으로 인해서 국내,외 고객분들이 백화점 내에 많이 방문하셨습니다.  금요일에는 여의도에서도 월드컵 중계가 있었고, 주말 동안에는 많은 외국인 방문객과 내린 비 날씨 영향으로 인해 백화점내 고객층이 급증하면서 쇼핑을 하는 고객분들 또한  많았습니다. 그래서 저희 매장 내에도 많은 활력이 있어서 방문 고객 및 판매도 크게 증가 했던 주였습니다."},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"대부분 만족 하시고 구매후에도 만족하시고 다음에 또 오겠다는 재방문 의사를 말씀하시면서 떠나시는 고객 분들이 많았습니다.  너무나 적절한 이벤트였던것 같습니다!"}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"NTS NTL 의류 판매가 높고, 퓨어드라이 소재의 의류를 특히 더 찾는것 같습니다  바지도 쇼츠 위주 이거나, TSK 의류를 많이 찾고, 여름이여도 자외선 때문인지 얇은 자켓류도 찾는 고객분들이 종종 있습니다.  남성 고객분들도 퓨어드라이 소재의 상의나 땀흡수가 잘 되는 바지를 많이 찾는 편입니다."},{"cat":"용품","topic":"","fb":"드로우 스트링 백팩은 신규로 들어오자마자 판매가 지속적으로 이어지고 있습니다. 국내외 모두 비중은 비슷하고, 현재까지는 신규 컬러 기준그레이->핑크->레드 순으로 판매가 되고 있고, 새로운 컬러 입고로 인해서 고객분들의 선택의 폭이 넓어져 호평이 좀 더 높았던것 같습니다."},{"cat":"신발","topic":"","fb":"에어리 w 입고와 신규컬러 컬러 반응은 조금씩 다시 있는것 같습니다. 사이즈가 빠르게 깨져서 재입고까지의 텀이 있다보니,  신규 고객위주로 반응이 주로 있습니다. 주로 연령대는 20-30이고, 화이트나 옐로우를 위주로 찾으며, 종종 기존 컬러였던 퍼플도 찾는 고객분들도 있었습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"신규 라켓 파이썬에 대한 문의가 점점 많아지고 있습니다. SNS나 인터넷 블로그에 올라온 글을 보고 문의를 주시는 분들이 있습니다.  그외에도 지속적으로 판매나 판매 문의 있는게 클래시 뷰티 에고니, 롤랑가로스 클래시 100ul, 데저트 100L을 지속적으로 문의를 하고 (주로 외국인 비중이큼) 만약 외국인 고객중에 라켓에 대한 스펙이 안맞더라도 무게라도 올려서 구매하시는 분들이 많습니다.  국내 고객층에서는 주로 블레이드 클래시 위주로 많이 찾으며 국내 고객분들도 클래시 롤랑가로스 버전을 찾는 고객층이 많습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공 입고가 그래도 많이 되어서 판매 로스는 많이 없어졌습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"금주는 토이스토리 팝업, 지하에도 최근 몬치치 팝업등 여러가지 팝업 행사가 겹치면서, 외국인 고객분들이 많이 입점했습니다."},{"cat":"기타","topic":"* 26FW 상품교육북 매장의견   - 상품교육자료를 직관적으로 볼 수 있게 품번/상품명 검색 시, 세일즈포","fb":"영상으로 듣는거 보단 오히려 정독을 할 수 있어서 좀 더 이해도가 빠르고 시간이 날 때마다 볼 수 있다는 장점이있었습니다"}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"금주 NTS, TTS 주로 반팔 상의와 TSK등 치마 의류가 판매율이 높았습니다.  신상의류도 마찬가지로 터치율도 높고 판매도 많이 되고 있습니다. 그중에도 제일 기본로고가 있는  상품이 터치율이 높은것 같습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"여름이고 자외선이 뜨거워지면서, uv 쿨 기능이 있는 긴팔이나 바지, 혹은 내의로 입을 수 있는 내의로된 쿨감 티(주로 골프에서 많이 쓰임)  혹은 긴레깅스등 몸을 좀 잡아줄 수 있는 기능의류가 있으면 좋을것 같습니다."},{"cat":"용품","topic":"","fb":"모자와 양말 가방등 모두 터치율이나 판매도 좋은편인것 같습니다. 최근 모자 신상이나 양말도 신상으로 많이 들어와 구매하실때 선택의 폭이 넓어져 고객님들도 고르실때 부족하다는 느낌이 많이 감소했습니다."},{"cat":"신발","topic":"","fb":"여성 인잔 코트 신발이 나오면서 남성 인잔 코트 신발에 대한 문의가 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"디파이어 라켓 스펙 문의와 미리 예약을 걸 수 있는지 정확한 런칭일은 언제인지 문의하는 고객분들이 많으시고, 혹시 시타회나 체험해볼 수 있는지에 대한 문의도  종종 들어오고 있습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공은 꾸준히 판매가 있고, 최근 글러브에도 터치율이나 판매가 조금 더 있습니다. 주로 캐치볼 목적으로 가족단위로 방문하셔서 구매하시고,  야구공 같은것도 소프트 공에 대해서 아이들에게 조금 더 안전할 것 같은 피드백이 있어서 연계구매까지 같이 있습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주 대비 백화점내 외국인은 크게 줄진 않았지만 조금은 감소한 느낌이 있는 한 주 였습니다.  금주에는 국내 고객분들이 조금 유입이 되었고, 주로 뒤늦은 여름 대비나 현재 부족한 아이템들을 구매하기 위해 방문을 하시거나  또는 테니스를 시작 하시는 입문용이나 운동 대비 의류 신발 용품등을 사기위해 방문한 분들이 있었습니다.  외국인 고객분들도 오셔서 여름을 위한 의류를 주로 구매하시고, 혹은 라켓을 구매하기위해 혹은 선물하기 위해 방문하는 고객분들이 있었고,  동시에 본인의 의류뿐만이 아니라 선물을 위해서 같이 의류를 구매하시는 고객분들이 많았습니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"5BOX"},{"cat":"기타","topic":"신규라켓 디파이어\n7/24일(금) 15시~18시 시타회 참석여부\n작성예시) 매니저 1, 직원 1","fb":"매니저 1"}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"금주 TTS 혹은 NTS 등이 판매가 베스트 였습니다. 더위가 지속됨에 따라 반팔과 치마 그리고 숏츠 등이 판매가 많이 되고 있으며,  주로 신상 위주로 판매가 잘 되었던것 같습니다."},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"사이즈가 전체적으로 빠지면서 DP판매가 많아 매장 헹거가 널널합니다,, 판매로스 또한 컸고 이번주는 연휴기간까지 겹쳐 물량 이슈로 판매하는데 어려움이 많았습니다  신상 입고를 좀 더 당겨야 할 것 같습니다"},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"모자가 특히 터치율이 높은데, 신상 외에도 다른 모자 반응도 좋고, 주로 기능을 많이 보면서 구매를 하시는 고객분들이 많아, 전체적으로 반응이 좋은것 같습니다."},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"금주는 볼트나 리스폰스 보다는 남성분들은 주로 러쉬 투어나 프로를 보시고, 여성 고객분들은 인트리그나 에어리를 많이 보십니다.  에어리 중에도 금번에 추가 컬러로 입고된 옐로우 컬러를 많이 보시고, 인트리그는 올코트용으로 보시지만 인잔용 컬러가 맘에들어하시는 고객분들이 많습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"디파이어 물량이 거의 소진되고, 이후 문의가 많습니다. 여성 스펙 일정도 지속적으로 문의가 늘어나고 있습니다."},{"cat":"팀스포츠","topic":"2-2. 팀스포츠 판매 특이사항","fb":"농구공은 지속적으로 가족단위로 오셔서 선물용이나 어린이 사용으로 구매를 많이 합니다."},{"cat":"기타","topic":"고객 입점 동향","fb":"전주 보다는 외국인 비중이 조금 줄어든 상황이지만 그래도 외국인 비중이 조금은 더 높았고, 금주 제헌절 연휴가 껴 외국인과 내수고객 비중이 거의 비슷했습니다.  제헌절 부터는 백화점내 입점 고객이 많아 저희 매장에도 많은 방문 고객분들이 있었고, 주로 의류를 보시면서, 라켓도 구매하는 고객분들도 많았습니다.  그리고 백화점 내 팝업및 플리마켓 행사도 진행하여 백화점내에 전주 보다 활기가 넘쳤던것 같습니다."}]},"롯데잠실":{"5월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"30대 여성분들 피키 쇼츠 아직도 자주 찾으시는거 같습니다. 그리고 동호회 단체티로 W261003NTW23 MIX 25장 판매되었습니다. 단체 할인 문의 주셨는데 급하게 구해드리느라 5% 할인쿠폰으로 백화점 결제 하셨습니다. 부모님 생신 선물로 시어아이스 라인들 반응 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  **신발 : 에어벨 W 고객 반응 (착화, 디자인","fb":"급격히 더워진 날씨로 얇은소재의 아이템들을 많이 찾으십니다. 추천 아이템으로 시어아이스 안내드리고, 피팅 후 적극 판매 되고 있습니다. 더 얇은 소재의 아이템들을 찾고 계셔서 응대할때 어려움이 있습니다. 신상품들이 조금 줄다보니 판매가 저조한것도 있습니다."},{"cat":"용품","topic":"","fb":"용품은 꾸준하게 잘 나가는거 같습니다. 의류랑 신발 컬러에 맞춰서 구매하시는 고객님들이 부쩍 증가하였습니다."},{"cat":"신발","topic":"","fb":"러쉬투어 라인들 심의건들이 매주 한건씩 발생하고 있습니다. 남자 테니스화 판매중 제일 많이 판매되고 있는데 너무 아쉽습니다. 요즘은 리스폰스,볼트프로로 응대 하고 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"아직 생각보다 반응이 없습니다. 미리 예약하신 고객님들 제외 하고 판매가 저조합니다. 홀세일이나 해외직구로 구매하신 고객님들이 많은거 같습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주가 연휴기간이여서 금주는 입점객 감소하였습니다. 평일 입점이 더 많았던 한주였습니다."},{"cat":"","topic":"전체 고객 중 외국인 유입비중 (증가한 사유? 별도 점포에서 외국인 대상 진행하고 있는 프로모션/사은혜택은?","fb":"잠실점 5/1 투어리스트 멤버쉽 5% 할인 적용하고 있습니다. 본점은 일찍히 시작했던 프로모션입니다. 아직은 매장내 소지 후 방문하신 분들은 안계십니다."}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"40대 여성분들 입점객이 많았던 한주였습니다. 재입고된 퓨어드라이 에이스 티셔츠 반응 좋았고, 같이 코디할 하의 피키쇼츠 반응 좋았습니다. 티셔츠는 화이트가 숏팬츠는 레드컬러가 반응 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"시어아이스 상품 판매율 좋습니다. 재고가 좀 부족해서 아쉽습니다. 남녀 같이 코디되는 상품들이여서 남녀셋업으로 판매 잘되는거 같습니다."},{"cat":"용품","topic":"","fb":"바이저류 판매 좋았습니다. 마스크도 판매 좋았습니다. 백팩은 재입고 보충 후 주말에 많은 판매 되었습니다."},{"cat":"신발","topic":"","fb":"점포 특성상 테니스화가 아니면 판매 저조한편이여서 전혀 반응 없습니다. 차주엔 매장에서 직원들 착용 후 적극 판매 해봐야겠습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"라켓은 전체적으로 반응은 좋지만, 전년보다는 조금 아쉬운거 같습니다. 테린이분들이 새라켓 사실때 클래시가 블랙+레드 조합이다 보니까 꺼리시는분들이 많아서 롤랑가로스 라켓으로 적극 어필해드렸습니다. 가방은 생각보다 반응 없어서 아쉽습니다. 블레이드도 라켓은 적극 어필하면 판매로 이루어지는 편인데, 원래 V9 반응 보다는 좀 적은거 같습니다. 블레이드는 남성분들이 관심 더 많으십니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"기온이 올라감으로써 주말에 나들이 가시는 분들이 많았던거 같습니다. 전주 대비 입점객은 비슷했던거 같습니다. 전년대비 롯데백화점도 매출 감소하여 롯데카드 사은 있었습니다."}],"5월3W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"NTS24 재입고 후에 30,40대 여성 고객님 방문이 많았습니다. 백팩 구매도 많았는데 공홈에서 품절인 드로우스트링 에어 그레이 컬러 매장에서 판매 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통) -의류 : 엘리트 퍼포먼스, 어드밴스드 등 (5/1","fb":"선셋매치 반응 좋았습니다. 기본티셔츠만 찾으시다가 프린팅 있는 상품들에 관심이 꽤 있으셨습니다."},{"cat":"용품","topic":"","fb":"드로우스트링 에어 반응 좋았습니다. 가벼운 백팩을 찾으셔서 반응 좋았던거 같습니다."},{"cat":"신발","topic":"","fb":"러쉬투어 찢어짐 현상 수선 방법이 생겼다고 하여 고객님들 맡겨 주셨습니다. 금주는 리스폰스 프로 판매율이 좋았습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"롤랑가로스,블레이드 라켓이 판매율 좋았습니다. 롤랑가로스는 클래시 라인이 판매율 좋습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"금주 입점객 전주보다 좀 적었습니다. 전체적으로 점포 오프라인 매출 감소하는 추세입니다."}],"5월4W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"재입고된 퓨어드라이 티셔츠들과 에어모션 캠프캡 판매율이 좋았습니다. 날씨가 많이 더워지셔서 반팔티셔츠 판매율도 많이 증가하였습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 [의류] 선셋매치 라인업  1. 구매목적 : 테니스 카테고리가 아니라","fb":"링거 티셔츠 디자인이 여성분들한테 인기 디자인이고 저희는 남성 링거 티셔츠를 여성분들이 많이 구매하셨습니다. 공홈에 있는 룩 그대로 구매하셨던 분들도 꽤 많았습니다. 테니스도 치되 일상 티셔츠도 많이 입으시려고 구매하신거 같았습니다."},{"cat":"용품","topic":"","fb":"주말 양말 판매 증가하였습니다. 가천대 동아리 타이브레이크에서 동아리 비용으로 양말 구매했습니다. 소단체로 자주 오는 동아리이고, 4월에는 백팩도 구매했었습니다."},{"cat":"신발","topic":"","fb":"20,30대 고객님들이 주로 찾는 스타일이다 보니까 매장에서 생각보다 반응이 없습니다. 테니스화를 주력으로 찾으시다보니 구매로 잘 이루어지지 않는 부분인거 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"금주에는 라켓 판매가 좀 저조했습니다. 블레이드,롤랑가로스 문의는 많으셨는데 스트링 작업 기간이 길다보니 구매를 꺼려하셨습니다. 1~2일 정도 소요되는 매장에서 구매하시는것 같았습니다. 그래도 라켓 설명이랑 고객님한테 맞는 라켓 추천 드렸습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"점포에 러닝 고객님이 증가하고 있습니다. 테니스 목적을 가지고 오시는 고객님들은 좀 저조했던 한주였습니다."},{"cat":"","topic":"1) 에어벨 W의 판매호조 사유 - 주 구매 고객층 (테니스/일반) (테니스신발이 아닌데 어떤고객이 구매하는","fb":"인스타 홍보로 인해 매장 방문해주시는 편인데, 저희는 테니스화가 아니라고 응대 해드리면 거의 구매 안하시는 편입니다."},{"cat":"기타","topic":"신규 라켓 출시 프로모션 진행을 위한 그립커버 사전 주문  박스당 수량 30개, 개당 단가: 3,000원(V","fb":"5박스"}],"6월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"40대 여성분들의 입점이 많았습니다. 여름 시즌이라서 양말 아대 같은 용품 판매가 좋았던 한주였습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품 - 드로우스트링 백팩V2 (아이보리, 화이트) 재입고 후 반응,","fb":"새로 입고된 선셋라인들 반응 좋았습니다. 재고가 아쉽지만 재입고 해도 8월달에도 계속 팔릴 아이템들이여서 재입고 필요해 보입니다."},{"cat":"용품","topic":"","fb":"드로우 리오더로 반응 좋았고, 문의 주시는 분들이 많으셨습니다. 테니스메트로 방문 후에 저희 매장으로 오시는 분들이 꽤 많았습니다."},{"cat":"신발","topic":"","fb":"볼트프로,리스폰스프로 위주로 적극 추천드리고 있습니다. 리스폰스프로가 큰 사이즈가 지금 전컬러 없다보니 판매에 조금 어려움은 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"롤랑가로스의 반응이 조금 저조한거 같습니다. 전년대비 라켓 판매가 30% 정도 감소한거 같습니다. 블레이드 위주로 적극 응대 중입니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"평일에 공휴일이 있어서 주말 같은 매출이 나왔지만, 전체적으로 평일,주말 입점객이 감소하여 매출은 떨어진 상황입니다. 점포에서도 오프라인 활성화를 위해 여러 방안들을 모색하고 있습니다."}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"신상품 위주의 판매가 좋았습니다. 20,30대 여성분들의 입점이 많았고, 신상품 라인들 전반적으로 반응 좋았습니다. DP도 전반적으로 새로 구성하였습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"신상품 반응 전체적으로 좋았습니다. 피키쇼츠랑 매치할수 있어서 더 반응 좋았습니다. 일상복으로도 전환 가능하고, 운동복으로 좋을거 같다는 의견 있었습니다. 조금 아쉬운점은 몇가지 티셔츠들의 핏 문제가 있었습니다. 오버핏으로 나온 티셔츠들이 터무니 없이 큰데 사이폭도 XS~L 여서 작은 사이즈들을 많이 찾으셨습니다.(TTS76)"},{"cat":"용품","topic":"","fb":"얇은 두께감의 양말은 좀 판매율이 좋진 않았는데, 옷이랑 같이 매칭 하시려고 구매하신 고객님들이 많으셨습니다. 길이가 좀 더 길어진 점도 호조로 느껴졌습니다."},{"cat":"신발","topic":"","fb":"아직 새로운 컬러의 볼트프로의 반응은 없었습니다. 하지만 225,230을 찾으시는 고객님들한테 반응 좋을거 같습니다. 발목을 더 잡아 줄수 있게 개선된 점도 좋아보입니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"롤랑가로스 라켓 구매가 좋았습니다. 롯데호텔 코치님께서 테린이분들 매장으로 안내주셔서 울트라로 연계 판매하였습니다. 사은품 적극 챙겨드리고, 레슨 픽업 시간에 맞춰 스트링 작업 마무리 할수 있도록 도와드렸습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주보다 입점객은 조금 줄었습니다. 점포 전체적 특성인거 같습니다. 점포에서 매장 유입 가능할만한 POP대 같은 층이나 알로,룰루레몬 같은 브랜드 옆 동선에 둘 수 있도록 하고싶다고 POP 양식 원하셨습니다."},{"cat":"기타","topic":"수시사은품 전반 매장 피드백 (스크런치 / 그립커버) 좋은점, 아쉬운점 + 차후 사은품 제안 아이템","fb":"양말 사은품 찾으시는 분들이 많긴 했으나, 스크런치 고무줄이 짱짱하다는 평들이 많았고 맘에 들어하셨습니다. 대신 남성분들 사은품들이 조금 아쉽습니다. 그립커버 입구가 조금 좁기도하고, 그립커버는 모든 테니스 고객님들이 쓰시진 않아서 그런지 반응이 좀 미덥지근 하긴 했습니다."}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"신상 퓨어드라이 반팔티 판매율이 높았습니다. 같이 코디 가능한 피키 쇼츠도 반응 좋았습니다. 운동목적 구매가 훨씬 좋습니다. 휴가철 아이템으로 구매하시는분들은 거의 없었습니다. 휴가목적 구매는 외국인들 구매가 높았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"퓨어드라이 신상품 반응 좋은거 같습니다. 여성 디자인 및 공용 상품들도 반응 좋고, 전사이즈가 다 있어서 더 적극 어필 하여 판매 하였습니다. 저희는 긴바지 수요는 없습니다. 대신 너무 짧은 스커트,반바지류보다 적당한 기장감의 상품들이 더 있었으면 좋겠습니다."},{"cat":"용품","topic":"","fb":"인기 품목 기본 스타일 용품 모자,아대,양말들이 재고 부족으로 판매 아쉬웠습니다."},{"cat":"신발","topic":"","fb":"볼트프로 라인들이 반응 좋습니다. 전사이즈 있는 컬러로 적극 판매 중입니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드 반응 좋으며, 롤랑 클래시 판매율 좋았습니다. 다음달에 출시될 라켓 궁금해 하시는분들도 계셨습니다."}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"신규 아이템들의 반응이 좋았습니다. 드로우스트링 뉴컬러랑 에어리 뉴컬러 판매율 좋았습니다. 티셔츠는 신규 남녀공용 퓨어드라이 매우 좋은 반응 보이고 있습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품) 드로우스트링 백팩 V2 신규 컬러 반응  (내/외국인 비중,","fb":"퓨어드라이 신규 입고 컬러 상품들이 반응 좋습니다. 남성 고객님들은 티셔츠 종류가 많아져서 좋다는 반응이였습니다. 여성분들은 캐주얼하게 입을수 있는 아이템들이 늘어나서 좋다는 의견이 많았습니다."},{"cat":"용품","topic":"","fb":"레드 컬러가 반응 및 터치감 제일 많았습니다. 새로운 컬러가 공홈에서 먼저 노출되서 문의가 좀 있었는데 문의가 있던거에 비해서는 판매율 저조한거 같습니다."},{"cat":"신발","topic":"","fb":"새로운 컬러가 입고됨으로써 반응이 좋았습니다. 같이 재입고 되었던 화이트 컬러도 판매 좋아졌습니다. 볼트프로,리스폰스프로 보시는 고객님께 거의 에어리 추천드리면 에어리로 구매하시는 거 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드가 가장 반응 좋으며, 롤랑가로스 클래시 곧 품절이라 판매율 좋았습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"6월 마지막 주에 공동사은이 있음에도 생각보다 많은 입점이 이루어지진 않았습니다. 오프라인 역신장 브랜드가 많아졌고, 오프라인 매출 늘리기 위한 백화점 방안들이 늘어나고 있습니다."},{"cat":"기타","topic":"* 26FW 상품교육북 매장의견   - 상품교육자료를 직관적으로 볼 수 있게 품번/상품명 검색 시, 세일즈포","fb":"전직원 모두 숙지 가능하고 직접 검색하고 볼수있게 되어 있어서 좋은거 같습니다. 섹션구성만 좀 공식홈페이지 처럼 나눠져있으면 좋을거 같습니다."}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"드로우스트링 뉴컬러 아이템들 반응 좋았습니다. 신상 퓨어드라이 의류들도 꽤 반응 좋았고, 남성분들 코트라인 7인치 팬츠 판매 좋았던 한주였습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"너무 짧은 의류보다는 약간의 기장감이 있는 반바지나 스커트가 필요해보입니다. 스커트를 입었을때도 기장감이 짧고, 반바지는 스타일이 많이 없다보니 추천드릴 아이템들이 없습니다."},{"cat":"용품","topic":"","fb":"소프트 에어 터치감 높았고, 판매율도 좋았습니다. V1은 판매는 있었지만 V2만큼의 반응은 아니였습니다. 키링 고객님들 반응 좋았습니다. 심리스 퍼포먼스 바이저 반응은 아직 미비하였습니다."},{"cat":"신발","topic":"","fb":"리스폰스 프로 뉴컬러들 반응 좋았는데, 뒷축이 높아서 불편하다는 의견이 있었습니다. 그 전 리스폰스랑 비교했을때 피팅감이 좀 달라진거 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"문의 및 반응 전혀 없었습니다. 단체전할때나 단골고객님 방문 오셨을때 말씀드렸는데 모르고 계시는 분들이 대부분이였고, 관심 많이 없으셨습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"백화점 세일기간이지만 전년대비 입점객 및 매출은 하락하였다고 합니다. 남은 세일 기간 및 7월 잔여에 공동사은 계속 진행 할것 같습니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"5박스"},{"cat":"기타","topic":"신규라켓 디파이어\n7/24일(금) 15시~18시 시타회 참석여부\n작성예시) 매니저 1, 직원 1","fb":"매니저 1"}],"7월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"잠실 레이커스 선수분들이 주말에 방문하여 리본 니삭스 아이템 커플템으로 구매하셔서 니삭스 판매율이 좋았습니다. 이번주는 의류 신발보다 용품 판매가 좋았던 한주였고, 신상품 위주로 판매가 좋았습니다."},{"cat":"의류","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신상 전반적인 고객 터치 및 피드백","fb":"신상 전체적으로 반응은 좋은데 SS와 비교했을때 큰 차이가 없는 기본 아이템들이 들어와서 잘은 모르시는거 같습니다. 그래도 사이즈 많은 아이템으로 적극 추천 드리고 판매하고 있습니다."},{"cat":"용품","topic":"2-1. 의류/용품/신발 판매 특이사항 - 드로우스트링 신규 반응","fb":"새로 나온 백팩 라인업들 고객님들 반응 좋은거 같습니다. V2 보다 확연하게 판매가 높진 않지만 백팩 사이즈가 크다고 느끼시는 여성분들의 터치감이 높았고, 다양한 선택지가 있어서 좋아하셨습니다! 캠프캡 두께가 좀 두꺼워서 아쉽다는 의견들도 있었는데 FW시즌일때에는 꽤 많은 판매가 될거 같습니다."},{"cat":"신발","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신발 신규컬러 반응","fb":"에어리 신규 컬러 반응 좋습니다. 밋밋한 화이트보다 포인트 되는 컬러로 구매 꽤 이루어지고 있습니다. 리스폰스프로도 터치감은 있는데 창이 높다보니 착화 후에 아쉽다는 의견이 많았던 한주였습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 - 디파이어 판매반응","fb":"윌슨리그 선수분들이 구매를 많이 하셨습니다. 런칭 당일 4명이 방문 주셨는데 PRO 98이 3자루 밖에 안나와서 난감한 상황이였습니다ㅠㅠ 서로 친한분들이 오신거라서 가격은 동일하니 돌려서 쓰신다고 구매하셨습니다. 바볼랏 퓨어에어로 쓰시는 고객님들도 있으셨는데 주말에 어떠셨는지 여쭤보니까 윌슨 라켓들의 느낌에 스핀이 걸리는 느낌이라 아직 적응은 안되신다고 합니다. 블레이드보다는 전체적인 총평은 아쉬운거 같지만 컬러나 라켓 디자인은 더 좋아하시는 느낌이셨습니다! 여성스펙 문의도 있으셨고, 입고때 연락달라는 고객님 3명 있으셨습니다!"},{"cat":"기타","topic":"전주대비 고객 입점 현황","fb":"주말 공동사은 및 사은행사가 없어서 입점 감소하였습니다. 그래도 매출은 전주랑 비슷한걸로 보여집니다."}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"새로 입고된 용품들 판매가 좋았습니다. 손목밴드에 포인트 주시는분들이 많아서 컬러풀한걸 원하시는 분들이 많았는데 반응 좋았습니다. 글로우 바이저 라인도 반응 꽤 괜찮습니다. 20,30대 여성분들 쇼핑하러 나오신 분들이 많았습니다!"},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"이번주는 남녀 커플로 구매하시려는 고객님들이 많았습니다. 퓨어드라이 반팔 라인들로 적극 추천하여 판매 하였습니다. 꼭 같은 디자인이 아니여도 시밀러룩처럼 같이 커플로 맞추셨고 구매로 이루어졌습니다."},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"색상이 밝고 의류에만 있을법한 컬러라고 생각했는데, 용품으로 나와도 꽤 반응 좋았습니다. 화이트,블랙의 기본 라인들보다 더 반응 좋았던거 같습니다."},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"남녀 모두 볼트프로로 테니스화 추천드리는 편입니다. 제일 운동화와 비슷한 느낌이여서 테린이분들이 접근하기 좋은 테니스화입니다. 리스폰스 프로는 높은 창 때문에 발목에 무리가 갈수도 있어서 원하시는분들께만 추천 드리고 있습니다. 여성분들 에어리도 꽤 반응 좋습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"디파이어 98 PRO 문의가 제일 많았고, 홀세일 매장에서 블레이드 재고가 많이 빠져서 매장으로 블레이드 문의를 많이 주시는거 같습니다. 적극 추천하여 판매중입니다."},{"cat":"기타","topic":"고객 입점 동향","fb":"휴가기간으로 전주대비 입점객 감소 하였습니다."}]},"스타필드코엑스":{"5월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"평균 연령층과 성별은 지난주와 큰 차이가 없었습니다. 수입쪽의 브라탑,스커트가 터치가 많았으며, 스커트 사이즈 받쳐주는데 브라탑 사이즈가 너무 깨져있어서 쉽지 않았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  **신발 : 에어벨 W 고객 반응 (착화, 디자인","fb":"슬슬 긴팔 종류의 상품들 터치가 줄어들고 브라탑,원피스 등의 제품들을 선호합니다. 스커트제품이 종류가 다양한점은 너무 좋으나, 현재 국내 제품 상의 사이즈가 부족합니다. 간혹 단품만 구매하고 가시는 고객들고 있긴하나, 꼭 셋업이 아니라도 구성이 형성되지 않으면 주문도 안하고 이탈합니다."},{"cat":"용품","topic":"","fb":"용품은 모자,양말,헤어밴드 순으로 판매가 되고있으며 가방도 꾸준히 잘 판매되고있습니다. 모자에서는 화이트,그린 판매 좋으며 성별은 남여 동일합니다."},{"cat":"신발","topic":"","fb":"아직까지 큰 반응은 보이고 있지 않습니다. 화이트보단 블랙 터치가 많으며 착화감,가격보단 디자인컬러에 먼저 중점을 두고 구매를 합니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"현재까지는 80%이상이 목적구매유입이며, 클래시가 압도적인 반응을 보여지고 있습니다. 여성,남성 비율은 비슷하다고 볼수있으며 롤랑 라켓구매시 아직까지 롤랑 구성보단 드로우를 많이보고있습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공은 올팀, 커리,샴페인,에보넥스트 판매 좋습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"연령층의 큰변화는 없었습니다. 점포내 다양한 전시회를 하여 유동인구는 많았으나, 매장으로 유입되는 고객들은 지난주와 큰 변화는 없었습니다."},{"cat":"","topic":"전체 고객 중 외국인 유입비중 (증가한 사유? 별도 점포에서 외국인 대상 진행하고 있는 프로모션/사은혜택은?","fb":"외국인 리무진 버스의 코스지만, 외국인의 대상으로 프로모션은 없습니다."},{"cat":"기타","topic":"타브랜드 프로모션","fb":"언더아머 - 외국인 여권 소지시 20%할인 나이키 - 외국인 여권 소지시 10%할인 - 나이키 상시 리복 - 20% 할인"}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"금주 성별은 지난주와 다르게 남성비중이 올라왔습니다. 여성 60% 남성40% 입니다. 평균 연령층은 30대초반이며, 여성쪽에서는 수입 스커트 터치가 많았습니다. 남성쪽에서는 임팩트 반팔 아노락 셋업, 시어아이스 판매가 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"피키 스튜디오 핑크 셋업은 꾸준히 판매되고있으며, 여성쪽에서는 시어아이스 반응은 크게 없으나, 남성쪽에서는 시어아이스 터치 많았습니다. 화이트 컬러에 대한 비침에 대해 많은 부담을 가져 화이트컬러 판매는 부진하며, 여성쪽에서는 브라탑 반응이 조금씩 올라오고 있습니다."},{"cat":"용품","topic":"","fb":"바이저의 구매는 올라오고 있으나, 바이저를 제외한 여름 아이템은 크게 터치가 없습니다. 드로우스트링 재입고후 폭발적인 문의 및 터치는 없으나, 꾸준한 판매가 이뤄지고 있습니다. 요즘들어 V1 화이트 구매가 올라오고있습니다."},{"cat":"신발","topic":"","fb":"에어벨 초반에 반응좀 있다가 금주 터치가 제로에 가까울정도로 없습니다. 슈즈쪽에서는 리스폰스프로1.5 터치가 많으나, 여성 사이즈가 부족하여 판매로스가 발생하였습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"롤랑 반응은 초두입고후 금주에는 반응 좋았습니다. 클래시,울트라 순으로 판매가 되었으며, 내국인40% 외국인 60% 판매율을 보였습니다. 여성 80% 남성20% 구매율을 보였습니다. 블레이드라켓은 초반보다 판매가 줄어들었지만, 남성 고객들에게는 꾸준히 관심있는 라켓입니다. 블레이드 가방라인은 롤랑 입고후 터치가 제로에 가깝습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공은 에볼루션,에보넥스트 판매 좋으며, 퓨어샷 재고 부족합니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"지난주와 다르게 성별은 차이나 있으나, 유동인구에 큰 변화는 없었습니다. 테린이 고객들의 매장 유입이 다시금 늘어나고 있으며, 라켓보단 의류 선택이 많았던 한주였습니다."},{"cat":"기타","topic":"타 브랜드 프로모션/ 행사현황","fb":"언더아머 - 외국인 여권 소지시 20%할인 나이키 - 외국인 여권 소지시 10%할인 - 나이키 상시 리복 - 20% 할인"}],"5월3W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"퓨어드라이 라인들 판매 좋았습니다. 여성 리오더 컬러뿐만 아니라, 남성쪽에서도 반팔티 위주로 터치 판매 되었습니다. 연령층은 지난주와 큰차이가 없었으며, 금주 성별은 다시 여성 비중이 80% 차지하여 높았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통) -의류 : 엘리트 퍼포먼스, 어드밴스드 등 (5/1","fb":"엘리트 퍼포먼스는 다양한 연령층으로 반응 좋습니다. 선셋매치 우먼스는 조금씩 터치가 올라오고있는데, 유니쪽에서 호불호가 심하게 갈리고 있습니다. 물론 조금더 지켜봐야 알겠지만, 입고후 현재까지 유니 반응은 불호가 많았습니다."},{"cat":"용품","topic":"","fb":"드로우스트링은 금주 판매가 많지 않았습니다. 모자,양말이 가장 많은 판매가 많았으며, 모자에서는 선물하는 고객들 비중이 30% 입니다."},{"cat":"신발","topic":"","fb":"남성쪽에서는 슈즈 터치가 전체 판매율에 30%정도 차지할만큼 저조합니다. 여성슈즈에서는 클레이가 외국인들한테 판매 좋습니다. 내국인들은 볼트프로,리스폰스프로 많이 선호합니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"라켓판매 평일 초반에는 저조하더니, 주말 가까워지면서 판매 많이 올라왔습니다. 라켓 구매 고객은 여성이 90%에 가까울정도였으며, 롤랑,클래시,블레이드 순으로 판매가 되었습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공 에볼루션,퓨어샷,에보넥스트 많이 부족합니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"금주 평일에는 점포 유동인구가 지난주보다 너무 감소된걸 느꼈습니다. 외국인들도 줄었으며, 내수 고객들은 거의 목적구매로 방문하는 비중이 높았습니다. 그 외 특별한 이슈는 없었습니다."},{"cat":"기타","topic":"타 브랜드 프로모션/ 행사현황 (POP내용 등 참조)","fb":"언더아머 - 외국인 여권 소지시 20%할인 나이키 - 외국인 여권 소지시 10%할인 - 나이키 상시 리복 - 20% 할인"}],"5월4W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"금주 평균 연령층은 30대중후반이며, 여성 비중은 지난주와 비슷합니다. 시어아이스 셋업 판매 좋았고, 스커트 종류가 터치가 많았습니다. 더블메쉬를 제외하고 거의 수입 스커트의 터치 및 구매였습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 [의류] 선셋매치 라인업  1. 구매목적 : 테니스 카테고리가 아니라","fb":"선셋은 거의 대부분이 젊은층 고객이였으며, 테니스 비중 40% 일상 60% 정도로 구매가 이뤄집니다. 링거티쳐스가 압도적으로 판매가 좋다기는 보단 현재 우먼스중에 퓨어드라이 빼고는 딱히 신상이 없다보니 판매에 몰리는 현상도 생각해봐야 할거같습니다. 슬리브리스는 아직 판매될때가 아니니 조금더 지켜보겠습니다."},{"cat":"용품","topic":"","fb":"금주 용품중 모자 판매가 가장 많았습니다. 성별도 어느쪽에 몰리는게 아닌 동등하였으며, 바이저보단 캡모자를 선호하였습니다."},{"cat":"신발","topic":"","fb":"신발 터치가 많이 없었습니다. 내국인들 방문시 신발쪽에 관심은 전혀 없었으며, 그나마 유럽쪽 외국인들의 신발 착화가 있었습니다. 지금 사이즈 깨져있는 디자인이 너무 많습니다...빠른 보충이 필요할듯합니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"롤랑,블레이드 판매 많았습니다. 여성비중이 90%를 차지하였으며, 롤랑에서는 여성 블레이드는 남성 위주의 판매였습니다. 테린이 고객이 대부분이였으며, 라켓 구매시 가방 연계판매가 좀 되었습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공 에볼루션,올팀,퓨어샷,에보넥스트 많이 필요할거같습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"커플 고객들의 유동이구나, 입점이 많았으나, 역시나 판매에는 큰도움이 없었으며 이를 제외한 성별,연령층은 지난주와 큰 변동이 없었습니다."},{"cat":"","topic":"1) 에어벨 W의 판매호조 사유 - 주 구매 고객층 (테니스/일반) (테니스신발이 아닌데 어떤고객이 구매하는","fb":"우리 점포는 에어벨 터치,착화도 저조합니다. 상권마다 특성이 있다보니 자연스러운 현상으로 보여지며, 마네킨도 신겨보고 노출도 많이 해봤지만, 큰 반응이 없습니다.   선셋매치 라인들이 판매호조까지는 아니지만, 테니스 비중보다 일반 고객비중이 조금더 있어보입니다."},{"cat":"기타","topic":"타 브랜드 프로모션/ 행사현황 (POP내용 등 참조)","fb":"언더아머 - 외국인 여권 소지시 20%할인 나이키 - 외국인 여권 소지시 10%할인 - 나이키 상시 리복 - 20% 할인"},{"cat":"기타","topic":"신규 라켓 출시 프로모션 진행을 위한 그립커버 사전 주문  박스당 수량 30개, 개당 단가: 3,000원(V","fb":"5박스"}],"6월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"금주 연령층은 지난주와 큰 변동이 없었으며 성별도 비슷하였습니다. 판매되는 상품들 또한 큰 변화는 없었지만, 국내 제품보다 수입제품의 터치가 좀 더 늘었다는게 이슈입니다. 외국인뿐만 아니라 내수고객들의 터치도 들었으며, 수입중 셋업을 많이 선호하였습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품 - 드로우스트링 백팩V2 (아이보리, 화이트) 재입고 후 반응,","fb":"브라탑,스커트 터치가 많았습니다. 그중에 탑스핀 브라판매 좋았습니다. 제일 많은 셋업문의가 많았던 상품이였습니다. 연령층 무관하게 다양하게 판매되었으며 밑에 코디하는게 다양하지가 않아 아쉬운점이 있습니다."},{"cat":"용품","topic":"","fb":"재입고후 전보다 판매 속도가 잘 안나오고있습니다."},{"cat":"신발","topic":"","fb":"남성쪽에서 슈즈는 거의 터치가 없다고 볼수있으며, 여성쪽에서는 볼트프로,리스폰스프로1.5 터치 있습니다. 구력이 있는 고객보단 테린이 고객들의 반응이 더 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"뷰티 라켓은 내국인보다 외국인 반응이 더 있으며, 에디션 라켓 입고를 알고 구매를 하는게 아닌 매장에서 라켓을 보다가 구매가 대부분 이였습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공 너무 부족합니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"점포내 전시회가 활발하지않아서 그런지 유동인구도 그렇게 많지는 않았습니다. 하지만 매장에 유입되는 비중이 큰변화가 있던건 아닙니다. 외국인 수요는 지난주대비 10%정도 감소하였습니다."},{"cat":"기타","topic":"타 브랜드 프로모션/ 행사현황 (POP내용 등 참조)","fb":"언더아머 - 외국인 여권 소지시 20%할인 나이키 - 외국인 여권 소지시 10%할인 - 나이키 상시 리복 - 20% 할인"}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"아이코닉쇼츠와 퓨어드라이티셔츠 판매 잘되었습니다. 전반적으로 호불호적인 부분은 보이지 않으며 20대후반 30대초반에서 반응을 보이고있습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"스토로베리 라인은 라이프보단 백프로 가까이 운동목적으로 구매 고객입니다. 신규고객 비중이 쪼금더 높으며 쇼츠는 피키스튜디오쇼츠와 많이 착용해보고있습니다."},{"cat":"용품","topic":"","fb":"연계판대도 되고있지만, 별도구매 비중이 더 높습니다. 상하의 코디 색상에 따라 크루삭스에서도 다양하게 초이스를 하고있습니다. 오히려 이젠 잘 판매가 되고있던 코트라인 삭스가 너무 투머치한 느낌이 되버렸습니다."},{"cat":"신발","topic":"","fb":"신규 볼트프로 아직까지 터치 없습니다. 터치가 많이 없다보니 많은 피드백은 없었지만, 컬러가 블루말고는 아쉽다는 피드백도 있었습니다. 전반적으로 테니스화에서 국내는 신규가 입고되어 방어가 되지만, 수입에서는 사이즈 너무 부족합니다. 사이즈가 없을때 내국인은 주문을하지만 외국인들은 절대 주문하지 않고 바로 판매로스가 발생합니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"금주 RF 반응좀 있었으며, 롤랑 과 더불어 뷰티라켓도 판매 잘되었습니다. 전부 스트링 희망하는 고객이였으며, 80%가 테니스 입문하는 고객이였습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공 에볼루션, 에보넥스트,퓨어샷 문의 많습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"지난주대비 유동인구 유입에 큰 변동은 없었습니다. 입점수는 비슷했으나, 객단가가 낮은 한주였습니다."},{"cat":"기타","topic":"수시사은품 전반 매장 피드백 (스크런치 / 그립커버) 좋은점, 아쉬운점 + 차후 사은품 제안 아이템","fb":"스크런치 반응이 좋을줄알았는데, 생각보다 그립커버에 밀리는 느낌이였습니다. 운동용 목적으로 사용하고 싶은데 운동을 하다보면 흘러 내린다는 피드백도 많았습니다."}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"휴가 목적의 구매는 없었으며, 대부분 운동목적으로 구매 하였습니다. 아직까지도 피키 스튜디오 판매 좋습니다. 내/외국인 전부 반응 좋으며 이또한 운동 목적입니다. 그리고 탑스핀 폴로 브라 셋업으로 판매 잘되고있습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"퓨어드라이 반응은 매년 좋습니다. 유일하게 호불호가 없는 제품입니다.  여성 긴바지 수요는 많지는 않지만, 그래도 매장 내 사이즈 소진은 할정도로 판매 되고있습니다. 주로 30대후반부터 터치가 많으며 외국인 구매 비중이 좀더 높습니다."},{"cat":"용품","topic":"","fb":"금주 용품 중 모자가 가장 많이 판매 되었습니다. 선물과 더불어 여성 남성 비중도 다양하게 관심을 보였으며, 의류구매시 무조건 모자는 연결판매 가능합니다."},{"cat":"신발","topic":"","fb":"아직까지 뉴 볼트프로에 대한 고객들의 반응은 크게 없습니다. 일단 컬러에서 약간 호불호가 갈릴거라 예상됩니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"라켓은 지난주와 비슷하게 판매 되었습니다. 애고니,롤랑,블레이드순으로 판매 잘되었으며, 지난주와 다른점은 내국인 비중이 조금더 늘었다는 점입니다."},{"cat":"팀스포츠","topic":"","fb":"농구공 에볼루션 기본컬러 말고 블루,그린 찾으시는 고객 많습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"입점은 지난주보다 20%정도 감소한걸 느꼈습니다. 가족단위에 고객들은 늘어났는데 전부 쉽지 않은 가족들이였습니다. 오히려 평일이 더 집중되는 한주였습니다."},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"말한대로 스킨쪽이라 여성분들이 받자마자 그자리에서 개봉후 자세하게 확인하는 모습이 대다수였습니다. 본인에게 맞는건지 확인 고객들도 있었으며, 외국인 고객들에게 드리면 무엇인지 말만 해드려도 그저 마냥 기뻐합니다. 외국인들에게는 사은품 줄 맛 납니다."}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"기능성 반팔 티셔츠와 테니스 쇼츠, 여성 원피스류가 높은 터치와 판매가 되었습니다. 신상의류는 디자인과 컬러에 대한 반응이 전반적으로 긍정적이였으며 특히나 화이트 컬러에대한 반응이 높았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품) 드로우스트링 백팩 V2 신규 컬러 반응  (내/외국인 비중,","fb":"셋업 코디 구매가 증가했으며, 확실한 기능성적인 제품을 픽스후, 그안에서 컬러를 고르는 모습이 많았습니다. 금주는 국내 디자인보다 수입 제품들의 반응이 높았으며, 내/외국인에게 모두 터치가 많았습니다."},{"cat":"용품","topic":"","fb":"블랙 컬러를 제외한 모든 컬러가 조금씩의 터치는 있으며 신규 컬러중 레드가 가장 불호가 심한편입니다. 현재까지 신규 컬러는 내국인보다 외국인의 비중이 미세하게 높은편입니다."},{"cat":"신발","topic":"","fb":"에어리는 젊은층 고객들의 반응이 좋습니다. 하지만 화이트의 리오더, 신규 컬러의 반응은 조금더 지켜볼 필요가 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"금주 라켓은 애고니가 소진되어서 그런건지 다양한 모델들이 판매 되었습니다. RF제품을 제외하고 골고루 판매 되었으면 성별은 여성70% 남성30%입니다."},{"cat":"팀스포츠","topic":"","fb":"농구공은 지난주대비 판매가 좀 줄었습니다. 올팀 좀 부족합니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"평일/주말 지난주대비 점포내 유동인구는 큰 차이가 없었지만, 매장으로 유입되는 고객수는 거의 절반에 가까울정도로 줄었습니다. 그나마 라켓 판매 비중이 조금 높아 매출의 도움을 줬다하지만, 평일 주말 쉽지 않았습니다."},{"cat":"기타","topic":"* 26FW 상품교육북 매장의견   - 상품교육자료를 직관적으로 볼 수 있게 품번/상품명 검색 시, 세일즈포","fb":"품번 및 상품명으로 검색후 세일즈 포인트를 바로 확인할 수있어 교육과 고객 응대가 이전보다 훨씬 편할거같습니다. 필요한 정보를 빠르게 찾을수 있어 신규 직원 교육에도 도움이 될거 같으며, 실제 판매 시 활용도가 높을걸로 예상됩니다."}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"전반적으로 퓨어드라이 제품들 반응 좋았습니다. 아이코닉 셋업으로 많이 착장했습니다. 추가적으로 드로우스트링도 판매 잘되었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"대부분에 여성분들은 자외선으로부터 피부가 노출되는걸 꺼려합니다. 그렇다고 팔토시를 선호하지도 않습니다. 현재 매장에서 운영하고 있는 자켓종류는 두께감이 있다보니 터치가 없습니다. UV 경량 자켓이 있다면 다양한 연령층에게 좋은 아이템이 될거같습니다. 어느정도의 스트레치가 들어가야 하며, 남성제품으로는 필요없으며 단품이 아닌 여성용으로 셋업 추천합니다."},{"cat":"용품","topic":"","fb":"드로우스트링 뉴컬러 반응은 조금더 지켜봐야 할거같습니다. 아직까지는  V2 화이트가 판매 좋습니다. 글로우 베일 바이저 W 반응 좋습니다. 디자인을 떠나서, 후면 밴드조절이 다양한 두상 크기에 맞춰줄수있고 밴드가 넓어 이질감이 없습니다. 신상 바이저는 베일 바이저로인해 터치 저조합니다."},{"cat":"신발","topic":"","fb":"리스폰스 신상은 일단 발이 커보인다는 피드백이 너무 많습니다. 운동하는데 발이 커보이든 작아보이든 그게 중요한가라는 생각이 들긴하지만, 볼트프로 대비 비교될수 있다고 생각합니다. 하지만 조금더 지켜보겠습니다. 코트글라이드의 터치 및 반응에대해 가격적인 부분으로 선택하는 고객이 상당수라는걸 발견하였습니다. 어차피 테니스를 이제 배우는 단계에서 금액이 높은게 필요없다라는 반응이 있었습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"대외비라고 노출이 없었으니 당연 매장 문의는 전혀 없었습니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션,올팀 판매 좋습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"금주 전시회 이슈로 유럽고객들 뿐만 아니라 내국인들의 매장 유입도 좀 있었습니다. 주말보다 평일 목적구매 및 객단가가 높게 나왔습니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"2박스"},{"cat":"기타","topic":"신규라켓 디파이어\n7/24일(금) 15시~18시 시타회 참석여부\n작성예시) 매니저 1, 직원 1","fb":"대기 (조율중)"}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"에브리데이 옐로우 컬러 셋업으로 터치 많았습니다. 주로 20대중후반이 많았으며 날씨가 더워지면서 반팔보다 브라탑을 선호하는 고객들이 늘어나고 있습니다."},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"스커트,브라탑 선호하는 고객들이 많았으며 거의 수입제품입니다."},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"바이저 판매가 지난주대비 떨어졌습니다. 캡모자를 더 선호 하였습니다. 선물용으로도 캡모자 터치가 많았습니다. 올어라운드 짐백은 컬러에서 관심은 있지만 아직까지 많은 구매로 이뤄지고 있지 않습니다. 지켜보겠습니다."},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"에어리 화이트 컬러 제외하고 두가지 컬러는 꾸준히 판매되고 있습니다. 20대후반부터 30대초반에서 반응 있습니다. 볼트프로는 그린컬러만 터치있고 나머지는 저조합니다. 리스폰스프로 터치 거의 없습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"디파이어 문의는 현재까지 이어지고 있습니다. 디파이어때문에 다른 라켓의 수요가 없습니다. 대량 입고를해서 7월을 방어했어야 했는데, 디파이어 기다리고 있는 고객들이 지금 다른 라켓을 보지 않고있습니다."},{"cat":"팀스포츠","topic":"2-2. 팀스포츠 판매 특이사항","fb":"에볼루션,퓨어샷,올팀 잘나갑니다."},{"cat":"기타","topic":"고객 입점 동향","fb":"지난주와 큰 변동사항은 없었지만, 주말에는 매장으로 유입되는 고객들의 기복이 심합니다. 외국인은 거의 없으며 내국인들의 지갑은 쉽게 열리지 않고 있습니다."}]},"스타필드고양":{"5월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"드디어 시어아이스 상품들이 손이 많이타고 판매되고있습니다. 여성분들은 여전히 시어아이스 셋업과 기본 반팔티 및 치마 가위주였습니다. 남성분들은 기본 반바지와 퓨어드라이 반팔티 시어아이스 까지 였습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  **신발 : 에어벨 W 고객 반응 (착화, 디자인","fb":"시어아이스 이염 이슈때문에 고객 클레임이있었습니다. 저희 신발 및 의류상품들이 자꾸 이런 말도안되는 상품불량이 생기는게 고객들에게 신뢰감을 크게 잃는다고 생각합니다. 비싼가격과 높은 브랜드 가치성으로 마케팅되는것과 달리 불량이슈가 너무많아 아쉽습니다.ㅣ"},{"cat":"용품","topic":"","fb":"드로우스트링의 잠깐의 부제가 컷습니다. 고객들이 원하시는 메인 백팩이 사라지니 가방판매율이 잠깐줄었었고 새로들어온 롤랑 시리즈 색상이 예뻐 고객들에게 아이캐칭 및 구매까지 이어질확률이 높았습니다."},{"cat":"신발","topic":"","fb":"에어벨은 디자인이 아주 예뻐 여성고객들이게 크게 호응을 얻고있습니다. 저희직원들도 전부 착화중입니다 하지만 가벼운무게감과 예쁜 디자인은 좋은부분이지만 신발 쿠션감이 쉽게 딱딱해지는 느낌을 받는다고 합니다. 수정이 필요할거같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"1. 전년보다 유입이 줄었습니다. 유입이 줄어든 이유는 롤랑가로스의 디자인 문제는 전혀없고 그동안 기다렸던 고객님들이 홀세일에서 저렴한 가격에 풀고있어서 홀세일쪽으로 몰리는 영향이 큽니다.(스트링샾) 신상 라켓나올때마다 홀세일쪽과의 가격차이때문에 신상품 판매에 타격이커서 걱정입니다. 2. 클래시 상품이 확실히 앞도적이고 이번 울트라도 쨍한 파란색만 구비되있다가 황토색으로 입고된 롤랑을 보고 판매하기 더좋아졌습니다. 아쉬운건 여성 UL그람수가 발매되지않아 매우아쉽습니다.ㅣ3. 여성 7 남성 3 4. 시어아이스 시리즈와 러쉬투어 신발 그리고 롤랑 에디션 가방들이 같이 판매되고있습니다."},{"cat":"팀스포츠","topic":"","fb":"올팀 , 퓨어샷,에볼루션,EVO넥스트가 주력판매입니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주대비 입점율이 높지는않았습니다. 하지만 일요일만 신기하게 고객님들이 라켓구매가 매우 높았습니다. 연휴에 놀러갔다 돌아오신 고객들이 시즌을 맞아 라켓을 교체및 신규구매하시는 느낌이였습니다."},{"cat":"","topic":"전체 고객 중 외국인 유입비중 (증가한 사유? 별도 점포에서 외국인 대상 진행하고 있는 프로모션/사은혜택은?","fb":"외국인 유입없습니다."}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"리오더 상품인 퓨어드라이 티셔츠가 주를 이뤘습니다. 또한 SS 핫시즌이 시작되면서 시어아이스 상품 남여 전부 판매율이 좋습니다. 또한 신상으로 입고된 APEX 브라,플레이티드 스커트 또한 판매가 좋습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"시어아이스 상품들이 반응이뜨겁습니다. 하지만 이번 ORG색상 상의 색물빠짐 현상같은 이슈가생기면 고객들의 실망하는 반응이 매우큰것도 현실입니다. 브랜드이미지가 고급화되어가는 과정중에 비싼가격으로 판매하는 의류상품들이 너무도 아쉬운 불량이생긴다는점이 고객들에게 크게 와닿는거같습니다."},{"cat":"용품","topic":"","fb":"특히 마스트 상품이 반응이 좋습니다. 전년보다 대낮 기온이 빨리 뜨거워져서 마스크가 필수가 되서 고객들이 많이 찾으십니다. 2) 드로우 스트링은 그의 메인급으로 판매율이 좋기때문에 재고가 항상 넉넉히 있어야한다고 생각합니다. V2재입고 반응또한 뜨겁습니다. (테니스칠때 필수로 필요한가방으로 자리잡고있습니다.)"},{"cat":"신발","topic":"","fb":"메리제인은 귀여운 디자인으로 고객들에게 반응이 있는편입니다. 처음 들어오는고객들이 예쁘다는 반응이 대부분이였습니다. 딜라마는 에어리W와같이 테니스화면 더 많이 신고 싶어할거같습니다. 하지만 테니스화 특성상 샌들식으로 만들수없으니 디자인만 느낌이 비슷하게 테니스화 형식으로 (에어리W처럼)만들수있으면 좋을거같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"1.디자인 요소 : 글씨체와 분양 컬러조합 모두 저는 만족합니다. 2.내국인/외국인 : 내국인 100% 입니다 3.여성/남성 : 여성 남성 90:10 블레이드 10 라켓가방 반응변화 : 내국인 고객이 90% 이상입니다. 판매 반응은 첫날 보단 더디지만 슬슬 홀세일쪽 상품들이 품절이 되가면서 저희쪽으로 와서 구매하시는경우가 높아졌습니다. 특이사항은 고매고객들이 여성 1그립, 남성 3그립에대한 문의가 많습니다. 1,3그립 수입양을 늘리고 홀세일보단 저희쪽에 수량을 늘리면 홀세일쪽 가격차이를 어느정도 방어할거같다는 생각을 크게했습니다."},{"cat":"팀스포츠","topic":"","fb":"대부분 시리즈벼로 농구공의 재고가 부족하여 판매로스가 종종 발생하고있습니다. 볼타워 철거 혹은 볼타워 보강에대해서 급하게 논의되야할거같습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주대비 입점은 비슷합니다."}],"5월3W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"엘리트 플리티드 셋업 라인이 신상으로 들어와서 반응이 매우좋았습니다. 또한 여성 크로티셔츠 리오더와 신상품 출시가 고객들에게 큰반응을 얻었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통) -의류 : 엘리트 퍼포먼스, 어드밴스드 등 (5/1","fb":"엘리트 퍼포먼스 상품들이 생각보다 남성 고객들에게 반응이 좋습니다. 내장되어있는 반바지 때문에 굳이 속옷입을필용없이 착용할수있어서 매우좋습니다. 선셋 상품들또한 터치감이 매우좋습니다."},{"cat":"용품","topic":"","fb":"리본 니삭스는 여전히 고객들이 많이 찾으십니다. 벌써 판매율이 크게증가하고있습니다."},{"cat":"신발","topic":"","fb":"여전히 러쉬투어 상품들이 가장 판매가 가장좋습니다. 또한 에이리W또한 귀여운디자인으로 많이 판매되지만 사이즈가 부족하여 판매로스로 이어지고있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"롤랑가로스 판매율이 많이올라 클래시 상품들이 주를 이루고있고 블레이드 또한 꾸준히 판매가되고있습니다(홀세일매장들 품절이슈가있음)"},{"cat":"팀스포츠","topic":"","fb":"농구공은 여전히 주력상품만 판매됩니다(에볼루션,퓨어샷,에보넥스트_)"},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주대비 입점은 조금 늘었습니다. 확실히 단골고객들이 다시 재방문하여 구매하시는 상품들이 증가했습니다."}],"5월4W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"대부분 퓨어드라이 상품과 시어아이스 상품들 치마바지 상품들이 주를 이루었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 [의류] 선셋매치 라인업  1. 구매목적 : 테니스 카테고리가 아니라","fb":"선셋상품들은 대부분 테니스고객들이 구매하셨습니다. 디자인은 일반고객들도 살만하다고 생각합니다 하지만 아직까진 매장에 입점하는 일반고객들이 많치않아서 반응을 보기 힘들었습니다. 2.링거 상품은 디자인 자체가 귀엽고 크롭하기때문에 대부분 쇼츠 상품들과 매치합니다 어느 쇼츠든 대부분 잘어울려서 고개들에게 큰방응입니다. 남성 링거티셔츠 커플라인과 슬리브리스는 여름에는 필수라고 생각합니다. 고개들반응은 대부분 좋습니다."},{"cat":"용품","topic":"","fb":"아직까지 크게 반응은없었지만 디자인자체가 귀여워 터치감이 있는편입니다."},{"cat":"신발","topic":"","fb":"내국인 50:외국인 50 반응은 귀엽다고 평가가만고 일반고객들도 꾀나 물어보고 신어보십니다. 이런식으로 핫시즌 아이템은꼭 필요할거같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"롤랑및 블레이드가 여전히 주를 이루어서 판매되고있고 이제 홀세일 상품들이 재고가 소진되어 저희한테 오는거같습니다."},{"cat":"팀스포츠","topic":"","fb":"신상품및 주력상품(에보넥스트,퓨어샷,에볼루션이 필요합니다.)"},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주대비 확실히 입점객은 좀줄어서 막바지에 매출이 좀 저조했습니다."},{"cat":"","topic":"1) 에어벨 W의 판매호조 사유 - 주 구매 고객층 (테니스/일반) (테니스신발이 아닌데 어떤고객이 구매하는","fb":"에이벨 대부분 고객들이 일상화로 신기위해서 구매하시고 디자인또한 호조에 가까워서 터치감도 높았습니다."}],"6월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"여성 선셋 라인 (링거티셔츠) 가 전체적으로 큰반응이였습니다. 남자분들은 시어아이스 및 에어브리즈 시리즈 상품(기능성에 냉감소재)상품들이 주를 이루었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품 - 드로우스트링 백팩V2 (아이보리, 화이트) 재입고 후 반응,","fb":"남성 긴바지 ,여성 긴바지 여름전용으로 많이 문의하셨지만 얇은 긴바지 SKU가 부족하여 판매로스가 좀있었습니다."},{"cat":"용품","topic":"","fb":"코어 상품인 드로우스트링 V2가 입고되어 신규고객들에게 자신있게 판매할수있게되어 가방판매율이 올랐습니다."},{"cat":"신발","topic":"","fb":"여전히 수입상품 러쉬투어 상품 및 러쉬프로 상품들이 주를 이루고있습니다. 테니스에 진심인 분들일수록 수입상품을 더욱 많이구매하십니다. 여성분들은 리스폰스 프로와 볼트프로 상품을더좋아하시고 여성 카본화 문의가 많습니다.ㅣ"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"롤랑가로스 시즌에 맞게 롤랑가로스 판매율이 앞도적으로 높습니다. 찾아오시는분들 및 신규고객들에게 판매하기 매우수월합니다. 또한 블레이드 열기또한 아직 남아있어서 남성분들 은 여전히 블레이드도 많이 구매하시는 편입니다."},{"cat":"팀스포츠","topic":"","fb":"주력상품 퓨어샷,에보넥스트,에볼루션 부제로 판매율이 현저히 떨어지고있습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주대비 크게차이가 없습니다. 주말입점은 좀빠지는 편이지만 단골 고객및 신규고객 객단가가 높아서 좀더 판매한수준입니다."}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"여름 피스테 상품(냉감소재) 퓨어드라이 소재 이번주 입고된 신상품 스트로베리 엔크림 컬렉션 등등 잘나갔습니다. 주고객층은 30~40대"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"신규 및 기존 고객들이 귀여운 디자인과 프린팅때문에 많이 구매하셨습니다. 이왕사시는거 쇼츠와 함께 같이 구매하시는경우가 더많습니다."},{"cat":"용품","topic":"","fb":"연계판매하기 쉬운 색조합이였지만 생각보다 많이 구매는 이루어지지 않았습니다."},{"cat":"신발","topic":"","fb":"볼트프로는 확실히 색감이 새로들어오면서 부족했던 테니스화 SKU를 채워줬습니다. 색상또한 고객님들이 좋아하는색감이 많아 반응이 좋습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"여전히블레이드와 롤랑가로스 클래시 상품이 주를 이루고있습니다."},{"cat":"팀스포츠","topic":"","fb":"주력상품 입고와 신상품 입고가 시급한 상황입니다."},{"cat":"상설","topic":"상설 신발 및 쉴드백팩 슬링백현장반응은 ?  가격 및 상품에 대한 고객반응등","fb":"ㄴ"},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"지난주보단 입점객이 좀늘고 고정단골고객들이 많이오셔서 판매가 수월했습니다."},{"cat":"기타","topic":"수시사은품 전반 매장 피드백 (스크런치 / 그립커버) 좋은점, 아쉬운점 + 차후 사은품 제안 아이템","fb":"그립커버는 판매를 원하실정도로 반응이 매우좋습니다. 스크런치는 이제들어와서 반응을 좀봐야할거같습니다."}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"운동목적이 아직까진 대부분입니다. 특히 스트로베리 라인들또한 대부분 테니스 목적구매 고객들이 전부입니다. 남성분들도 아직까진 시어아이스와 퓨어드라이 원단들구매가 대부분이고 90%는 테니스 목적구매입니다.ㅣ"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"1.색감의 종류가 많아져 고객님 선택권이 많아졌습니다. 색감 반응또한 좋아 고객들이 구매력이 높습니다 (핑크 판매 1등) 2. 조거 팬츠와 같은 상품들이 훨씬 고객들에게 반응이 좋습니다. 시어아이스 팬츠는 나풀거리는 와이드한 핏감때문에 고객들이 싫어하십니다."},{"cat":"용품","topic":"","fb":"핫썸머 시즌이 되가면서 디펜더 마스크 및 냉감"},{"cat":"신발","topic":"","fb":"예약하신분들이 많아서 기다리는 고객들이 많았습니다. 또한 귀여운 디자인으로 신상품 테니스화중에 가장 이슈화됬습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"BNA라켓이 구매력이 매우 높아졌습니다. 아쉬운건 260~65g 무게가 발매가안되어 이탈되는 고객들이 꾀생깁니다 디자인은 여성전용인데 무게 선택에서 아쉬움이 남습니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션과 evo nxt 가 입고되어 그전보다 확실히 고객들의 구매력이 많이 올렸습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"입점객수는 전주와 비슷합니다."},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"아무래도 사은품으로 나오는 스킨케어라 고객들에게 반응은 좋습니다."}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"대부분 기능성 반팔티 라인들 판매가 주를이뤘습니다. 특히 시원한소재의 냉감상품들이 판매율이 남녀 가리지않고 잘판매되었습니다. (퓨어드라이 에이스)"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품) 드로우스트링 백팩 V2 신규 컬러 반응  (내/외국인 비중,","fb":"신가을상품 빠른 입고가 판매로스에 시너지작용을줘서 품절된상품을 대처할수있게되었습니다. 빠른 리오더로 고객들에게 기다림없이 판매할수잇도록 물량을 보충해야할거같습니다."},{"cat":"용품","topic":"","fb":"신규 컬러감 대부분 고객님들이 매우 만족하는반응이였습니다. 색다른 컬러감하나로 완전 다른제품처럼 보일만큼 매우 예쁩니다."},{"cat":"신발","topic":"","fb":"리오더 및 신규컬러 둘다 반응이 매우좋습니다. 에어리 특성상 여자분들이 매우좋아하시는데 기존에 문의하셨던부들도 새로운색상으로 바꾸는 추세입니다. 색상 너무이쁩니다.!"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"BNA와 같은 예쁜 한정판 라켓들이 여성고객들의 마음에 불을 지핍니다. 여성분들은 확실히 예쁜라켓이 먼저기때문에 한정판과같은 예쁜라켓이 출시되면 꼭 여성 그람수까지 대량수입해야할거같습니다."},{"cat":"팀스포츠","topic":"","fb":"주력상품인 에볼루션과 에보넥스트의 보충으로 판매율이 오르고있습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"6월말이 되갈수록 입점객수가 줄어들고있습니다. 7월 휴가철에 고객들에게 어필할수있는 상품들위주로 판매해봐야할거같습니다."},{"cat":"기타","topic":"* 26FW 상품교육북 매장의견   - 상품교육자료를 직관적으로 볼 수 있게 품번/상품명 검색 시, 세일즈포","fb":"기존에는 찾아보고힘들었지만 이젠 바탕화면에 다운받아서 일일이 검색하여 상품교육을 받을수있다는게 너무 편리합니다!!!"}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"퓨어드라이 에이스 모델 과 멜로우 크롭티와 같은 시원하고 짧은 상품들이 30~40대 여성분들이 많이 구매하셨습니다. 남성분들은 냉감소재의 반팔티 혹은 퓨어드라이 소재만 구매하셨고 바지는 매우얇은소재의 냉감소재만 구매하는추세입니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"남성분이나 여성분들 반바지 기장김이 좀 있는(무릎까지오는 5부바지) 스타일의 상품들을 꾀나 찾으십니다. 여성분들은 특히나 바지가 너무짧아서 구매못하시는 경우가 상당히 많습니다."},{"cat":"용품","topic":"","fb":"아직까진 고객들이 구매까지 많이 이루어지지 않았지만 반응들은 확실히 오는편입니다. 하지만 드로우스트링은 V2가있는데 굳이 V1을 추가로 만들어내는건 불필요하다 생각합니다. V1과 V2의 상품 피로감이 매우심하기때문에 V3와같은 신상품 디자인이 필요합니다."},{"cat":"신발","topic":"","fb":"색감이 매우 예뻐서 고객들반응은 좋은편입니다. 판매율은 더지켜봐야할거같습니다ㅏ."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"디파이어 문의 반응이 좋습니다. 스펙만 골고루 (여성무게)까지 물량감잇게 나온다면 큰반응일거같습니다. 중요한건 자세한 스펙과 성능에대해서 디테일한 교육이 필요하다고 생각합니다. (울트라 V5출시때와같은)"},{"cat":"팀스포츠","topic":"","fb":"에볼루션,EVO 와같은 주력상품위주의 판매"},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"입점객은 전주대비 확줄었습니다. 고양스타필드 자체 입점이 줄었기때문에 다음주를 지켜봐야할거같습니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"1박스"},{"cat":"기타","topic":"신규라켓 디파이어\n7/24일(금) 15시~18시 시타회 참석여부\n작성예시) 매니저 1, 직원 1","fb":"매니저1"}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"테크 크루 티셔츠,반바지 세트가 판매가 매우좋았습니다. 하지만 국내 고객들에겐 반응이 거의 없었고 대부분 외국인 고객들의 비중의 판매 였습니다.(테크 크루 한정)"},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"입점여성분들 대부분 여성전용 티셔츠를 더많이 찾으십니다. 여성 라인으로 나오는 반팔티셔츠가 수요가 많은만큼 SKU를 늘려야할거같습니다. 한참 잘팔려야할 시어아이스 치마 바지가 입었을때 허리와 골반쪽 핏이 양옆으로 튀어나오는 현상때문에 판매가 저조해서 매우아쉽습니다."},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"바이저들은 전년도보다 SKU가 늘고 예쁜색감의 상품들이 많이 나와 고객들이 매우 만족해하십니다. 올어라운드 짐백은 아직까진 큰반응은 없습니다 좀더 지켜봐야할거같습니다."},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"볼트 프로,에어리,리스폰스 모두 신규 색상 출시로 고객들에게 자신감잇게 셀링할수있게되었습니다. 또한 에어리 뉴컬러감들은 기존 컬러감을 잊게만드는 아주예쁜컬러여서 신어보시는 대부분 고객들이 구매로 이어집니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"오로지 디파이어만 찾는 한주였습니다. 초도 한정판이라 소량일거라곤 생각했지만 마케팅에 비해 너무 소량이라 고객들의 아쉬움이 크게 와닿는 한주였습니다. 10월 재출시로 안내 중이긴하나 10월까지 열기가 이어갈지가 의문입니다."},{"cat":"팀스포츠","topic":"2-2. 팀스포츠 판매 특이사항","fb":"주력상품 에볼루션과 퓨어샷 에보넥스트만 반응이 좋습니다."},{"cat":"기타","topic":"고객 입점 동향","fb":"휴가시즌이  시작되면서 테니스 목적구매 고객들이 많이 줄었습니다. 또한 대부분 디파이어 구매를위해 오시는분들이 많았지만 재고부족으로 8월, 10월에 출시하는 스펙 후불 주문예약으로 방문하신분들이 주를이뤘습니다."}]},"LF광양":{"5월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"금주 고객층은 40~50대 비중이 가장 높았으며, 가볍고 시원한 착용감을 선호하는 경향이 두드러졌습니다. 특히 매쉬 소재와 시어아이스 제품군에 대한 관심이 높았고, 직접 만져보거나 착용해보는 등 터치율이 전반적으로 우수하게 나타났습니다. 기온 상승에 따라 통기성과 쾌적함을 중시하는 고객 반응이 뚜렷하게 확인되었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  **신발 : 에어벨 W 고객 반응 (착화, 디자인","fb":"금주에는 40~50대 고객 비중이 높았으며, 더워진 날씨 영향으로 시원하고 가벼운 착용감을 선호하는 반응이 두드러졌습니다. 특히 시어아이스 원단과 매쉬 소재처럼 통기성이 우수한 제품군의 관심이 높았고, 실제 판매도 해당 제품 위주로 활발하게 이루어졌습니다."},{"cat":"용품","topic":"","fb":"기온 상승으로 야외활동과 운동량이 늘어나면서 손목아대 판매율이 증가한 것으로 보입니다. 특히 가볍고 간편하게 착용할 수 있어 관련 용품군 내에서 자연스러운 추가 구매로 이어졌습니다."},{"cat":"신발","topic":"","fb":"볼트 프로와 비교했을 때 리스폰스 프로 1.5의 판매율이 더 높게 나타났습니다. 착화감과 안정적인 착용감에 대한 고객 만족도가 높았으며, 두 제품을 비교한 뒤 리스폰스 프로 1.5로 구매가 이어지는 경우가 많았습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"금주 기준으로는 롤랑가로스 에디션을 찾는 고객 문의는 아직 거의 없었습니다. 현재 고객 관심은 주로 블레이드 V10 출시 소식에 집중되어 있는 것으로 보입니다. 수도권에 비해 지방 상권은 신제품에 대한 초기 반응이 다소 늦게 나타나는 경향이 있어, 출시 직후 즉각적인 문의보다는 시간이 지나면서 점진적으로 관심이 확대될 가능성이 높아 보입니다."},{"cat":"팀스포츠","topic":"","fb":"중·고등학생 고객층에서는 농구공에 대한 관심이 여전히 높아 관련 문의와 매장 방문이 꾸준히 이어지고 있습니다. 다만 현재는 관심 단계에 머무르며 즉각적인 구매로 연결되는 비중은 높지 않았습니다. 다만 매장 내 농구공 취급 여부를 인지한 고객이 늘어난 만큼, 추후 재방문을 통한 구매 가능성은 충분히 있을 것으로 보입니다."},{"cat":"상설","topic":"쉴드백팩(정상판매율 65%), 슬링백(정상판매율 27%)의 판매부진 사유는 ? 상설 테니스 카테고리 의류의","fb":"기존에는 할인 판매를 하지 않는 매장이라는 인식이 있었으나, 최근에는 세일 상품 운영에 대한 고객 인지가 점차 높아지고 있습니다. 이에 따라 할인 상품만 단독으로 구매하기보다 정상 상품과 함께 비교·구매하는 사례가 늘어나고 있으며, 현재 정상 상품과 상설 상품의 판매 비중도 약 5:5 수준으로 나타나고 있습니다. 다만 상설 상품은 사이즈 구성이 제한적이고 추가 주문이 원활하지 않아, 고객 관심이 있더라도 원하는 사이즈 부재로 인해 실제 판매 전환까지 이어지기 어려운 경우가 발생하고 있습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"5월 초 연휴 기간에 소비가 상대적으로 집중되었던 영향으로, 금주 주말 매출은 이전 주말 대비 다소 부진한 흐름을 보인 것으로 판단됩니다. 초기 소비가 선반영되면서 주말 추가 구매 수요가 다소 둔화된 것으로 보입니다."}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"30~40대 고객 유입이 많았으며, 활동성과 실용성을 중시하는 고객층 중심으로 피스테 종류의 반팔 제품 판매 반응이 좋았습니다. 특히 가볍고 편하게 착용 가능한 스타일 위주로 구매가 이어졌습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"30~40대 고객 유입이 많았으며, 기능성 제품에 대한 선호도가 높게 나타났습니다. 특히 땀 배출과 통기성이 우수한 제품에 대한 관심이 높아지면서 관련 상품 위주로 판매가 이루어지고 있습니다. 그중에서도 퓨어드라이 원단과 시어아이스 원단 제품에 대한 고객 반응이 좋은 편이며, 착용감과 시원한 소재감에 대한 만족도가 높아 구매로 이어지는 경우가 많았습니다."},{"cat":"용품","topic":"","fb":"드로우 스트링 백팩은 신발 분리 수납이 가능한 실용적인 기능으로 고객 반응이 좋은 편이며, 운동용 및 일상 겸용으로 활용도가 높아 판매가 원활하게 이루어지고 있습니다. 특히 신발과 의류·소지품을 분리 보관할 수 있는 점이 구매 포인트로 작용하며 좋은 판매율을 보이고 있습니다."},{"cat":"신발","topic":"","fb":"메리제인 스타일 제품은 디자인에 대한 고객 호감도와 관심은 있는 편이나, 실제 구매로는 이어지지 않는 경우가 많습니다. 주된 이유로는 테니스화로서의 기능성에 대한 의문이 있어 실사용 가능 여부를 고민하는 고객이 많아 구매 결정까지 이어지지 않는 것으로 보입니다. 특히 착화 안정감이나 운동 시 기능적인 부분에 대한 우려가 판매 저해 요인으로 판단됩니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"디자인적인 조합에 대한 고객 반응은 좋은 편이나, 입문 고객이 사용하기에는 다소 높은 가격대로 인해 실제 판매로 이어지기에는 어려움이 있습니다. 특히 기능성과 가격을 함께 고려하는 입문 고객층에서 구매 부담을 느끼는 경우가 많았습니다. 고객층은 내국인 비중이 100%이며, 여성 고객님들의 관심과 반응이 상대적으로 좋은 편입니다."},{"cat":"팀스포츠","topic":"","fb":"야구 글러브에 대한 고객 문의가 종종 발생하고 있으며, 특히 입문용 및 취미용 제품에 대한 관심이 있는 편입니다. 다만 실제 구매까지 이어지는 비중은 높지 않으나, 브랜드 인지도 및 스포츠 카테고리 확장에 대한 관심으로 문의가 꾸준히 발생하고 있습니다."},{"cat":"상설","top 이 높았으나 현재는 상설 상품만 운영되고 있어 가격 메리트가 이전 대비 크지 않게 느껴지는 것으로 보입니다.상설 전환 이후 상품 다양성이 감소했다는 고객 의견이 많았으며, 상설 신상품 및 신규 SKU 보강을 통해 고객 선택 폭 확대와 체류시간 증가가 필요하다고 판단됩니다."},{"cat":"기타","topic":"전주대비 고객 입점 현황","fb":"전주 대비 고객 유입이 약 40-50% 감소하였으며, 여름 비수기 영향으로 점 내 유동 인구 또한 감소한 것으로 판단됩니다."}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"여전히 퓨어드라이와 시어아이스 소재 제품의 터치율과 판매율이 높게 나타나고 있습니다. 무더운 날씨의 영향으로 기능성 냉감 소재에 대한 고객 선호가 지속되고 있으며, 착용감과 기능성을 중시하는 고객들의 구매가 꾸준히 이어지고 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"신제품 디파이어와 블레이드 V10에 대한 관심이 높아지면서 라켓 문의가 전주 대비 증가하였습니다. 특히 기존 블레이드 사용자들의 교체 및 모델 비교 문의가 많았으며, 신규 고객들의 관심도 함께 높게 나타났습니다."},{"cat":"상설","topic":"상설 판매 현황","fb":"현재 가장 큰 문제는 상설제품 특성상 인기 사이즈의 공백이 많아 구매를 포기하는 고객이 지속적으로 발생하고 있습니다. 제품에 대한 관심과 착용까지는 이어지지만 원하는 사이즈가 없어 구매로 연결되지 않는 사례가 많습니다.상설상품도 최소한의 사이즈 풀(M~XL 등)은 유지할 수 있도록 운영 기준 마련이 필요하다고 생각합니다."},{"cat":"기타","topic":"고객 입점 동향","fb":"전주 대비 디파이어·블레이드 V10 신제품에 대한 관심 증가와 여름 기능성 제품(퓨어드라이, 시어아이스)의 꾸준한 수요, 상설 신상품 입고에 따른 상품 다양성 확보로 고객 유입이 소폭 증가하였습니다."}]},"커넥트청주":{"5월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"20대고객들의 방문이 가장 많았습니다  퓨어드라이티 에이스티를 메인으로  브레이크쇼츠, 코트라인쇼츠 등 기본적이며  착용감이 우수한 제품들 위주로 판매가 되었습니다.  30대 후반 고객이나 40대고객들은 블레이드나 롤랑가로스에  터치가 많았고 상설 제품을 추가로 구매를 많이 하였습니다"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  **신발 : 에어벨 W 고객 반응 (착화, 디자인","fb":"여성고객들도 이제 얇은 긴팔이나 아우터제품들을 찾기보다는  시어아이스 원단이나 퓨어드라이와 같은 시원한 원단 위주로  터치와 판매가 일어나고 있습니다."},{"cat":"용품","topic":"","fb":"용품들의 판매율이 저조한 주였으며  가방을 구매하는 고객들도 구력이 오래되신 분들이  교체를 하기 위해 구매를 하였고 테린이 고객들의 방문이  적었기 때문에 드로우스트링백팩라인의 판매율이 없었습니다."},{"cat":"신발","topic":"","fb":"신발은 소모품이기 때문에 항상 판매율이 굉장히 뛰어나고  구매율이 굉장히 높은라인입니다. 주로 볼트프로를 메인으로  남녀노소 반응이 좋고 추가적으로 인트리그나 러쉬라인을  보셨습니다. 단골고객들 중 믿고 러쉬투어를 구매하신 고객들이 많은데  내구성 이슈로 아쉬움을 호소하는 고객들이 많았습니다"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"최근 들어 블레이드나 롤랑가로스 런칭에 있어  라켓의 관심도가 높아졌습니다. 기본적으로 4~50대 고객들이  선물용으로 구매하는 경우가 가장 많았으며  블레이드가 구력,성별을 가리지 않는 호불호 없는 라켓임을  증명하였습니다"},{"cat":"팀스포츠","topic":"","fb":"롤랑가로스에 대해서 목적유입보다는 충동적으로 구매하는 경우가 더 많으며 클래시100ul의 반응이 가장 좋았습니다. 롤랑가로스 컬러의 드로우스트링백팩,  그리고 에펠티셔츠의 연계 판매가 가장 좋았고  디자인 특성 상 여성고객의 관심도가 남성에 비해 높았습니다."},{"cat":"상설","topic":"쉴드백팩(정상판매율 65%), 슬링백(정상판매율 27%)의 판매부진 사유는 ? 상설 테니스 카테고리 의류의","fb":"가장 큰 이유는 오로지 테니스용으로만 사용이 가능한 이미지 때문입니다.  추가로 디자인도 부담스러워 하는 고객들도 계시고  아무래도 드로우스트링백팩라인이 워낙 선호도가 강하다보니  자연스럽게 판매가 부진하다고 판단됩니다"},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"트래픽은 비슷하였고 행사로 인스타를 보고 찾아오신 테니스고객이 정말 많았습니다. 추가적으로 단골고객들이 감사하게도 지인분들까지 많이 데려와주셔서 앞으로 잠재고객도 많이 확보가 되었습니다. 40대고객들이 가장 많았습니다"}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"2~30대 고객들의 입점율이 가장 높았으며 시어아이스라인의  판매율이 가장 높았습니다. 시어아이스가 아니라면 대부분  퓨어드라이 혹은 블락티셔츠와 같은 기본라인에서만 터치가 일어났고  남성에서는 임팩트 반팔 아노락 색감 덕분에 터치가 종종 일어났습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"어두운컬러보다는 여름이 되니 밝은컬러의 선호도가 확실하게  올라갔음을 체감하고 있습니다.  추가적으로 화이트+레드조합도 물론 인기 컬러지만  그린컬러의 선호도가 정말 높은편이기에  시어아이스 여성라인 중 그린이 없어서 아쉬움이 있습니다."},{"cat":"용품","topic":"","fb":"여름성 아이템의 반응은 아직 크게 반응 없습니다.  하지만 본격적으로 더운날씨가 시작 된다면 충분히 수요가 발생할 것으로  보입니다.  드로우스트링백팩 v2 재입고가 된 이후 확실하게 가방 조닝의 분위기가  다채로워졌으며 가방쪽을 보고 입점하는 고객이 늘어났습니다."},{"cat":"신발","topic":"","fb":"에어벨 입고 후 터치는 종종 있으며 큰 판매는 일어나지 않았지만  윌슨에서 테니스화를 제외한 일반 라이프스타일 쪽에서는  가장 수요가 강한라인이 될 것으로 보여집니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"롤랑가로스의 터치는 종종 일어나고 있으며  디자인 요소 중 가장 크게 작용하는 것은  전체적인 컬러 조합을 보고 터치하는 경우가 가장 많습니다.  블레이드 v10의 반응은 생각보다 블레이드의 성능이 변화되어  구매하기보다는 디자인에 끌리거나 단순 구매욕으로 인해  판매가 되는 상황이 자주 발생하는 것으로 보여지고 있습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공의 판매율은 항상 잘 일어나고 있고  다양한 스포츠에 전문성을 띄고 있는 브랜드라는 것을  각인시켜주고 있어 여러부분에서 도움이 많이 되고 있습니다."},{"cat":"상설","topic":"1.  W251002TPH21 정상판매율 상위권이나 판매부진사유는 ?  2. 상설 용품 (모자, 양말 등 )","fb":"터치가 자주 일어나는 제품이지만  가장 큰 이유는 비춤이 있는 제품이기 때문에 섣불리 고객한테 먼저  추천드리기 부담이 있는 제품입니다.  상설 용품에서는 가격저항은 정상에서도 크지 않는 편이며  스큐도 다양해 연계판매에 있어 잘 되고있습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주에 비해 입점율은 비슷하였습니다.  주로 20대 고객의 입점
