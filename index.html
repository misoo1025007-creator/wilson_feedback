며  단골고객들에게는 테니스고객들에게도 판매가 되고 있습니다.  시원해보이는 그래픽 그리고 대부분 로고플레이에만 집중 되어있는  디자인이 대부분 이였지만 새로운 그래픽에 흥미를 느끼는 것 같습니다.   청주점에서는 링거슬림 티셔츠에 대한 반응 보다는 에이스라인의 반응이 더 좋습니다.   선셋매치 하의의 경우 확실한 점은 테니스인들에게 환영을 받는 라인은 아닙니다.  디테일을 자세하게 보기보다는 전체적인 원단과 핏이 이질감이 들 수 있기에  긴 기장을 좋아하시는 연령대 있으신 남성들에게 터치가 일어나고 있습니다."},{"cat":"용품","topic":"","fb":"선셋매치 볼캡,크루삭스의 연계판매는 아직 크게 이루어지지 않고 있으며  본격적인 여름의 시작과 휴가철이 시작되는 6월정도는 되고 완전히 여름복장을 찾는 고객들에게 함께 연계판매로 이루어질 것으로 보여집니다"},{"cat":"신발","topic":"","fb":"에어벨의 터치는 종종 있으나 아직 가격저항이 일어나고 있습니다.  아직 날씨가 애매하기 때문에 6월은 되어야 고객들께서 메쉬라인 신발에  관심을 둘 것으로 보여집니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"라켓의 터치가 크지는 않으나 종종 블레이드와 롤랑가로스의 터치가 일어나고 있고 디자인에 대한 긍정적인 피드백이 많습니다"},{"cat":"팀스포츠","topic":"","fb":"농구공의 판매는 원활하게 되고 있으며  빠른 농구공 라인의 리오더가 필요할 것으로 보여집니다."},{"cat":"상설","topic":"상설 조닝 내에 필요한 POP나 연출물, 집기 등등  추가적으로 설치필요한것? 신규로 필요한것?","fb":"상설조닝에 대한 추가적인 필요한 집기는 없습니다.  지금도 충분히 정상라인보다 상설라인의 터치가 많은 상황이고 정상조닝과 차이가 나게끔 연출이 될 경우 오로지 상설만  보는 경우가 생기기 때문에 구매했을 때의 고객 만족도와  객단가면에서 판매로스가 발생할 수 있다고 생각됩니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주와 비슷한 트래픽이 나왔고  평일은 평균 3팀정도 입점이 이루어지고  주말 평균 7팀정도 방문이 이루어지고 있습니다.  대신 전체적인 연령대가 낮기 때문에 들어오는 고객은  윌슨을 알고 입점하시는 고객이기 때문에  판매율은 굉장히 높은 상황입니다."},{"cat":"","topic":"1) 에어벨 W의 판매호조 사유 - 주 구매 고객층 (테니스/일반) (테니스신발이 아닌데 어떤고객이 구매하는","fb":"에어벨 W 가장 큰 이유는 윌슨 고객들이 좋아하는 색감인 점이 가장 크고  디자인 또한 타 브랜드에서 쉽게 볼만한 디자인이 아니기 때문입니다.  주로 일상용으로 보시는 경우가 많습니다.   선셋매치  테니스 일반고객 5:5인 상황이고  일반고객들에게는 시원해보이는 그래픽에 좋은 원단을 가진 반팔이기 때문에  무난하게 구매하는 편이고  테니스고객들에게는 로고플레이에 지루함을 느끼는 단골고객들 위주로  판매가 되고있습니다."},{"cat":"기타","topic":"신규 라켓 출시 프로모션 진행을 위한 그립커버 사전 주문  박스당 수량 30개, 개당 단가: 3,000원(V","fb":"2박스"}],"6월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"2~30대 고객들의 방문이 많았습니다  여성고객보다는 남성고객의 방문이 주를 이루었고  코트라인팬츠, 그리고 퓨어드라이를 중심으로 판매가 되었습니다.  5,60대 고객의 방문도 있었는데 연령대가 높을수록 디자인보다는  원단을 중요시하게 보셨습니다. 추가로 코트라인 팬츠는 모든 연령대에게  호불호 없이 판매율이 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품 - 드로우스트링 백팩V2 (아이보리, 화이트) 재입고 후 반응,","fb":"남성 임팩트 아노락,시어아이스 상의류의 터치율이 생각보다  많이 일어나고 있습니다. 터치율에 비해 판매하기 까다로운 라인인데  남성고객들이 중요시하는 부분은 원단도 좋고 디자인도 이쁘지만  비춤 때문에 걱정이 많으시고 저항이 많이 일어납니다."},{"cat":"용품","topic":"","fb":"드로우스트링백팩 화이트보다는 아이보리가 역시 판매율이 정말 좋으며  특히 현재는 롤랑가로스 시즌이 겹쳐 세일즈 할 수 있는 명분이 많습니다.  그 다음 인기컬러가 화이트, 그 다음으로 그린이 판매율이 높습니다."},{"cat":"신발","topic":"","fb":"사이즈 부재가 정말 아쉽습니다.  볼트프로 그린컬러의 경우는 남녀노소 나이 상관없이 호불호가 없는 컬러이기에  그린의 경우는 사이즈가 넉넉하게 있었으면 하는 생각이 듭니다. 볼트프로 사이즈 부재에 있어 리스폰스프로의 판매율이 올라가고 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드,클래시가 메인으로 판매가 되었습니다.  세종,대전에서 오신 고객들이 많았으며 대부분 테니스를 시작하는  테린이 고객들이 많았습니다. 금주 주말 블로그를 보고 방문하신 고객이  4팀이 있었는데 만큼 이슈 아이템만큼은 네이버에서 찾아보고 오시는 것을 알 수 있었습니다."},{"cat":"팀스포츠","topic":"","fb":"금주는 농구공 판매가 전주에 비해서는 저조했는데  전체 입점고객이 평소 1,20대에서 금주는 2,30대의 고객의 방문율이  높았기에 자연스럽게 감소된 것으로 판단됩니다."},{"cat":"상설","topic":"금주 상설 추가 10% 현장 반응은 ? 매장별로 가장 효과좋앗던 아이템, 사유는 ?","fb":"저조했던 여성 상설라인의 판매가 늘어났으며  에어브리즈 볼레로, 혹은 스위프트 하의라인의 판매가 늘어났습니다.  평소 남성라인의 가격저항은 거의 없었으며 여성상설라인은 비교적 할인가가  적었기에 고객들에게 조금 더 크게 와닿은 것으로 생각됩니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"입점객은 전주와 비슷하였으나 30대 고객의 방문비율이 조금 더 늘었습니다.  타지에서 온 처음보는 고객들이 많았으며 서울,세종,대전 쪽에서 유입이 많이 되었습니다. 대부분 구력자보다는 입문자고객들이 많았고 라켓의 판매가 높았습니다."},{"cat":"기타","topic":"타 브랜드 프로모션/ 행사현황 (POP내용 등 참조)","fb":"르꼬끄 행사"}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"금주 2,30대 고객들의 비율이 가장 컸습니다.  여성 FW신상 의류들이 출시하면서 판매량이 증가하였고  셋업구매율이 전주에 비해 확연히 증가하였습니다.   특히 남녀노소 코어티셔츠와 함께 셋업라인으로 매치를 많이 하였으며  부진했던 하의류들도 판매량이 함께 증가하였습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"스토리베리앤크림 컬랙션은 현장에서 당장 반응은 없지만  터치율도 일어났고 반응도 충분히 일어날 것으로 보여지고 있습니다.  라이프스타일 목적도 있겠지만 대부분은 테니스에 포커스가 맞춰져있고  신규고객보다는 기존고객 위주로 터치가 이루어졌습니다."},{"cat":"용품","topic":"","fb":"피키 크루 삭스에 대해 아직 반응은 크게 없으나  컬러감과 디자인 자체에 호불호는 크게 없을 것으로 보여집니다.  기존 비슷한 모델인 클래식 스트라이프 삭스보다 높은 판매량이  나올 것으로 생각됩니다."},{"cat":"신발","topic":"","fb":"볼트프로 신규 입고로 인해 고객들 반응이 좋고  판매까지 이루어지고 있어 전주에 비해 신발 판매량이 올라왔습니다.  가장 인기 컬러인 그린컬러의 사이즈 부재가 아쉽습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"금주 라켓판매량은 크게 없었으며 최근 롤랑가로스의 터치가 증가하고 있습니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션의 부재로 인해 농구공 판매량에서  감소되는 것을 확인하고 있습니다.  포지, DRV라인 보다는 에볼루션,레트로 라인이  반응이 월등히 좋습니다"},{"cat":"상설","topic":"상설 신발 및 쉴드백팩 슬링백현장반응은 ?  가격 및 상품에 대한 고객반응등","fb":"먼저 터치를 하는 제품은 아니나, 가격을 들었을 때 판매율은 굉장히 높을정도로  가격에 대해서는 대부분 만족을 하십니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"입점율이 점점 낮아지고 있어  근처 체육사와 롯데아울렛 디아도라 매장를 다녀와봤는데  롯데아울렛 자체의 트래픽은 높았지만 디아도라 매장 자체의  유의미하게 구매하는 사람은 거의 없었습니다.  체육사도 동일하게 라켓,신발과 같은 메인 용품보다는  스트링, 혹은 장갑 등 보조 용품들의 판매만 주로 일어나는 것으로 확인 되었고  현재 청주 테니스인들이 전체적으로 감소되었거나 , 테니스 의류,용품에 대해  크게 필요함을 느끼지 않는 시기인 것으로 생각됩니다."},{"cat":"기타","topic":"수시사은품 전반 매장 피드백 (스크런치 / 그립커버) 좋은점, 아쉬운점 + 차후 사은품 제안 아이템","fb":"전반적으로 고객들의 반응은 좋은 상태입니다. 특히 컬러감에 대해서 윌슨의 대표컬러이기 때문에 남녀노소 호불호가 없는 상태입니다."}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"아직 휴가철로 인해 제품을 구매하는 고객은 없었습니다.  신상 퓨어드라이류를 다양하게 보셨고 남성 코트라인팬츠도  인기를 끌었습니다.  대부분 운동복으로 보시는 남성고객들이였고  휴가목적으로 터치는 아직 없었지만 선셋매치류를 가장  많이 보지 않을까 싶습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"퓨어드라이 FW신상 컬러 반응 굉장히 좋습니다.  터치도 많고 판매도 원활하게 일어나는 중입니다.  다만 아쉬운 점은 로고 컬러가 애매한 부분이기에  같은 컬러의 하의를 찾기도 어렵고 같은 컬러의 하의류가 나온다하여도  부담스러울 수 있을 거 같습니다.  여성고객 여름성 긴바지 수요 있습니다.  일반 스포츠브랜드에서 나오는 츄리닝 느낌보다는 최근에 나왔던  시어아이스 원단과 디자인 핏, 알로에서 나오는 느낌의 팬츠가  윌슨에서도 충분히 메리트 있을 것으로 보여집니다."},{"cat":"용품","topic":"","fb":"금주 모자와 가방의 판매율이 전주대비 올라왔습니다.  특히 모자의 터치가 많았는데 더운 날씨 머리가 뜨거워  필요성을 느끼고 오시는 고객들이 많았기에 판매하기에 수월했습니다."},{"cat":"신발","topic":"","fb":"신규 볼트프로1.5의 판매도 좋았고 기존에 있던 볼트프로1.5 그린컬러의  판매율은 여전히 강세였습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드를 중점으로 고객의 터치가 좋았고  디자인에 대해서 초반보다 이쁘다는 피드백이 많아지고 있습니다.  다른 분들이 쓰는 것을 많이 봐서 왔다는 고객들도 다수 있는 것으로 보아  튀는 색감, 블레이드의 네임드로 인해 바이럴이 잘 되가고 있다고 보여집니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션,레트로볼,에보넥스트 등 다양하게 판매가 되었고  전주비해 1,20대 고객의 입점이 올라가 농구공 판매량도 자연스럽게  올라왔습니다."},{"cat":"상설","topic":"상설 제품 운영매장 전용 VM가이드 연출 후 현장 반응은 ?","fb":"VM가이드 연출 후 조닝라인이 더 깔끔해졌습니다.  앞으로도 VM가이드에 상설라인도 같이 제시해주시면  도움이 많이 될 거 같습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"커넥트현대청주점 1주년 여러 팝업으로 인하여  점포 트래픽이 올라갔습니다. 하지만 대부분 환승연애 인풀루언서 우진, 뉴진스님 팝업스토어로 인해 1,20대의 트래픽 위주로 증가하였기에 스포츠 매출의 눈에 띄는 증가는 없었습니다."},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"사은품이기에 좋아하시기는 하셨지만 아무래도 화장품 쪽은 민감한 분들이 많고 다른 사은품들과 비교해 필요로 인해 확 와닿는 사은품은 아니었던 것 같습니다."}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"현재 판매되는 대부분 제품이 신상 의류 위주로 판매 되어 가고 있습니다.  주로 다양한 퓨어드라이류 위주로 판매가 되어가고 있으며  남성라인의 경우 무더위로 인해 엘리트 헨리 티셔츠, 여성은 멜로우 티셔츠도  같이 터치율이 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품) 드로우스트링 백팩 V2 신규 컬러 반응  (내/외국인 비중,","fb":"점점 기온이 올라감에 있어 독특한 디자인, 혹은 여러 원단을 보기보다는   냉감 원단, 혹은 땀에 달라붙지 않는 시어아이스 원단의 터치율과 판매량이 좋습니다. 최근 들어 핑크라인의 스펙트럼이 넓어졌는데 실질적으로 판매가  이루어지기에는 고객들이 부담을 갖는 것으로 보여집니다."},{"cat":"용품","topic":"","fb":"한눈에 띄는 컬러로 백팩라인 전체 조닝이 밝아져서  매장 밖에서도 눈에 잘 띄고 있습니다.  다만 부담스러운 컬러감이기에 아직 판매까지는 이루어지지 않았지만 추후 드로우스트링백팩v1 고객들이 추가 구매를 할 때  충분히 고려해볼만한 제품으로 보여집니다."},{"cat":"신발","topic":"","fb":"에어리의 경우도 다양한 라인업이 입고되며  기존 에어리를 좋아하던 고객들은 더욱 관심을 보일 것으로 보여지며  2~30대의 터치율이 대부분입니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"금주라켓판매는 없었지만 구경오시는 고객들에게  파이썬에 대해서 설명을 계속해서 드리는 중이며  잠재고객을 확보하는데에 힘을 쓰고 있습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공의 관심도는 금주 역시 높았으며  레트로볼,에볼루션 위주의 판매가 이루어졌습니다."},{"cat":"상설","topic":"동업계 브랜드 상설 FW 입고 현황 및  주로 나가는 아이템 현황은 ?","fb":"본격적으로 f/W를 출시한 브랜드는 없어보이며  아직까지 역시 반팔 반바지가 주력으로 보입니다.  대표적으로 HDEX가 보이드행사를 계속해서 하는 중인데  전체 60% 2만원대 반팔이 주력으로 판매 되어가고 있습니다.  추가적으로 르꼬끄,휠라 역시 5~60%할인율 제품들이  메인으로 판매 되는 중입니다. 추가적으로 무신사스탠다드 ~80% 할인행사 중입니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주에 비하면 1주년프로모션이 시작되는 주였기에  트래픽은 확연히 낮아졌습니다.  하지만 타브랜드도 마찬가지로 매출에는 큰 변화가 없으며  점포트래픽과 스포츠트래픽은 별개로 보여집니다.  주로 2030 고객들의 방문이 많았습니다."},{"cat":"기타","topic":"* 26FW 상품교육북 매장의견   - 상품교육자료를 직관적으로 볼 수 있게 품번/상품명 검색 시, 세일즈포","fb":"기존 교육자료들과 확연하게 달라진 시스템으로 이러한 기능들은 현장에서는 정말 많은 도움이 됩니다. 감사합니다."}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"신상 퓨어드라이 라인 위주로 판매 되었으며  멜로우 라인도 터치가 많았습니다.  작년 같은 시기 신상을 비교하였을 때 반응이 좋으며 판매율도 올라가고 있습니다"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"남성라인이 많이 부족합니다.  여성은 현재 스큐도 다양하고 종류도 다양한데  남성은 얇은 긴팔도 없고 원단도 한정적이며  남성고객들이 아쉬워 할 때가 종종 있습니다."},{"cat":"용품","topic":"","fb":"드로우스트링백팩 아직은 큰 반응 없지만  v1라인의 신규컬러들의 터치가 많습니다.  윌베어 키링 고객들의 터치가 존재하고  실제 판매까지도 이루어지고 있습니다."},{"cat":"신발","topic":"","fb":"청주점은 리스폰스프로 1.5 신상이 들어오지 않았으나  볼트프로1.5의 반응이 워낙 좋기 때문에  판매로스가 있다고 생각이 들지는 않습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"디파이어 라켓의 문의는 아직 없습니다.  현장에서 구경하러오시는 고객들은 주로  블레이드,롤랑가로스 라인에 관심이 많습니다"},{"cat":"팀스포츠","topic":"","fb":"농구공의 판매량이 높습니다.  문의 전화도 있고 레트로,에보넥스트,퓨어샷 등  다양하게 판매되고 있습니다. 최근들어 야구글러브에 대한 문의가 증가하고 있습니다."},{"cat":"상설","topic":"25FW 상설 신상품 입고 후 현장반응","fb":"단골고객들이 상설라인을 많이 기다린만큼  f/w에 대한 판매율은 정말 높았습니다.  Airveil 전 라인 모두 반응이 좋은데  작년에 디자인,원단 모두 마음에 들었지만  가격에서 저항이 일어났던 라인인만큼  30% 비교적 큰 할인율은 아니지만 가격저항 없이  판매가 일어나고 있습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"트래픽의 큰 변화는 없었고  단골고객들 위주의 방문이 주로 이루어졌습니다.  주말에는 서울에서 오신 고객들이 매출에 기여를 많이 해주었고  주 연령대는 30대가 가장 많았습니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"2박스"},{"cat":"기타","topic":"신규라켓 디파이어\n7/24일(금) 15시~18시 시타회 참석여부\n작성예시) 매니저 1, 직원 1","fb":"직원 휴가 미참석"}],"7월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"신상으로 입고 된 하퍼 크롭라인이 터치도 많았고  판매량도 높았습니다. 기본적으로 컬러감이 좋아 터치가 많이 존재하였고  포인트 줄 수 있는 디자인에 비해 가격대 또한 합리적이었기에  단골고객들에게 신선함을 주는 아이템군이었습니다."},{"cat":"의류","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신상 전반적인 고객 터치 및 피드백","fb":"26FW 아이템들은 대부분이 반응이 좋습니다.  터치율도 많지만 피팅했을 때의 판매율이 정말 높습니다.  다만 아쉬운 점은 남성 단골고객들도 많으신대 커플끼리 방문 후  남성라인은 신상으로 나온 라인이 퓨어드라이를 제외하고는  아예 없기 때문에 여성고객만 두둑히 구매하시고 남성고객은 빈손으로  떠나시는 경우가 계속해서 생기고 있습니다."},{"cat":"용품","topic":"2-1. 의류/용품/신발 판매 특이사항 - 드로우스트링 신규 반응","fb":"전체적인 조닝이 한층 밝아졌고 종류도 다양해졌습니다.  다만 방문고객 대부분 재방문 고객들이기 때문에  의류에 비해 용품은 이미 가지고 계신 분들이기 때문에  판매율이 의류에 비해 높지는 않은 상황입니다.  신규고객들에게는 다양하게 판매가 되고 있는 상황입니다."},{"cat":"신발","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신발 신규컬러 반응","fb":"볼트프로1.5에 대한 반응이 여전히 정말 좋습니다.  비교적 에어리나 리스폰스프로의 판매율은 저조하나  기 이유는 리스폰스프로1.5의 신규컬러 미입고 매장이고  청주점은 비교적 보수적이고 너무 튀는 디자인은 부담스러워하는 고객들이  많기에 볼트프로1.5로 많이 보십니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 - 디파이어 판매반응","fb":"사전예약은 한분 계셨고  나머지분들은 구경 오셨다가 충동적으로 구매를 한 고객들이었습니다.  반응은 정말 좋았고 친구따라 왔다가 갑자기 같이 구매 하실 정도로  신규라켓 런칭은 단골고객들에게 크게 와닿았던 것 같습니다.  윌슨라켓과 타브랜드라켓 고객 비중 5:5  테린이, 구력자는 2:8 정도로 대부분이 구력자였습니다.  윌슨에서의 스핀형라켓? 하시면서 고객들께서도 굉장히 귀를 열고 들어주셨습니다. 퓨어에어로 이야기를 많이 하였으며 스핀과 컨트롤을 함께 잡았다는 거에  많은 호감을 느끼셨던 것 같습니다."},{"cat":"팀스포츠","topic":"2-2. 라켓/팀스포츠 - 팀스포츠","fb":"에볼루션, 퓨어샷 위주로 판매가 되었습니다.  새로운라인은 없는지 궁금해하는 고객들이 조금씩 늘어나고 있습니다."},{"cat":"상설","topic":"상설 판매 어려운점·제안","fb":"25FW 소량입고 된 제품들이 기존에 있던 상설라인보다 판매량이 높습니다.  신규고객보다 단골고객 의존도가 높은 상권의 매장이기 때문에  현재 갖고있는 상설 SKU들로는 단가도 낮고 종류도 많지 않기에  메인으로 권해드리기에는 무리가 있는 것 같습니다."},{"cat":"기타","topic":"전주대비 고객 입점 현황","fb":"점포 트래픽의 변화는 크게 없었습니다.  강릉길감자 팝업으로 1~20대들의 고객들이 많았습니다"}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"퓨어드라이 티 위주로 판매가 되었고  반바지보다 스커트를 찾는 고객이 늘어났습니다.  고객들과 소통 중 대부분 고객들은 흰색,네이비 위주로만 가지고 있고  그 다음으로는 블랙컬러의 스커트를 찾는 고객들이 많았습니다."},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"현재 핑크색컬러 의류나 브라탑 위주의 제품들이  메인으로 작용하고 있는데 현실적으로 국내에서 착용할 수 있는 고객들은  그렇게 많지 않습니다. 그렇게 되면 여성,남성 모두 현재로서는 권해드릴 수 있는 라인이  퓨어드라이 뿐인데 추천을 드릴 수 있는 폭이 정말 좁습니다."},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"신상 올어라운드 라인의 터치는 아직 터치가 많지 않습니다 FW 모자는 착용 후 판매율이 높습니다."},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"볼트프로의 판매율이 좋습니다. 가장 인기컬러는 그린,블루였습니다"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"디파이어에 대해 여쭤보시는 분들이 증가하였습니다.  특히 98 덴스에 대해서 관심이 많으셨고  여성 스펙 출시 날짜에 대해서 여쭤보시는 분들고 간혹 계셨습니다."},{"cat":"팀스포츠","topic":"2-2. 팀스포츠 판매 특이사항","fb":"점포 트래픽이 낮아지면서 공 판매율도 자연스럽게 낮아졌습니다.  중,고등학생 친구들이 많이 구경합니다  고무로 만들어진 아웃도어 용 레트로볼이 신상으로 들어왔는데  실질적으로 고무로 된 농구공은 주연령대인 10대들이 선호하지 않는 라인이라  아쉬운 부분입니다."},{"cat":"상설","topic":"상설 판매 현황","fb":"단가도 확실히 낮은 상태이고  상설은 물량을 추가할 수 있는 부분도 아니기 때문에  상설메인으로 조닝을 바꿔 상설판매율이 올라갈 수 있도록  현장에서 더욱 노력해보겠습니다"},{"cat":"기타","topic":"고객 입점 동향","fb":"트래픽은 전주와 비슷했습니다.  점포 특성 상 트래픽과 고객 객단가가 많이 낮은 상태라  기대만큼 매출을 끌어올리지 못하는 상황이기에 아쉽습니다.   단골고객이 윌슨에서 이탈하지 않도록 주의하고  신규고객들을 만드는 것에 집중하고 있습니다"}]},"스타필드하남":{"5월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"어린이날과 어버이날이 있어서 가족단위 방문이 많았습니다. 또한, 본격적인 시즌이 시작되면서 그 동안 판매가 부진했던 테니스 고객들의 입점도 늘었습니다. 농구공과 글러브의 판매가 많았고 드로우의 부재 기간동안 문의나 주문도 많이 하셨습니다. 글러브 SKU를 늘려 운영했던 부분이 효과가 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  **신발 : 에어벨 W 고객 반응 (착화, 디자인","fb":"퓨어드라이 판매가 좋으며, 여성라인에서 아이코닉과 시어아이스의 문의 및 터치가 많았습니다."},{"cat":"용품","topic":"","fb":"블레이드 문의나 판매가 조금씩 올라오고 있습니다. 드로우 스트링 백팩 V2 부재기간 중에 문의와 예약이 많았습니다."},{"cat":"신발","topic":"","fb":"에어벨은 아직까지는 반응이 없었고 에어리W 리오더를 기다리시는 고객들이 많습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"롤랑라켓의 반응이 아직 적습니다. 가방의 판매나 문의는 많습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"시즌이 시작되면서 F/W시즌에 인사드리고 안내 해드렸던 고객님들과 또 소량으로 맞춤구매 하셨던 분들의 입점과 그 고객님들의 지인 및 하남스타즈 선수분들의 방문 그리고 지인분들의 추가 유입이 이루어지고 있습니다. 하남점에 매출을 확보하고 자리잡기에 지금이 적기이며, 중요한 시기라고 생각됩니다. 매장에서도 지금 입점하시고 찾아주시는 고객님들께 집중하고 확실하게 자리잡으려 노력 중 입니다. 다만, 우려스러운 부분은 재고가 부족하여 고객들의 발걸음을 돌리는 일이 발생하거나 주요점포인 하남점에서 상품을 구매할 수 없다는 인식이 생기면 재방문율과 충성도에 좋지않은 영향을 끼칠 것 같습니다...!! 하남지역에서 이제 막 윌슨을 알리는 시작인만큼 본사의 도움이 간절하게 느껴집니다. 인기상품의 재고를 여유있게 운영할 수 있다면, 지금보다 더 큰 매출을 확보할 수 있을 것 같습니다."},{"cat":"","topic":"전체 고객 중 외국인 유입비중 (증가한 사유? 별도 점포에서 외국인 대상 진행하고 있는 프로모션/사은혜택은?","fb":"별도 점포에서 진행하는 프로모션 및 사은혜택은 없습니다. 외국인 10% 미만"}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"30~50대 여성 고객의 입점이 많았으며, 윌슨 리그 선수분들의 입점도 조금 있었습니다. 시어아이스 및 퓨어드라이 터치가 많았습니다. 볼티셔츠도 일반 고객에게 터치나 구매가 있습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"퓨어드라이 리오더가 빨리 되었으면 좋겠습니다. 남자 시어아이스의 카라티 네이비 컬러의 부재가 아쉽습니다."},{"cat":"용품","topic":"","fb":"모션 섬머 캠프캡 & 베일 드레이프 캡 판매와 문의가 많습니다. 특히 베일 캡 리오더가 필요할 것 같습니다. 테니스 고객들의 용품만족도와 신뢰도가 높아지고 있습니다. 드로우 스트링도 많이 ic":"2-1.의류/용품/신발 판매 특이사항  용품 - 드로우스트링 백팩V2 (아이보리, 화이트) 재입고 후 반응,","fb":"시어아이스의 소재로 다양한 라입업이 구성되면 좋을 것 같습니다."},{"cat":"용품","topic":"","fb":"드로우 스트링 백팩의 판매가 여전히 많이 이루어지고 있습니다. 올라운드 짐백도 뒤늦게 문의나 구매가 많습니다."},{"cat":"신발","topic":"","fb":"인기 사이즈의 재고 부재가 아쉽습니다. 인트리그 투어 신상(옴니코트) 특수성으로 구매를 못하시는 분들이 많으셨습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드 V10 100PRO 문의가 조금 더 늘었습니다. 롤랑가로스의 판매는 부진합니다..!!"},{"cat":"팀스포츠","topic":"","fb":"올라운드 짐백 및 더플백의 문의나 수요가 늘고 있습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"점포 입점이 전체적으로 많이 줄었습니다. 입점하시는 분들께 제안드릴 수 있는 SKU도 한정적이라 운영에 어려움이 다소 있습니다."}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"신상 입고된 상의와 리오더 스커트의 셋업 판매가 동호인 위주로 많이 판매되었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"반팔티 반응이 좋았으며 더블메쉬와 셋업 구매가 많았습니다."},{"cat":"용품","topic":"","fb":"라켓이 두자루 들어가는 백팩(드로우) 문의가 많이 생기고 있습니다."},{"cat":"신발","topic":"","fb":"에어리의 터치나 문의가 여전히 많으며 수입 신발의 사이즈 보충이 필요합니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"라켓 판매도 조금씩 올라오고 있습니다."},{"cat":"팀스포츠","topic":"","fb":"올라운드 짐백의 판매가 여전히 잘 이루어지고 있습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"스타필드내 월드컵 행사로인해 입점은 조금 늘었으나 행사(이벤트) 시간 동안의 매장 입점은 거의 없습니다."},{"cat":"기타","topic":"수시사은품 전반 매장 피드백 (스크런치 / 그립커버) 좋은점, 아쉬운점 + 차후 사은품 제안 아이템","fb":"만족스럽습니다."}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"리오더 입고 된 상품들의 판매가 많이 이루어졌습니다. 운동 목적의 구매가 많았으며, 퓨어드라이의 경우 이전에 구매하여 만족도가 높았던 고객님들의 재구매가 많았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"그라데이션의 만족도가 높았으며, 남.여 커플로 입을 수 있는 부분이 세일즈 포인트로 좋습니다."},{"cat":"용품","topic":"","fb":"쉴드 백팩을 찾으시는 분들이 가끔 있습니다. 상설로 안내해드리고 있는데 연간으로 정상매장에서 소량 운영하는 것도 좋을 것 같습니다. 베일캡의 리오더 문의가 많습니다."},{"cat":"신발","topic":"","fb":"신규 입고된 테니스화의 가격이 고객님들께 메리트있게 보이는 것 같습니다. 관심도 많고 착화도 많은데 아직 판매는 많지 않습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"파이썬의 문의가 늘고 있습니다. 롤랑가로스의 판매도 조금씩 올라오고 있습니다. 블레이드 V10 100PRO의 입고도 많이 기다리십니다."},{"cat":"팀스포츠","topic":"","fb":"올라운드 짐백의 인기가 많습니다. 사이즈 대비 공간구성과 간편하게 여러가지로 활용할 수 있다는 부분에서 좋아하십니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"입점 자체는 전주와 비슷합니다. 금주 초롱프로님께서 방문하시어 터치업 해주신 덕분에 매장이 좀 더 시즌에 맞는 분위기로 변경되어 고객들의 의류 터치가 많았습니다. 재고 운영에 있어서 여유있게 운영할 수 있도록 배려해주신 덕분에 주말간 입점이나 문의 놓치지않고 매출 확보할 수 있었습니다."},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"만족도는 높지만 스킨쪽이라 조금 민감한 부분도 있습니다. 만족도에서는 엄청 높습니다.  추가로 스크런치 사은품의 만족도가 매우 높습니다. 빨리 추가 구매할 수 있게되면 좋을 것 같습니다."}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"비가 온뒤에 한낮에 뜨거운 날씨로 인하여 신규 입고된 그리고 리오더 입고된 퓨어드라이의 반응이 좋습니다. 특히 전년 구매로 경험해보신 고객들이 추가 구매를 위하여 방문하여 새로운 컬러&디자인을 찾으십니다. 우먼즈 라인의 전면 워딩에 적용된 재귀반사의 반응이 좋습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품) 드로우스트링 백팩 V2 신규 컬러 반응  (내/외국인 비중,","fb":"원피스의 터치가 많이 늘었지만 아직 구매까지는 어렵습니다. 착용시 편하다는 점은 큰 장점으로 구매를 고민하게 하지만 사이즈가 국내 고객에게는 애매하며, 노출되는 부분이 많아서 방어적으로 구매를 망설이시는 포인트가 되는 것 같습니다. 시어아이스의 소재가 낮은 연령층의 터치가 많은데 디자인에서 연령대가 높아집니다. 시어서커 원단을 활용한 볼레로(원피스 위에 입을 수 있는 류)가 나온다면 연계판매에 도움이 될 것 같습니다.  퓨어드라이 L사이즈 재고가 많지않아 기회로스가 많아 아쉬웠습니다."},{"cat":"용품","topic":"","fb":"가방의 판매가 여전히 많이 되고 있지만, 신규 입고된 드로우V2 컬러의 반응은 아직 미약합니다."},{"cat":"신발","topic":"","fb":"에어리 재입고 소식에 많은 분들이 방문 하였지만, 기존의 퍼플의 재입고를 더 기대하시는 것 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"파이썬 문의가 급증하였습니다. 판매는 소폭 상승했습니다."},{"cat":"팀스포츠","topic":"","fb":"좌투 글러브 문의가 많습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"일반 고객입점은 아주 소폭으로 상승했지만, 구매에는 더 소극적이 되었습니다. 테니스 고객 입점은 조금 더 늘었고 라켓의 터치가 조금 늘었습니다."},{"cat":"기타","topic":"* 26FW 상품교육북 매장의견   - 상품교육자료를 직관적으로 볼 수 있게 품번/상품명 검색 시, 세일즈포","fb":"아주 보기좋고 기다리던 시스템입니다. 해당 내용 활용하여 신규 및 기존 직원들 교육에 크게 도움이 될 것 같습니다. 감사합니다.!!"}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"신상 퓨어드라이의 판매가 가장 좋았습니다. 또한 마네킨 착장과 테이블 디스플레이를 피키 쇼츠로 변경한 이후 고객 터치가 증가하고 있어 앞으로의 판매 반응이 기대됩니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"여성용 오버핏 제품의 종류가 더욱 다양했으면 좋겠다는 의견이 많았습니다. 스트로베리앤크림 오버핏 제품의 핏에 대한 만족도는 높았으나, 다양한 디자인의 선택지가 부족하다는 아쉬움을 표현하는 고객들이 있었습니다."},{"cat":"용품","topic":"","fb":"소프트 에어는 고객 터치는 많지만 아직 구매로는 이어지지 않고 있습니다. 여전히 드로우스트링 스타일의 인기가 높으며, 신규 컬러에 대한 반응도 매우 좋습니다. 윌베어 키링 역시 좋은 반응을 보였으며, 가방과 함께 디피한 이후 고객 터치가 늘어 앞으로도 긍정적인 판매가 기대됩니다. 반면 심리스 퍼포먼스 바이저는 아직까지 고객 터치가 없는 상황입니다."},{"cat":"신발","topic":"","fb":"신상 리스폰스 프로에 대한 관심도는 높았으나 실제 구매는 러쉬투어, 러쉬프로, 또는 인트리그 투어로 이어지는 경우가 많았습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"신규 라켓의 스펙과 가격에 대해 매장 방문 고객과 DM을 통한 문의가 많았습니다. 특히 출시일에 대한 관심이 높아, 출시 일정과 관련한 문의가 있었습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공의 판매가 가장 많았습니다. 이번주는 글러브의 터치가 늘었으며 관심이 높아지는 모습이었습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주에 비해 평일 입점은 늘었지만 주말 입점은 줄었습니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"2박스"}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"피키 폴로가 재입고 되면서 그간 기다리시던 고객들의  방문과 피키쇼츠와 셋업으로 구매가 조금 있었습니다. 또한, 날씨가 많이 더워지고 습해지면서 이전에 퓨어드라이를 구매하셨던 고객들의 재구매가 많이 이루어졌습니다."},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"본격적인 시즌이되면서 시어아이스의 터치가 늘고있습니다. 베이지 컬러의 부재가 아쉽니다. 의류의 경우 여성 스커트 속바지가 착장시 너무 덥고 답답하다는 피드백이 많습니다... 원단을 조금 더 얇게 가거나 다른 원단의 적용을 고민해볼 필요가 있을 것 같습니다...!!   남성 의류의 경우 깔끔하면서 기능적인 부분이 어필된다면 좋을 것 같습니다. 원단의 만족도는 매우 높으나 테니스를 즐기시면서 러닝과 헬스도 같이 즐기시는 남성고객이 많아서 벤틀레이션이 부각된다거나 착장시 스포티한 무드가 돋보이면서도 고급스럽게 보일 수 있는 상품을 원하십니다. (테니스 및 일상 착장 가능한 카라티, 깔끔하면서 가벼운 스트레이트 핏 긴바지)"},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"올어라운드 짐백 새로운 컬러의 반응은 좋지만 아직까지 구매로 이어지지는 않고 있습니다. 바이저의 착용도 많고 착용해보신 고객의 구매율이 높습니다. 다만, 바이저의 경우 챙의 기장이 너무 짧다는 피드백이 조금 있었습니다."},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"금주는 신발 고객의 입점이 많이 적었습니다..!! 새로 추가된 상품들의 컬러 만족도가 높았습니다. 특히, 클레이&옴니 분리되어 나오는 구성에 만족도가 높았습니다. (재고가 없는 부분이 아쉬웠습니다.) 러쉬 프로 기존에 구매하셨던 고객들의 내구성 피드백이 조금 있었습니다. (착화한지 얼마 안되어서 발볼쪽 갈라짐 현상)"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"디파이어의 문의가 많습니다..!! 타 라켓의 판매는 저조한 한 주였습니다...!!"},{"cat":"팀스포츠","topic":"2-2. 항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"대부분 여성 고객들이 디자인의 많은 관심을 보이시며 적극적으로 응대하여, 주말에 판매하였습니다 디자인을 보기위해 입점하시는 분들은 거의 없으나 친절히 설명하면서 관심도를 끌어 올리고 있습니다."},{"cat":"팀스포츠","topic":"","fb":"라켓은 꾸준히 많이 찾아오며 반응이 좋은 편입니다. 남성분들이 많이 보시고 테니스를 원래 치시던 분들에게 특히 어필이 잘되어 구매로 이어지는 경우가 많습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"연휴가 끝나며 동시에 몰 자체 입객이 많이 빠졌습니다. 평일에 판매부진이 심하여 사은품, 쿠폰 사용 등 고객 유치에 힘쓰고 있습니다."}],"5월3W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"30~40대 고객님들의 방문이 대부분 이었으며 점점 지역내 클럽원분들과 협회관련자들의 방문이 생기고 있어 점포 인지도가 올라가고있다라는 생각이 들었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통) -의류 : 엘리트 퍼포먼스, 어드밴스드 등 (5/1","fb":"선셋라인은 여성고객터치가 높은편입니다. 윌슨로고가 많이 있으신 고객님들의 터치가 늘어날것으로 예상되며 기장감이 있어 연령대 있는 고객님들에게도 권하기 좋은아이템입니다."},{"cat":"용품","topic":"","fb":"리본니삭스는 저희 점포에서는 판매량이 높은 상품이 아니었어서 재입고반응도 없는 상태입니다. 니삭스보다는 자외선 차단 스타킹 찾으시는 고객님들이 더 많습니다."},{"cat":"신발","topic":"","fb":"볼이 넒은 테니스화 찾으시는 고객님들이 많았습니다. 특히 남성고객중 사이즈가 크신분들을 잡을 수 있는건 볼이넘ㄹ고 사이즈 커버가 가능한 큰사이즈의 수입화가 있으면 좋을것같습니다. 오셨을때 윌슨은 무조건 있을것같았는데 라는 아쉬움이 있으십니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"테린이분들의 방문이 구매로 연결이 가장 많이 되매 구력자 분들도 부상이나 스윙스타일에 따라 권해드렸더니 구매로 이어지고있습니다. 블레이드 100프로 재입고 문의가 꾸준히 있습니다."},{"cat":"팀스포츠","topic":"","fb":"가족단위 고객님들의 주말방문으로 주말만 판매량이 조금 올랐습니다."}],"5월4W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"30~40대 여성고객의 비중이 많았으며 스커트 중 매쉬 스커커트 판매량이 꾸준합니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 [의류] 선셋매치 라인업  1. 구매목적 : 테니스 카테고리가 아니라","fb":"선셋라인은 테니스 고객의 비중이 많으며 하의같은경우 옆라인이 트여있어 색상은 너무 맘에드나 안쪽에 받쳐입을 속바지를 많이 찾으십니다.링커티셔츠 판매량이 나오는건 여성라인 크롭티셔츠를 선호하지 않으시는 고객님들의 선택의 폭이 좁습니다. 남성고객의 경우 반팔 그래픽 디자인은 터치가 자주 이루어지고 있습니다. 매장에서 느끼기엔 백그레픽에 긍정적이며 다만 그래픽이 너무 큰비중으로 들어갈때 땀이 고이고 감길 수 있어 감안해주시면 감사하겠습니다. 남성 쇼츠의경우 여성에비해 디테일이 장 보이지 않아 고객님들이 종류가 많다라고 느끼비 못하십니다."},{"cat":"용품","topic":"","fb":"선셋 볼캡 , 크루삭스 의류연개판매가 크지않습니다. 바탕컬러가 강한상품보다는 화이트, 블랙 라인에 포인트 컬러 찾으시는 분들이 많습니다."},{"cat":"신발","topic":"","fb":"에어벨w 저희점포에서는 판매량이 거희 없습니다. 쪼한 러쉬투어 기존 구매 고객 a/s건이 3건이나 됩니다. 착용횟수가 많지안은데 앞발 볼부분  좋습니다 깔끔한 로고 플레이와 컬러감 상대적으로 낮은 가격저항이 요인으로 보입니다. 20-50대 남녀 모두 모자 터치가 많습니다 (에어모션 캠프캡) 30-40대 남성: 퓨어드라이 블라썸라켓티셔츠 디자인을 좋아하십니다"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"큰 사이즈 재고가 부족해 판매까지 이어지기 어려운 경우가 종종 있습니다. 시어아이스 와이드 팬츠같은 여름용 긴바지를 찾는 고객님들이 많았습니다."},{"cat":"용품","topic":"","fb":"용품에 대한 터치는 거의 없는 편입니다. 양말은 가격저항이 있는 편이지만 판매가 되고 있습니다."},{"cat":"신발","topic":"","fb":"전체적으로 고객 연령대가 높았던 한 주여서  반응이 미미했습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"롤랑가로스 라켓은 선물용으로 구입하시는 분이 대부분입니다. 디자인이 매장입구에서 시선을 끌어 구경 하시기 위해 들어오는 고객님들이 많습니다. 내국인 입점고객만 있었습니다. 에디션 라인을 제외한 라켓 중에서는 블레이드 v10에 대한 관심이 제일 크신 편이고 v9을 가지고 계신 고객님들께서 관심을 가지고 방문 주십니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"주중에는 목적구매를 위해 방문해주시는 고객들이 많이 찾아오셨고 주말에는 더워진 날씨로 입점 고객이 줄었습니다. 강원도에 생겼다는 소식을 듣고 강원도 타 지역에서 오신 고객님들이 많았습니다."}],"5월3W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"강원도 내 타 지역에서 20-40대 부부,커플 분들의 방문이 많았습니다. 이번 주는 신발 터치가 많았습니다. 기능적으로 신발에 많이 투자해야한다는 생각으로 일부러 윌슨 매장으로 찾아오시는 고객분들이 계셨습니다. 상의는 퓨어드라이 라인 터치가 많습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통) -의류 : 엘리트 퍼포먼스, 어드밴스드 등 (5/1","fb":"엘리트 퍼포먼스나 어드밴스드는 메인 상품으로 나가있는데도 불구하고 터치가 적은 편입니다. 우선 입점고객 다수가 여성분인 만큼 보수적인 강원도 지역에서 브라탑에 대한 터치가 떨어지는 편입니다. 남성 고객에 입점이 늘어난다면 엘리트,어드밴스드라인의 수요가 늘어날 것이라고 기대합니다. 선셋매치는 입고된지 얼마 되지 않아서인지 아직은 퓨어드라이 라인을 눈여겨 보십니다"},{"cat":"용품","topic":"","fb":"리본 니삭스 반응은 없습니다 가방은 롤랑가로스 에디션 위주 터치가 있는 편이고 모자는 베이스라이 볼캡 인기가 많습니다"},{"cat":"신발","topic":"","fb":"이번 주는 신발 판매량이 가장 많았던 주였던 만큼 테니스화를 정말 잘 만드는 브랜드에 대한 갈증을 해소해드린 피드백이 많았습니다. 신발을 종류별로 다 신어 보시고 신중하게 구매하시는 분들이 많은데 대체적으로 가벼운 볼트프로를 선호하십니다 발볼이 넓으신 분들은 리스폰스 프로 라인도 살짝 불편해하셔서 발볼이 넓게 빠지는 테니스화에 대한 수요가 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"라켓 판매율과 문의는 저조한 편입니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"점내 유동인구는 전주보다 줄었지만 반대로 입점고객은 늘었습니다. 입소문도 차차 나고 있고 선셋 매치 라인이 들어오면서 조금 더 편하게 매장을 둘러보시러 오는 분들이 늘었습니다."},{"cat":"기타","topic":"타 브랜드 프로모션/ 행사현황 (POP내용 등 참조)","fb":"나이키 시즌오프 20"}],"5월4W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"이번 주는 40-50대 테니스 유저 남성분들의 입점이 많았습니다. 초반에 저희 매장을 방문해주신 분의 구매후기를 듣고 오신분들이 대부분이었습니다. 시어아이스 터치가 많았고 퓨어드라이 라인 티셔츠 구매율이 높았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 [의류] 선셋매치 라인업  1. 구매목적 : 테니스 카테고리가 아니라","fb":"선셋 매치 구매층은 테니스 유저 분들이 거의 없습니다.오히려 테니스를 안 치는데 입을 수 있는 의류를 찾으시는 고객님들에게 세일즈포인트를 맞춰 응대하고 있습니다. 섯셋매치 모자부터 양말까지 디자인 면에서 반응이 좋은 편이나 화려한 컬러감을 쉽게 손대지 못하는 부분도 있습니다. 여성 베이스라인 쇼츠는 통이 넓고 짧은 기장에 비해 이너레깅스가 없어 입기 부담스럽다는 피드백이 있었습니다. 타이다잉은 취향이 타는 티자인이라 터치는 없는 편입니다. 퓨어드라이 라인은 심미적인 부분이나 기능적인 부분이나 호평이 많습니다. 테니스를 치지 않는 고객들도 퓨어드라이 티셔츠만 고집해 입는다고 하시는 분들도 계시고 피팅까지 끌고가면 대부분 구매하십니다. 특히나 타 브랜드에 비교해 구김이 적은 특징을 좋아하십니다."},{"cat":"용품","topic":"","fb":"화려한 색감보다는 무난한 컬러의 용품을 보시는 편입니다. 용품을 선물용으로 구매하는 비중이 커서 더 무난한 선택을 하시는 것 같습니다."},{"cat":"신발","topic":"","fb":"에어벨 터치는 많지만 약간의 가격저항과 10단위로 떨어지는 사이즈가 애매해서 구매를 주저하시는 분들이 계십니다. 리스폰스 프로 라인을 많이 보시고 구매율도 높은데 사이즈별로 재고가 부족해 아쉽습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"저번주보다는 라켓 터치가 많았지만 즉시 스트링을 원하시는 분들이 많아 원활하게 판매로 이어지지 않는 부분이 있습니다. 그래도 문의는 꾸준히 늘어가고 있습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"평일 주말 입점고객이 많이 줄었습니다. 대부분 목적이 있는 매장만 잠깐 들렀다가 바로 귀가하는 고객들이 대부분입니다."},{"cat":"","topic":"1) 에어벨 W의 판매호조 사유 - 주 구매 고객층 (테니스/일반) (테니스신발이 아닌데 어떤고객이 구매하는","fb":"에어벨이 나가는 이유는 첫눈에 봤을 때 디자인으로 끌려하시고 저와 직원들이 착용하고 있는 신발이라 실착 후기를 전해드리고 구매하시는 고객들이 있습니다. 저희 지점은 테니스 유저분들과 아닌 분들 비율이 반반이라 테니스화 만큼 관심을 가지시는 것 같습니다만 가격저항이 조금 있습니다."},{"cat":"기타","topic":"신규 라켓 출시 프로모션 진행을 위한 그립커버 사전 주문  박스당 수량 30개, 개당 단가: 3,000원(V","fb":"1박스"}],"6월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"30-40 남성 비율이 높았고 시어아이스와 퓨어드라이 라인 반응이 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품 - 드로우스트링 백팩V2 (아이보리, 화이트) 재입고 후 반응,","fb":"날이 더워짐에따라 시어아이스 소재 의류 터치가 많아졌습니다. 다만 컬러별 리오더가 빠르게 진행되면 판매에 도움이 될 것 같습니다. 저희 매장은 테니스 유저와 아닌분들 비율이 비슷해서 얇은 긴바지 의류 문의가 많습니다."},{"cat":"용품","topic":"","fb":"리오더 문의가 들어온 고객들은 모두 구매해가셨지만 문의 수가 많지 않았습니다."},{"cat":"신발","topic":"","fb":"에어벨 터치는 여전히 많습니다. 리스폰스와 볼트프로 라인도 동호인 분들이 많이 찾아주시는데 전체적으로 사이즈가 부족해 판매로 이어지는데 어려움이 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"라켓 문의는 꾸준히 늘고 있습니다. 이번주는 블레이드 판매량이 있었습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"입점고객은 전주보다 줄었지만 목적구매 고객님들이 많으셨습니다. 특히 일요일에 입점고객이 확 떨어집니다."}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"어드벤스드 에어브리즈 탑 기능성이 대한 호평이 많았고 터치,판매가 많아습니다. 신상 의류 반응은 아직까지 미미합니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"메인 마네킨과 메인 상품군 셋업으로 행거링 해두었지만 점포 내 연령대가 높은 편이라 아직은 반응이 없습니다. 연령대가 맞춰지면 반응이 괜찮을 것 같습니다."},{"cat":"용품","topic":"","fb":"신규 삭스 반응은 미미합니다. 액티브 모션 니삭스 판매율이 좋습니다."},{"cat":"신발","topic":"","fb":"이번 주는 신발 판매율이 저조하여 아직 많은 분들께 신규 컬러를 선보이지 못했습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"라켓은 터치율과 워크인 하게끔 만드는 요소지만 아이쇼핑이 많습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"평일 입점은 비슷하지만 주말 입점 고객이 심각하게 줄고 있는 상황입니다. 평일은 목적 구매 고객, 단골 고객이라도 방문해주시지만 주말 워크인이 많이 떨어졌습니다."},{"cat":"기타","topic":"수시사은품 전반 매장 피드백 (스크런치 / 그립커버) 좋은점, 아쉬운점 + 차후 사은품 제안 아이템","fb":"테니스 비주류 분들께 나갈 수 있는 사은이 늘었으면 합니다."}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"퓨어드라이 라인과 스피드 드라이 티셔츠 터치가 높았습니다 주로 운동목적 구매율이 많습니다"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"퓨어드라이 신상라인 보다는 아직까진 기존에 입고 되어있던 디자인 판매율이 높습니다 유입고객 연령층이 40-50대 이다보니 긴바지를 찾으시는 고객들이 많습니다"},{"cat":"용품","topic":"","fb":"가격 저항이 비교적 덜한 모자판매율이 좋았습니다 드로우 스트링 백팩은 꾸준히 나가고 있습니다"},{"cat":"신발","topic":"","fb":"볼트플로 신상컬러에 대한 반응은 미미한 편입니다 에어리 w 리오더는 아직 입고 된지 얼마 되지않아 반응을 앞으로 조금 더 지켜봐야할 것 같습니다. 현재는 에어벨 상품 터치가 가장 많습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"라켓 터치율은 꾸준히 올라가고 있으면 블레이드 v10관심이 특히 많습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주와 비슷하게 입점 고객은 적은 편입니다. 유동인구가 많이 줄었습니다."},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"사은품 받으시는 고객님은 모두 좋아하셨습니다. uv파우치를 받기위해 추가 구매 하시는 분도 계십니다."}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"퓨어드라이 유니 핑크 컬러 터치와 구매도가 높습니다. 의류보다는 모자 판매가 많습니다. 신상 의류는 브라캡이 함께 포함된 멜로우 슬리브리스 터치가 높은데 판매로는 잘 이어지지 않고 있습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품) 드로우스트링 백팩 V2 신규 컬러 반응  (내/외국인 비중,","fb":"점포 내 유동인구 연령층이 40-50대다 보니 여성 스커트와 쇼츠를 주력으로 팔아야하는데 기장감이 짧아 판매가 안되고 있습니다 기장감이 있는 쇼츠나 긴바지 수요가 많습니다."},{"cat":"용품","topic":"","fb":"외국인 비중은 아예없습니다 드로우 스트링 백팩 v2신규컬러에 관심도는 아직까지 미미하고 기존 컬러 위주로 구매 고려를 하시는 편입니다"},{"cat":"신발","topic":"","fb":"에어리 w는 테니스 비유저 분들의 관심도가 더 높고 여성 연령층이 40-50대로 높아 관심도가 떨어지는 편입니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"라켓은 꾸준히 가격 문의가 들어오지만 가격 저항이 있습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주보다는 유동인구가 늘었지만 늘 가던 브랜드만 갔다가 바로 빠져버리는 고착화된 움직임이 있어 매장 내 유입이 떨어졌습니다. 특히 주말에 점포를 찾는 쇼핑 인구가 크게 떨어졌습니다."},{"cat":"기타","topic":"* 26FW 상품교육북 매장의견   - 상품교육자료를 직관적으로 볼 수 있게 품번/상품명 검색 시, 세일즈포","fb":"간단명료한 세일즈 토크와 연계판매 부분이 도움이 되었습니다."}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"이번주는 여름 휴가철 시작되면서 브라탑 터치가 늘었고 시어아이스,퓨어드라이 라인이 판매율이 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"여성,남성 연령대는 30-50대 모두 긴 기장의 하의를 원하시는 분들이 많습니다. 종류가 많진 않더라도 기본 스타일 몇 개가 추가 되면 좋을 것 같습니다."},{"cat":"용품","topic":"","fb":"드로우 스트링 신규 스타일은 아직까지 반응이 미미한 편입니다. 윌베어는 높은 관심이 있지만 가격대 이유로 구매로는 잘 이어지지 않습니다. 엘리트 모션 바이저 신규 컬러 터치가 많습니다."},{"cat":"신발","topic":"","fb":"깔끔한 색감을 원하셨던 고객님들이 이번 리스폰스 프로 1.5 신상을 보시고 관심을 가져주셨습니다. 에어리도 색상별로 터치가 많고 문의가 있는 편입니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"블레이드 V10꾸준히 문의가 들어오고 신규 입고되는 파이썬 문의도 들어옵니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"평일은 전주와 비슷하고 주말 고객입점이 확 늘었습니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"1박스 신청합니다"}],"7월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"여전히 퓨어드라이 라인 많이 보시고 남성고객들의 코트라인 쇼츠 구매율이 높았습니다 전체적으로 무난하고 간결한 디자인 선호도가 보입니다"},{"cat":"의류","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신상 전반적인 고객 터치 및 피드백","fb":"신상 브라탑 터치율은 높지만 입기 부담스러워 하셔서 판매로 이어지기는 힘들었습니다. 여전히 여성고객들이 하의가 짧아 구매를 많이 망설이십니다."},{"cat":"용품","topic":"2-1. 의류/용품/신발 판매 특이사항 - 드로우스트링 신규 반응","fb":"백팩보다는 캠프캡이나 바이저 터치율이 높고 판매가 많습니다."},{"cat":"신발","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신발 신규컬러 반응","fb":"에어리 w 반응은 미미하고 리스폰스 프로 신규컬러 화이트 골드 반응이 좋습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 - 디파이어 판매반응","fb":"인스타 광고를 보고 연락주신 분이 분 전화로 문의 주신 분이 분정도 계셨는데 가격문의가 제일 많았고 그 이후로 판매로 전환되지는 않았습니다. 매장 입점 고객 중에선 컬러를 보고 터치율이 많았으나 대부분 테린이 분들이라 여전히 블레이드 v10에 관심이 많으셨지만 대부분 가격에서 많이 포기하는 양상입니다. 원주 지역은 대부분 동호인들이 많다보니 강력한 프로 사양 라켓에 대한 욕심이 떨어지는 것 같습니다."},{"cat":"기타","topic":"전주대비 고객 입점 현황","fb":"전주대비 입점 고객이  떨어졌습니다."}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"퓨어드라이 라인이 꾸준히 잘 나가고 있고 날씨가 더워짐에따라 엘리트 프로 라인 판매량도 늘었습니다. 금주는 테니스 유저분들이 많이 오셔서 스커트 판매율이 올랐습니다. 너무 짧은 기장감을 피하시는 경향 이 있어 미드타운스커트 터치가 많습니다"},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"남성 폴로 라인이 컬러나 디자인 면에서 조금 더 다양했으면 하는 피드백이 있었습니다. 그 외에는 퓨어드라이 라인을 처음 접해보시고 다른 컬러나 디자인으로 재구매를 하러 오시는 고객들이 많았습니다"},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"짐백 신상컬러에 대한 반응은 현재까지 미미합니다 추가된 바이저 들은 터치율도 높고 판매도 괜찮습니다. 날이 더워지면서 캡보다 바이저 보시는 분들이 늘었습니다."},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"리스폰스 프로 신규컬러를 사가신 고객님들이 착용감과 디자인 ,실제로 스포츠 활동을 하며 느꼈던 좋은 점에 대해서 평가를 많이 해주셨습니다. 기존에 화려한 컬러감도 매력이지만 확실히 무난한 컬러에 대한 선호도가 높았습니다. 에어리 반응은 저조한 편입니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"디파이어 문의가 꾸준히 들어오고 수량이 적어 판매가 적은 게 아쉽습니다. 리오더 일정에 맞춰 구매하시겠다고 연락하시는 분들이 많습니다."},{"cat":"기타","topic":"고객 입점 동향","fb":"전주보다 사은행사가 많아 입점고객이 늘었습니다. 금토일 연휴로 구매하시러 나오는 가족단위가 늘었습니다."}]},"신세계의정부":{"5월3W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"의정부 상권은 퓨어드라이나 반바지 보다는 30대에서 50대까지 사이에서여성 스커트 터치감이 가장 많았습니다.남성 고객 유입이 적어서 그러는 경향도 있는 거 같고,20대나 학생 고객은 엄청 적은 느낌입니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통) -의류 : 엘리트 퍼포먼스, 어드밴스드 등 (5/1","fb":"선셋라인도 바지랑 민소매 반응도 있는데 가격에서는 좀 고민하는 고객도 있었고,여성고객보다는 남성고객들 터치가 많은거 같습니다.주로 여성 고객 유입이 많다보니 30대 40대 여성은 스커트 브라탑,피키쇼츠 라인 선호, 40대 50대는 퓨어드라이 와이드팬츠나 카라,라운드티 터치감이 가장 높았습니다."},{"cat":"용품","topic":"","fb":"오픈한지 몇일 안되었지만 니삭스보다는 기본 중목 삭스 터치가 높았습니다.의정부점은 기본 드로우스트링보다는 TBP13 보는 고객들이 많습니다.그 외는 댐프너나 오버그립 컬러가 적다는 피드백은 있었습니다."},{"cat":"신발","topic":"","fb":"볼트프로 ,리스폰스 보는 고객이 대부분인데 의정부점은 연휴 3일동안 260에서 280사이즈 사이 재고들이 거의 없어 아쉬움이 많았습니다.에어벨은 20대부터 70대까지 다양한 여성분들이 선호했으며 ,카본소재는 40대,50대 전문성있는 남자고객들이 관심갖거나 신어보았습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"대부분 블레이드10 터치하는 고객들이었고 평가는 좋다는데 가격이 인상이 되었다 이런 피드백이 있었고 라켓 세일 물어보는 고객은 몇명 있었습니다. 구매는 가끔씩 있었던 한주였습니다."},{"cat":"팀스포츠","topic":"","fb":"NTS50 농구공 티셔츠나 야구라인 티셔츠 터치 말고는 라이프는 크게 관심도 높지 않았습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"평일에는 경제력있는 35~55 사이의 여성고객들이 한번에 30만원 이상씩 구매하는 경향이 뚜렷한 상권이라고 느꼈습니다.평일 입점은 좋은편인데,주말은 아이쇼핑이 너무 많았습니다.입점은 유동인구 자체가 생각보다도 많습니다.구매하는 고객이 많지 않아 아쉬웠던 연휴 3일이었지만 근처 호원테니스장이나 주변 테니스 클럽에서 취미로 즐기는 고객들 입점도 점차 늘고있고 입소문 타고 하면 단골고객들도 많이 늘거 같아 기대하고 있습니다."}],"5월4W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"남성분들보단 여성분들 구매가 더 많았고 40-50대 연령층은 시어아이스 라인이 반응이 좋았으며 20-30대 연령층은 더블메쉬스커트가 반응이좋았습니다 남성분들은 연령대 관계없이 파리크레스트 티셔츠 전컬러 반응이 좋았습니다"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 [의류] 선셋매치 라인업  1. 구매목적 : 테니스 카테고리가 아니라","fb":"스커트는 골프나 다른 스포츠 용도로 입으시려고 구매하시는 경우가 꽤 많았고 여성팬츠같은경우는  다른브랜드보다 팬츠가 짧다고 부담스러워하시는 분들이 자주 있었습니다 퓨어드라이 소재 제품들은 남녀 관계없이 일상용으로도 입으시려고 구매하시는 경우가많았고 셋업터치보단 티셔츠와 바지 이런식으로 매치해서 컬러를 맞추시는 경우가 대부분이셨습니다"},{"cat":"용품","topic":"","fb":"캠프캡같은 라인의 모자 형태보다 에어모션 원단에 캠프캡 스타일에 모자를 더 많이찾으시는 편이셨습니다 드로우스트링에어가 반응이 좋았으며 일상용으로도 구매하시려는 분들이 꽤 많은편이였습니다"},{"cat":"신발","topic":"","fb":"에어벨 반응이 좋았고 볼트프로 컬러감이 화려해서 40-50 연령대 반응이 좋았지만 오히려 20-30대는 좀 더 무난한 컬러를 찾으셨고 전체적으로 제품 컬러감 선택의 폭이 좁아서 어려움이있었습니다"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드 v10 관심도가 있었습니다"},{"cat":"팀스포츠","topic":"","fb":"미운영"},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전 주와 비슷함/ 평일은 목적구매가 저번주보다는 조금 줄었고 주말은 입점객 수에 비해서는 구매율이 낮음, 추후 매장 입소문 나고 단골고객분들을 늘려야 할거 같습니다. 외국인 입점은 거의 없고 일반 내수 고객 입점율 90프로 이상입니다."},{"cat":"","topic":"1) 에어벨 W의 판매호조 사유 - 주 구매 고객층 (테니스/일반) (테니스신발이 아닌데 어떤고객이 구매하는","fb":"일반고객이 압도적으로 많았으며 오히려 테니스 치시는 분들 관심은 낮았습니다 메쉬소재 샌들 이다보니 여름신발로 구매하시는편이였으며 20-30대 여성들같은경우는 에어벨 디자인자체에 관심을 가지심 / 의정부점은 같은경우는 선셋매치라인보단 기본 퓨어드라이 제품군에 선호도가높았음, 선셋매치 구매하시는분들은 여름티셔츠로 입으시려는 일반고객님들의 관심도가 높음"},{"cat":"기타","topic":"타 브랜드 프로모션/ 행사현황 (POP내용 등 참조)","fb":"다이나핏 행사"},{"cat":"기타","topic":"신규 라켓 출시 프로모션 진행을 위한 그립커버 사전 주문  박스당 수량 30개, 개당 단가: 3,000원(V","fb":"3박스"}],"6월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"20-40대여성/ 스커트종류와 모자종류 선호도가 높았으며 전연령대 남성분들은 퓨어드라이 반팔티 종류가 선호도가 높았습니다"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품 - 드로우스트링 백팩V2 (아이보리, 화이트) 재입고 후 반응,","fb":"반바지가 너무 짧다는 피드백이 많았으며 브라탑보다는 반팔티 라인의 셋업종류를 원하시는 경우가 많았습니다 여름에도 착용가능한 얇은 바람막이 종류도 찾으시는분들도 많았습니다"},{"cat":"용품","topic":"","fb":"기존 드로우스트링보단 에어백팩 14만원짜리 가방이 무게감이나 착용감에서 특히 여자 고객들한테 반응이 더좋았습니다. 이번주에 두명 정도 남성 테니스 고객이 투어백 9PK나 더플백 종류 없는지 문의 있었습니다. 남성 고객들한테는 백팩만으로 응대하기 어려운 점 있습니다."},{"cat":"신발","topic":"","fb":"테니스를 치시는 고객님이 아니셔도 에어벨 선호도가 높았으며 신발 컬러가 너무적다는 피드백이 많았습니다"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"신상제품인 블레이드 제품에 관심이 많으셨습니다"},{"cat":"팀스포츠","topic":"","fb":"의정부에서 운영 안하는 야구 글러브 문의 있었습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"주말 입점은 매주 거의 비슷함, 입점고객은 많은 편이나 구매고객이 현저하게 적은편이고 세일제품 찾는 고객들 많음.목적성 있는 테니스 고객보다는 일반 고객(아이쇼핑)많습니다."},{"cat":"기타","topic":"타 브랜드 프로모션/ 행사현황 (POP내용 등 참조)","fb":"다이나핏,스케쳐스 행사 진행"}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"스커트종류와 퓨어드라이소재 반팔티를 가장 많이 보셨고 신상라인은 아직 크게 반응을 느끼지 못했음"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"아직 반응이 크게있지않았고 관심을 보이시는 고객님들은 라이프 목적으로 보시는경우가 다수였음 쇼츠를 보시면서 티셔츠를 같이보시는 경우가 많았음"},{"cat":"용품","topic":"","fb":"캠프캡 라인말고 볼캡종류를 더 많이 선호하시는편이였음"},{"cat":"신발","topic":"","fb":"볼트프로 관심도가 높으나 컬러감이 많은것보단 무난한 컬러는 더 선호하시는편임"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드나 롤랑제품을 많이봄"},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"백화점 자체 입점이 줄었음,그나마 평일 입점이 좀 있는 편이었는데 평일도 확 줄었던 한주였고 주말은 입점대비 구매율이 낮은편임.그리고 라코스테가 목요일부터 대행사 30프로 이상 할인 진행하면서 응대 자체가 쉽지 않았음."},{"cat":"기타","topic":"수시사은품 전반 매장 피드백 (스크런치 / 그립커버) 좋은점, 아쉬운점 + 차후 사은품 제안 아이템","fb":"테니스 치시는분들과 안치시는분들 모두 사용가능한 사은품도 필요함"}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"전체적인 반바지 라인이 판매가 좋았으며 멜로우라인제품이 관심도가 높았습니다 운동목적보단 일상적인용도와 운동 겸용으로 입으실려는 목적이 많았습니다"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"남녀 상관없이 퓨어드라이라인은 항상 반응이 좋으며 긴바지를 찾으시는 경우가 생각보다 꽤 많았으며 시어아이스라인도 그렇지만 반팔티에 같이판매할수있는 얇은원단으로된  와이드팬츠라던지 레귤러핏 제품들도 많이 찾으셨습니다"},{"cat":"용품","topic":"","fb":"로고가 작은 선바이저 제품들을 많이찾으셨습니다"},{"cat":"신발","topic":"","fb":"볼트프로 제품을 많이보시긴하지만 조금 더 가성비있는 모델도 찾으시는편입니다"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드 V10 제품 관심도가높습니다"},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"고객입점은 한여름되면서 오히려 평일도 좀 줄어들고 있음,평일은 그래도 적당히 유지되는 느낌인데,,주말에 유동 인구는 많지만 거의 아이쇼핑 고객만 너무 많은 느낌이어서 아쉬움."},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"가격대가 있어보이는 사은품이라 반응은 좋았지만 얼굴에 맞지않는 제품일까봐 안쓰신다고 하는 경우도 간혹있었음"}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"남녀구분 없이 신상 퓨어드라이 라인이 반응이 좋았음 ,스커트는 터치감은 높으나 의정부 입점 고객자체가 외국인은 거의 없고 주 여성층 연령대가 높아서 치마길이를 부담스러워하는 경향 많음.거의 다 피드백이 이쁜데 본인은 못입겠다 계속 이런 느낌임. 의외로 의정부 상권은 의류보다는 신발 관심도가 높은 고객이 많아 다소 의아하게 느껴짐."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품) 드로우스트링 백팩 V2 신규 컬러 반응  (내/외국인 비중,","fb":"여성분들은 스커트 라인보단 반바지라인을 많이 찾으셨는데 조금 더 긴기장감에 반바지라인을 많이찾으셨음 여러제품은 아니여도 여성용으로 조금더 긴기장의 반바지도 필요하다고 느낌  공용이나,남성라인 퓨어드라이같은 그래픽의 여성라인도 있었음 좋겠다는 반응이 많았음"},{"cat":"용품","topic":"","fb":"기본라인의 니삭스종류를 찾으시는분들 있었고 신상컬러 드로우스트링 컬러감 관심도가 좋았음"},{"cat":"신발","topic":"","fb":"볼트 프로 제품들이 남녀 관계없이 가볍고 컬러감의 종류가많아서 반응이 좋음,커플로 판매하기에도 제일 가격 무난하고 볼도 넓고 실제 터치감도 제일 높음.에어벨은 몇주전에 비하면 구매율은 낮아지고 있음."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"아직까지는 v10 제품이 관심도가 높음,라켓은 당연히 터치감은 많으나 가장 중요한 가격에서 할인이 없다보니 가격 물어보고 나가거나 인터넷이나 주변 테니스샾 비교하는 남성 고객이 많음."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"입점은 비슷했지만 전주대비 구매는 떨어짐,평일은 그래도 금액을 크게 사거나 구매를 하려는 고객들이 입점하는 반면 주말은 정말 유동인구는 많으나 항상 구매율이 낮고 연령대가 너무 높아 제품만 이쁘다고 하는 고객이 많아 아쉬움."},{"cat":"기타","topic":"* 26FW 상품교육북 매장의견   - 상품교육자료를 직관적으로 볼 수 있게 품번/상품명 검색 시, 세일즈포","fb":"세일즈 포인트 같은 경우는 제품명만 다르고 거의 동일하게 되어 있어서 특별히 도움이 되는 느낌은 아니였고 연계 판매할 수 있는 품목, 소재 같은걸 볼수 있는건 도움이됨."}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"퓨어드라이 반팔 제품들과 볼트프로 신발 제품이 관심도가 높았으며 신상의류 반응은 좋았던것 같습니다.피키쇼츠나 짧은 여성 반바지 터치감이 가장 높으며 2NTS24 핏 느낌 원하는 여성 고객들이 많았음."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"반팔라인이 남여관계없이 반응이 좋았으나 요즘은 스커트류보다 반바지류가 관심도가높은데 여성 기본 반바지종류가 티셔츠랑 연계판매하기가 조금 어러운 부분이 있습니다 너무 짧다거나 색상이 너무 화려하다보니 구매까지 이어지기가 어려웠습니다.피키쇼츠를 목적성 있게 구매하는 고객들은 많으나 여성 반바지가 조금 더길게 스타일이 한두종류 더 있었으면 좋겠음."},{"cat":"용품","topic":"","fb":"캠프캡 스타일말고 기본 볼캡 라인의 얇은 여름용 소재 모자를 많이 찾으시는데 여성분들이 쓸만한 캡모자가 별로 없다는 피드백이 많았습니다.흰색 메쉬캡에 빨간 글씨로고 들어간거 모자 선호도가 높은데 해당 모자 없다고 아쉽다고 하는 분들 있음."},{"cat":"신발","topic":"","fb":"볼트프로 반응이 좋으며 에어리w제품은 터치는 많으나 막상 신어보시면 겉면이 딱딱한 느낌이라 착화감이 좋지않다는 얘기가 있었습니다 .에어리가 발이 커보이는 느낌이 있는 거 같습니다.인트리그 프로 라인이 좀 어두운 색깔이 하나 있으면 여성 테니스 고객들한테 어필이 될거 같음."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"이번주에는 라켓 터치가 적었음,파이썬 관련 물어보는 남자고객들은 몇명 있음."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주에비해 백화점 자체 입점이 적어졌다고 느낌,항상 평일은 목적구매나 크게 구매하는 고객들이 꽤 있는반면 주말은 아이쇼핑 비중이나 연령대 높은 고객들이 너무 많음.제품 디자인이나 dp보고 들어와도 구경만 하는 고객들이 대다수임.그리고 라코스테가 계속 30프로 할인하는데 이번주 목요일부터는 행사장에 매대 크게 치고 할인 행사해서 가격 비교하는 고객이 더 많은 느낌임."}],"7월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"신발 에어리랑 볼트 프로 판매율이 꾸준하고 의류는 저번주보다 판매율 낮아짐.남성 고객은 거의 없고 여성 퓨어드라이나 스커트 위주 판매."},{"cat":"의류","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신상 전반적인 고객 터치 및 피드백","fb":"의류 전반적으로 피키쇼츠랑 스커트,여성 퓨어드라이 뺴면 판매율이 이번주는 더 낮아짐.터치감도 거의 여성의류 위주이고 의류 판매 자체가 구매율이 낮아짐."},{"cat":"용품","topic":"2-1. 의류/용품/신발 판매 특이사항 - 드로우스트링 신규 반응","fb":"매장 방문후 알게 된 테니스 클럽에서 드로우스트링 문의나 단체구매는 있음. 그 외 일반적으로 백팩 판매율이 낮음.모자는 기본적으로 나오던 메쉬켑들이 인기 많고 선바이저도 이번주는 판매율이 낮음."},{"cat":"신발","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신발 신규컬러 반응","fb":"에어리는 꾸준히 몇일에 한두개씩은 판매가 되고 있고 볼트프로도 꾸준함.리스폰스 신규컬러는 생각보다 터치감,구매율 낮음."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 - 디파이어 판매반응","fb":"디파이어 98 전화문의도 꽤 있는데 방문이 엄청 많지는 않음.라켓도 기본적으로 지인들이 구매를 해주었고,블레이드는 이번주 터치감 낮았음. 바볼랏 사용고객들이랑 요넥스 이존 사용하는 고객들이 꽤 많았음.주로 테린이들은 디파이어 구매가 없었음. 구매사유는 스핀라켓이라고 한번 쳐보고 싶었다고 하거나 컬러감에서 레드가 한정판이라서 산다고함."},{"cat":"기타","topic":"전주대비 고객 입점 현황","fb":"이번주는 평일도 입점이 좀 낮았는데, 주말은 입점대비 구매율 자체가 심각할 정도로 낮음. 아이쇼핑 고객이 너무 많고 테니스 고객 아니고 그냥 일반고객들도 많아서 좀 튕겨져 나가는 고객들이 많음.또 이번주 제시믹스나 라코스테,아디다스,나이키 전체적으로 다 세일하는 기간이라 가격 택만 보고 나가거나 세일물어보는 고객들도 많음."}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"퓨어드라이소재 반팔티라인이 남녀 연령관계없이 계속 반응이 좋고 여성분들한테는 선바이저 제품도 같이 반응이 좋습니다"},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"퓨어드라이반팔티 라인이 반응이 좋은데 연계판매할만한 반바지 라인이 너무 짧다거나 컬러감이 화려하다는 평이 많았습니다 기본 블랙,화이트 스커트제품도 추가되었으면 좋겠습니다 에어리제품은 불편하다는 평이 꽤 많았습니다"},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"바이저 스타일은 여성분들에게 반응이 좋았으며 가벼운소재라인을 더 선호하는것 같았습니다 짐백같은경우는 사이즈는 딱 좋지만 타브랜드보다 평균적으로 좀 비싸다는 얘기가 많았습니다"},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"볼트프로나 리스폰스 같은경우는 반응이 좋았지만 에어리같은경우는 가죽소재가 너무 답답하며 생각보다 밑창이 딱딱하다는 평가가 많았습니다"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"디파이어리 라켓은 초반에 관심도가 높았지만 신규모델이다보니 더많이 비교해보시는편이셨습니다 세트로 스트링을 드리는 서비스는 만족해하셨습니다.블레이드나 퓨어에어로 쓰던 고객이 제일 관심을 많이 디파이어에 가지는데 가격할인이나 시타해볼수 있는지 문의는 꽤 있습니다."},{"cat":"기타","topic":"고객 입점 동향","fb":"항상 주말 매출 유지하는게 더 힘든 상권이고,주말에 입점대비 구매율이 너무 낮음.테니스 고객들도 보통 평일에 구매가 더 많은 느낌이고 금액 크게 구매하는 고객들 아니면 주말 매출 유지 자체가 힘듬. 그리고 주말 입점 연령대가 너무 높은 편이라 아쉬움.사가는 고객들도 이거는 우리 나이대에서는 못입겠다 이런 피드백 하는 여성 고객들이 많음(50대 이상) , 그리고 제시믹스,휠라,라코스테,아디다스 등 대체적으로 30프로 이상 정도 할인하는 브랜드들 많아 금액에서도 튕겨져 나가는 고객들 다수 있음."}]},"롯데기흥":{"7월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"퓨어드라이 라인이 흡습속건이라 날이 습하고 더워지면서 쾌적하게 입을 수 있어 착용 후 구매전환율이 높았습니다. 추가적으로 모자,아대 등 용품들과 포인트 컬러를 맞춰 연결판매가 수월하게 이뤄졌습니다."},{"cat":"의류","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신상 전반적인 고객 터치 및 피드백","fb":"전체적으로 원단이 좋아 다양하게 터치가 이뤄지고 있습니다. 하퍼 크롭의 경우 원단 자체가 부드러워 착용감이 좋아 선호하기도 했습니다."},{"cat":"용품","topic":"2-1. 의류/용품/신발 판매 특이사항 - 드로우스트링 신규 반응","     if(k==='date'||k==='전체요약')return;
    var m=CAT_META[k]||{color:'#374151'};
    h+='<button class="sb-item" id="sb-'+k+'" onclick="goSec(\''+k+'\')"><span class="sb-dot" style="background:'+m.color+'"></span>'+(s[k].title||k)+'</button>';
  });
  document.getElementById('sidebar').innerHTML=h;
}
function goSec(k){
  var el=document.getElementById('sec-'+k);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  document.querySelectorAll('.sb-item').forEach(function(b){b.classList.remove('on');});
  var sb=document.getElementById('sb-'+k);if(sb)sb.classList.add('on');
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderMain(){
  var main=document.getElementById('main');
  var wd=weekStore[cur];
  if(!wd){main.innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)"><div style="font-size:48px;margin-bottom:12px">&#x1F4CA;</div><p style="font-size:15px;font-weight:600;color:var(--text)">\ub370\uc774\ud130\uac00 \uc5c6\uc2b5\ub2c8\ub2e4</p></div>';return;}
  var sm=wd.summary;
  var h='<div class="upsec" onclick="document.getElementById(\'finput\').click()"><span style="font-size:22px">&#x1F4C2;</span>'
    +'<div class="upsec-t"><strong>\uc0c8 \uc8fc\ucc28 \ud30c\uc77c \uc5c5\ub85c\ub4dc</strong> &mdash; \uc5d1\uc140 \ud30c\uc77c\uc744 \uc5c5\ub85c\ub4dc\ud558\uba74 AI\uac00 \uc790\ub3d9\uc73c\ub85c \uc694\uc57d\ud569\ub2c8\ub2e4</div></div>'
    +'<div class="whd"><span class="wpill">'+cur+'</span>'+(wd.date?'<span class="wdt">'+wd.date+'</span>':'')+'</div>';
  if(sm['전체요약']){
    h+='<div class="overall-top"><div class="overall-top-t">\uD83D\uDCCC \uC804\uCCB4 \uC694\uC57D</div><div class="overall-top-txt">'+esc(sm['전체요약'])+'</div></div>';
  }
  var chks=(sm['즉시체크']&&sm['즉시체크'].items)||[];
  if(chks.length){
    var grouped={};
    var catOrder=['의류','용품','신발','라켓','팀스포츠'];
    chks.forEach(function(c){
      var cat=c['구분']||'기타';
      if(!grouped[cat])grouped[cat]=[];
      grouped[cat].push(c);
    });
    var allCats=Object.keys(grouped).sort(function(a,b){
      var ai=catOrder.indexOf(a),bi=catOrder.indexOf(b);
      if(ai===-1)ai=99;if(bi===-1)bi=99;
      return ai-bi;
    });
    h+='<div class="warn-bar"><div class="warn-bar-t">&#x26A0;&#xFE0F; \uc774\ubc88 \uc8fc \uc989\uc2dc \uccb4\ud06c &mdash; \ud074\ub9ad\ud558\uba74 \ud574\ub2f9 \uc12d\uc158\uc73c\ub85c \uc774\ub3d9</div>';
    allCats.forEach(function(cat){
      h+='<div class="wchip-group"><span class="wchip-cat">'+esc(cat)+'</span><div class="wchips">';
      grouped[cat].forEach(function(c){
        h+='<span class="wchip" onclick="goSec(G_CHECK)">'+esc(c['내용']||'')+'</span>';
      });
      h+='</div></div>';
    });
    h+='</div>';
  }
  Object.keys(sm).forEach(function(key){
    if(key==='date'||key==='전체요약')return;
    var sec=sm[key];
    var m=CAT_META[key]||{icon:'&#x1F4CC;',color:'#374151',bg:'#f9fafb'};
    h+='<div class="csec open" id="sec-'+key+'">'
      +'<div class="chd" onclick="toggleSec(this)">'
      +'<div class="cicon" style="background:'+(m.bg||'#f9f9f9')+'">'+m.icon+'</div>'
      +'<span class="ctitle" style="color:'+m.color+'">'+esc(sec.title||key)+'</span>'
      +'<span class="cchev" style="transform:rotate(180deg)">&#x25BC;</span></div>'
      +'<div class="cbody">';
    if(key==='즉시체크'){
      h+='<div style="padding:16px 18px;overflow-x:auto"><table class="clt"><tr>'
        +'<th style="width:70px">\uad6c\ubd84</th><th>\ub0b4\uc6a9</th><th style="width:155px">\ud574\ub2f9 \ub9e4\uc7a5</th><th style="width:95px">\uc0c1\ud0dc</th><th>\uc870\uce58</th></tr>';
      (sec.items||[]).forEach(function(r){
        var st=r['\uc0c1\ud0dc']||'';
        var sc=st.indexOf('\u274c')>-1?'red':st.indexOf('\u2705')>-1?'green':st.indexOf('\ud83d\udccc')>-1?'blue':'gray';
        h+='<tr><td><strong>'+esc(r['\uad6c\ubd84']||'')+'</strong></td>'
          +'<td>'+esc(r['\ub0b4\uc6a9']||'')+'</td>'
          +'<td style="font-size:11px;color:var(--muted)">'+esc(r['\ub9e4\uc7a5']||'')+'</td>'
          +'<td><span class="st '+sc+'">'+esc(st)+'</span></td>'
          +'<td style="font-size:12px">'+esc(r['\uc870\uce58']||'')+'</td></tr>';
      });
      h+='</table></div>';
    }else{
      (sec.items||[]).forEach(function(item){
        var tag=item.tag||'';
        var isW=tag.indexOf('\u26a0')>-1||tag.indexOf('\uc989\uc2dc')>-1||tag==='warn';
        var tc=isW?'warn':tag.indexOf('\ubcc0\ud654')>-1?'change':tag.indexOf('\uc81c\uc548')>-1||tag.indexOf('\uae30\ud68d')>-1?'proposal':tag.indexOf('\ubca0\uc2a4\ud2b8')>-1?'best':tag.indexOf('\ud2b8\ub80c\ub4dc')>-1||tag.indexOf('\ub3d9\ud5a5')>-1?'insight':'normal';
        var tl=esc(tag).replace('warn','&#x26A0;&#xFE0F; \uc989\uc2dc \uccb4\ud06c');
        var txt=esc(item.text||'')
          .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
          .replace(/(&#x26A0;[^<]*)/g,'<span class="wt">$1</span>');
        h+='<div class="sitem">'+(tag?'<span class="stag '+tc+'">'+tl+'</span>':'')+'<div class="stxt">'+txt+'</div></div>';
      });
    }
    h+='</div></div>';
  });
  main.innerHTML=h;
}
function toggleSec(hd){
  var sec=hd.closest('.csec');sec.classList.toggle('open');
  hd.querySelector('.cchev').style.transform=sec.classList.contains('open')?'rotate(180deg)':'';
}
function renderStoreBtns(){
  var all={};
  Object.keys(STORE_DATA_RAW).forEach(function(s){all[s]=1;});
  Object.values(weekStore).forEach(function(w){Object.keys(w.storeData||{}).forEach(function(s){all[s]=1;});});
  document.getElementById('slist').innerHTML=Object.keys(all).sort().map(function(s){
    return '<button class="sbtn" onclick="showStore(\''+s+'\')">'+esc(s)+'</button>';
  }).join('');
}
function filterS(q){document.querySelectorAll('.sbtn').forEach(function(b){b.style.display=b.textContent.indexOf(q)>-1?'':'none';});}
function showStore(name){
  document.querySelectorAll('.sbtn').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('.sbtn').forEach(function(b){if(b.textContent===name)b.classList.add('on');});
  var r=document.getElementById('sres');r.className='sres on';
  var ch=STORE_CH[name]||'';
  var h='<div class="sres-name">&#x1F3EA; '+esc(name)+'<span class="sres-ch">'+esc(ch)+'</span></div>';
  var wks=WEEK_ORDER.filter(function(w){return weekStore[w]&&weekStore[w].storeData[name];});
  if(!wks.length){h+='<div class="no-s">\uc774 \ub9e4\uc7a5\uc758 \ud53c\ub4dc\ubc31\uc774 \uc5c6\uc2b5\ub2c8\ub2e4</div>';}
  else{
    wks.forEach(function(w){
      var fbs=(weekStore[w].storeData[name]||[]).filter(function(f){return f.topic.indexOf('\u203b')===-1;});
      if(!fbs.length)return;
      h+='<div class="swblock"><span class="swlabel">'+w+'</span>';
      fbs.forEach(function(f){h+='<div class="sfitem"><div class="sfcat">'+esc(f.cat)+'</div>'+esc(f.fb)+'</div>';});
      h+='</div>';
    });
  }
  r.innerHTML=h;
}
var bdCurWeek=null;
var ESC_STORE_LABEL='\uD83C\uDFEA \uB9E4\uC7A5\uBCC4';
var ESC_CAT_LABEL='\uD83D\uDCC1 \uCE74\uD14C\uACE0\uB9AC\uBCC4';
var ESC_NODATA='\uC6D0\uBCF8 \uB370\uC774\uD130\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4';
var ESC_RAWDATA_LABEL='\uC6D0\uBCF8 \uD53C\uB4DC\uBC31 \uBC31\uB370\uC774\uD130';
var ESC_NOCAT_SUFFIX=' \uCE74\uD14C\uACE0\uB9AC\uC758 \uD53C\uB4DC\uBC31\uC774 \uC5C6\uC2B5\uB2C8\uB2E4';
var ESC_STORE_COUNT_SUFFIX='\uAC1C \uB9E4\uC7A5 \uD53C\uB4DC\uBC31';
var bdViewMode='store';
var bdCurCat=null;
var BD_CATS=['\uC758\uB958','\uC6A9\uD488','\uC2E0\uBC1C','\uB77C\uCF13','\ud300\uc2a4\ud3ec\uce20'];
function bdSetView(mode){bdViewMode=mode;if(mode==='category'&&!bdCurCat)bdCurCat=BD_CATS[0];renderBD();}
function bdSetCat(cat){bdCurCat=cat;renderBD();}

function openBD(){
  bdCurWeek = WEEK_ORDER.filter(function(w){return weekStore[w];}).slice(-1)[0];
  renderBD();
  document.getElementById('bdMbg').classList.remove('hidden');
}
function renderBD(){
  var body=document.getElementById('bdBody');
  var weeks=WEEK_ORDER.filter(function(w){return weekStore[w];});
  var tabsHtml='<div class="bd-tabs">'+weeks.map(function(w){
    return '<button class="bd-tab '+(w===bdCurWeek?'on':'')+'" onclick="bdSwitchWeek(\''+w+'\')">'+w+'</button>';
  }).join('')+'</div>';

  var toggleHtml='<div class="bd-toggle">'
    +'<button class="bd-toggle-btn '+(bdViewMode==='store'?'on':'')+'" onclick="bdSetView(\'store\')">'+ESC_STORE_LABEL+'</button>'
    +'<button class="bd-toggle-btn '+(bdViewMode==='category'?'on':'')+'" onclick="bdSetView(\'category\')">'+ESC_CAT_LABEL+'</button>'
    +'</div>';

  if(bdViewMode==='category'){
    toggleHtml+='<div class="bd-cat-tabs">'+BD_CATS.map(function(c){
      return '<button class="bd-cat-tab '+(c===bdCurCat?'on':'')+'" onclick="bdSetCat(\''+c+'\')">'+c+'</button>';
    }).join('')+'</div>';
  }

  var wd=weekStore[bdCurWeek];
  var contentHtml='';
  if(!wd || !wd.storeData){
    contentHtml='<div class="no-s">'+ESC_NODATA+'</div>';
  } else {
    contentHtml+='<div class="bd-week-hd2"><span class="bd-week-pill">'+bdCurWeek+'</span>'+(wd.date?'<span class="bd-week-dt">'+esc(wd.date)+'</span>':'')+'<span style="font-size:11px;color:var(--muted);margin-left:auto">'+ESC_RAWDATA_LABEL+'</span></div>';

    if(bdViewMode==='store'){
      var storeNames=Object.keys(wd.storeData).sort();
      if(!storeNames.length){
        contentHtml+='<div class="no-s">'+ESC_NODATA+'</div>';
      } else {
        storeNames.forEach(function(store){
          var fbs=(wd.storeData[store]||[]).filter(function(f){return f.topic.indexOf('\u203b')===-1;});
          if(!fbs.length) return;
          contentHtml+='<div class="bd-store-block">';
          contentHtml+='<div class="bd-store-name">\uD83C\uDFEA '+esc(store)+'</div>';
          fbs.forEach(function(f){
            contentHtml+='<div class="bd-fb-item"><div class="bd-fb-cat">['+esc(f.cat)+'] '+esc(f.topic)+'</div><div class="bd-fb-text">'+esc(f.fb)+'</div></div>';
          });
          contentHtml+='</div>';
        });
      }
    } else {
      var catEntries=[];
      Object.keys(wd.storeData).sort().forEach(function(store){
        (wd.storeData[store]||[]).forEach(function(f){
          if(f.cat===bdCurCat) catEntries.push({store:store, f:f});
        });
      });
      if(!catEntries.length){
        contentHtml+='<div class="no-s">'+esc(bdCurCat)+ESC_NOCAT_SUFFIX+'</div>';
      } else {
        contentHtml+='<div class="bd-store-block">';
        contentHtml+='<div class="bd-store-name">\uD83D\uDCC1 '+esc(bdCurCat)+' &mdash; '+catEntries.length+ESC_STORE_COUNT_SUFFIX+'</div>';
        catEntries.forEach(function(e){
          contentHtml+='<div class="bd-fb-item"><div class="bd-fb-cat">\uD83C\uDFEA '+esc(e.store)+' &mdash; '+esc(e.f.topic)+'</div><div class="bd-fb-text">'+esc(e.f.fb)+'</div></div>';
        });
        contentHtml+='</div>';
      }
    }
  }
  body.innerHTML=tabsHtml+toggleHtml+'<div class="bd-content">'+contentHtml+'</div>';
}
function bdSwitchWeek(w){bdCurWeek=w;renderBD();}
function closeBD(e){
  if(!e||e.target===document.getElementById('bdMbg')){
    document.getElementById('bdMbg').classList.add('hidden');
  }
}
function openMod(){document.getElementById('mbg').classList.remove('hidden');document.getElementById('msrch').focus();}
function closeMod(e){
  if(!e||e.target===document.getElementById('mbg')){
    document.getElementById('mbg').classList.add('hidden');
    document.getElementById('sres').className='sres';
    document.querySelectorAll('.sbtn').forEach(function(b){b.classList.remove('on');});
  }
}
function handleUpload(input){
  var file=input.files[0];if(!file)return;
  document.getElementById('loverlay').classList.remove('hidden');
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var sn=wb.SheetNames[wb.SheetNames.length-1];
      var ws=wb.Sheets[sn];
      var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      var hr=raw[2]||[];
      var stores={};
      for(var i=3;i<hr.length;i++){if(hr[i]&&String(hr[i]).trim())stores[i]=String(hr[i]).trim();}
      var sd={};var rows=[];
      for(var ri=3;ri<raw.length;ri++){
        var row=raw[ri];
        var topic=String(row[1]||'').trim();
        var cat=String(row[2]||'').trim();
        if(!topic&&!cat)continue;
        var fbs={};
        Object.keys(stores).forEach(function(ci){
          var v=String(row[parseInt(ci)]||'').trim().replace(/[\r\n]+/g,' ');
          if(v&&['x','X','-','\\'].indexOf(v)===-1){
            fbs[stores[ci]]=v;
            if(!sd[stores[ci]])sd[stores[ci]]=[];
            sd[stores[ci]].push({cat:cat,topic:topic.slice(0,80),fb:v});
          }
        });
        if(Object.keys(fbs).length)rows.push({topic:topic,cat:cat,feedbacks:fbs});
      }
      var txt='\uc8fc\ucc28: '+sn+'\n\n';
      rows.forEach(function(r){
        if(r.cat==='\uacf5\ud1b5'&&r.topic.indexOf('\u203b')>-1)return;
        txt+='['+r.cat+'] '+r.topic.slice(0,60)+'\n';
        Object.keys(r.feedbacks).forEach(function(st){txt+='  '+st+': '+r.feedbacks[st].slice(0,200)+'\n';});
        txt+='\n';
      });
      callAI(txt,function(summary){
        weekStore[sn]={date:summary.date||'',summary:summary,storeData:sd};
        Object.keys(sd).forEach(function(st){if(!STORE_DATA_RAW[st])STORE_DATA_RAW[st]={};STORE_DATA_RAW[st][sn]=sd[st];});
        cur=sn;renderAll();
        document.getElementById('loverlay').classList.add('hidden');
      });
    }catch(err){alert('\uc624\ub958: '+err.message);document.getElementById('loverlay').classList.add('hidden');}
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}
function callAI(text,cb){
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,system:_SYS,messages:[{role:'user',content:text}]})
  }).then(function(r){return r.json();}).then(function(d){
    var raw=(d.content||[]).map(function(c){return c.text||'';}).join('');
    var clean=raw.replace(/\u0060\u0060\u0060json/g,'').replace(/\u0060\u0060\u0060/g,'').trim();
    cb(JSON.parse(clean));
  }).catch(function(e){alert('AI \uc624\ub958: '+e.message);document.getElementById('loverlay').classList.add('hidden');});
}
document.addEventListener('dragover',function(e){e.preventDefault();});
document.addEventListener('drop',function(e){
  e.preventDefault();
  var f=e.dataTransfer&&e.dataTransfer.files[0];
  if(f&&(f.name.endsWith('.xlsx')||f.name.endsWith('.xls')))handleUpload({files:[f],value:''});
});
renderAll();
</script>
