"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"스커트: 기존 스커트 보다 기장감이 좀 더 길면 좋을 듯. 타사 보다 너무 짧다는 의견이 많았으며, 골프와 테니스를 같이 하는 고객들이 많아 겸용으로 입으시려고 하는데 너무 짧아 부담스러워 함. 무릎정도 오는 긴기장 스커트에 대한 문의도 많은 편이나 구성이 없어 아쉬움. 이번 라코스테 등에서 나온 듯 / 폴로티: 남성고객의 터치나 구매율이 높은 편. 스타일, 다양할 컬러, 소재 필요. 라운드T 중복 느낌 축소하고 카라로 변경해도 좋을 듯. 테니스 브랜드 중 가격이 있는 편이다 보니 선물용으로도 많이 구매하시는데 라운드 보다는 카라에 대한 수요가 큼 / 퓨어에이스티셔츠 핑크의 경우 컬러, 소재에 대한 만족도는 크나 라운드 티셔츠라 30대 후반 이상의 고객들은 카라 디자인은 없냐는 문의가 많았음. 골프 겸용으로 입으시려는 고객들도 다수 있는 편이며 연령대가 있을수록 라운드 보다는 카라 형태 등의 고급스러운 느낌을 추구하는 편./ 퓨어드라이 유니 XS사이즈: 기본 라인이다 보니 가격부담이 적어 학생들의 터치 및 수요도 어느정도 있는데 공용은 너무 크고 여성용은 라인이 들어가 핏이 애매한 경우가 다소 있었음. 유니라인 전체까진 불가하더라도 에이스 라인에 XS이 추가 구성된다면 판매에 도움이 될 듯함/ 여성 숏팬츠: 4-5인치 정도의 기장감이 있는 숏팬츠의 수요가 많은데 구성이 부족하여 아쉬움 다른 버전들은 너무 짧다고 하시며, 이번시즌 숏팬츠 대부분 디자인이 피키와 비슷하게 출시되어 종류가 적은거 같다고 느끼는 고객들이 꽤 있었음 기장감이 좀 더 길고 깔끔한 디자인으로 출시된다면 4-50대 여성고객들의 니즈를 충족시키기 좋을듯함."},{"cat":"용품","topic":"","fb":"소프트에어의 경우 LVD반응 좋음. 기존 에어시리즈 GBL, YBL컬러를 더 많이 찾으시긴 함. 품절되어 LVD로 구매 / 윌베어는 귀엽다고는 하지만 구매로는 잘 이어지지 않고 있음 / 바이저의 경우 세탁가능, 가벼운 소재에 대한 만족도는 좋은 편이나, 착용 시 안정감 없이 위로 올라오거나 내려가 벗겨질 것 같다는 의견이 있었음. 소재가 탄탄하지 않아 반복 착용 시 늘어나는 현상에 대한 우려도 있었음(늘어날 경우 따로 조절 어려운 디자인)"},{"cat":"신발","topic":"","fb":"새로운 컬러 출시로 고객들의 선택지가 넓어짐. 기존WGN은 꾸준히 판매되고 있으며 새로운 컬러 모두 반응 좋음. 특히 과하지 않은 컬러감으로 산뜻한 느낌은 살리고 무난하게 코디 가능하여 만족도가 높았음."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"다른 라인에 비하여 문의가 많지는 않으나 출시일, 스펙에 관련하여 소량 있었음."},{"cat":"팀스포츠","topic":"","fb":"."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"타지 유입 고객 감소. 평일 주말 모두 전반적인 입점객이 감소함."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"1박스"}],"7월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"남녀공통/퓨어드라이 시리즈 전체 - 본격적으로 날이 더워지며 땀에 비침이 덜 한 기능성의 수요가 높아짐 메인VMD인 랠리 네이비와 에이스글로우 핑크에 대한 판매율도 높았음 /하의의 경우 남녀모두 한가지 특정 디자인보단 원하는 라인으로 골고루 판매가 되었음"},{"cat":"의류","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신상 전반적인 고객 터치 및 피드백","fb":"여성 : 신상브라탑이나 스커트 입고로 브라탑의 터치율 및 판매율이 소폭 상승함 지방권의 특성상 브라탑이 부담스러워 구매를 망설이는 경우가 다소 있었으나 이 경우엔 탑스핀폴로 로 어느정도 대체를 하였음./ 남성: 전체적으로 원단에 대해선 항상 만족하시는 편이나 항상 디자인이 너무 비슷하다는 의견이 다소 있었음 특이점이 될만한 디자인이나 라인이 없어서 구매를 망설이긴 하였으나 셋업코디로 어느정도 대체함 남성의 경우 너무 중복되는 디자인들을 좀 더 줄이고 포인트가 될만한 라인을 추가하거나 심플한 폴로티 등을 좀 더 추가한다면 더욱 판매에 도움이 될것같음"},{"cat":"용품","topic":"2-1. 의류/용품/신발 판매 특이사항 - 드로우스트링 신규 반응","fb":"1.백팩:터치율도 높고 반응도 나쁘지 않았음 다만 디자인이 항상 비슷하여 피로감이 다소 느껴진다는 의견이 있었음/ 2. 캠프캡: 색감도 너무 예쁘고 포인트자수 컬러도 조화가 잘 어우러짐 세트로 묶어 판매하기에도 좋고 모자 단독으로도 판매가 잘 이루어질듯함/ 3. 바이저: 두가지 스타일 모두 터치율도 높고 고객들 디자인 반응도 좋았음 글로우 베일의 경우 중앙 필기체 자수가 고급스럽고 색감또한 연한컬러로 여성고객들의 터치율이 매우 높았음"},{"cat":"신발","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신발 신규컬러 반응","fb":"에어리W : 3가지 컬러 모두 터치율은 소폭 있음, 2-30대 연령층은 옐로우, 40대 여성들은 레드컬러에 대한 반응이 좋았음 하지만 다소 안정감이 더 있는 모델을 선호하여 구매까지 크게 이어지진 않음/ 리스폰스프로: 남녀전연령층에게 모두 반응이 좋음, 컬러감, 배색자체가 고급스럽고 깔끔하여 호불호없이 판매가 수월하게 이루어짐"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 - 디파이어 판매반응","fb":"1.런칭 후 방문구매 비중 100% / 2. 기존 자사 블레이드 사용고객 30% 타사 70% (대부분 바볼랏 퓨어에어로, 요넥스 브이코어)/ 3. 구력자 100%/4. 윌슨 스핀형 라켓에 대한 궁금증과 사설스포츠샵에 아직 풀리지 않아 빨리 구매하고 싶어 가져가신 경우가 많았음. 또한 매장 블로그를 보고 문의한 고객들의 비율도 소폭 있었으며 구매고객들의 시타후기 등을 보고 서서히 더 관심을 보이는듯함 /5. 디자인: 전반적으로 모두 만족하시는 편임 실물컬러가 훨씬 강렬하며 고급스러워 보인다는 의견이 많았음. 추후에 블랙으로 출시예정이 있는지에 대한 문의 또한 다소 있었음, 따로 컨셉에디션이라 구매한다 라는 고객은 적었음 성능: 구매 후 시타고객의 후기는 블레이드의 컨트롤감이 느껴지며 스윙이 빠르고 가벼워지는 느낌이 크다고함 라켓이 주는 안정감이 느껴지며 이질적인 느낌이 적다고함 / 6. 매장블로그 문의, 입점여성고객들의 여성스펙 문의가 소폭 있었음 특히나 100UL에 대한 관심도가 높았으며 기존 요넥스 브이코어 또는 이존 등 타사라켓 사용하는 구력이 어느정도 있는 여성 고객들의 비율이 높았음/ 관심량에 비해 물량이 턱없이 부족하여 너무 아쉬움 16일부터 사설스포츠샵에서 판매시작시 가격저항이 심할텐데 초반물량이 더 있었다면 훨씬 많이 판매 되었을것같음 입고일부터 주말까지 전부 98PRO 에 대한 문의였음 100도 매장내 판매가 잘 이뤄지고 있지만 매장 내 재고 전부 소진하여 모두 예약주문하심."},{"cat":"기타","topic":"전주대비 고객 입점 현황","fb":"경쟁브랜드 시즌오프 및 매장 앞 대행사장 크록스 대형행사로 입점객 감소 / 디파이어 문의 고객들로 매출 소폭 방어함"}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"퓨어드라이 T / 기온상승과 습한 날씨로 기능성 의류에 대한 고객들의 관심도가 한층 높아짐. 착장 시 비침이나 몸매 부각이 적으며, 원단 만족도 높음. 운동+일상을 겸용해서 입을 수 있는 점이 가장 큰 장점."},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"퍼포먼스 스타일이 대부분이다보니 매출에 한계점이 있음. 남성의 경우 비슷한 라운드 티셔츠의 종류만 너무 많아 스타일이 중복 되어 아쉬움. 여성의 경우 반집업 아노락 같이 남성과 커플로 같이 입을 수 있는 아이템이 부족해 아쉬움. 퍼펙트 스윙 슬리브리스 같은 스타일도 더 나오면 좋을 듯. 러닝이나 다른 운동도 겸하는 고객들이 많고 그런 유형의 고객들은 반팔보다 기능성 루즈핏 나시나 기본 나시 아이템을 많이 찾으심."},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"스윙라이트캡의 경우 소재가 가볍고 좋다는 반응이 있으나, 스윙모션캡의 쉐입이 더 예쁘다는 고객들이 많았음. 라이트캡 착장 시 딱 잡아주는 느낌이 없고 기존보다 사이즈가 크게 느껴져 운동 시엔 불편할 것 같다는 의견도 있었음."},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"볼트프로-더운 날씨로 통기성이나 가벼운 신발을 찾는 고객들이 많아져 꾸준히 판매 됨. 신규 컬러들도 전체적으로 반응 좋은 편 / 에어리-입문자들이 더 선호하는 디자인으로 한여름이다보니 테니스를 시작하는 고객이 봄에 비해 줄어들어 판매율이 빠르게 올라오지 않는 듯 / 리스폰스-발목까지 딱 잡아주는 착화감을 선호하는 고객들이 꾸준히 구매. 신규컬러도 반응 좋은 편. 검정의 경우 지난 시즌의 올검보다 덜 무거운 느낌의 그라데이션으로 터치율 늘었음"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"디파이어에 대한 문의가 많았음. 실제 구매 고객의 후기가 긍정적인 편이고, 물량이 너무 적어 구매를 못 한 고객이 많아 관심도도 더 올라간 듯. 초반에 반응이 있을 때 판매할 수 있는 수량이 없어 아쉬움. / 블레이드V10의 터치율과 판매율이 전주대비 상승하고있음"},{"cat":"팀스포츠","topic":"2-2. 팀스포츠 판매 특이사항","fb":"."},{"cat":"기타","topic":"고객 입점 동향","fb":"연휴로 금요일엔 반짝 늘었으나 비가 오락가락하다보니 토,일은 입점 객수가 전주와 비슷"}]},"신세계센텀":{"5월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"이번주도 퓨어드라이 관련제품들의 반응이 가장 좋았습니다. 남자 소량 단체건도 있었고 대부분 더운날씨에 퓨어드라이 제품들을 많이 찾았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  **신발 : 에어벨 W 고객 반응 (착화, 디자인","fb":"날씨가 더워짐에 따라 퓨어드라이 제품들의 터치가 많이 되는데 벌써 공용 퓨어드라이 제품들의 S,M 사이즈들이 재고가 많이 부족합니다."},{"cat":"용품","topic":"","fb":"디팬더캡처럼 강한 햇빛에 얼굴을 가려주는 제품의 문의가 많았습니다."},{"cat":"신발","topic":"","fb":"연휴기간동안에 외국인고객들에게 반응은 참좋았습니다. 국내고객들에게도 여성스러운 디자인에 몇몇 터치가 있었지만 테니스화로는 활용을 못해 많은 판매로는 이어지고 있지는 않습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"런칭후 주말동안 큰 반응은 없었습니다만 문의전화는 있었고 대부분 클래시 였습니다."},{"cat":"팀스포츠","topic":"","fb":"가정의달로 팀스포츠 관련 제품들 아이들에게 선물용을 판매가 잘되었습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주 대비 상당히 트래픽이 빠졌습니다. 4월말에서 5월 첫주동안은 엄청난 외국인 고객들과 가정의달 행사로 백화점을 찾아주셨지만 이번주는 생각보다 연휴기간동안 많은 지출로 많은 트래픽은 없었습니다."},{"cat":"","topic":"전체 고객 중 외국인 유입비중 (증가한 사유? 별도 점포에서 외국인 대상 진행하고 있는 프로모션/사은혜택은?","fb":"외국인 비중은 절반으로 줄었습니다. 5/1 ~ 5/4일까지의 외국인 비중이 가장 컷습니다! 외국인관련 프로모션이 외국인 멤버스카드 만들시 5%할인, 세급환급 매장에서 즉시 환급 7%, 그외 위챗으로 결제시 랜덤으로 5%할인 우대"}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"퓨어드라이 제품들과 시어아이스제품들의 반응이 좋았습니다. 아무래도 이제는 더워진 날씨에 시원한소재의 상품들을 많이 찾고 있습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"퓨어드라이제품들의 리오더로 여성반팔티셔츠 판매에 숨통이 트였고 시어아이스 관련제품들의 반응이 너무 좋았습니다. 그리고 시즌반품으로 매장이 약간 비어보이는 느낌이 있었지만 신상품입고로 좀 잘채워진 느낌입니다."},{"cat":"용품","topic":"","fb":"바이저 제품들은 매년 여름에 잘나가는 상품중에 하나입니다. 그러나 아직까지 그외 여픔제품들은 크게 관심은 없는편입니다."},{"cat":"신발","topic":"","fb":"디자인때문에 여성고객들이 관심을 좀 가지는 편입니다. 테니스화로 나왔다면 아마 더 반응이 좋았을것으로 보입니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"일단 롤랑가로스 클래시버전은 인기가많습니다. 매년 그랫지만 여성고객들에게 딱 타켓팅이 맞춰진 느낌입니다. 그러나 일부고객들은 흘림체 글씨에 불호를 느끼고 있으며 작년 디자인보다 못하다는 의견들도 꽤 있었습니다. 그리고 블레이드 관련 제품들도 초반대비 관심이나 판매가 확 줄어들상태입니다."},{"cat":"팀스포츠","topic":"","fb":"학생들에게 꾸준히 판매가 잘되고 있는 팀스포츠카테고리 입니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"연휴끝으로 입점객이 많이 줄었지만 크루즈입항으로 또 많은 외국인 고객들이 백화점으로 몰렸습니다."}],"5월3W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"금주에도 크루즈입항으로 많은 외국인이 유입이 되었고 아펙스 브라, 엘리트 플리츠 스커트 셋업으로 판매가 잘되었고 더운날씨에 슬리브리스 제품들의 반응이 상당히 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통) -의류 : 엘리트 퍼포먼스, 어드밴스드 등 (5/1","fb":"금주 신상품관련해서는 아직 크게 터치는 없었습니다만, 아펙스브라탑과 엘리트 플리스 스커트 그리고 퍼펙트 스윙 슬리브리스 제품들의 반응이 좋았습니다. 물론 비중은 외국인 고객비중이 컷고 그리고 전체적으로 퓨어드라이 제품들과 시어아이스 제품들의 반응이 아주 좋았습니다."},{"cat":"용품","topic":"","fb":"리본 니삭스 리오더 입고 되면서 바로 판매가 잘되었고 그전에 주문해놓으셨던 고객들도 있어서 금방 재고가 소진되었습니다.  선셋매치 관련제품들은 조금더 반응을 지켜봐야될듯합니다."},{"cat":"신발","topic":"","fb":"금주는 신발판매가 많이 저조했습니다. 발볼넓은 남성고객들이 매장으로 많이 찾았지만 수입제품중에 발볼넓은 상품으로 많이 찾아 아쉽게 구매하지못하고 나가는 손님이 좀 있었습니다. 리스폰스로 대체해서 권해드렸지만 러쉬제품으로 원하는고객들이 좀 많았습니다. 러쉬 에이스 처럼 발볼넓은 수입화가 좀 필요합니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"테린이분들이 거의 대부분이었고 클래시와 블레이주 위주로 판매가 되었습니다."},{"cat":"팀스포츠","topic":"","fb":"팀스포츠관련 제품들은 학생들에게 꾸준히 판매가 잘되고있습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주랑 비슷한 입점을 보여주었으며 금주에도 크루즈 입항으로 외국인 고객들이 많은 한주였습니다."}],"5월4W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"이번주도 많은 외국인 고객들이 매장을 방문하였고 다양한 연령대의 가족,커플 고객들이 많았습니다. 대부분 퓨어드라이나 반팔위주의 상품들이 잘나갔고 스트링백팩 종류도 반응이 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 [의류] 선셋매치 라인업  1. 구매목적 : 테니스 카테고리가 아니라","fb":"1. 선셋매치 상품들은 윌슨을 좋아하는 테니스를 좋아하는 고객들이 테니스칠때 말고 일상용으로 보고 구매를 많이 했습니다.   2. 일단 퓨어드라이 소재의 새로운 프린팅 디자인이 나온게 반응이 좋았고 대부분 여름에 놀러갈때나 일상용으로 착용할려고 판매가 잘되었습니다. 쇼츠도 셋업으로 같이 판매가 잘되었습니다.  3. 퓨어드라이 소재는 남여 고객 모두 만족감을 보여주고 있어서 퓨어드라이 소재의 새로운프린팅 제품들이 계속 나온다면 판매가 꾸준히 잘될것입니다. 그리고 남성용 쇼츠 벨크로 포켓에 관련해서는 큰 불호는 없었고 조금더 긴기장에 버뮤다팬츠 핏으로 나왔으면 하는 바램도 있었습니다."},{"cat":"용품","topic":"","fb":"아직 모자는 크게 반응은 없고 양말은 많지는 않지만 섯셋매치 의류 판매하면서 연계판매로 좀 판매가 되었습니다."},{"cat":"신발","topic":"","fb":"여성스럽고 귀여운 디자인에 여성고객들의 많은 관심이 있었지만 테니스화가 아니라서 발길을 돌리신 분들이 많았습니다. 판매도 외국인 비중이 더 많았습니다, 7 : 3 으로 외국인 비중이 높습니다!"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드와 롤랑가로스 라켓의 반응이 가장좋았습니다."},{"cat":"팀스포츠","topic":"","fb":"날씨가 많이 풀리면서 야구글러브 판매가 많이 올라오고있습니다,"},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주랑 비슷한 입점율이었습니다. 날씨가 많이 따뜻해져서 나들이 고개들로 많았고 이번주도 크루즈입항으로 많은 외국인 고객들이 있었습니다."},{"cat":"","topic":"1) 에어벨 W의 판매호조 사유 - 주 구매 고객층 (테니스/일반) (테니스신발이 아닌데 어떤고객이 구매하는","fb":"1. 크게 많이 팔지는 않았지만 구매고객 대부분이 외국인 고객들이었고 테니스용으로 보셨다가 일반용으로 알고 구매하신 분들이 대부분입니다.  2. 선셋매치 상품들도 테니스를 좋아하는 윌슨을 좋아하는 고객들이 매장에 들어와서 새로운 디자인의 퓨어드라이 소재 티셔츠라 반응이 좋았습니다. 구매고객 대부분이 여행용이나 일상용으로 구매했습니다."},{"cat":"기타","topic":"신규 라켓 출시 프로모션 진행을 위한 그립커버 사전 주문  박스당 수량 30개, 개당 단가: 3,000원(V","fb":"3박스"}],"6월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"다양한연령층의 고객들이 방문하였고 주 고객층들은 가족단위고객들중 3~40대 부부였습니다. 2NPS43 피케티셔츠와 선셋관련제품들의 반응이 가장좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품 - 드로우스트링 백팩V2 (아이보리, 화이트) 재입고 후 반응,","fb":"여성 기본 폴로셔츠들의 반응이 너무 좋습니다. 이번에 2NPS41이나 시어아이스 폴로셔츠등 기본디자인에 폴로셔츠들의 반응이 상당히 좋습니다."},{"cat":"용품","topic":"","fb":"입고 문의 많았고 차주 구매하러 온다는 연락도 많았습니다."},{"cat":"신발","topic":"","fb":"최근 좀 전문적으로 테니스칠때 신을 신발을 찾는 고객들이 많아서 인트리그나 러쉬제품들로 안내를 해드리고 있습니다. 지금 너무 밝은 톤의 수입화만 있는데 고객들이 어두운 컬러신발도 많이 찾고는 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"매장내에 롤랑가로스 클래시는 모두 완판이 될정도로 인기가 많았습니다."},{"cat":"팀스포츠","topic":"","fb":"팀스포츠 제품들은 있으면 있는데로 판매가 잘되고있습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주와 비슷한 입점율입니다. 6/1일 6/5일 크루즈 입항으로 또 많은 외국인 관광객들이 백화점으로 몰렸었습니다."}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"2~40대여성고객들이 많았고 리오더 들어온 아이코닉 쇼츠와 퓨어드라이제품들의 반응이 가장 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"매장에 없던 프린팅의 디자인제품이라 여성고객들의 반응이 좋았습니다."},{"cat":"용품","topic":"","fb":"아직 큰 반응은 없었습니다."},{"cat":"신발","topic":"","fb":"최근 테니스 숙련자 고객들이 많아 볼트프로 제품들보다는 수입테니스화쪽으로 더 관심으 보이고 있습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"최근 외국인 고객들의 라켓 구매율이 많이 올랐습니다."},{"cat":"팀스포츠","topic":"","fb":"팀스포츠제품들은 꾸준히 판매가 잘되고있습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"부산에 크루즈입항과 BTS 공연으로 많은 외국인 고객들이 몰렸었습니다."}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"멜로우 크롭 티셔츠와 새로운 퓨어드라이 제품들의 반응이 가장좋았습니다. 대부분 운동목적으로 구매를 했고 여러 클럽에서 소규모단체문의가 많았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"퓨어드라이제품들은 가볍게 팔기에도 좋고 지금 이렇게 더운날씨에 가장 잘 팔수있는 아이템입니다. 이번 FW 신상퓨어드라이가 들어오면서 새로운프린팅과 새로운컬러에 벌써 여성고객들에게 반응이 상당히 좋았습니다.  그리고 시어아이스 긴바지가 반응이 좋았는데 대부분 시어아이스 셋업으로 착용할수 있었던거 때문에 반응이 좋았었습니다. 그래서 새로운 바지종류들이 나온다면 셋업으로 고객들에게 권해줄수 있는 아이템들이라면 슬림핏이든 조거형식이든 다 좋을것 같습니다."},{"cat":"용품","topic":"","fb":"이번주도 많은 외국인 고객들이 몰리면서 스트링백팩V2 가방이 가장 반응이 좋았습니다."},{"cat":"신발","topic":"","fb":"볼트 프로 새로운 컬러가 인기가 많았고 에이리W 재입고로 기존 예약주문하신 고객들이 있었는대 대부분 다음주에 방문하기로 했습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드와 클래시의 반응이 좋았고 최근 외국인 고객들이 라켓판매가 많아졌습니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션 단체 문의 있었습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주랑 비슷했습니다만 전주랑 다르게 주말에 많은 외국인 고객들이 몰리면서 판매가 잘되었습니다."},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"일단 사은품 주는것에 고마워하고 여성분을은 안쓰더라도 남자친구나 남편준다고 상당히 좋아했습니다."}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"퓨어드라이 소재의 반팔티셔츠가 전체적으로 판매가 좋았고 여성 멜로우 티셔츠도 반응이 좋았습니다!"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"최근 배드민턴, 탁구 등 생활체육 고객들이 증가하면서 매장에 입점되는 고객들의 나이대가 다양해졌는데 현재 매장에 있는 스커트들이 길이감이 다 짧아서 5~60대 고객들이 상당히 부담스러워하는 부분이 있습니다. 무릎까지오는 기장감의 스커트나, 기능성 얇은 긴바지도 필요합니다."},{"cat":"용품","topic":"","fb":"스트링백팩 신규컬러들의 반응은 좋은편입니다. 그래도 국내고객들보단 외국인 고객들에게 인기가 많은편이고 월베어 키링은 아직까지는 크게 반응이 있지는 않습니다."},{"cat":"신발","topic":"","fb":"신상컬러보다는 기존의 그린컬러의 반응이 더 좋았습니다!"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"디파이어 라켓 문의 보다는 블레이드라켓의 반응이 더 좋았고 최근 외국인고객들의 라켓판매율이 올랐습니다."},{"cat":"팀스포츠","topic":"","fb":"팀스포츠 관련제품들은 꾸준히 판매가 되고있습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주와 비슷했습니다. 특히 이번주말에는 외국인관광객보다는 국내고객들의 트래픽이 훨씬 좋았고 평일에는 외국인 고객들의 비중이 컷습니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"2박스"}]},"롯데아울렛기흥":{"5월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"금주 남녀 모두 시어아이스 라인이 터치가 가장 많이 일어나며 구매전환율이 가장 높았습니다. 꾸준히 날이 더워지면서 기능성 제품의 터치가 증가하는데 시어아이스의 경우 냉감이 있으며 신축성까지 있어 착용감이 좋아 반응이 좋았습니다. 특히 여성 고객의 경우 기장감이 너무 짧지 않아 연령대 상관 없이 너무 만족해하셨습니다. 여성고객은 스포츠 탑 또는 나시 를 같이 착용하다보니 비춤에 덜 민감한 편이지만 남성은 이너를 잘 착용하지 않아 컬러감이 있는 상품을 더 선호했습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  **신발 : 에어벨 W 고객 반응 (착화, 디자인","fb":"퓨어드라이 라인은 사이즈가 깨진 상품들도 리오더가 된다면 꾸준히 수요가 발생할 것으로 예상됩니다."},{"cat":"용품","topic":"","fb":"모자,아대,양말 등 컬러 조합을 맞춰 보통 세트로 판매가 되며 소재가 좋아 단품으로도 구매가 이뤄지고 있습니다. 디팬더 모자의 경우 자외선 차단에 대한 설명이 있지 않아 고객님들이 혼동하는 경우가 있었습니다."},{"cat":"신발","topic":"","fb":"에어벨의 경우 20대 고객에게 터치가 조금 있었지만 착용 후 샌들 대비 가격대가 비싸 구매까지 이뤄지지 않았습니다. 디자인,컬러감,착화감 모두 만족하시긴 했지만 아직까지 윌슨의 데일리화가 익숙치 않아 구매를 미뤘습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"롤랑라켓 목적 유입은 2팀 뿐이였습니다. 다른 고객들은 블레이드 신규 모델 출시가 되어 매장 방문이 이뤄졌지만 롤랑가로스가 출시되어 둘 중 고민을 하셨습니다. 롤랑라켓중에선 클래쉬가 가장 많이 판매되고 작년에는 블레이드가 있었는데 올해는 안 나오냐는 문의가 많았습니다. 색감 자체가 밝아 남성보단 여성고객이 더 선호하다보니 클래쉬 265G이 가장 많이 판매됩니다. 라켓을 구매하시면 대부분 신발,가방과 같이 연계판매가 진행되고 있습니다."},{"cat":"팀스포츠","topic":"","fb":"가족단위 입점이 많아지면서 농구공,글러브의 수요가 증가했습니다."},{"cat":"상설","topic":"쉴드백팩(정상판매율 65%), 슬링백(정상판매율 27%)의 판매부진 사유는 ? 상설 테니스 카테고리 의류의","fb":"쉴드백팩의 경우 스트링백팩에 비해 신발 따로 넣은 칸의 부재, 일상겸용보다 테니스전용인 느낌의 디자인으로 인해 순위가 밀렸습니다. 상설테니스 라인의 의류의 경우 사이즈가 깨지거나 포인트 컬러의 경우 셋업의 부재로 인해 구매를 미루는 경우가 있었습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주대비 가족,커플 단위 입점이 많이 증가했습니다. 어린이날과 어버이날이 겹치며 선물용으로 구매를 하시기도 하고 상품권을 사용하러 점자체 입점이 많이 증가했습니다. 단품보다 셋업 상품들로 주로 연계판매가 이뤄졌습니다."},{"cat":"","topic":"전체 고객 중 외국인 유입비중 (증가한 사유? 별도 점포에서 외국인 대상 진행하고 있는 프로모션/사은혜택은?","fb":"외국인 유입 비중은 변함 없이 9:1을 유지하고 있습니다."}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"금주 여성의 경우 리오더된 퓨어드라이 에이스와 같이 퓨어드라이 라인의 수요가 가장 많았습니다. 모자,아대,양말 등 용품들과 포인트 컬러를 맞추며 대부분 세트로 구매가 이뤄졌습니다. 남성 고객 또한 퓨어드라이 라인을 가장 선호하며 시어아이스,스피드 드라이 같이 얇은 두께감은 비춤이 신경쓰여 흰색 제외한 컬러만 구매가 이뤄지고 있습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"W262002TBR51 같은 경우 길이 조절하는 부분이 헐거워 운동중 빠질 것 같다는 피드백이 있었습니다."},{"cat":"용품","topic":"","fb":"바이저 제품들은 남녀 모두 사이즈 조절이 가능해 구매가 꾸준히 이뤄지고 있습니다. 암슬리브,마스크의 경우 테니스 고객들 뿐만 아니라 골프 고객들도 원단이 좋아 구매가 이뤄지고 있습니다. 글러브의 경우 겨울은 손이 시려 남녀 모두 찾지만 여름에 남성 고객은 땀이 나 오히려 불편하다며 구매를 미루고 여성 고객은 살이 타는걸 방지하려 구매가 이뤄졌습니다. 스트링 백팩의 경우 재입고가 되며 컬러 선택지가 많아져 구매여부에서 컬러 고민으로 바뀌어 가방 구매율이 증가했습니다."},{"cat":"신발","topic":"","fb":"에어벨의 경우 디자인은 선호하지만 착용 후 가격저항이 많아 구매까지 이뤄지지 않았습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"롤랑가로스 라켓의 경우 컬러감 자체가 예뻐 매년 큰 인기를 끌었습니다. 글씨체,문양은 클래식한 느낌이라 부드러운 컬러감과 조화로워 고급져보인다는 피드백이 많았습니다. 외국인 고객보단 내국인 고객의 관심이 더 크고 구매도 내국인으로만 이뤄졌습니다. 여성 6 남성 4로 관심을 가지며 구매비중은 여성 9 남성 1 이였습니다. 고 있습니다. 용품유는 드로우스트링백의 잠깐의 공백을 '캡'류들이 안정적으로 매출을 유지해서 서브매출에 크게 기여했습니다."},{"cat":"신발","topic":"","fb":"이번주에는 신발쪽에 수요가 부족한건 아니었지만 라켓과 의류중심으로 판매가 되어서 구매 우선순위에서 판매가 저조한것 처럼 보였으나 지난주보다 신발을 찾으시는 수요는 급증했습니다. 특히 '에어벨'같은 경우에는 테니스퍼포먼스용으로 판매하기 어렵기때문에 '일반테니스화'를 판매하면서 연계성있게 판매하는 경우가 아니라면 단품으로만 판매되기는 어려우나, 용품류로 생각하고 테니스어웨이버젼으로 생각하고 고객님들께 어필해볼수는 있을 것 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"라켓의 인기가 매장내에서 큰절정을 이루고 있습니다. 블레이드 뿐만아니라 로랑가로스 한정만의 판매까지 추가적으로 화력이 더해지면서 매장내의 고객님들의 유입이 크게 상승하였으며, 여름이라는 계절적이점으로 '신규고객'님들의 매장입점이 증가하였고 특히 구력이 높으신고객님들도 5~7월사이에 라켓교체시점이라고 생각하시는분들이 많아서 매장으로 구경하시는분들이 크게 늘었습니다."},{"cat":"팀스포츠","topic":"","fb":"날씨가 너무 좋아서 고객님들은 지금 딱 나들이 가기 좋은 시즌이라고 생각하시는 것 같습니다. 요즘 관광지에 농구골대가 있는 곳이 많이 늘어 낫는데 농구공이 있으면 여가생활을 하기 좋다고 인식하시는 고객님들이 많아서 매장에 오셔서 농구공을 충동구매하시는 분들이 많아졌습니다. 안정적인 매출유지에 서브매출역할을 잘해주고 있는 것 같습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"요즘 주말에 테니스 대회가 많아서 바쁜고객님들이 평일에 오셔서 제품을 구매하시는 분들이 많이 계십니다. 특히나 급하게 오시는 분들은 결정이 굉장히 빠르시며 , 여성분들같은경우에는 타이밍을 놓치면 바로 상품을 구매하지 못한다는 생각에 매장직원들이 코디만 잘해주면 빠르에 제품을 구매하는 경우가 많습니다. 특히나 요즘 제품이 굉장히 컬러풀해져서 꼭 셋업상품이 아니라도 고객님들께 권해드리기 쉬운점이 이번주 매출상승에 가자큰 이점이라고 생각됩니다. 앞으로도 여름은 특히나 컬러감이 가장 중요할 것 같습니다."},{"cat":"","topic":"전체 고객 중 외국인 유입비중 (증가한 사유? 별도 점포에서 외국인 대상 진행하고 있는 프로모션/사은혜택은?","fb":"이번주엔 일본고객님들의 입점이 굉장히 많이 늘었습니다. 요즘 외국인 \"한국방문의 해(?)\"라고 들었는데 고객님들이 특히 지난달 말일부터 많이 입점하고 있습니다. 중국을 비롯한 동남아의 고객님들이 제품을 구경하시러 오시기보다는 'k뷰티'를 체험하시기 위해서 오시는 분들이 대부분많은데 , 얼굴이 아파서 옷을 입어보지 못하시는 분들이 제품을 시원시원하게 잘 구매해 가시는것 같습니다. 그만큼 다양한 고객님들이 많이 매장에 오셔서 이를 먹는 경우도 있지만 '백화점내'의 별다른 프로모션이 없어도 매장에 많이 방문해주셔서 감사할 따름입니다."}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"이번주에는 20~30대 여성고객님들의 의류 판매가 가장 눈에 띄게 좋았습니다. 라이프스타일도 같이 활용할 수 있는 테니스룩을 선호하셨으며, 단순 기능성제품들보다 밝은 컬러감의 상품들과 셋업류의 판매가 굉장히 좋았고, 퓨어드라이류와 시어아이스류의 매출이 가장 이번주 매출에 핵심역확을 해주었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"이번주에 동남아와 일본중국의 관광객님들의 유입이 굉장히 많았습니다. 특히 이 해당 아시아권 국가의 날씨의 니즈는 굉장히 시원한 상품이면서 국내 한정상품의 제품이 가장 많응이 좋았습니다. 로코플레이나 흰색계열의 제품들 그리고 일반무드보다는 프리미엄한 무드의 상품들을 선호하시는 고객님들이 많았는데 골프웨어같은 니즈는 아니었습니다. 최근 남성분들의 구매 패턴도 조금 달라지고 있는데 예전에는 라켓을 보러왓다가 의류 조금 구매하시는 방식이었다면 최근에는 의류의 착장이 완성되면 신발이나 가방을 구매하시는 풀착고객님들이 많이 늘어낫습니다."},{"cat":"용품","topic":"","fb":"초여름 시즌으로 진입영향으로 바이저나 암슬리브같은 기능성 용품들의 문의나 판매가 굉장히 많이 상승했습니다. 특히 여성고객님들 중심으로 코디나 실사용을 동시에 해결하여는 고객님들이 많이 구매하셨으며 최근에 드로우스트링v2가 물량이 없어서 전체매출에 역신장이 걱정되었으나 최근 드로우에어의 판매가 굉장히 올라오면서 의류를 구매하는 고객님들이 용품을 연계구매하는 경우가 굉장히 많이 늘어났습니다."},{"cat":"신발","topic":"","fb":"에어벨w런칭 2주차 기준으로 여성고객님들의 반응은 살짝아쉬운것같습니다. 일반 테니스화대치 생각보다 착화의 편의성도 좋고 스타일링이 가능한 요소에 고객님들의 관심이 높아지고 있으며, 테니스 입문고객님들이나 패셔너블한 테니스와가 필요하신 고객님들이 좋아하시는 상품이라고 매장에서는 인식되고 있습니다. 특히나 20~30대 고객님들사이에서 평상시에 착용이 가능한지가 가장 중요한데 셋업이나 아니면 캐쥬얼한 스커트류가 있다면 함께 코디해서 판매하기 굉장히 좋을 것 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"1. 롤랑가로스 특유의 클래식한 필기체에 대한 반응은 매우 긍정적입니다. 한정판이라는 느낌이 굉장히 강하면서 특히 클레쉬는 클레이컬러계열의 느낌을 잘 살려서 제작되었기 때문에 요즘 시즌 의류와도 굉장히 판매가 좋았습니다. 매치업하기 정말 편합니다. 2. 내국인 고객님들은 디자인이나 희소성으로 접근하는 경우가 가장 많았고 외국인들은 한국이 라켓이 본인들 나라보다 더 저렴한데 줄까지 매준다고 하니 너무넘 좋아했습니다. 3.  남성고객님들은 한정판제품을 사용한다기보다는 희소성을 상징성으로 생각하시는 고객님들이 많이 구매하시는 것같았고 여성고객님들은 테니스웨어와 함께 입기 좋아하기때문에 감성좋은아이템으로 인식하고 구매하시는 경우가 많습니다.                          기타특이 사항으로는 블레이드 가방은 단독으로 구매하시는 분들은 많이 없었고 셋트구성으로 라켓과 같이 구매하시는분들이 많았습니다. 특히나 최근 동호회고객님들사이에서는 최근에 가장 화제가 되고 있는 라켓이라고 이야기 하시는분들도 많고 이로 인해서 한정판이 '윌슨'에 나왔다고 생각하여 구매로 종종 전환되는 경우가 많습니다."},{"cat":"팀스포츠","topic":"","fb":"실제 단순저가의 농구공을 쓰시는분들이 고가의 윌슨공을 구매하기 위해서 매장으로 오시고 있습니다. 이는 이제 운동할때 프리미엄하게 운동을 즐기고 싶은 고객님들의 심리?라고 생각되며 , 그만큼 계속해서 윌슨이 고객님들께 보내드리는 운동이라는 메세지는 야구용품과 농구용품을 윌슨으로 하여금 계속해서 소비를 증진시키고 실적인 실적의 강세의 흐름을 잘 유지하고 있다고 생각합니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주대비 확실히 매장기준으로 보면 전체적으로  고객님들이 소비자체를 많이 하시기 시작하시는것 같습니다. 요즘 아웃도어 시장의 강세가 스포츠에도 영향을 끼치고 있지만, 프리미엄한 이미지의 윌슨제품들로 하여금 단순 저가상품이 아닌 감성적이고 고급스러운 테니스웨어로 일반 라이프스타일을 구매하고 싶은 고객님들의 마음까지 사로 잡고 있는 것 같습니다. 다음주도 비슷한 흐름으로 이어진 전망입니다."}],"5월3W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"이번주에는 롤랑가로스 관련상품들이 모두 판매가 좋았습니다. 특히나 롤랑가로스 라켓을 중심으로 의류와 신발 용품까지 모두 판매가 좋았던 한주였고, 테니스 감성웨어의 느낌이 강하며 컬러와 그래픽이 과하지 않은 데일리 상품이 판매가 좋았습니다. 특히나 여름시즌을 맞이해서 착용감과 기능성 만족도가 못은 상품들이 이번주에 매장에서 가장 경쟁력있었습니다,"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통) -의류 : 엘리트 퍼포먼스, 어드밴스드 등 (5/1","fb":"1. 엘리드퍼포먼스 라인은 이번주에 고객반응에서 가장 \"정통 퍼포먼스 테니스웨어\"느낌이 강하게 전달되는 상품이었습니다. 특히 두잉용상품을 가장 중요하게 생각하는 테니스 진성고객님들이 활동성을위해서 상의의 핏감과 기능성등 디테일을 가장 중요하게 생각하시는분들에게 반응이 좋았습니다. 2. 어드밴스 라인은 엘리트 퍼포먼스 대비 조금더 데일리하고 부담없는 상품이라고 고객님들이 인새식하셔서 운동할떄도 입고 일상에서도 활용이 가능하길 원하시는 고객님들이 구매하셨습니다. 특히 최근에 고객님들이 과한 테니스복을 입지않기때문에 그냥 테니스감성의 깔끔한 스포츠 웨어로 인식해서 구매하셨으며, 연계코디가 생각보다 쉬워서 메인상품으로 판매되기보다는 서브의류로 판매가 좋았습니다. 3. 선셋매치 상품들은 이번주에 가장 인기가 많았던것같습니다. 기능성 자체보다 컬러감이나 그래픽 휴가,자유,휴식 등 여름시즌 특유의 밝고 감성적인 라이프스타일 무드가 잘 고객님들이게 전달되었으며, 20~40대 고객님들에게 윌슨테니스상품의 고급스러운 무드와 캐쥬얼의무드의 경계선을 다 가지고 있는 상품으로 인식시켜드리기 참 좋았습니다."},{"cat":"용품","topic":"","fb":"리본니삭스 w 리오더 재입고건에 대해서 고객님들의 반응이 굉장히 좋았고 기존 수요가 계속 유지되고있는 상품이었기때문에 타이밍상이번주에 판매가 좋았습니다. 또한 선셋매치 볼캡이나 크루삭스는 캐쥬얼하면서도 너무 퍼포먼스하지 않은 무드의 상품이기 떄문에 모든 고객님들에게 추천해드리기 좋았고 의류나 신반과 연계해서 판매하기 좋았습니다."},{"cat":"신발","topic":"","fb":"테니스 신발의 진입장벽이 확실히 많이 무너진 느낌입니다. 처음 테니스화를 구매하시는 고객님들도 이번주에 러쉬투어상품(남성)을 많이 구매하셨는데 요즘은 디자인에 있어서 의류나 신발 테니스화까지 스타일링이 풀코디로 제안 되었을때 테니스웨어를 모두 한꺼번에 구매하시는 고객님들이 많았습니다. 생각보다 신발을 먼저 해결한 후에 의류를 구매하시는 고객님들이 많아져서, 의류제작시 신발류의 컬러감이 먼저 1차작업이 되어서 앞으로 제작될 의류와서 협업이 이루어 지면 좋을 것 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"2026 윌슨 롤랑가로스 라켓이 지금 현 매장시점에서 라켓매출에 전체적인 면을 보면 단순 한정판이라는 인식보다는 윌슨이 최근 강화하고 있는\" 프리미엄 감성 + 퍼포먼스헤리티지\"전략이 꽤 잘 반영되어 제작되고 있는 제품이라고 생각됩니다. 특히 블레이드의 어마어마한 판매후의 후속타를 이어받아서 매장판매 매출의 중심역활을 다시 라켓이 해주고 있다고 생각이되며, 20~40대 여성분들에게 판매가 좋기때문에 라켓을 구입하시는 여성고객님들의 착장매칭의류컬러(베이지 , 오렌지, 카멜 등...)에 좀 더 \"롤랑가로스\"한 느낌의 상품들이 많이 제작 되었으면 좋겠습니다."},{"cat":"팀스포츠","topic":"","fb":"요즘 윌슨 농구공은 의뢰로 농구을 플레이하시는 고객님들이게 아주 좋은 인식이 있는데요~! 예전에는 농구공브랜드라는 이미지가 아닌 \"윌슨농구공\"을 쓰면 굉장히 농구씬에서 패셔너블한 농구선수로 인식된다고 함니다. 특히 경기용이나 동호회용 학교체육용으로 구매하시는 고객님들도 계시지만 방에 인테리어나 운동 인증샷을 찍으려는 감성선수? 분들도 최근 많이 늘어낫기때문에 \"윌슨\"이라는 브랜드가 여러가지 스포츠부분에서 굉장히 트랜디함으로 요즘 인식이 아주 멋지게 되고 있다고 생각이 들었던 한주 입니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주대비 이번주는 '기능성상품중심구매'에서 '라이프스타일구매고객이 월등히 많이 늘었던 한주였습니다. 특히나 선셋매치상품들처럼 롤랑가로스 무드의 상품군들이 많이 판매가 되면서 확실히 남성판매가 없던 전주대비 이번주는 스타일링이 좋은 상품들이 많이 입고되어서 30~40남성고객님들의 매장입점이 굉장히 많이 증가하였습니다. 특히나 롤랑가로스 에디션에 대한 관심이 꾸준히 높아지고 있으면서 최근 매장분위기나 vmd의 방향도 해외감성의 매장연출이 국내외고객님들에게 다양한 색감으로 매장을 선보이기 좋았으며, 조금 아위웠던점은 너무 퍼포먼스중심의 상품들이 전문성을 원하시는 고객님들께 일부 유지가 되고는 있으나... 점차점차 고객님들에게 계속해서 멀어지고 있는 부분이 상당히 아쉬웠고.. 이제는 퍼포먼스상품들의 라이프스타일 무드화가 빨리 진행이 되어서 조금 더 카테고리간의 연계판매가 더 많이 이루어 졌으면 좋겠습니다. 스타일리쉬한 퍼포먼스제질의 패션스타일의 상품들이 많이 만들어 졌으면 좋겠습니다."}],"5월4W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"20~30대 여성고객님들은 선셋매치과 남성고객님들은 롤랑가로스 디자인컬러가 들어가있는 그래픽상품에 굉장히 호감을 보이셨고, 특히 기능성제품들 보다는 디자인이나 스타일링이 더 예쁘게 되는 상품을 고객님들께서 더욱 많이 찾으셨습니다. 30~40대 고객님들은 엘리트 퍼포먼스위주의 상품들이나 실제 테니스를 치실때 더 편하고 드라이한 원단을 선호하셨으며, 화려한 디자인보다는 깔금한 무드와 실용성있는 상품들은 더 많이 선호하셨습니다. 40~50대 고객님들은 브랜드의 신뢰도로 구매를 하시는 분들이 많아서 신발이나 라켓같은 용품류의 상품 위주로 구매를 많이 하셨습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 [의류] 선셋매치 라인업  1. 구매목적 : 테니스 카테고리가 아니라","fb":"1. 선셋매치는 트리이닝 카테고리로 분류는 되어 있으나 실제로 구매하시는 고객님들은 일반스포츠 고객보다 테니스를 치시는 고객님들이 구매하시며, 특히 컬러감때문에 테니스갈때 입으려고 구매하시거나 순수하게 운동용상품으로 구매하신다기 보다는 그래도 라이프테니스용도로 구매하시는 분들이 더 많은 것 같습니다. 2. 요즘 여성 고객님들이 몸에 적당히 붙는 상품들을 더 많이 선호하시는 경우가 많습니다. 단 부담스럽지 않게 슬림해야되며, 테니스스커트와 잘 어울리는 컬러감의 상품일때 판매가 좋은 것 같습니다. 남성링거티셔츠는 부담스럽지 않고 살짝 캐쥬얼 한 무드 때문에 실제 호불호가 크게 없으며, 20~30대 고객님들이 가장 구매역이 좋습니다. 단 추가적으로 슬리브리스의 컬러가 많이 들어왔으면 더 좋을 것 같고 , 심플한 그래픽이 더 많이 추가가 되서 20~50대 고객님들이 모두 이용할 수 있는 그래픽물이 필요합니다."},{"cat":"용품","topic":"","fb":"선셋매치 볼캡과 크루삭스는 이번시즌 의류와 함께 가장 편하게 연계판매가 되는 디자인물인 것 같습니다. 특히 볼캡은 선셋매치의류 색상과 워낙 잘 연결이된 느낌이고 크루삭스 역시 링거티셔츠나 베이스라인 쇼츠랑 코디해서 고객님들이게 추천드리기 굉장히 좋았습니다. 전체적으로 의류를 구매하시는 고객님들에게 추가적으로 연계추천을 드리기 좋은 상품으로 볼 수 있었습니다."},{"cat":"신발","topic":"","fb":"에어벨 상품은 기존 퍼포먼스 테니스화와는 다르게 라이프스타일 느낌의 디자인으로 강남점의 고객님들과는 조금 거리감이 있다고 느껴지는 상품입니다. 하지만 20~30대 고객님들에게 터치감은 확실히 좋으나 일상복과도 매치가 가능한 디자인이라서 디자인적인 평가는 굉장히 긍정적이라고 볼 수 있습니다. 다만 퍼포먼스 테니스화 구매목적인 고객님들은 기능성 모델인 러쉬프로나, 인트리그상품들이 훨씬더 판매비중이 높다고 보시면 될것 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"이번주에 라켓 카테고리는 블레이드 v10의 앞도적인 판매를 예상했으나, 롤랑가로스 에디션의 엄청난 판매로 점내의 스트링어님의 에너지가 엄청나게 소비되고 있습니다. 특히 기존 블레이드v9 사용자분들의 v10으로 교체시기에 맞물려서 주간매출이 굉장히 많이 올랏으며, 롤랑가로스 그랜드슬램 시작으로 인해서 롤랑가로스라켓의 판매로 매장 오픈이래 가장 라켓판매가 좋은 한달인것 같습니다."},{"cat":"팀스포츠","topic":"","fb":"요즘 농구공 튕겨보시러 오시는 고객님들은 거의 농구공을 무조건 구매하신다고 보시면 될것 같습니다. 특히 컬러볼이나 프리미엄 모델인 evo NXT의 판매가 좋았고 , 금액과는 전혀상관없이 재고만 있다면 무조건 구매하시는 충성고객님들이 많았습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"이번주는 확실히 라이프스타일 고객님들보다는 퍼포먼스 상품 중심의 매출이 굉장히 좋았으며, 블레이드 v10의 이용고객님들과 신규라켓교체 고객님들의 블레이드라켓 구매가 올라가면서 \"한주간의 매출\"이 굉장히 많이 증가하였습니다.  특히 선셋매치라인의 상품들이 매출이 급증하면서 함께나온 용품류와 원피스핏 탑스핏라인의 제품들이 함께 판매가 잘 되었으며, 전체적으로 이번주는 \"테니스브랜드\"라는 느낌보다는 확실히 라이프스타일 테니스브랜드의 입지를 더욱 단단히 궅혔으며, 다음주도 롤랑가로스라켓의 매출핸들링으로 전체적인 매출의 안정화가 잘 될것으로 예상됩니다."},{"cat":"","topic":"1) 에어벨 W의 판매호조 사유 - 주 구매 고객층 (테니스/일반) (테니스신발이 아닌데 어떤고객이 구매하는","fb":"1. 에어벨상품은 순수하게 테니스화로 보기는 어려우나 테니스를 좋아하시는 여성고객님들이 발레코어의 스타일을 기반으로 스타일링을 굉장히 중요하게 생각하시는 고객님들만 구매를 하시는 것 같습니다. 특히 20~30대 여성고객님들은 메리제인 스타일의 디자인에 관심이 높은 편인데, 테니스화를 패션아이템으로 구매할 수 있다는 생각으로 구매하시는 고객님들이 있었던 것 같습니다. 2. 선셋매치는 일반 스포츠 고객님들보다는 실제 테니스를 치시는 고객님들이 많이 구매하시고 계신다고 보시면 될것 같습니다. 다만 구력이 상당히 높은 분들은 라이프스타일 상품들이나 테니스 패션에 크게 관심이 없으시기 때문에 \"단순한 예쁜 테니스 운동복\"으로 구매를 원하시는 고객님들이 굉장히 구매를 많이 해주셨고, 선셋매치상품들이 바지가 인기가 많아서 여성용 상의만 남은 경우에는 \"피키\"라인과 섞어서 구매하시거나 생각보다 백팩(드로우에어)이나 브라탑과 같이 연계구매를 많이 하셨습니다."},{"cat":"기타","topic":"신규 라켓 출시 프로모션 진행을 위한 그립커버 사전 주문  박스당 수량 30개, 개당 단가: 3,000원(V","fb":"3박스 부탁드립니다~"}],"6월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"본격적인 여름시즌으로 진입하면서 기능성의류의 수요가 굉장히 많이 증가하였으며, 특히 엘리트,에어브리즈 등 특히 여성고객중심의 테니스 라이프스타일 제품들이 지속적으로 6월초반부터 매출이 확대대고 있으며 , 스타일링이 잘되는 요소의 테니스복을 구매하시던 20~30대 고객님들이 기능성소재의 상품까지 구매하시면서 이번주 매출에 결정적으로 역활을 해주었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품 - 드로우스트링 백팩V2 (아이보리, 화이트) 재입고 후 반응,","fb":"테니스 입문자 고객님들의 수요가 굉장히 늘었습니다. 특히나 테니스 의류같은 경우 디자인을 중요하게 생각하는 20~30대 고객님들에게 \"스타일링 테니스복\"으로 이미 자리매김한 윌슨의 의류는 어느때보다 판매가 좋아지고 있으며, 특히 라켓과 의류 용품을 한꺼번에 구매하시는 분들이 많아서 이번주 연계판매 매출의 핵심은 \"라켓\"이었지만 추가적인 더 큰매출창출은 의류카테고리에서 폭등했습니다."},{"cat":"용품","topic":"","fb":"드로우스트링 백팩 V2의 재입고 이후 대기 고객님들과 기존의 구매고객님들의 재문의가 지속적으로 발생되었습니다. 특히 바이저나 암슬리브 여름시즌 용품반응이 굉장히 많이 증가했습니다. 용품 구매 목적이 단순 기능성 제품들을 구매한다기보다 활용성을 가진 라이프스타일링이 가능한 악세사리로도 확대되었으면 좋겠습니다. 무릎보호대나 팔꿈치보호대 같은 기능성 상품들도 꼭 필요한 고객님들도 윌슨마크가 찍혀있는 디자인의 기능성상품을 구매하고 싶다고 하셨습니다."},{"cat":"신발","topic":"","fb":"이번주는 에어벨W의 상품의 문의가 생각보다 많았습니다. 판매가 잘되었다기 보다는 220~225싸이즈를 물어보시는 분들이 많았고 이러한 디자인물의 상품들이 조금터 테니스특화상품으로 진화하면 좋을 것 같습니다. 특히 이번주도 퍼포먼스스타일이 앞도적으로 판매가 좋았으며, 몇몇 고객님들은 셋업 착장과 함께 구매할 수 있는 상품들로 구매하시는 분들도 있었습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"이번주에 롤랑가로스 컬렉션과, 애고니컬렉션의 상품들의 판매로 라켓매출이 어마어마하게 올랐습니다. 특히 목~일요일까지 보면 라켓의 판매갯수가 무려 60개에 육박할 정도로 어마어마하게 판매가 잘되고 있습니다. 이는 이제 일반 프랜차이즈 라켓들이 만들어지더라도 특별하고 디자인이 좀더 희귀한 상품들이 판매가 잘되는 시기가 오면 이렇게 전체적인 실 매출이 폭등 할거라고 기대가 됩니다. 역대 롤랑가로스라켓판매금액중 최고의 매출을 갱신했다고 볼수 있으며, 애고니라켓처럼 그저 테니스를 좋아하는 초심자분들이 디자인만으로 라켓구매를 유도할 수 있는 수입상품이 더 매장에 입고되어 추가적인 매출이 발생 되었으면 좋겠습니다."},{"cat":"팀스포츠","topic":"","fb":"요즘 \"농구유튜버\"들이 SNS활동량이 굉장히 왕성합니다. 이는 농구를 좋아하시는 고객님들이 이미 \"농구\"라는 운동을 요즘 테니스처럼 하나의 트랜드화 하고 있다고 보시면 됩니다. 테이스는 여성분들에게 핫하다고 한다면 농구는 남성분들에게 굉장히 핫한 스포츠인데요, 최근 농구공을 구매하시는 고객님들을 분석해보면 10대 고객님들의 수요가 폭등하고 있습니다. 10대 고객님들을 위한 다자인의 의류가 준비된다면 정말 좋을 것 같습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"본격적인 여름시즌 진입과 함께 기능성 용훔의 판매가 굉장히 많이 확되가 된 한주였습니다. 특히나 여성중심의 테니스 라이프스타일 판매가 역시 꾸준히 확대 되고 있으며, 의류,용품,신발의 연계구매가 이루어질때 그 중심에는 확실히 드로우스트링V2가 있었습니다. 꾸준한 인기모델의 판매와 라켓의 에디션풀시가 이번주 매출의 가장 특핵심이었으며, 블레이드V10과 롤랑가로스 컬렉션상품들의 수요가 높은 지금 지점에 \"애고니\"라켓의 추가 매출비중확대는 고객님들의 꾸준한 프리미엄 관심도를 높일 수 있는 아주 전략적인 영업기획이었다고 생각합니다. 제품군들의 경쟁력을 다시 한번 확인할 수 있는 한주였습니다."}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"이번주는 용품류와 쿨링기능성 상품들이 특히 판매가 잘된 한주였습니다. 신상의류로 나온 스트로베리앤크림 라인을 기준으로 고객님들의 입점이 상당히 많았으며, 특정제품의 판매가 좋았다고 말씀드리기 보다는 용퓸류와 라켓까지 전체적으로 판매가 일정하게 잘된 한주였습니다. 특히 판매베스트는 여성 셋업류의 판매가 가장 좋았으며, 남성의류의 판매가 상당히 좋았는데, 이번주 부터 의류를 구매하시러 매장에 나오시는 남성고객님들이 많았는데 이점은 계쏙 지난주 부터 꾸준하게 증가하고 있습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"스트로베리앤크림 컬렉션 제품의 실제 구매고객님들은 운동 목적과 라이프스타일 목적이 동시에 있으나, 체감상 라이프스타일활용 비중이 훨씬더 좋았습니다. 특히 테니스뿐 아니라 일상복으로도 착용 가능한 컬러감과 디자인이 구매 포인트였던것 같고 테니스 입문 고객님들이 부탐없이 구매가 가능 한 상품이어서 꼭 테니스칠때만 입지않아도 될것 같다는 생각으로 구매하셨던 것 같습니다."},{"cat":"용품","topic":"","fb":"신규 피키 크루삭스는 고객님들이 이류를 구매하실때 그냥 둘러보시다가 구매를 하시기 보다는 , 판매직원들의 연계판매로 계쏙 지속적인 홍보가 필요했었습니다. 특히 기존 스포츠 양ㅁㄹ보다 디자인이 예뻐서 테니스복과 활용하기 좋다고 하셨고 여성고객님들은 로코가 예뻐서 좋았다는 반응이 많아서 굉장히 긍적적이었습니다."},{"cat":"신발","topic":"","fb":"볼트프로의 신규 업데이트 컬러는 고객님들의 눈길을 끄는 정도? 였던 것 같습니다. 특히나 보르프로를 구매해보셨던 고객님들이 공홈을 보고 매장에서 구매를 하기 위해서 매장을 내방했는데, 이미 하이퍼포먼스테니스화에 눈길이 뺏긴고객님들은 \"러쉬투어5\"를 더 많이 구매 하셨고 특히 시즌감이 있는 생상이라서 고객님들께 로랑가로스타 us오픈 대응용으로 아주 좋을 것 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"이번주도 역시 무조건 에디션에 고객님들은 초점이 맞춰져있었습니다. 매장에 라켓을 구매하시러 오시면 로랑가로스 라켓을 1순위로 구매하셨으며, 디자인이나 한정판감성에 대한 긍정적인 반응이 너무 강하다는 생각이 들정도로 요즘에 너무너무 핫합니다. 하지만 그에 반박하듯 블레이드 v10의 돋보적인 행보는 잡을수가 없는 것 같습니다. 남성 여성분들 할것 없이 블레이드의 인기는 상당히 높으며, 외국인 고객님들의 구매에 있어서 단연 1등은 \"롤랑에디션\"이지만 이번주에 그다음은 블레이드 v10이 가장 판매가 좋았습니다."},{"cat":"팀스포츠","topic":"","fb":"요즘 급격하게 농구클럽들이 많이 만들어 지고 있습니다. 한국에 가장 많은 팬층을 가지고 있다고 하면, 1등 테니스 2등 풋살 3등이 야구가 아닌  \"농구\"일 정도로 요즘 여성 고객님들도 많이 급증하고 있습니다. 농구공을 찾으시는 고객님들도 많치만 실재 여성남성가리지 않고 실사용을 위해서 매장에 오셔서 농구공을 구매하시는 고객님들이 많이 들어나고 있으며, 특히 농구공은 소장가치에 대한 내용들이 많기 때문에 고객님들의 충동구매 또한계속해서 늘어나고 있습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"본격적인 여름시즌과 함께 요즘 테니스고객님들사이에서 기능성의류 및 시원한 의류들의 판매가 급증하고 있습니다. 특히 여성고객님들 중심으로 이번주는 굉장히 매출상승폭이 컷던 한주였고, 퍼포먼스상품들보다 갑자기 라이프스타일상품들의 판매가 점점 다시 올라고오 있어서 계쏙 여성고객님들에 대한 판매데이터에 집중적인 관심이 필요할 것 같습니다."},{"cat":"기타","topic":"수시사은품 전반 매장 피드백 (스크런치 / 그립커버) 좋은점, 아쉬운점 + 차후 사은품 제안 아이템","fb":"현대 ㅛㅏ은품은 단국하게 증정이 목적이 보다는 고객님들이 제품을 구매할때 객단가를 올리기 위한 수단으로 활용이 되고있으며, 향후에 고객님들이 실제로 사은품을 사용할 빈도가 높은 상품으로 더 다양한 사은품을이 만들어 지고 좋을 것 같습니다. 특히 실용성과 디자인이 동시에 반영된 스크런치는 정말 너무 좋고, 고객님들은 지속적으로 사은품에 관심을 가질 수 있도록 1년에 두시즌만 사은품을 하는게 아니라 3시즌으로 늘려서 더 많은 사은품을 만들었으면 좋겠습니다."}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"금주에는 윔블던 에디션인 \"스트로베리랜크림\"라인업이 아이코닉쇼츠 제품들과 판매가 가장 좋았으며, 기능성 반팔류의 판매가 가장 좋았습니다. 남성고객님들은 반바지를 2~3개장씩 사가실정도로 반팔티도 많이 구매하셨는데 반바지의 수요가 확 올라갓습니다. 특히 의류구매목적으로 보면 운동(테니스)목적의 구매의 비중이 80%이상이었고 20%고객님들은 휴가나 여행시즌을 준비하는 고객님들이 선셋매치상품들을 구매하기면서 라이프스타일 제품들의 비중이 점차 증가하는 추세가 보였습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"1. fw 신상컬러는 기존 시즌 대비 심플하고 고급스러운 느낌에 고객님들이 다 좋아하시는 것 같습니다. 특히 기존 윌슨 고객님들의 새로운 컬러 출시로 실물을 보고 싶어서 매장에 오셔서 착용해보시고 구매하신분들이 급증하였고, 확실히 이번주에 오신고객님들은 fw의 반응이 높아보였습니다. 2. 스커트류만큼은 아니지만 여름용 긴바지의 수요는 분명히 있습니다. 다만 일반적인 트레이닝바지가 아닌 냉감기능이나 체형보완의 와이트상품들을 훨씬고객님들이 선호하셨고 uv차단을 위해서 긴바지를 문의하시는 고객님들이 많았습니다."},{"cat":"용품","topic":"","fb":"드로우스트링백팩v2의 꾸준한 판매가 이어지고 있는데요 , 요새들어 그레이컬러를 문의하시느 고객님들이 많아졌고 운동뿐아니라 출퇴근 일상용 가방으로 활용하려는 고객님들이 가끔 있을정도로 요해 반응이 좋습니다! 특히 여성고객들은 uv차단 상품들이 관심이 많았는데 \"필요해서 구매\"하시는 분들이 매장에서 의류를 구매하지면서 uv기능이 있는 상품들을 곁드려 구매하셨습니다."},{"cat":"신발","topic":"","fb":"기존에 작은싸이즈가 계속 인기가 있는데, 리오더를 하고 나서 역시나 작은싸이즈가 잘팔립니다. 요즘 테니스복으로 입지않고 약간\"성수룩\"? 같은 mz룩에 코디를 하고 싶으신분들이 일상복으로 구매를 하시는 분들이 많아습니다. 일반 테니스화를 대용으로 신으시기에 가볍게는 신으시는것 같지만, 대회나 중요한 테니스경기에서 신기에는 하이퍼포먼스 스타일이 아니기때문에 조금 더 저가형의 데일리테니스화로 나오면 좋을것 같다는 의견이 있었습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"이번주 역시 라켓판매는 기존 블레이드 v10과 롤랑가로스 에디션의 판매가 월등히 높았습니다. 특히나 요즘 v9을 구매하셨던 고객님들이 신형 v10으로 넘어가신다는 고객님들이 구매를 많이 하시며, 롤랑가로스 에디션은 여전히 디자인때문에 구매하시는 분들이 많았고 특히 희소성이나 남들이게 보여주기위한 브랜드의 한정판이기때문에 아직도 관심이 높은 라켓입니다. 여성분들의 계속적인 라켓구매는 롤랑가로스 라켓덕분이라고 보시면 될것 같습니다."},{"cat":"팀스포츠","topic":"","fb":"이번주에 농구공 선물수요가 급증했습니다. 학생분들이게 선물하기 딱 좋은 금액대의 만족도 높은 선물이었기때문에 프리미엄 농구공\"윌슨 에볼루션\"은 고객님들의 선물가치를 높여주었습니다. 특히 농구가 요즘 학생분들 사이에서 굉장히 특인기가 있기때문에 매장에 오는 학생분들은 하나씩 구매해 가시는 것 같습니다. 야구는 요즘 시즌을 맞이헤서 클러브문의가 많은데, 윌슨코리아온라인스토어에서 본 실제글러브를 구경하고 싶어서 오신분들이 많았습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"이번주에 장마와 폭염으로 의류에 미치는 영향이 굉장히 많았는데 uv차단 기능성 제품들이 굉장히 판매가 좋았으며, 작년에 오셨던 분들이 굉장히 많은 재방문으로 매출이 증가하였습니다. 외국인고객님들의 유입은 전주와 비슷했고, 외국인고객님들중에서도 테니스 신규 유입자분들이 엄청나게 증가하고 있습니다. 이는 해외에서도 테니스와 피클볼을 치시는 분들이 굉장히 많이 증가하고 있다고 보면 되며, 특히나 에디션라켓이라면 눈뒤집고 구매하는 고객님들이 많아서 이번주에도 기본 프랜차이드 라켓보다는 에디션 라켓이 훨씬잘 팔렸습니다. 그리고 \"기존 클레쉬100L\"이 엄청 잘팔리는데 재고가 없습니다 ㅠㅠ 온라인에 재고가 있다면 오프라인매장에도 보내주세요~!"},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"지금 굉장히 좋은 프로모션이라고 생각 됩니다. 폭염으로 날씨가 너무 덥기때문에 uv차단 관련 용품에 대한 고객님들의 관심이 많아지는데 , 스킨케어 내용물들은 고객님들께서 필수적인 요고로 사용하시기도 하며, 일단 다른 사은품들보다 훨씬더 금액대가 나가기 때문에 고객님들이 사은품을 받았을때 너무너무 좋아하셨습니다."}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"이번주도 역시 \"여성의류\"의 판매가 굉장히 좋았던 한주였습니다 . 그중에서도 상당히 반응이 좋은 상품은 스트로베리 라인이고! 확실히 \"윔블던\"의 영향을 받은 상품들이 이번주에 판매가 확확 올라왔습니다. 늘 그랜드슬램이 걸려있는 월마다 매출이 지속적으로 증가 하는 것을 매우 크게 실감하고 있습니다. fw의 시작인 지금 확실히 겨울에는 4대 그랜드슬램에 관한 카테고리 디자인들을 구성해도 괜찮겠다는 생각도 해봅니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품) 드로우스트링 백팩 V2 신규 컬러 반응  (내/외국인 비중,","fb":"선셋매치같은 \"테캉스\"룩에 잘어울리는 상품들이 딱 시즌에 맞춰서 판매가 굉장히 좋습니다. 시원해보이고 목이 길어보이는 링거티부터 베이스라인 쇼츠는 여성고객님들의 감성을 잘 자극했던것 같고, 특히 탑스핀 라인의 수입의류처럼 젠틀리하고 퍼포먼스에 강한 의류들을 강남점에서는 굉장히 많이 찾으셨습니다. 엘리트 라인의 상품들을 4계절 모두 신상이 계속 지속적으로 출시가 됫으면 하는 바램이 있습니다."},{"cat":"용품","topic":"","fb":"드로우 스트링백팩의 신규컬러 입고 이후에 기존 고객님들과 신규고객님들의 븐응은 정말 폭발적으로 좋았습니다. 사실 매장에 오시면 \"흰색\",\"아이보리\"컬러의 판매의 피로도가 쌓여가고 있었던 상황에 적절한 시기에 상품들이 빨리 출시되어서 이번주 매출의 정말 큰역활을 해주었습니다. 드로우스트링 \"흰색\"의 판매비중을 이번주에 근소하게 제쳤을 정도로 \"LGR,PNK\"의판매가 굉장히 좋았습니다. 이번주 매장에 외국고객님들이 정말 많이 오셨는데 중국과 동남아 고객님들에게 화사한 컬러의 \"PNK\"가 인기가 굉장히 많았고 남성분들의 의류가 판매가 좋았는데 의류와 \"LGR\"컬러의 구매가 많았으며 특이하게 커플구매 고객님들이 많았습니다. 내국인고객님들은 오히려 \"WHT\",\"IVY\",\"BLK\"의판매가 더 좋았고 외국인들의 고민패턴엔 \"신상품\"이라고 꼬시면 정말 순식간에 바로 구매를 결정하시는 경우가 많았습니다."},{"cat":"신발","topic":"","fb":"화이트컬러는 깔끔하고 다양한 의류와 매칭을 할 수 있기때문에 그점이 가장 고객님들이 좋아하는 구매 포인트였습으며 리오더후에도 계속 꾸준하게 판매가 잘 되고 있습니다. 특히 신큐컬러는 지금 매장에 같이 매칭할만한 의류가 많이 없기때문에 즉각적인 판매가 빠르게 이어지고 있지 않습니다. 의류와 함께 코티를 할 수 있도록 빠른 의류 신상품이 입고가 되어야 하는게 에어리판매전환율을 많이 높이는 방법이라고 생각합니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"이번주에는 기존 블레이드 유저분들(v9)고객님들의 \"V10\"신상교체가 굉장히 많았습니다. 처음 구매하는 초급자분들이 아니라, 중상급자분들이 판매가 훨씬 높았고, 여성분들은 100ul의 구매도 있었지만 롤랑가로스 라켓의 디자인의존도가 상당히 높았기 때문에 여성분들은 무게랑은 상관없이 \"롤랑\",\"데져트\",\"리버스\" 같은 에디션을 계속해서 지속적으로 구매하시면서 신상품으로 나올 에디션 상품을 직원들을 붙잡고 언제나오는지 한참을 물어보셨습니다. 하지만 외국인들은 곧 출시되는 \"파이썬\"라켓에 대한 질문은 전혀 없었고, 내국인들은 파이썬을 물어보시는 분들이 엄청 많았습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"내국인구객님들은 확실히 \"지금이 테니스 시즌\"이라며 동호회 및 테니스 모임 활동이 증가하면서 의류과 신발을 매장에서 시원시원하게 구매하시는 고객님들이 많았고 기존 고객의 재방문이 굉장히 높아서 비교적 이번주는 매출이 비교적안정적인 한주 였습니다. 외국인 고객님들은 생각보다 전주보다 \"보합\"되는 수준이었는데 , 중국인 관광객의 유입은 꾸준하게 유지되었으며, 이번주는 인본고객님들의 입점이 동남아 고객님들 만큼 있었습니다. 다만 베트남이나 말레이시아같은 동남아 고객님들의 비중에 작년과 비슷한 추세로 가고 있으며 , 작년보다 외국인 고객님들이 10~15%정도 증가한것은 맞지만 비중이 계속해서 늘어나고 있는 국가는 중국,일본,홍콩,대만 이고 비중이 작년과 동일하게 유지되고 있는 나라는 \"베트남,말레이시아,인도네시아\"같은 동남아 고객님들의 유입은 작년과 동일했습니다."},{"cat":"기타","topic":"* 26FW 상품교육북 매장의견   - 상품교육자료를 직관적으로 볼 수 있게 품번/상품명 검색 시, 세일즈포","fb":"이번 시즌부터 이렇게 내용이 추가가 된 내용은 매우 좋은것같습니다. 특히 기존에 원하는 상품을 찾은 후에도 추가적인 확인이 필요한 상품들이 많았지만, 핵심적으로 확인해야하는 포인트를 확인할 수 있다는건 신규staff에게 \"스스로\"학습할 수 있는 내용으로 사용한다면 이점이 강남점에서 가장 좋은 사용용도로 생각이 됩니다. 요즘 스탭들이 외국어를 잘하는 대학생들이거나, 매장에서 매니져나 부매니져 셋,넷째까지 정신이 없는데 갑자기 신입직원이 아무리 쉬운부분이라도 손님을 보고 있을때 물어본다면 자주 \"판매의 흐름\"이 끊겨서 속상한경우가 많았습니다.(화도 못내요...). 혹시 추가적으로 활용이 되는 점이 있다면 1. 상품착장이미지, 2.비슷한 상품과의 차이점, 3. 외국인 고객응대 포인트(상품명 옆에 상품추천을 권유하는 국가별로 표시하여 각 나라의 온도감을 체크)를 잡아준다면 좀더 고객님들이 손쉽게 그리고 굳이 제품을 시착하지않아도 인지할 수 있고 편하게 입을 수 있는 점을 교육북으로 고객님들께보여주면서 어필할 수 있을 것 같아서 좋을 것 같습니다."}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"7월 첮째주에 들어 본격적인 여름의 무더위가 시작되었습니다. 특히 시원하고 세탁하기 좋은 의류가 아주 판매가 잘되었는데, 특히 색상이 밝고 가벼우면서 시원한 소재들의 판매가 확 올라왓습니다. 7월들어서 야외테니스장보다는 실내테니스장이 훨씬 고객님들의 테니스 모임이 많이 진행되었으며, 특히 윌슨홈코트를 오셨던 고객님들이 매장에 오셔서 셋트류를 많이 구매하셨습니다. 이로 인해서 객단가도 크게 늘었으며, 엘리트 플리츠 스커트같은 상품들이나 퓨어드라이처럼 테니스를 칠때 입는 fw상품들의 반응이 굉장히 좋았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"일단 여름에 여성고객님들이 입을 만한 반팔티가 굉장히 늘어났는데 , 도저희 이해가 되지않는 상품들이 많았습니다. 예를들어서 셋트로 컬러를 맞추면 너무너무 팔팔릴만한 상의나 하의가 , 하나만 딱 출리되었는데 믹스매칭할 수 있는 상품들도 없는 이해가 안되는 구성이 있었습니다. 최대한 셋트매칭을 할 수 있도록 만들어주세요, 추가적으로 3품번의 핵심싸이즈 s,m 싸이즈를 늘려주셨으면 좋겠습니다. 또한 3품번의 xs제품은 언제 출시 될까요."},{"cat":"용품","topic":"","fb":"드로우신큐컬러의 대한 관심을 아직 초반이다 보니까 그렇게 빠르게 확! 올라오지는 않는것 같습니다. 아직은 v2화이트의 판매반응이 훨씬좋습니다. 그리고 웰베어키링은 실사용 목적보다 소장용이나 선물용으로 관심이 높았습니다. 20~30대 여성고객님들이다 외국인고객님들의 반응이 좋았고 가방을 구매하시는 고객님들에게 연계판매하기 좋았습니다. 특히 이번주에 심리스바이저의 터치율이 상당했는데 이는 여름철에 자외선차단과 착용감을 동시에 잡을수 있는 상품이었기 때문에 인기가 많았고 기능성모자에 대한 관심은 계속해서 증가하고 있습니다."},{"cat":"신발","topic":"","fb":"리스폰스 프로 신상의 반응은 초반부터 긍정적입니다. 쿠셔닝과 안정성에 대한 만족도가 높았는데, 저는 오히려 신발이 너무 높아서 판매하는데에 있어서 어려울 것 이라고 생각했는데 오히려 러쉬프로를 2년전까지 신으셨던 고객님들이 착화감과 발볼이 넒은점이 경기용이나 레슨용으로도 좋을 것 같다는 의견이 있었습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"디파이어 라켓 출시에 대한 반응이 뜨겁습니다. 이는 새로은 라켓을 사용하고 싶은 사용자들이 타사의 스핀형라켓을 비교해보고 싶은 목마름이 있어서 그런것 같습니다. 1.바볼랏 퓨어에어로보다 스핀이 더 잘걸리지, 중상급자부터 써야하는지, 블레이드가 저 쉽다던지,, 시타가능 여부에대하여 엄청 물어보십니다."},{"cat":"팀스포츠","topic":"","fb":"농구공은 에볼루션과 evonxt의 판매가 굉장히 안정적이었습니다. 남학생들의 여름박학 시즌 특수아이템인 농구공이 벌써부터 팔매가 좋으며 향후에 농구공에 대한 수요가 더 더 늘어날것으로 보입니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"7월 첫째주는 신상품에 대한 고객관심이 계속해서 높아지고 있습니다. 특히 전주대비 기능성원단을 더 많이 찾으시면서 의류의 상승세가 계속되고 있고, 디파이어의 계속되는 상담수요가 급증하고있다보니, 라켓판매에 굉장한 에너지가 필요할 것 같습니다. 하지만 늘 강조드리는 연계성(의류,신발,용품)의 판매확대로 계속해서 기획이 나와야 하는게 제일 중요할것 같습니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"안녕하세요! 신세계강남점 20박스 신청합니다. 감사합니다~ 이번주도 너무 고생많으셨습니다 :)!!"}],"7월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"이번주는 여성의류의 압도적인 판매가 매장매출의 핵심역활을 해주었습니다. 특히 퓨어드라이 상품들은 남녀공용으로 착용가능한 상품들이 꾸준하게 많이 판매가 되었고 일상복으로 구매하시는 20~40대 고객님들이 많았습니다. 특히 아직도 시어아이스 제품들은 날씨가 너무 더워지다 보니 아직도 냉감소재와 경량한 느낌을 선호하시는 고객님들에게 굉장히 인기가 많으며, 라켓을 구매하시는분들은 컬러감이 의류와 컬러감이 비슷한 의류가 있다면 고객님들이 주저하지않고 정말 잘사가셨습니다."},{"cat":"의류","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신상 전반적인 고객 터치 및 피드백","fb":"이번주에는 윌슨코리아 제품들이 거의 풀시가 안되었고 전부 수입상품들로만 신상품이 출시가 되다보니 라이프스타일링이 조금 떨어지는 느낌이 있었습니다. 요즘은 기능성뿐만 아니라 라이프감성도 같이 갖춘 상품이 반응이 계속 좋아지고 있어서 너무 테니스에 대한 감도가 너무 높지않아도 괼것같습니다. 특히나 컬러코디를 하기에 시간이 없는 고객님들을 위해서 세트코디를 한번에 할 수 있는 상품들이 판매가 굉장히 좋았습니다."},{"cat":"용품","topic":"2-1. 의류/용품/신발 판매 특이사항 - 드로우스트링 신규 반응","fb":"드로우스트링백팩의 신규컬러들의 반응이 상당히 좋습니다. 특히나 GBL컬러의 판매가 계속해서 잘되고 있으며, 드로우스트링 에어소프트백팩의 관심이 상당히 좋아지고 있습니다. 기존의 출시제품보다 더욱 가볍게 느껴지는 디자인으로 여성스러운 느낌이 강조되서 20~30대 고객님들에게 반응이 매우 좋습니다. 특히 이번주에는 일부러 듀오플립백팩이 신상라인업을 고객님들에게 굉장히 많이 밀어서 추천해드렸는데 오히려 드로우스트링보다 더 많이 팔리는것 같았습니다. 이는 노랑색이나 보라색같은 컬러감에 굉장히 민감한 고객님들이 제품을 많이 구매하셨으며, 이제 가방은 유색컬러가 기본컬러보다 훨씬 잘팔리는 것 같습니다. 2) 여름시즌이다보니 통기성과 경량성만 보장된다면 모든 제품들의 판매가 잘되는 시즌입니다. 특히나 의류와 같이 코디하기가 좋은 상품이기 때문에 고객님들에게 의류를 구매할때 추가구매를 권해드리기 좋았습니다. 3) 이제품은 4계절 내내 나와도 될것같습니다. 특히 컬러감이나 착용감까지 좋은 상품이기때문에 이번시즌 가장 판매가 좋을 것같은 상품입니다."},{"cat":"신발","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신발 신규컬러 반응","fb":"생각보다 볼트프로의 판매가 상당히 좋습니다. 반면에 리스폰스프로의 판매가 계속해서 줄어들고 있으며, 이는 조금더 경량하고 제품을 신었을때 조금더 착화감이 편안한 느낌이 강한 상품이 판매가 좋은것 같습니다. 생각보다 러쉬프로의 고객님들이 리스폰스프로는 좀 불편하다고 하시는데 밑창 시스템이 딱딱하고 착화감이 너무 단단해서 테니스를 칠때 착화감이 덜하다는 말씀을 많이 하셨고 , 에어리는 확실히 화이트컬러의 판매가 꾸준했으며 20~30대 고객님들에게는 레드컬러의 판매가 좋았습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 - 디파이어 판매반응","fb":"디파이어는 일단 사전 예약고객도 많았지만 런칭 당일에 방문하시는 고객님들의 구매비중도 상당히 높았습니다. 특히 꾸준히 인스타로 홍보! 그리고 현장에서 고객님들께 홍보를 한터라 출시직전에 정말 많은 문의가 있었습니다. 그리고 라켓을 구매하시는 고객님들은 거의 다 테니스 고인물(?)고객님들인데요! 신제품이 나오면 무조건 구매하시는 고객님들이기때문에 기존에 윌슨 사용자나 타브랜드 사용고객님들이 많이 구매하셨으며, 특히 다들 매장에 자주오셔서 수다떨고가시는 테니스 진성고객님들이 구매하셨습니다. 그리고 진짜 \"퓨어에어로\"를 사용하시는 고객님들이 상당히 많이 구매하셨습니다."},{"cat":"팀스포츠","topic":"2-2. 라켓/팀스포츠 - 팀스포츠","fb":"농구공의 판매가 꾸준히 많습니다~! EVO시리즈의 판매가 가장 안정적으로 판매가 꾸준히 잘 유지되었으며, 학생분들의 방학시즌이 시작되면서 부모님과 농구공을 구매하시러 오시는 분들이 굉장히 많았습니다. 특히 선물용으로 제품을 구매하시는 본들이 많았는데 공에 대한 수요가 계속해서 증가하고 있기 때문에 농구공의 신상품이 더 빨리 들어왔으면 좋겠습니다."},{"cat":"기타","topic":"전주대비 고객 입점 현황","fb":"7월 둘쨰주는 여름시즌에 맞춘 기능성의류와 신상품의 판매가 굉장히 좋았으며, 디파이어라켓이 2일만에 완판되면서 역시 윌슨이다라는 수식어에 걸맞게 아주 뿌듯했던 한주였습니다. 특히 신강점은 홈코트 커뮤니티와 SNS홍보를 통해서 신제품을 계쏙해서 노출시키고 있었는데 이점에 대해서 디파이어라켓의 판매가 좋았으며, 라켓을 구매하시러 오신고객님들의 의류나 신발 연계판매가 좋아서 이번주 매출은 굉장히 안정적이었습니다."}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"금주는 퓨어드라이부터 원피스 그리고 시어아이스 원단까지 굉장히 다양하게 모든 제품이 잘 판매되었습니다. 특히나 시어아이스제질의 긴바지를 아직까지도 많이 선호하시는 여성분들이 많이 계셨는데, 내년에는 여성용 긴바지를 두종류정도 더 만들어봐도 좋을 것 같습니다. 특히나 이번주에 저희팀은 입점하는 여성고객님들의 동반으로 입점하시는 남성고객님들이 \"주타겟\"이었으며, 어떻게는 남성용제품을 끼워 팔기위해서 노력을 하였고, 그러므로 이번주에 퓨어드라이 남성용 상의가 판매가 굉장히 좋았습니다. 지금 시즌은 연계판매워 끼워팔기가 가장 중요한 시기인것 같습니다."},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"이제 극 여름시즌으로 장마가 끝나면 엄청나게 습하고 꿉꿉한 날씨에도 테니스를 고객님들이 치셔야 하는데 , 지금 시즌에 얼마든지 대응이 가능한 퓨어드라이나 시어아이스 소재는 충분히 대응을 잘하고 있으니, 반대로 고객님들께서 여가생활을 할떄 입을 수 있는 리조트룩,휴가룩에 조금 더 테니스 무드를 접목한 상품들이 많이 만들어지면 좋을것 같으며, 이번 여성티셔츠 2NTS51같은 레몬컬러감이 너무너무 예뻣던 티셔츠가 판매가 가장 빨리 판매가 된것처럼 앞으로도 강한 유색컬러를 기반으로한 대물량의 상품이 많이 나왔으면 좋겠습니다~!"},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"이번주에 올어라운드짐백이 엄청나게 인기가 좋았습니다. 특히 드로우스트링v2라벤더컬러(품절)를 구입하러 오신분들께 TBO73 라벤더를 보여주면 일단 말이 통합니다. 그러면서 듀어플립백팩까지 같이 보여드리면 두개씩구입하시는 경우가 많았고, V2흰색이 판매가 너무 빨리 끝나서 IVY컬러도 추천해드리고 있지만 IVY는 구매하지않고 흰색만 자꾸 찾으셔서 \"듀오플립백팩\"을 추천! 이제품은 싸이즈가 너무 귀엽고 사용용도가 좋은 신상품이다 라고 말해주니까 V2백팩보다 훨씬까진아니지만 이번주에 판매가 상당히 좋았습니다. 특히 바이저들은 핑크,와인,하늘색 처럼 무조건 유색이 엄청 잘팔렸으며, 기본 검흰(BLK/WHT)은 적당히 인기가 좋았습니다. 지금은 인기상품이 많이 빠진상태라서 판매에 최선을 다하는 수밖에 없습니다. V2 신상이 빨리들어 왔으면 좋겠습니다."},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"볼트프로 1.5 블루컬러의 인기가 굉장히 좋습니다. 하지만 볼트는 거의 여성분들에게 인기가 좋은데 이번주도 놀색이 없어서 헛걸음하시는분들이 다행히도 신상 인트리그상품(WHT/LIM)을 구매해주셔서 판매로스를 막았으며, 저희팀 특색상 \"업셀링\"을 하기때문에 일단 남성고객님께는 30만원 카본화를 먼저 권유해드리고 금액이 저렴한 기준으로 내리면서 판매하였는데, 생각보다 러쉬투어나 러쉬프로가 판매가 좋아서 리스폰스를 많이 보진 않으셨습니다. 이제 신발은 새로운 라인이 출범해야 될것 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 판매 특이사항 - 디파이어 반응","fb":"라켓은 오로지 블레이드일 것 같았지만, 이번주에 생각보다 정말 골고루 판매되었습니다. 초보여성분들이 \"울트라\"를 많이 구매해주셨으며, 초보남성분들은 \"클레쉬\"를 선택을 많이 하셨는데 이는 주변에서 블레이드가 생각보다 쓰기 어렵다는 이야기가 있어서 그렇다고 하시는 분들이 계셨고, 그럼애도 불구하고 역시나 부동의 1등은 블레이드였지만, 그래도 이번주는 골고루 판매가 좋았습니다."},{"cat":"팀스포츠","topic":"2-2. 팀스포츠 판매 특이사항","fb":"농구공을 만지기도 전에, 볼타워주변을 조금만 서성여도 곧바로 달려가서 농구공을 튕겨보라고 말씀드리고 곧장 매장으로 고객님들을 유인합니다. 이유는 어떻게든 매장이 시끌시끌해야 주변의 고객님들이 모여 들기때문입니다. 특히 지난주에 에볼루션과 에보NXT를 넉넉히 매장에 넣어주셔서 다행히도 매출에 도움이 많이 되었습니다. 이번주에도 쫌만 더 넣어주시면 열심히 팔겠습니다!"},{"cat":"기타","topic":"고객 입점 동향","fb":"이번주에 입점 상황은 지난주대비 급증했습니다. 일기예보가 불규칙했기때문에 비가올때는 고객님들이 몰리고 비가 안올때는 고객님들이 외부로 많이 다가 시는데 이번주에 비가 오지 않았지만! 일기예보는 비가 온다고 되어있기 때문에 테니스를 않치신 고객님들이 매장으로 많이 찾아오셨고, 늘그랬듯 이번주에도 \"인플루언서\"분들과 협업을해서 계속 SNS(인스타 스토리)상에 매장을 노출하여 고객님들의 매장유입을 유도했으며, 최근 매장에 들어온 사은품인 \"머리끈\"과 \"라켓커버(RED)\"를 구매고객들에게 뭐든 구매하시면 다 챙겨드리고 있습니다. 특히 이제는 그냥 매장에 꼭! 구매하시는게 아니라도 매장주면 동내를 지나가시다가도 매장에서 놀다가시는분들이 많아져서 늘 북적북적한 매장분위기로 고객님들이 매장을 들어올때 부담을 덜 같는 것 같습니다. 이분위기속에서 외국인고객님들도 \"아 , 여기 인기많은 매장이구나\"하는 느낌도 많이 들게하여 고객님들의 구매심리가 많이 부축여진것 같습니다. 지금처럼 불경기에는 기본적으로 \"맞이인사\"는 물론 제품을 구매하지 않고 아이쇼핑만하시는 고객님들에게도 꼭!!!! 배웅인사를 더욱 크게해서 나중에라도 우리매장에 다시 오시게끔 최선을 다하는 노력으로 버티고 있습니다. 다음주는 더 적극적인 마인드로 아직은 신상이 들어아지않았지만 서비스마인드를 더욱 발휘하여 더 많은 매출울 올릴 수 있도록 \"기본\"에 더욱 충실해야 할것 같습니다."}]},"롯데아울렛동부산":{"5월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"이번주는 남자 고객님의 판매율이 좋았습니다 20대~40대 초반 고객님의 반바지 구매가 많았습니다. 코트라인 7인치 쇼츠와 시어아이스 7인치 쇼츠, 펀더멘탈 쇼츠 등등을 많이 터치하셨고 구매는 코트라인으로 가장 많았습니다 아무래도 가격이 제일 저렴하고 핏은 다 비슷비슷하기에 판매율이 높은것으로 보입니다. 그리고 퓨어드라이 에어로 폴로 라인과 퓨어드라이 코어 제품도 많이 나갔습니다. 여성 분들은 대부분 숏팬츠 위주의 제품 또는 스커트 제품을 많이 보셨는데 피키 스튜디오 쇼츠에 판매가 가장 잘 되었습니다."},{"cat":"용품","topic":"","fb":"양말 아대 골고루 나가며 롤랑가로스 라인의 터치율이 좀 올라갓고 블레이드 라인의 용품은 아직 크게 반응은 없는듯합니다"},{"cat":"신발","topic":"","fb":"가벼운 신발을 찾는 고객님들이 많아서 볼트프로를 많이 추천해주었고 역시나 판매는 좋았습니다. 다만 클레이 라인으로만 나오는 상품을 많이 찾습니다 부산에서는 대부분 인조잔디 흙땅으로 이루어진 곳들이 많아서 클레이로 찾는 고객님이 더 많았습니다"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"롤랑 에디션으로 찾는 외국인 고객님도 계셨고 롤랑을 보고 날라는 외국인 고객님이 있으셨습니다만 국내고객님의 롤랑을 보기위해 오시는 분은 없었습니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션 과 퓨어샷의 판매가 갑자기 늘어나고 있습니다"},{"cat":"상설","topic":"쉴드백팩(정상판매율 65%), 슬링백(정상판매율 27%)의 판매부진 사유는 ? 상설 테니스 카테고리 의류의","fb":"쉴드백팩 자체가 재입고 될때 들어왔던 시기가 굉장히 늦어졌던것으로 알고 있습니다. 정상에서 이미 제품의 판매율이 불이 꺼져가고 있는 상태 였던걸로 알고 있습니다. 그뒤로 넘어왔고 가격이 꺽여도 그 여파는 여전하고 그때는 외국인들이 좀 많이 사갔었는데 지금은 외국인들의 반응도 없습니다 쉴드백팩 처음에는 혁신적이였고 새로운 디자인이여서 호기심으로 판매가 많이 되었다면 지금은 좀 편하고 케쥬얼한 제품을 더 많이 찾는 고객님들이 많아서 판매가 더 저조해 지는듯 합니다.  애초에 상설제품으로 넘어올때 제품의 핏들이 정말 안좋아서 정상에서부터 인기가 없었고 지금 넘어온 제품들은 대다수 핏감이 안좋거나 너무 테니스쪽으로 치우쳐져 있는 옷이라던가 여자 옷들은 노출이 심하던가 굉장히 타이트한 핏이거나 불편한 제품들이 많이 넘어 와서 그리고 그 제품들이 하나하나가 너무 많은 양이라서 제품을 팔아도 티도 안나고 가격의 문제보다는 제품 자체가 만들어 졌을때 인기가 없었어서 판매 되어지는 속도가 느린것 같습니다. 그리고 피스테 긴것도 색상이 너무 어중간하게 뽑았고 진짜 많이 만들어서 실패작인데 키 아이템으로 해서 판매속도가 떨어지는것으로 보입니다. 그리고 색상 소재 테니스치기엔 다 별로인 제품들이 꾀나 많이 있습니다"},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"저번주 가정의달의 피크였다고 볼수 있습니다. 어버이날 제품과 어린이날 제품들을 다 사러오는 그런 한주 였고 노동자의날도 있어서 그날 다 준비하는 느낌이였고 지금은 이미 써버린 돈으로 따로 쇼핑을 하러 오는 고객님들의 동향이 굉장히 줄어들었습니다."},{"cat":"","topic":"전체 고객 중 외국인 유입비중 (증가한 사유? 별도 점포에서 외국인 대상 진행하고 있는 프로모션/사은혜택은?","fb":"저번주는 7:3 정도의 비중입니다 외국인이 7입니다 중국인이 7정도였고 베트남 2 그외 1 이였습니다"}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"30~60대 여성분들에게 W261002NTS24 퓨어드라이 에이스 제품이 가장 인기가 많았습니다. 체격이 크든 작던 다 입을 수 있고 타이트하지 않게 나와서 모든 여성층 고객님들이 선호 하셨습니다. 그리고 30~40대 고객님들의 퓨어드라이 블라썸 크롭 라인의 터치율도 좋았습니다. 그냥 윌슨 로고에서 약간의 변화에도 고객님들은 열광하였습니다. 그리고 같이 입을 수 있는 반바지 또는 긴 조거 바지등을 많이 찾으셨습니다. 젊은 여성도 노출을 싫어하시는 고객님들이 그렇게 입길 원하셨습니다. 남자분들의 50~60대 고객님들에게 시어아이스 반팔 피스테  W262001TTW41 제품이 시원하고 원단도 얇아서 입어보시고 만족도가 높았습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"이제는 얇은 자켓 종류의 선호도가 높아지는 듯합니다. 입고 벗기 편한 제품을 많이 찾다 보니 아노락이나 피스테 같은 제품은 지금 입기에는 덥다는 평이 많아서 자켓을 남여 공통으로 굉장히 많이 찾으셨습니다. 좀 얇은 바람막이 제품을 많이 뽑는게 좋아보입니다."},{"cat":"용품","topic":"","fb":"금주에만 남여 가릴것 없이 암슬리브를 많이 찾으셨고 여자분들은 마스크를 많이 찾으셨습니다. 본격적으로 햇볕 차단을 위해 움직이는 듯 보입니다."},{"cat":"신발","topic":"","fb":"에어벨 은 아직은 크게 반응이 없습니다 거의다 테니스화를 찾으러 오시는 경우에 고객님들이 많아서 일상적으로 신으면서 같이 신을만한 상품을 찾는 고객님은 잘 없었습니다. 권해드려도 좀 시큰둥한 일이 많았습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"역대 나왔던 제품들중에 제일 반응이 시큰둥 한편이고 국내고객님들에게는 외국인분들에게서는 간혹 찾는 경우가 많았습니다. 흘림체 글씨에 대해서 그렇게 크게 메리트를 느끼지는 못한것 같고 작년과 계속 해서 같은 색상이 나와서 크게 또 좋은지 몰라 하는경우의고객님들이 많았습니다. 대부분 여성분들이 찾으셨습니다  블레이드 또한 내국인들에게 크게 관심이 없었습니다 점점 어려운 라켓이라는것에 대한 인식이 커져서 그런거 같기도 합니다. 찾는 고객님들은 여성 고객님들이 대부분이였고 (여성 상위랭커들이 사용하는 효과 큰듯합니다.) 그리고 남자분들은 블레이드100프로 를 많이 찾으시는데 그건 없어서 응대를 못드린 경우가 많습니다. 가방 같은경우는 더플 백이 제일 인기가 많습니다. 다른건 크게 터치율도 떨어지고 판매율도 떨어집니다"},{"cat":"팀스포츠","topic":"","fb":"에볼루션 퓨어샷 종류의 제품이 많이 나가는데 현재 서서히 재고가 전국적으로 없어져서 빠르게 재입고가 필요할 것으로 보입니다"},{"cat":"상설","topic":"1.  W251002TPH21 정상판매율 상위권이나 판매부진사유는 ?  2. 상설 용품 (모자, 양말 등 )","fb":"현재는 외국인 고객님들의 판매에 의존을 하고 있는 느낌인데 이제품은 작년에 국내 고객님들에게 인기가 많았어가지고 현재 국내 고객님들에게 저희 제품이 어필이 좀 안되는 느낌이라서 판매가 부진한 것으로 보여집니다.  모자,양말은 제품들 원래 디자인이 너무 선호하지 않는 제품들이여서 고객님들에게 가격을 떠나서 잘 어필이 되어지지 않는듯 합니다. 컬러감이 너무 난한것들이 너무 많습니다 모자건,양말이건 특이한 제품들을 만들고 실용성이 있는제품을 만드는것도 좋지만 제품의 색상들이 너무 다른 제품들과 조합하기가 어렵고, 모자는 디자인이나 핏이 너무 난한것들이 많습니다,."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"30~60대 여성 고객님들의 방문이 많았고 이번주는 유달리 체격이 좋은 50~60대 어머님들의 방문이 많았습니다. 그래서 긴바지나 반바지 좀 편하게 입을만한 제품들을 많이 찾으셨고 국내외 고객님들 전부다 첫주에 굉장히 소비를 많이 썼는지 방문이 굉장히 줄어든것이 보였습니다. 특히 주말은 더더욱이 방문객이 떨어졌고 주차장의 차들도 줄을 서지도 않았던 정도입니다."}],"5월3W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"20대부터 50대까지 다양했으며 2030여성들에게 스윙슬리브리스,엘리트 플리츠 스커트,아니코닉 스커트가 터치가많고 잘나갔습니다 여름이 되었고 엘리트 라인의 제품의 소재감은 잘 안나왔던거라서 고객님들의 호기심 반 그리고 여름에 진짜 잘 마를거 같다라는 어필이 잘 어필이 되어진거 같아서 많이 사가셨습니다"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통) -의류 : 엘리트 퍼포먼스, 어드밴스드 등 (5/1","fb":"엘리트 헨리티셔츠는 소재감에 대해서 고객님들이 굉장히 좋아하셨고 냉감에 대한 제품의 의견도 좋았습니다.  센셋매치 라인은 외국인 남여에게 인기가 제일 많았으며,그래픽 또한 너무 윌슨을 강조한 것도 아니면서 케쥬얼하면서 굉장히 이번에 좋은 그래픽으로 생각되어집니다."},{"cat":"용품","topic":"","fb":"리본 니 삭스가 재입고 되었다고 고객님들에게 재입고 상황들을 알렸는데 반응이 크게 오지 않았습니다만 장기적으로 바라 봤을때는 다 나갈 거 같습니다. 선셋매치 볼캡의 색상이 다르면서 소재감이 다른거때문에 고객님들이 같은 제품 맞냐고 재차 물어보시는데 핑크색 제품의 소재로 어두운 컬러를 만들었어도 좋았을거 같습니다."},{"cat":"신발","topic":"","fb":"발볼 넓으신 고객님들이 많았으며 남성분들은 볼트프로1.5 가 제일 반응이 좋았고 여성분들은 인트리그 투어,프로 라인 터지가 많았습니다"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드 V10 과 롤랑가로스 에디션 제품들이 터치율이 제일 높았습니다."},{"cat":"팀스포츠","topic":"","fb":"부모님이 자녀분껄 구매해주실라고 문의 및 방문이 많았습니다 대부분 에볼루션 퓨어샷이 많이 팔렸습니다"},{"cat":"상설","topic":"25SS 5차 추가할인 상품 현장 및 고객 반응은 ?  의류 용품 신발 각각 피드백 요청","fb":"의류 - 티셔츠나 긴바지 반바지등등 대부분 고르셨다하면 50%의 가격이라서 고객님들이 굉장히 좋아하셨습니다.   용품 - 가방이 제일 좀 중요한 할인 품목중에 하나인데 실질적으로 백팩의 할인하는 상품은 몇가지가 안되기 때문에 크게 메리트를 못 느꼈습니다.  신발- 진짜 다양하게 고를수 있는 상황이라서 고객님들이 터치율도 높고 대부분 가격도 싸게 느끼셔서 더 사갈라고 하는 경향도 있습니다 테니스화 같은경우 빠르게 또 닳기 때문에 더 자 at":"팀스포츠","topic":"","fb":"농구공 재입고가 절실히 필요합니다"},{"cat":"상설","topic":"상설 신발 및 쉴드백팩 슬링백현장반응은 ?  가격 및 상품에 대한 고객반응등","fb":"상설 신발은 테니스화는 가격대가 좋아서 괜찮은데 일상화 트레이닝 화 제품들의 가격이 좀더 다운 되어야 생각합니다 사이즈만 있고 사이즈가 맞고 착화감만 문제 없으면 구매로 많이 이어지고 있습니다. 가격에 대한 저항이 많이 없습니다"},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"금주 BTS 로 인해서 일요일에 외국인이 많았고 금,토 는 너무너무 조용했습니다 진짜 평일 정도의 유동인구로 조용했습니다. 그외 적으로는 날씨가 점점 더워지니 몰 안으로 들어오는 느낌을 많이 받았습니다"},{"cat":"기타","topic":"수시사은품 전반 매장 피드백 (스크런치 / 그립커버) 좋은점, 아쉬운점 + 차후 사은품 제안 아이템","fb":"스크런치 너무 큽니다 여자분들은 보통 팔에 끼면서도 패션에 한스푼 추가 하는 느낌이있는데 이게 너~~~~~무 나플나플되게 커서 오히려 거추장 스러워 보입니다. 그립커버도 너무너무 작게 만들어서 타이트하게 규격이 나와서 그립 넣을때 너무 불편합니다  둘다 이번엔 실패같은 느낌이 너무 많이듭니다. 남자분들은 뭘 드려야할지 아쉽습니다."}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"운동목적의 구매수요가 100%입니다. 아직 저희가 일상적인 옷으로 입기에 방문해주시는 고객님들은 그렇게 많지 않으거 같습니다. 이번주는 선셋매치 티셔츠 남자분들 40~50대 남성분들이 많이 보시고 시어아이스 카라 티셔츠 반바지 시어아이스 제품의 문의가 많았는데 흰색은 땀나면 많이 비친다는 의견이 있었어서 초록색으로 많이 터치율이 높았고 네이비나 베이지 같은 다른색상이 없는것에 굉장히 아쉬워 하셨습니다. 여자 분들은 멜로 티셔츠 멜로 폴로탑 등의 재입고로 고객님들의 반응이 다시 오고 있고 같이 해서 엘리트 스커트 등의 제품들이 판매가 잘 되었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"시어아이스 엘리트 같은 얇고 냉감속건 제품들을 많이 찾으셨습니다. 전체적으로 반바지 티셔츠를 많이 찾는게 대다수였고 여자분들도 스커트 얇은 제품을 많이 찾으십니다 그리고 브라탑 나시 제품도 굉장히 터치율이 높았습니다.  여름이라서 여성긴바지수요가 그렇게 높지는 않습니다"},{"cat":"용품","topic":"","fb":"외국인들의 드로우 스트링 V2 백팩을 많이 사가십니다."},{"cat":"신발","topic":"","fb":"시기가 조금 늦은듯한 것으로 느껴져 고객님들의 터치율이 그렇게 높은편이 아니라서 저희는 큰 반응은 없습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"블레이드 V10에 관한 문의는 굉장히 많습니다. 270g의 대한 수요가 많고 여자분들이 초보자에서 중급자 정도로 올라가기 위해 스펙업을 하고 싶어하시는데 보통 275 와 280은 굉장히 부담스러워 하시고 270g 짜리 무게를 많이 찾으십니다 거기에 대한 스펙이 좀 많이 부족하여 아쉽습니다."},{"cat":"팀스포츠","topic":"","fb":"에볼루션과 퓨어샷 입고로 판매량이 늘어가고 있습니다. 보통 하이브리드 형태의 농구공을 좀 많이 찾는경우가 많습니다"},{"cat":"상설","topic":"상설 제품 운영매장 전용 VM가이드 연출 후 현장 반응은 ?","fb":"상설제품 운영해도 사실 사이즈가 꽉 차있거나 원하는 옷들의 제품들이 다 빠져있어서 터치가 있다고 하더라도 구매율로 이어지는경우는 드뭅니다. 특히 남자들의 흰색 티셔츠 종류나 여자분들의 스커트들은 찾는데 제품이 없어서 확실히 어려운경우가 많습 라 전체 고객 유입은 평일에 집중되는 경향을 보였습니다."}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"라켓 판매는 꾸준히 이루어지고 있으나, 현재 고중량 제품과 큰 그립 사이즈 제품 위주로만 재고를 보유하고 있어 다양한 고객 수요를 충분히 충족하지 못하고 있습니다. 이로 인해 구매를 희망하는 고객 중 상당수를 놓치고 있는 상황입니다.  의류 역시 반팔 티셔츠, 스커트, 반바지의 일부 사이즈만 보유하고 있어, 재고가 있는 사이즈의 상품 위주로 판매가 이루어지고 있습니다. 다양한 사이즈 확보가 이루어진다면 판매 기회 확대와 고객 만족도 향상에 도움이 될 것으로 판단됩니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"라켓에 대한 고객 문의는 지속적으로 많으며, 특히 여성 고객들의 관심이 높은 편입니다. 그러나 현재 여성 고객이 선호하는 중량 및 그립 사이즈의 제품 재고가 부족하여 실제 판매로 이어지지 못하고 있습니다. 이로 인해 여성 고객층의 수요를 충분히 흡수하지 못하고 있으며, 관련 제품군의 재고 확보가 필요하다고 판단됩니다."},{"cat":"상설","topic":"상설 신발 및 쉴드백팩 슬링백현장반응은 ?  가격 및 상품에 대한 고객반응등","fb":"이번에 추가 할인된 신발은 고객 반응이 매우 좋으며 판매도 원활하게 이루어지고 있습니다. 가격 경쟁력이 높아지면서 구매 문의와 실제 구매 전환이 증가하는 모습을 보이고 있습니다.  또한 쉴드백 역시 고객들에게 적극적으로 추천드리고 있으며, 가격을 확인한 후 구매를 결정하는 고객들이 이전보다 눈에 띄게 증가하였습니다. 전반적으로 고객 반응과 판매 실적이 개선되고 있는 것으로 판단됩니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주대비 평일/주말 입점고객수가 감소한걸로 보입니다."}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"최근 단골 고객 모임 및 클럽 회원들의 소규모 단체 주문 문의가 증가하고 있습니다. 특히 퓨어드라이 티셔츠에 대한 문의가 가장 많으며, 매장에서도 지속적으로 수요가 발생하고 있습니다. 그러나 상품 재고가 부족한 상황으로, 여성 사이즈의 경우 현재 재고가 전혀 없어 판매 기회를 놓치는 사례가 빈번하게 발생하고 있습니다. 이로 인해 매출 확대에 어려움이 있는 상황입니다."},{"cat":"용품","topic":"","fb":"모자는 캠프캡 스타일에 대한 수요가 높은 편이나, 현재 매장 내 관련 상품이 1종만 운영되고 있어 아쉬움이 있습니다. 백팩은 꾸준한 판매를 유지하고 있으며, 쉴드 백팩은 가격 인하 이후 판매가 더욱 호조를 보이고 있습니다."},{"cat":"신발","topic":"","fb":"가격 인하가 적용된 여성 인트리그 프로 화이트가 이번 기간 가장 높은 판매 성과를 보이며 독보적인 반응을 얻었습니다. 또한 남성 러쉬 프로 화이트 역시 매출 기여도가 높았으며, 고객 반응 또한 매우 긍정적이었습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"260g~280g 무게대의 1그립, 2그립 사이즈 재고가 전혀 없는 상황입니다. 이로 인해 해당 상품을 찾는 고객들의 구매가 이어지지 못하고 있어, 매주 판매 기회를 놓치고 있는 점이 아쉽습니다."},{"cat":"상설","topic":"상설 제품 운영매장 전용 VM가이드 연출 후 현장 반응은 ?","fb":"고객 반응은 매우 좋은 편이나, 재고 부족으로 인해 DP 상품 판매 후 추가 판매가 이어지지 못하는 상황이 반복되고 있습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주대비 비슷한 입점수 입니다."},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"선크림과 피부 진정 팩으로 안내드리며 증정해 드렸더니 고객 만족도가 매우 높았습니다. 또한 브랜드를 검색해 보신 후에도 타 브랜드 대비 사은품 구성이 뛰어나다며 좋은 반응을 보였고, 긍정적인 평가를 해주셨습니다."}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"여성 상품은 사이즈가 있는 제품을 중심으로 고객 상황에 맞춰 응대하고 있습니다. 다만 제품 스타일과 사이즈 구성이 매우 부족한 상황이어서, 고객들은 선택의 폭이 넓지 않아 재고가 있는 상품 위주로 구매하는 경향을 보이고 있습니다. 이로 인해 현재는 재고가 확보된 상품이 자연스럽게 베스트 판매 상품으로 이어지고 있습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품) 드로우스트링 백팩 V2 신규 컬러 반응  (내/외국인 비중,","fb":"입고상품이 절실하게 필요합니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"여성분들이 사용할수있는 무게라켓이 없습니다. 블레이드 v9라도 있으면 판매에 너무나 큰도움이 있을꺼 같습니다."},{"cat":"상설","topic":"동업계 브랜드 상설 FW 입고 현황 및  주로 나가는 아이템 현황은 ?","fb":"아직까진 f/w 상품 입고된 브랜드는 없는거 같습니다. 그리고 주판매는 여성분들이기에 스커트나 반바지스커트 나시종류가 있으면 꾸준히 판매완료중 입니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주 대비 방문 고객 수가 크게 감소했습니다. 제품 보충이 원활하지 않아 고객들이 원하는 상품을 찾지 못하는 경우가 많았으며, 이로 인해 재방문율도 감소한 것으로 판단됩니다."}],"7월1W":[{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"금주 입고된 남성 티셔츠는 기존에 품절되었던 신규 사이즈가 추가 입고되면서 고객 반응이 가장 좋았습니다.  반면, 경쟁사 대비 여성 상품 구성이 부족한 상황입니다. 특히 여성 그랩 사이즈와 250g, 270g 상품이 전혀 없어 커플 고객의 동시 구매를 유도하는 데 많은 어려움이 있습니다.  또한 전체적으로 여성 아이템의 물량이 부족하며, 특히 여성 스커트와 티셔츠의 상품 구성이 매우 부족한 상황입니다. 여성 상품을 보강한다면 커플 고객 판매 확대와 매출 증대에 도움이 될 것으로 판단됩니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"현재  4/3그립과 4/4그립 재고만 보유하고 있어 고객 선택의 폭이 제한된 상황입니다. 이로 인해 매출에도 일정 부분 어려움이 발생하고 있습니다. 특히 여성 고객들의 문의는 꾸준히 많지만, 원하는 규격의 재고가 없어 실제 판매로 이어지지 못하는 경우가 대부분입니다."},{"cat":"상설","topic":"25FW 상설 신상품 입고 후 현장반응","fb":"입고가 한번뿐이여서 아쉽긴 하지만 금주는 이번입고된 상품반응이 좋았습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주대비 비슷했던거같습니다. 기존고객분들이 많이 뜸해졌습니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"1box"}]},"아이파크":{"5월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"시어아이스 셋업 판매가 좋습니다. 비침있는 화이트보다 베이지 선호도가 가장 높으며 선물용으로도 많이 구매해가십니다. 2030 여성 고객 방문이 많아 피키 셋업 판매도 좋았습니다. 시어아이스는 피스테 보다 카라 디자인 선호도가 높습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  **신발 : 에어벨 W 고객 반응 (착화, 디자인","fb":"다양한 스타일의 아노락 찾는 남성 고객님들 계시고 시어아이스가 주력이고 여름시즌이면 더 많은 판매가 이루어질텐데 창재고가 없는 제품도 있어 아쉬움이 큽니다. 시어서커 소재의 다양한 아이템이 있어도 좋을 거 같습니다."},{"cat":"용품","topic":"","fb":"용품 판매는 꾸준히 좋습니다. 리본 니삭스를 찾는 고객들이 여전히 계십니다."},{"cat":"신발","topic":"","fb":"남성 고객은 러쉬 투어&프로와 여성 고객들은 인트리그 라인 선호도가 높고 테니스화는 대부분 목적구매로 이어집니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항  라켓 1. 롤랑가로스 에디션 런칭 후 롤랑라켓 목적유입은 어느정","fb":"라켓 보러 오시는 분들도 적고 즉시 스트링을 원하시는 고객들이 대부분입니다. 롤랑가로스는 올해 디자인이 가장 예쁘다는 피드백이 있습니다."},{"cat":"팀스포츠","topic":"","fb":"화려한 디자인의 농구공 선호도가 높습니다. 공주머니 외로 백팩 스타일이 있어도 좋을 거 같습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주대비 평일~주말 20% 정도 입점이 감소하였습니다. 오전에는 한가하고 3시 이후로 붐비는 정도입니다. 다른 특이사항은 없었고 골든위크 이후 외국인 고객 발걸음도 눈에 띄게 줄었습니다. 황금연휴 이후 소비를 아끼려는 분위기도 있습니다."},{"cat":"","topic":"전체 고객 중 외국인 유입비중 (증가한 사유? 별도 점포에서 외국인 대상 진행하고 있는 프로모션/사은혜택은?","fb":"외국인 대상 프로모션 없습니다. 자연유입으로 외국인 고객이 있는 정도이며 비중은 국내 8: 외국인 2 정도 입니다."}],"5월2W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"테니스 고객 뿐만 아니라  일반 고객 입점이 있는 한주였습니다. 20대 여성 고객이 메인이라 무난한 스타일의 피키스튜디오 셋업이 터치가 많았습니다. 테니스 고객들은 시어아이스나 기본 퓨어드라이 셋업으로 구매해가십니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통)  용품 -본격 여름성 아이템 상세 반응 (바이저,","fb":"여성 고객님들 기본 퓨어드라이 넥이 답답하다는 피드백이 몇몇 있었습니다. v넥 스타일이나 금주 입고된 남성 헨리넥 탑이 여성 버전으로 있었으면 좋겠다는 피드백도 있었습니다. 브라탑 구매 고객이 많으셨는데 ss 볼레로 부재가 아쉽다고 하시는 분들도 계셨습니다."},{"cat":"용품","topic":"","fb":"드로우스트링 백팩은 국내 고객들에게 꾸준히 인기가 좋으며,그레이 컬러 문의주시는 분들도 계셨습니다. 여름용 메쉬백팩은 신발주머니가 하단에 없어 구매전환이 이루어지는 편입니다. 바이저는 의류와 연계판매가 잘되고 마스크 장갑 등의 용품은 반응 없습니다."},{"cat":"신발","topic":"","fb":"에어벨은 지나가면서 귀엽다 정도며, 진성 고객 보다 자연유입으로 일반 고객이 구매해가십니다. 에어라이트 다른 컬러 문의있습니다.(블랙이나 네이비,핑크 있어도 좋을 거 같습니다.)"},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항 ★롤랑가로스 라켓/가방★ 1. 디자인 요소 (흘림체 글씨/문양/전","fb":"흘림체 글씨와 문양이 예뻐서 여성 고객 선호도가 높습니다. 내국인 비중이 높으며 가격 비교를 많이 하시고 바로 사용하기 위해 방문해주시는 고객님들이 계셔서 구매 비중이 높진 않습니다."},{"cat":"팀스포츠","topic":"","fb":"라켓 구매 비중이 높지 않아 연계판매로 용품까지 이어지진 않습니다. 간혹 가격 문의는 있으나 드로우스트링이나 슬링백으로 보시고 구매해가십니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"전주대비 신규 고객 유입이 많은 한주였고, 지방 내려가기 전 들른 고객들이 있었습니다. 목적구매 보다 오신 김에 구경해보시고 구매로 이어졌습니다."}],"5월3W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"30대 남성 고객님들은 퓨어드라이 소재 반팔티&반바지 셋업 판매가 좋았습니다. 2030여성 고객들은 시어아이스, 선셋 라인, 엘리트 등 골고루 판매되었습니다. 간혹 무릎 위 기장을 선호하시는 4050 고객들이 계십니다.(스커트&팬츠 등)"},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 (의/용/신 공통) -의류 : 엘리트 퍼포먼스, 어드밴스드 등 (5/1","fb":"선셋 매치는 입고당일 40대, 자녀 선물용으로 구매해가셔서 주말 동안 사이즈가 깨져있어 아쉬워하시는 고객님들이 계셨습니다. 엘리트 스커트는 메쉬로 되어있어 타제품 대비 선호도가 눈에 띄게 높았습니다. 여성 고객들이 헨리넥 스타일의 V 넥을 찾는 분들이 계셨습니다."},{"cat":"용품","topic":"","fb":"리본 니삭스는 목적구매보다 스커트나 테니스화 보시는 분들이 연계구매해가십니다. 선셋매치 또한 2030 고객님들께서 디자인이 예쁘다고 구매해가십니다. 크루삭스는 아직 반응 없습니다."},{"cat":"신발","topic":"","fb":"남성 고객님들의 285~290 사이즈의 입고가 이루어지면 좋을 거 같습니다. 창재고는 없고 신발 사이즈가 대부분 깨져있어 주문으로 안내드리는 경우가 많습니다. 여성분들 인트리그 투어 선호도가 높고 남성 고객님들 또한 러쉬투어 선호도 높습니다. 경량 테니스화를 잘 안보십니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"클래시 블레이드 인기가 좋고 롤랑가로스 모델, 데저트 등 한정판 모델 선호도가 높습니다. 대부분 테린이들로 커플 단위 방문이 많습니다."},{"cat":"팀스포츠","topic":"","fb":"볼타워 골고루 판매되며 물량이 적어 주말이 지나면 비어있는 경우가 있습니다. 여유있게 운영되면 좋을 거 같습니다. 글러브 문의가 간혹 있습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"지난주보다 입점객수는 줄었으나 객단가는 비슷하게 나오고 있습니다. 목적구매보다 자연유입으로 필요한 의류,가방,신발 등 연계판매로 객단가 높이고 있습니다. 점포 5층에 테니스 메트로가 위치하고 있어 간혹 테니스 매트로 위치나 상품군 비교, 가격 비교 등이 많습니다."}],"5월4W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"20대 여성 고객들은 선셋 매치 선호도가 높았고 30대 엘리트, 40대 시어아이스였습니다. 3040 남성 고객들은 대부분 시어아이스를 선호하셨습니다. 기본 퓨어드라이 판매도 좋습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항 [의류] 선셋매치 라인업  1. 구매목적 : 테니스 카테고리가 아니라","fb":"테니스 60, 일반 고객 40으로 마네킨 착장 보시고 구매하러 오시는 분들이 많이 계십니다. 컬러가 눈에 띄어서 좋아해주시며, 디자인이 예쁘다는 피드백이 있었습니다. 피키라인은 기본 반팔티와 무난하게 다 잘어울리는 디자인이라 컬러만 맞춰서 착용하시는 분들이 많이 계십니다. 링거슬림이 운동복 같지 않아서 구매로 이어집니다. 다만 구매 고객 연령대는 1020이 많습니다. 타이다닝 터치 및 반응 전혀없습니다. 핑크색은 여성 라인으로 크롭하게 나왔으면 좋았을 거 같습니다.  남성 숏츠는 대부분 짧다는 피드백이 많습니다. 기능성을 알고 터치는 많으나 피팅 후 핏이 부담스럽다는 피드백이 있습니다."},{"cat":"용품","topic":"","fb":"볼캡은 2040 다양한 연령대 고객들이 디자인이 예뻐서 구매로 이어집니다. 크루삭스는 전혀 반응 없습니다. 선셋매치로 연계판매 이루어지기 보단 라켓, 신발, 타의류들과 함께 구매해가십니다. 드로우스트링 아이보리 및 그레이 문의가 많은 한주였습니다."},{"cat":"신발","topic":"","fb":"메리제인은 매장 메인 DP 테이블에 두어 2040 다양한 여성 고객님들이 보시고 구매해가십니다. 신어보시고 편하다, 쿠션감이 느껴진다, 여름용 샌들로 딱이다 라는 긍정적인 피드백이 대부분이었으나, 간혹 연결 메쉬망이 너무 약해서 내구성 제기하시는 분들도 계셨습니다. 국내 고객 비중이 90% 입니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"금주는 라켓 판매가 저조하였습니다. 테린이 보다 구력있으신 분들이 오셔서 즉시 스트링 문의가 많아서 이탈이 좀 있었습니다."},{"cat":"팀스포츠","topic":"","fb":"축구공 및 미식축구공 문의가 현장 뿐만 아니라 유선상으로도 꾸준히 있습니다. 글러브 입고 소식을 물어보시는 분들도 간혹 계십니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"금주는 입점고객이 전주대비 감소하였지만 객단가는 전주보다 2~30% 높았습니다. 2030 진성고객들의 대회 준비로 방문이 이어져 다양한 스타일을 구매해가셨습니다."},{"cat":"","topic":"1) 에어벨 W의 판매호조 사유 - 주 구매 고객층 (테니스/일반) (테니스신발이 아닌데 어떤고객이 구매하는","fb":"에어벨은 테니스 고객보다 일반 고객들이 메리제인 윌슨 스타일이 예뻐 구매해가십니다. 여름용으로 가볍게 신으려 터치가 많고, 테니스 하는 고객 선물용으로도 많이 보십니다. 선셋매치 숏츠, 스커트 골고루 보시고 컬러 맞춰서 구매해가십니다."},{"cat":"기타","topic":"신규 라켓 출시 프로모션 진행을 위한 그립커버 사전 주문  박스당 수량 30개, 개당 단가: 3,000원(V","fb":"2박스"}],"6월1W":[{"cat":"공통","topic":"1-1. 금주 연령대별/성별 판매 베스트 스타일과  어떤 특징이 있었는지?","fb":"2040 여성 고객들 시어아이스 셋업 선호도가 높고, 20대 여성 고객들 오프코트 피케 폴로와 더블메쉬 스커트, 미드타운 등 본인 취향에 맞게 다양한 스타일로 구매 이어집니다. 남성 고객들은 퓨어드라이 반팔티와 반바지 셋업 판매가 좋습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품 - 드로우스트링 백팩V2 (아이보리, 화이트) 재입고 후 반응,","fb":"셋업 맞추기 부담스러운 고객님들께서 에브리데이 코트 드레스 W 정말 많이 입어보시는데 대부분 테니스 고객님들이십니다. 이너와 셋트로 착용 전엔 긍정적이나, 볼수납 주머니가 없어 아쉽다는 피드백이 많았습니다. 남성 의류가 많이 단조롭고 구성이 아쉽다는 의견이 많습니다."},{"cat":"용품","topic":"","fb":"연핑크, 노란,민트 계열의 백팩이나 슬링백이 있으면 좋을 거 같다는 피드백있습니다. 드로우스트링은 꾸준히 판매 좋으며, 다만 V1 버전의 네이비, 브라운 찾는 고객들이 간혹 계십니다."},{"cat":"신발","topic":"","fb":"남성 사이즈 다 깨져있어 이탈이 많습니다. 점포 특성상 체격 좋은 외국인 고객들이 계시는데 290,295 등 입고되어 있지 않아 응대에 아쉬움이 큽니다. 여성 사이즈 재고는 여유있어, 남성 사이즈 여유있게 입고해주시면 더욱 더 연계 판매에 객단가를 상승시킬 수 있을 거 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"금주는 라켓 보러 주말에 2팀 방문해주셨는데, 2팀 모두 즉시 스트링을 원하셔서 테니스매트로로 이탈이 있었습니다. 테니스 메트로에서 자점 라켓을 할인 및 프로모션 해드리고 있어 크게 호응이 없는 한주였습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공 판매는 골고루 잘 이루어지며, 농구공 백팩 문의가 있는 한주였습니다."},{"cat":"기타","topic":"전주대비 금주 고객입점 현황은?","fb":"평일에는 점포내가 한가하며, 주말 또한 입점객수는 전주대비 감소하였습니다. 다만 객단가가 상승하여 매출 확보 가능하였습니다."},{"cat":"기타","topic":"타 브랜드 프로모션/ 행사현황 (POP내용 등 참조)","fb":"테니스매트로 용산점 특별 프로모션  10만원 이상 구매시 팔토시 증정/ 15만원 이상 구매시 양말 증정 / 20만원 이상 구매시 스트링백 증정 / 40만원 이상 구매시 팔토시&양말&스트링백 전부 증정"}],"6월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"2030 여성 고객들에게 탑스핀 폴로 브라 & 다운타운 메쉬 스커트 판매가 좋았습니다. 간혹 비침이 부담스럽다고 하셔서 벨로시티 스커티로 구매전환이 이루어졌습니다. 남성 고객님들은 기본 퓨어드라이 소재 셋업으로 판매가 좋습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   *스트로베리앤크림 컬렉션 반팔티 반응? 구매목적(라이프 OR 운동)","fb":"스트로베리 컬렉션 아직 반응 없습니다. 국내 고객들은 뒤늦게 인스타 및 홈페이지 보시고 선셋매치 셋업을 더 많이 찾으시는데 재고가 많이 깨져있어 응대에 아쉬움이 있었습니다. 브라탑이나 카라있는 디자인 선호도가 높습니다. 숏츠보다 스커트 터치가 더 많습니다."},{"cat":"용품","topic":"","fb":"피키크루 삭스는 의류랑 연계판매는 안 이루어지는 편이며, 테니스 양말 치고 너무 얇아서 아쉽다는 피드백이 있었습니다. 클래식 스프라이트 컬러가 그린, 퍼플 등 다양하면 좋을 거 같습니다."},{"cat":"신발","topic":"","fb":"신규 컬러들 중 블루 컬러 터치가 가장 많고 220,225,280,285 등 사이즈 부재로 인한 판매로스가 아쉬웠습니다. 여성 인트리그도 보충되면 좋을 거 같습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"금주는 라켓 보러 오시는 분들이 없었으며, 유선상 문의로 스펙 확인만 하십니다. 즉시 스트링 가능한지 물어보시는 신규 고객들이 늘고 있습니다."},{"cat":"팀스포츠","topic":"","fb":"축구공 문의가 있는 한주였습니다. 농구공은 평일보다 주말 가족단위로 방문 후 구매해가십니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주대비 입점이 30% 정도 감소하였고, 점포 층 자체가 한산합니다. 평일에는 5~6팀 내외로 저조하지만 객단가가 있어 매출 유지하고 있습니다. 목적구매는 없으며 대부분 자연유입으로 입점하시고 구매해가십니다. 신규 고객이 많은 한주였습니다. 외국인 고객도 전주대비 줄었습니다."},{"cat":"기타","topic":"수시사은품 전반 매장 피드백 (스크런치 / 그립커버) 좋은점, 아쉬운점 + 차후 사은품 제안 아이템","fb":"음료 보냉팩 (네이버 검색,ex:키티 텀블러 보냉백)- 4계절내내 음료는 사마시는 경우가 많으니 윌슨 버전으로 있으면 소유욕도 생길 거 같고(특히 진성 고객), 캐릭터랑 콜라보로 디자인해도 좋을 거 같습니다."}],"6월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?  * 금주 의류구매목적은? 이른 휴가철? or 운동목적 구매","fb":"금주는 테니스 고객 60: 일반 고객 40 정도의 비중으로, 테니스 동아리 및 테린이들 입점이 있는 한주였습니다. 가볍게 시작하시는 남성 고객님들은 기본 퓨어드라이&반바지 셋업으로 판매가 많이 이루어졌으며 2030 여성 고객님들은 탑스핀 폴로 브라 or 테크 포인텔 폴로 상의 터치가 많았습니다. 하의는 벨로시티나 더블메쉬 터치가 많았습니다. 휴가목적으로 구매하시는 분들은 선셋매치 터치가 있었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항   1. 퓨어드라이 FW 신상 컬러 및 입고 반응  2. 여성고객 여름","fb":"기본 화이트 스커트가 부족합니다. 판매가 많이 되었던 리플 스커트 wht 및 엘리트 라인 등 기본 화이트(국내고객 미드타운 선호도 낮음) 스커트가 더 많이 추가되면 좋을 거 같습니다. 와인색 상/하의 문의주시는 고객님들이 계십니다. 3부 정도의 숏츠 찾는 4050 고객님들 계십니다. 긴바지는 남성 고객님들이 더 찾으십니다. 밑단 스트링 조절되는 디자인이면 좋을 거 같습니다."},{"cat":"용품","topic":"","fb":"플로트백팩 디자인 선호도는 높으나, 컬러가 아쉽다는 피드백이 많습니다. 드로우스트링 에어의 gbl이나 핑크 등 있으면 좋을 거 같다는 고객님들 피드백이 있었습니다. 스카이블루나 민트 계열의 시원한 컬러 찾는 분들도 계십니다."},{"cat":"신발","topic":"","fb":"에어리 리오더 후 반응은 크게 없습니다. 여성 고객님들은 인트리그, 남성 고객님들은 러쉬 라인을 가장 많이 찾으십니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"자점 인스타그램 릴스 보시고 디엠&유선상 CLASH 100L V3 B&A FRM 2 문의주시는 고객님들이 계십니다. 데저트나 롤랑가로스로 안내드리고 있습니다. 금주는 테니스 고객이 적어서 라켓 판매가 저조하였습니다. 280g 대의 1그립 문의가 많습니다."},{"cat":"팀스포츠","topic":"","fb":"가족단위로 구매해가시며 간혹 신상 농구공 및 축구공 문의있습니다. 유선상으로 글러브 입점되어 있으면 실물보고 싶다는 고객님들이 늘었습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주대비 평일,주말 모두 한가하였으며 객단가는 유지되고 있어 매출 방어 가능하였습니다.  외국인 고객이 거의 없고 내수 고객(재방문) 들의 방문이 이어졌습니다."},{"cat":"기타","topic":"UV 파우치 고객 피드백 - 구매연계 도움되는지? - 더워지는 현시점 적절한 이벤트인지 (사은품에 대한 반응","fb":"사은품이라 좋아해주시는 고객님들이 많이 계시고, 제품을 하나하나 따지면서 받아가시는 분들은 안 계셨습니다. 테니스 고객 뿐만 아니라 일반 고객들도 좋아해주셨습니다. 여성 고객 입점이 대부분인 점포라 스크런치 좋아해주십니다."}],"6월4W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"2030 여성 고객들은 기본 퓨어드라이와 스커트&스커티 연계판매가 좋으며, 재구매로 다른 컬러도 찾아주시는 분들이 많습니다. 카라 디자인 선호도가 높아 탑스핀 폴로 브라W 판매가 좋습니다. 테크 포인텔 폴로 W의 다른 컬러나 유사 디자인을 찾는 분들이 정말 많습니다. 4050 남성 고객님 선물용으로 시어아이스 셋업 판매가 좋습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항  용품) 드로우스트링 백팩 V2 신규 컬러 반응  (내/외국인 비중,","fb":"올리브,연보라,버건디 컬러 등 있어도 좋을 거 같습니다. 위아래 셋업으로 구매가 많이 이루어지는데 비슷한 컬러 구성으로 기존 고객들은 지루함을 느끼시는 거 같습니다. 사이즈가 깨져있는 아이템이 많아 신상 입고가 빠르게 이어지면 좋을 거 같습니다."},{"cat":"용품","topic":"","fb":"아직까지 신상 디자인 판매가 많이 되진 않았지만 그 중 라이트 그레이가 반응은 좋습니다. 기존의 그레이 컬러를 찾으시는 고객님들도 계시지만 신상으로 안내해드리고 있습니다. 조금 더 지켜봐야 될 거 같습니다. 드로우스트링 국내 6: 외국인 4 정도 입니다."},{"cat":"신발","topic":"","fb":"에어리 화이트 리오더로 문의주시는 고객님들이 늘었습니다. 20대 초반 여성 고객들 선호도가 높지만, 디자인 및 금액대로 인트리그로 구매전환 됩니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항","fb":"금주는 라켓 고객님이 거의 없었습니다. 롤랑가로스 100L 리오더 문의만 2-3분 계셨고, 별도의 문의는 없었습니다."},{"cat":"팀스포츠","topic":"","fb":"농구공은 한주에 7-8 정도만 판매되고, 기존 고객들이 신상을 찾는 경우가 많습니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"평일이랑 주말하고 유입고객이 크게 차이나지 않습니다. 금주는 목적구매 50:자연유입 50 정도의 비중이고, 내수 고객은 전주와 비슷하나 외국인 고객이 감소하였습니다."},{"cat":"기타","topic":"* 26FW 상품교육북 매장의견   - 상품교육자료를 직관적으로 볼 수 있게 품번/상품명 검색 시, 세일즈포","fb":"자료로 변경되고 직원 교육용 뿐만 아니라, 보강된 세일즈 포인트로 안내드릴 수 있어 좋습니다. 매뉴얼 보기가 어렵지 않아 매니저 뿐만 아니라 새로운 직원들도 쉽게 다룰 수 있습니다."}],"7월1W":[{"cat":"공통","topic":"1-1. 금주 판매베스트 및 신상 의류 반응은?","fb":"퓨어드라이 판매 비중이 높으며, 금주는 시어아이스/피키 스튜디오 셋업/ 리플 메쉬 등 골고루 판매되었습니다."},{"cat":"의류","topic":"2-1.의류/용품/신발 판매 특이사항\n- 의류 : 현시점 추가 구성 필요한 아이템, 경쟁사 대비 부족한 아이템\n\n-용품 :  드로우스트링 신규 ","fb":"긴바지 찾는 고객들이 늘어나고 있습니다. 우븐이나 여름용 메쉬 소재면 좋을 거 같습니다. 풀집업 자켓 여름용 (볼레로 대용) 있으면 좋을 거 같습니다. 셋업으로 의류들 찾으시는데 컬러가 아쉽다는 피드백이 종종 있어 반팔 신상이나 하의 등 위아래 컬러가 통일감 있으면 좋을 거 같습니다."},{"cat":"용품","topic":"","fb":"윌베어 키링은 반응 너무 좋습니다. 카운터에 비치하여 결제 전 한번 더 보시고 구매로 이어지며,지인 선물용으로도 많이 보십니다. 기존 고객들께서 왜 이제서야 나왔냐며 너무 좋아해주십니다. 심리스 바이저는 선호 고객들에게 판매되고 디자인 자체가 무난해서 판매 올라올 것으로 기대됩니다. 소프트 에어는 때타면 안 지워질 거 같다는 피드백은 있으나 라벤더 컬러를 좋아해주십니다. 신규 컬러도 반응이 좋으나 v1(버전1)이라 인기가 좋은 것도 있는 거 같습니다."},{"cat":"신발","topic":"","fb":"신상 반응 아직 크게 없으며, 블랙 컬러가 그라데이션이 들어가 그나마 남성 고객들의 터치가 있는 편입니다. 대체적으로 인트리그&러쉬 라인을 구매해가십니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 각각 판매 특이사항\n\n* 디파이어 라켓 초기반응\n(문의 많은지, 주로 어떤 문의 위주로 많이 오는지)","fb":"금주는 라켓 보러 오는 고객님이 적어 판매가 저조하였습니다. 주말간 한분께서 파이썬을 언급하셨고 디파이어는 문의없었습니다. 점포 특성상 한정판 에디션만 판매되고 있습니다."},{"cat":"팀스포츠","topic":"","fb":"기존 고객들은 볼타워 피로도가 높으며, 10대 학생들에게 신상 문의가 있는 편입니다."},{"cat":"기타","topic":"전주대비 금주 고객 입점 현황은?","fb":"전주대비 20% 정도 입점객이 감소하여 점포 자체가 평일 뿐만 아니라 주말에도 한가합니다. 객단가는 평균 3~40만원 정도 입니다. 가족단위가 많았습니다."},{"cat":"기타","topic":"하반기 정기사은품 \"케이프담요\"\n\n1박스당 36만원 → 본사지원적용 18만원(V-)\n1박스당 30개단위\n\n박스단위로 주문수량 기재해주세요! \n(","fb":"2박스 신청합니다."}],"7월2W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"금주는 의류보다 테니스화 보러 오시는 고객들이 많았습니다. 여성 고객들은 인트리그,남성고객들은 러쉬투어로 구매해가셨습니다. 의류는 폴로 디자인 터치가 좋았어서 다양한 디자인으로 나오면 좋을 거 같습니다. 폭염으로 시어아이스 반응이 좋아 리오더가 이뤄지지 않은 점이 아쉬웠습니다."},{"cat":"의류","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신상 전반적인 고객 터치 및 피드백","fb":"의류 깨져있는 디자인이 대부분이라 셋업으로 보셔도 인기있는 상품 대부분 주문으로 도와드려야 되는 상황이 빈번히 있었습니다. 금주 신상 입고를 물어보시는 단골 고객들도 꽤 많이 계셨습니다. 폴로(카라) 디자인이 인기가 좋은데 SKU가 적어 아쉽습니다."},{"cat":"용품","topic":"2-1. 의류/용품/신발 판매 특이사항 - 드로우스트링 신규 반응","fb":"듀오플랩 옐로우 컬러 인기 좋습니다. 하단에 신발 주머니 추가되면서 반응이 더 좋고 디자인이 마음에 들어 구매로 이어집니다. 에어소프트는 원단이 때타는 걸 우려하여 드로우스트링이나 듀오플랩 백팩으로 구매전환 이루어집니다. 캠프캡은 디자인이 예쁘다고 좋아해주셨습니다. 바이저는 꾸준히 많이 판매됩니다."},{"cat":"신발","topic":"2-1. 의류/용품/신발 판매 특이사항 - 신발 신규컬러 반응","fb":"에어리 레드/옐로우 컬러는 좋아해주시는데, 굽이 높아 호불호 나뉩니다. 그럼에도 예쁘게 신고 사진 찍으신다고 구매해가십니다. 리스폰스 신규 컬러는 터치 없습니다. 골드 컬러가 의류랑 매치하기 어렵다는 피드백이 있었습니다."},{"cat":"라켓","topic":"2-2. 라켓/팀스포츠 - 디파이어 판매반응","fb":"자점 인스타그램 보시고 주문하시는 국내 고객들 비중이 높았고(1자루 제외 전부 내수고객), 구력있으신 고객님들이 대부분이셨습니다. 런칭후 구매로 이어졌으며, 유선상으로도 문의가 당일날 많이 왔습니다. 본인이 사용하려고 스트링 작업을 원하시는 고객님들/ 본인이 맡기는 스트링샵이 있는 경우 바로 수령해가시곤 하셨습니다. 기존 윌슨 고객 6:타브랜드 비중 4 정도로 바볼랏 유저고객들의 방문이 높았고 같이 오시는 여성 고객님들께서 여성 스펙 입고 문의가 있는 편이었습니다."},{"cat":"팀스포츠","topic":"2-2. 라켓/팀스포츠 - 팀스포츠","fb":"주말동안 농구공 판매는 저조하였고 외국고객들의 구매가 있었습니다."},{"cat":"기타","topic":"전주대비 고객 입점 현황","fb":"평일10팀 내외, 주말 20팀 정도의 입점이 있었습니다. 목적구매보다 자연유입이 대부분이고 국내고객님들께서 타점포에서 해주는 할인율을 제시하며 가격 비교하시는 고객들이 꽤 있는 한주였습니다. 폭염으로 인한 점포내 사람은 붐비는 정도였고 입점이 끊기는 시간대도 있었습니다."}],"7월3W":[{"cat":"공통","topic":"1-1. 금주 판매베스트","fb":"금주는 나시 스타일을 찾는 고객들이 많았습니다. 여성 고객들은 탑스핀 폴로, 남성 고객들은 선셋 매치 슬리브리스를 선호하셨습니다. 퓨어드라이 소재 반팔티 판매는 꾸준히 좋습니다."},{"cat":"의류","topic":"2-1. 의류 판매 특이사항","fb":"바람막이 자켓 및 셋업(긴바지)를 찾는 분들이 전주보다 많이 계셨으며 지속적인 장마로 인한 겉옷(아우터)를 찾는 듯 하셨습니다. 매장에 재고가 깨진 게 많아 시즌 지난 건 반품으로 내보내고 매장에 환기가 필요로해 보입니다. 신상 찾는 기존 고객들이 많이 계십니다."},{"cat":"용품","topic":"2-1. 용품 판매 특이사항","fb":"올어라운드 국내 고객 반응은 아직 없으며, 핑크 컬러 사진을 보여주시고 구매원하시는 고객들이 계십니다. 바이저는 다양한 스타일이 판매가 좋으며,키컬러 맞추시는 고객님들이 계시는데 노랑,핑크 컬러가 있으면 좋을 거 같습니다."},{"cat":"신발","topic":"2-1. 신발 판매 특이사항","fb":"간혹 골드 컬러가 취향이신 고객들이 계시나 신어보시고 의
